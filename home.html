<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — Me</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--green:#3E8C28;--amber:#C77800;--blue:#29ACE3;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1180px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:23px;font-weight:700;color:var(--charcoal);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rolepill{font-size:11px;padding:2px 9px;border-radius:20px;background:#eceae3;color:#5f5e5a;font-weight:600}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  .grid2{display:grid;grid-template-columns:1.15fr 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .panel h3{margin:0 0 4px;font-size:15px;color:var(--charcoal)}
  .panel .hint{font-size:12px;color:var(--muted);font-weight:400;margin:0 0 10px}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);cursor:pointer;font:inherit}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.ok{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
  .btn.no{color:var(--red);border-color:#f0c4c4}
  .btn:hover{filter:brightness(.97)}
  .clockbig{font-size:30px;font-weight:800;color:var(--charcoal);padding:10px 30px}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .alarm{background:#FBEAEA;border:1px solid #E8B4B4;color:#8a1d1d;font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:10px}
  .alarm a{color:#8a1d1d;font-weight:700}
  .allgood{background:#EAF5E6;border:1px solid #BEE0AF;color:#2f6a1f;font-size:13px;padding:10px 14px;border-radius:10px}
  .evchips{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 2px}
  .evchip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600;color:var(--charcoal);cursor:pointer;text-decoration:none}
  .evchip:hover{border-color:var(--orange)} .evchip .dot{width:10px;height:10px;border-radius:3px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 9px;border-bottom:1px solid #efede8;vertical-align:top}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .st{font-size:11px;font-weight:700;border-radius:10px;padding:1px 8px;color:#fff;white-space:nowrap}
  .chip{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;border-radius:10px;padding:2px 9px;display:inline-block;white-space:nowrap}
  .empty{color:var(--muted);font-style:italic;padding:8px 2px}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #f2f0ea;font-size:13px}
  .kv:last-child{border-bottom:none} .kv .k{color:var(--muted)} .kv .v{color:var(--charcoal);font-weight:600;text-align:right}
  input,select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;color:var(--ink);font:inherit}
  .frm label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
  .days{font-size:13px;color:var(--charcoal);font-weight:600;margin:2px 0 6px}
  .flags{font-size:12px;color:var(--red);margin:0 0 10px;min-height:15px}
  .flags div{margin-bottom:2px}
  .flag{color:var(--red);font-size:12px}
  .decidecard{border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:10px;padding:10px 12px;margin-bottom:10px;background:#fff}
  /* allocation */
  .mnav{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .mnav b{font-size:14px;color:var(--charcoal);min-width:150px;text-align:center}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 12px}
  .chipbox{background:#faf9f6;border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--muted)}
  .chipbox b{display:block;font-size:16px;color:var(--charcoal);font-variant-numeric:tabular-nums}
  .chipbox.good b{color:var(--green)}.chipbox.bad b{color:var(--red)}
  .code{font-size:11px;color:var(--muted)}
  .autoline{font-size:12px;color:var(--muted);background:#faf9f6;border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-bottom:10px}
  .autoline b{color:var(--charcoal)}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:2px 18px}
  .acell{display:flex;align-items:center;gap:8px;padding:5px 2px;border-bottom:1px solid #efede8;min-width:0}
  .acell .alab{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acell input.hrs{width:70px;text-align:right;padding:4px 7px;flex:0 0 auto}
  .atot{display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:700;border-top:2px solid var(--line);background:#f6f5f1;padding:9px 11px;margin-top:8px;border-radius:0 0 9px 9px}
  .atot .num{font-variant-numeric:tabular-nums}
  .mx{overflow-x:auto}
  .mx table{font-size:12px;min-width:520px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.total td{font-weight:700;border-top:2px solid var(--line);background:#f6f5f1}
  /* to-do */
  .td2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:520px){.td2{grid-template-columns:1fr}}
  .tdcol h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .tditem{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #f2f0ea;font-size:13px}
  .tditem .tdtxt{flex:1;min-width:0;overflow-wrap:anywhere}
  .tditem button{border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:12px;padding:2px 7px;color:var(--charcoal);flex:0 0 auto}
  .tditem button:hover{filter:brightness(.96)}
  .duechip{font-size:10.5px;font-weight:700;border-radius:9px;padding:1px 7px;background:#f0eee7;color:var(--muted);white-space:nowrap}
  .duechip.late{background:var(--red);color:#fff}
  /* fold pattern */
  .fold{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px}
  .fold>button.fhead{width:100%;text-align:left;background:none;border:none;padding:12px 16px;font:600 14px 'Segoe UI',sans-serif;color:var(--charcoal);cursor:pointer}
  .fold>.fbody{display:none;padding:0 16px 14px}
  .fold.open>.fbody{display:block}
  .fold .arr{float:right;color:var(--muted);font-size:12px}
  /* quick bar: the four occasional actions as small pills near the top, instead of
     four big cards buried at the bottom. The open one widens to a full row in place. */
  .qbar{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;margin:0 0 14px}
  .qbar .fold{flex:0 0 auto;margin:0;background:none;border:none;border-radius:0}
  .qbar .fold>button.fhead{width:auto;padding:5px 12px;font-size:12.5px;font-weight:600;
    color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;white-space:nowrap}
  .qbar .fold>button.fhead:hover{border-color:var(--orange);color:var(--charcoal)}
  .qbar .fold.open{flex:1 1 100%}
  .qbar .fold.open>button.fhead{color:#8a4a12;background:#FFF3E8;border-color:#F3C49B}
  .qbar .fold>.fbody{padding:10px 2px 2px}
  .qbar .fold .arr{float:none;margin-left:4px}
  .qbar .vis{font-size:10px;margin-left:3px;opacity:.65}
  /* phones */
  @media(max-width:680px){
    h1{font-size:19px}
    .btn{padding:10px 14px}
    .btn.clockbig{width:100%;padding:26px 12px;font-size:28px;border-radius:14px}
    #clockPanel{padding:18px 16px}
    #clockPanel #liveWorked{font-size:34px}
    .frm input,.frm select{width:100%}
    .acell input.hrs{width:62px}
    /* the pills stay small, but not smaller than a thumb */
    .qbar{gap:5px}
    .qbar .fold>button.fhead{padding:11px 12px;font-size:12.5px}
  }
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <div id="content"></div>
</div>
<script src="store.js?v=70"></script>
<script>
document.getElementById('nav').innerHTML=navBar('home');
const STCOL={'To do':'#9AA0A8','In progress':'#C77800','Done':'#3E8C28'};
let _clockTick=null;
let weekISO=toISO(monday(new Date()));   // allocation week being edited
let tcM=new Date();tcM.setDate(1);       // month shown in "My month"
let changeOf=null;                        // holiday change-request in progress
const _open={};                           // fold open/closed state (survives re-renders)

/* tiny visibility chip next to panel titles — who can see this information */
function visBadge(t){const pub=t==='everyone';return '<span title="'+(pub?'Visible to the whole team':'Private — '+t)+'" style="font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;vertical-align:2px;margin-left:6px;background:'+(pub?'#E9F0FB':'#F0EEE7')+';color:'+(pub?'#185FA5':'#7c7c78')+'">'+(pub?'👁 everyone':'🔒 '+t)+'</span>'}
/* the same idea shrunk to a single glyph, for the pills — the full badge is too big there.
   Everyone can USE all four; this says who can see what comes out of them. */
function visDot(t){const pub=t==='everyone';
  return '<span class="vis" title="'+(pub?'Visible to the whole team':'Private — '+t)+'">'+(pub?'👁':'🔒')+'</span>';}

function foldHtml(id,title){
  return '<div class="fold'+(_open[id]?' open':'')+'" id="'+id+'"><button class="fhead" type="button">'+title+' <span class="arr">'+(_open[id]?'▾':'▸')+'</span></button><div class="fbody" id="'+id+'Body"></div></div>';
}
function wireFolds(){
  document.querySelectorAll('.fold>.fhead').forEach(b=>b.onclick=()=>{
    const f=b.parentElement,open=f.classList.toggle('open');
    _open[f.id]=open;const a=b.querySelector('.arr');if(a)a.textContent=open?'▾':'▸';
  });
}
function openFold(id){
  const f=document.getElementById(id);if(!f)return;
  _open[id]=true;f.classList.add('open');
  const a=f.querySelector('.arr');if(a)a.textContent='▾';
  f.scrollIntoView({block:'start',behavior:'smooth'});
}

function render(){
  const me=DB.currentUser;const C=document.getElementById('content');
  if(_clockTick){clearInterval(_clockTick);_clockTick=null;}
  if(!me){C.innerHTML='<h1>🙋 Me</h1><p class="sub">You are signed in but not in the staff roster yet — ask Belén to add you. Once added, this becomes your personal home.</p>';return;}
  const acc=me.access||'member', accBg=acc==='admin'?'#FF4A00':acc==='manager'?'#E8A13C':'#eceae3', accCol=acc==='member'?'#5f5e5a':'#fff';
  /* "at an event" head suffix, computed up-front for the fold title */
  const today=toISO(new Date());
  let awaySuffix='';
  if(DB.eventReady()){
    const mineAw=DB.eventaway.filter(e=>e.personId==me.id);
    const cur=mineAw.find(e=>(e.dateFrom||'')<=today&&(e.dateTo||'')>=today);
    const up=mineAw.filter(e=>(e.dateFrom||'')>today).length;
    awaySuffix=cur?' <span style="font-size:12px;color:#185FA5;font-weight:700">· now: '+esc(cur.title||'Event')+'</span>'
      :(up?' <span style="font-size:12px;color:var(--muted);font-weight:400">· '+up+' upcoming</span>':'');
  }
  C.innerHTML=
    '<h1>🙋 Me — '+esc(me.name.split(' ')[0])+' <span class="rolepill">'+me.role+'</span>'+
      '<span class="rolepill" style="background:'+accBg+';color:'+accCol+'">'+(ACCESS_LABEL[acc]||acc)+'</span>'+
      (me.finance?'<span class="rolepill" style="background:#185FA5;color:#fff">€ finance</span>':'')+
      (me.hr?'<span class="rolepill" style="background:#4C3079;color:#fff">HR</span>':'')+'</h1>'+
    '<p class="sub">Your whole day in one place — clock in, plan your week, tick off your list and manage your time off.</p>'+
    /* the four occasional actions: small pills up here rather than four big cards at the
       bottom. Everyone gets all four; the glyph says who can see what comes out of each. */
    '<div class="qbar">'+
      foldHtml('awayFold','📣 At an event'+visDot('everyone')+awaySuffix)+
      foldHtml('reportFold','🛠 Report a clock mistake'+visDot('you + HR'))+
      foldHtml('monthFold','📆 My month'+visDot('you + HR'))+
      foldHtml('profFold','👤 My profile'+visDot('everyone'))+
    '</div>'+
    '<div class="grid2">'+
      '<div><div class="panel" id="clockPanel"></div><div class="panel" id="allocPanel"></div></div>'+
      '<div><div class="panel" id="alarmPanel"></div><div class="panel" id="todoPanel"></div><div class="panel" id="holPanel"></div></div>'+
    '</div>'+
    '<div class="panel" id="evPanel"></div>';
  /* panels isolated (20 Jul 2026 outage): one broken panel must not kill the ones after it */
  for(const f of [renderClock,renderAllocPanel,renderAlarms,renderTodo,renderHolPanel,renderEvents,
                  renderAwayFold,renderReportFold,renderMonthFold,renderProfFold,wireFolds]){
    try{f();}catch(e){console.error((f.name||'panel')+' failed',e);if(typeof showJsErrBar==='function')showJsErrBar((f.name||'panel')+': '+(e&&e.message));}
  }
}

/* ================= clock in / out (SACRED — ported verbatim from the old home) ================= */
function renderClock(){
  const me=DB.currentUser,box=document.getElementById('clockPanel');
  if(_clockTick){clearInterval(_clockTick);_clockTick=null;}
  if(!DB.tcReady()){box.innerHTML='<h3>⏱ Clock'+visBadge('you + HR')+'</h3><p class="hint">Not active yet — run dispatch_hr3.sql. Once live, clock in/out lives right here.</p>';return;}
  const today=toISO(new Date()),info=tcDayInfo(me.id,today),exp=tcExpectedDay(me.id,today);
  box.innerHTML='<h3>⏱ Clock'+visBadge('you + HR')+'</h3>'+
    '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">'+
    '<button class="btn primary clockbig" id="punch">'+(info.open?'Clock OUT':'Clock IN')+'</button>'+
    '<div><div style="font-size:15px;font-weight:700;color:'+(info.open?'var(--green)':'var(--charcoal)')+'" id="clockState">'+(info.open?'🟢 Clocked in':'⚪ Clocked out')+'</div>'+
    '<div style="font-size:28px;font-weight:800;color:var(--charcoal);font-variant-numeric:tabular-nums;line-height:1.1" id="liveWorked">0:00:00</div>'+
    '<div style="font-size:12px;color:var(--muted)">worked today'+(exp?' · '+exp+' h expected':' · no work expected today')+'</div></div></div>'+
    punchAckHtml()+
    '<div style="margin-top:10px;font-size:12.5px;color:var(--muted)">'+(info.entries.length?('Punches: '+info.entries.map(e=>e.kind.toUpperCase()+' '+(e.time||'').slice(0,5)+(e.manual?' *':'')).join(' · ')):'No punches yet today.')+'</div>'+
    '<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px"><b style="font-size:12.5px;color:var(--charcoal)">This week’s hours</b><span id="wkTxt" style="font-size:12px;color:var(--muted)"></span></div>'+
      '<div style="height:14px;border-radius:8px;background:#ece9e2;overflow:hidden"><div id="wkBar" style="height:100%;width:0%;border-radius:8px;transition:width .4s ease,background .4s ease"></div></div>'+
      '<div id="wkNote" style="font-size:12.5px;margin-top:6px;min-height:16px"></div>'+
    '</div>'+
    '<div style="margin-top:12px;font-size:12px;color:var(--muted)"><a href="#" id="lnkMonth" style="color:var(--muted)">Full month ↓</a> &nbsp;·&nbsp; <a href="#" id="lnkReport" style="color:var(--muted)">report a mistake ↓</a></div>';
  /* 20 Jul 2026 outage lesson: wire the punch button BEFORE any decoration — a crash in
     the cosmetics (week bar, live counter) must never leave a drawn-but-dead button. */
  document.getElementById('punch').onclick=async ev=>{
    const b=ev.currentTarget;if(b.disabled)return; // no double punches
    b.disabled=true;b.textContent='Saving…';
    await DB.punch(info.open?'out':'in'); // awaited insert; failure -> pending queue + banner
    renderClock();
  };
  document.getElementById('lnkMonth').onclick=e=>{e.preventDefault();openFold('monthFold');};
  document.getElementById('lnkReport').onclick=e=>{e.preventDefault();openFold('reportFold');};
  const tick=()=>{try{const li=tcLiveSeconds(me.id,today);const el=document.getElementById('liveWorked');if(el)el.textContent=fmtHMS(li.seconds);updateWeekBar(me);}catch(e){console.error('clock tick',e);if(typeof showJsErrBar==='function')showJsErrBar('clock tick: '+(e&&e.message));}};
  tick();if(info.open)_clockTick=setInterval(tick,1000);
}

/* weekly-hours bar (same behaviour as the HR time-clock tab): fills red→green
   as hours are clocked, live, with a "N left / week complete / last 30 min" note */
function updateWeekBar(me){
  const bar=document.getElementById('wkBar');if(!bar||!me)return;
  const p=tcWeekProgress(me.id);
  bar.style.width=Math.round(p.pct*100)+'%';
  bar.style.background='hsl('+Math.round(p.pct*120)+',68%,42%)';
  const fmt=h=>{const H=Math.floor(h+1e-9),M=Math.round((h-H)*60);return M?H+'h '+M+'m':H+'h';};
  const txt=document.getElementById('wkTxt');
  if(txt)txt.textContent=p.target<=0?'no hours expected this week':(fmt(p.worked)+' of '+fmt(p.target));
  const note=document.getElementById('wkNote');if(!note)return;
  if(p.target<=0)note.innerHTML='<span style="color:var(--muted)">Holiday week — nothing to clock.</span>';
  else if(p.done)note.innerHTML='<span style="color:var(--green);font-weight:700">✓ Week complete — that’s your '+fmt(p.target)+'. Nice one.</span>';
  else if(p.remaining<=0.5)note.innerHTML='<span style="color:var(--red);font-weight:700">🔔 Under 30 minutes to go this week!</span>';
  else note.innerHTML='<b style="color:var(--charcoal)">'+fmt(p.remaining)+'</b> <span style="color:var(--muted)">left to reach your '+fmt(p.target)+' this week.</span>';
}

/* ================= my week allocation (ported from hr.html Allocation tab) ================= */
const fmtH=v=>(Math.round(v*100)/100).toLocaleString('es-ES');
function projPrefix(p){const m=(p.label||'').match(/^\s*(\d+)/);return m?+m[1]:99;}
function projCodeNum(p){const m=(p.code||'').match(/\d+/);return m?+m[0]:0;}
function projCmp(a,b){return projPrefix(a)-projPrefix(b)||projCodeNum(a)-projCodeNum(b)||(a.sort||0)-(b.sort||0);}
function activeProjects(){return DB.projects.filter(p=>p.active!==false&&!p.kind).sort(projCmp);}
function autoProject(kind){return DB.projects.find(p=>p.kind===kind);}
function renderAllocPanel(){
  const box=document.getElementById('allocPanel');
  let h='<h3>📊 My week allocation'+visBadge('you + HR')+'</h3>';
  if(!DB.hrReady()){box.innerHTML=h+'<p class="hint">Not active yet — run dispatch_hr.sql in Supabase, then reload.</p>';return;}
  box.innerHTML=h+
    '<p class="hint">Split your week’s hours across the project numbers — bank holidays and approved holidays are filled in for you.</p>'+
    '<div id="allocAlarm"></div>'+
    '<div class="mnav"><button class="btn" id="w_prev">‹</button><b id="w_lab"></b><button class="btn" id="w_next">›</button>'+
    '<button class="btn" id="w_now" style="font-size:12px">This week</button>'+
    '<span id="w_msg" style="font-size:12px;color:var(--green)"></span></div>'+
    '<div class="chips" id="chips"></div><div id="ts"></div>'+
    '<div style="margin-top:12px"><button class="btn primary" id="saveBtn">Save my hours</button></div>';
  renderAllocAlarm();renderWeek();
  document.getElementById('saveBtn').onclick=saveWeek;
  document.getElementById('w_prev').onclick=()=>{weekISO=toISO(addDays(ymd(weekISO),-7));renderWeek();};
  document.getElementById('w_next').onclick=()=>{weekISO=toISO(addDays(ymd(weekISO),7));renderWeek();};
  document.getElementById('w_now').onclick=()=>{weekISO=toISO(monday(new Date()));renderWeek();};
}
function renderAllocAlarm(){
  const me=DB.currentUser,box=document.getElementById('allocAlarm');
  if(!me||!box){if(box)box.innerHTML='';return;}
  const miss=missingWeeks(me.id);
  box.innerHTML=miss.length
    ?'<div class="alarm">⏰ <b>'+miss.length+' week'+(miss.length===1?'':'s')+' without your hours:</b> '+
      miss.map(w=>'<a href="#" data-goto="'+w+'">'+w+'</a>').join(' · ')+' — filling them in is mandatory.</div>'
    :'';
  box.querySelectorAll('[data-goto]').forEach(a=>a.onclick=e=>{e.preventDefault();weekISO=a.dataset.goto;renderWeek();});
}
function renderWeek(){
  const me=DB.currentUser;
  const mon=ymd(weekISO),fri=addDays(mon,4);

  h+='<div class="atot"><span>Total (with auto-filled lines)</span><span class="num" id="tsTotal">'+fmtH(sum+w.fest+w.vac)+' / '+fmtH(w.required)+' h</span></div>';
  document.getElementById('ts').innerHTML=h;
  document.querySelectorAll('#ts input').forEach(inp=>inp.oninput=()=>{
    let s=0;document.querySelectorAll('#ts input').forEach(i=>s+=(+i.value||0));
    document.getElementById('tsTotal').textContent=fmtH(s+w.fest+w.vac)+' / '+fmtH(w.required)+' h';
    const rem=Math.round((w.toAllocate-s)*100)/100,ov=rem<-0.01,ex=Math.abs(rem)<0.01;
    const chip=document.getElementById('remChip');
    chip.className='chipbox '+(ex?'good':'bad');
    chip.innerHTML=(ov?'⚠ Over by':'Remaining')+'<b>'+(ex?'✓ 0':fmtH(Math.abs(rem))+' h')+'</b>';

function saveWeek(){
  const me=DB.currentUser;if(!me){alert('Log in first.');return;}
  const hours={};
  document.querySelectorAll('#ts input').forEach(i=>{const v=+i.value;if(v>0)hours[i.dataset.pid]=v;});
  const w=weekWorkInfo(weekISO,me.id);
  const sum=Object.values(hours).reduce((a,v)=>a+(+v||0),0);
  if(sum-w.toAllocate>0.01){ // the week can't hold more than it has — block it
    alert('You have allocated '+fmtH(sum)+' h but this week only has '+fmtH(w.toAllocate)+' h to allocate'+
      ((w.fest||w.vac)?' (bank holidays / holidays already take the rest)':'')+'.\n\nPlease take '+fmtH(sum-w.toAllocate)+' h off before saving.');
    return;
  }
  let t=tsFor(me.id,weekISO);
  if(t)t.hours=hours;else DB.timesheets.push({id:DB.newId(),personId:me.id,week:weekISO,hours});
  /* wait for the database to actually take it before saying so — on a phone the old
     debounced save could die when the app was backgrounded, and the week silently vanished */
  const m=document.getElementById('w_msg'),btn=document.getElementById('saveBtn');
  m.style.color='var(--muted)';m.textContent='Saving…';
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  DB.saveNow().then(ok=>{
    if(btn){btn.disabled=false;btn.textContent='Save my hours';}
    if(!ok)return; // syncNow already told them + reloaded
    m.style.color=Math.abs(sum-w.toAllocate)<0.01?'var(--green)':'var(--amber)';
    m.textContent=Math.abs(sum-w.toAllocate)<0.01?'Saved — week complete ✓':'Saved — '+fmtH(w.toAllocate-sum)+' h still unallocated';
    setTimeout(()=>m.textContent='',5000);
    renderAllocAlarm();renderWeek();renderAlarms();
  });
}

/* --- shared holiday helpers (ported from hr.html) --- */
function fmtRange(h){return fmtHumanRange(h.dateFrom,h.dateTo);}
function isExemptDay(iso){ // periods where team overlaps are normal: August, Christmas, Easter week
  const d=ymd(iso),m=d.getMonth(),day=d.getDate();
  if(m===7)return true;
  if((m===11&&day>=22)||(m===0&&day<=6))return true;
  const e=easter(d.getFullYear());
  return d>=addDays(e,-7)&&d<=addDays(e,1);
}
function overlapDays(aF,aT,bF,bT){ // shared NON-EXEMPT working days of two ranges
  const from=aF>bF?aF:bF,to=aT<bT?aT:bT,out=[];
  if(from>to)return out;
  for(let d=ymd(from);toISO(d)<=to;d=addDays(d,1)){const iso=toISO(d);
    if(d.getDay()===0||d.getDay()===6||madHol(iso))continue;
    if(!isExemptDay(iso))out.push(iso);}
  return out;
}
function reqAlarms(r){ // ⚠ strings for one request (used at request time AND in the approval panel)
  const p=DB.person(r.personId),alarms=[];if(!p)return alarms;
  if(r.type==='remote'){
    const yr=r.dateFrom.slice(0,4);
    const used=remoteDaysUsed(r.personId,yr)+(r.id?0:(+r.workDays||0));
    if(used>REMOTE_MAX_DAYS)alarms.push('Office days: '+used+' of '+REMOTE_MAX_DAYS+' in '+yr+' — over the 8-day yearly limit.');
    return alarms;
  }
  DB.holidays.filter(o=>o.id!=r.id&&(o.type||'vacation')!=='remote'&&o.status!=='denied'&&o.status!=='cancelled'&&o.personId!=r.personId
    &&DB.person(o.personId)&&DB.person(o.personId).role===p.role).forEach(o=>{
    const ov=overlapDays(r.dateFrom,r.dateTo,o.dateFrom,o.dateTo);
    if(ov.length)alarms.push('Team overlap: '+DB.personName(o.personId)+' is also off '+ov.length+' of these working day'+(ov.length===1?'':'s')+' (outside Xmas / Easter / August).');
  });
  DB.holidays.filter(o=>o.id!=r.id&&(o.type||'vacation')!=='remote'&&o.status!=='denied'&&o.status!=='cancelled'&&o.personId==r.personId&&o.id!=r.replaces).forEach(o=>{
    let gap=null;
    if(o.dateTo<r.dateFrom)gap=workingDaysBetween(toISO(addDays(ymd(o.dateTo),1)),toISO(addDays(ymd(r.dateFrom),-1)));
    else if(r.dateTo<o.dateFrom)gap=workingDaysBetween(toISO(addDays(ymd(r.dateTo),1)),toISO(addDays(ymd(o.dateFrom),-1)));
    if(gap!=null&&gap>0&&gap<=5)alarms.push('Broken-up holidays: only '+gap+' working day'+(gap===1?'':'s')+' in the office between this and '+fmtRange(o)+' — something is not quite right.');
  });
  return alarms;
}
function typeChip(r){const ty=r.type||'vacation';if(ty==='vacation')return '';
  const col=ty==='remote'?'var(--blue)':'var(--amber)';
  return '<span class="chip" style="background:'+col+'">'+TYPE_LABEL[ty]+'</span> ';}
function statusChip(h){
  if(h.status==='approved')return '<span class="chip" style="background:var(--green)">Approved</span>';
  if(h.status==='denied')return '<span class="chip" style="background:var(--red)">Denied</span>';
  if(h.status==='cancelled')return '<span class="chip" style="background:#9AA0A8">Cancelled</span>';
  return '<span class="chip" style="background:var(--amber)">'+holStageLabel(h)+'</span>';
}
function changeAdvice(r){ // what a change request means for the final holiday
  if(!r.replaces)return null;
  const o=DB.holidays.find(x=>x.id==r.replaces);if(!o)return null;
  const net=(+r.workDays||0)-(+o.workDays||0);
  return 'CHANGE of '+fmtRange(o)+' ('+o.workDays+'d) → '+fmtRange(r)+' ('+r.workDays+'d) · net '+(net>0?'+':'')+net+' day'+(Math.abs(net)===1?'':'s')+' on the balance.';
}
function esc2(s){return (s||'').replace(/"/g,'&quot;');}
/* the approval chain of one pending request, e.g. "✓ Carlos approved 12/07 → ● YOUR TURN → then HR" */
function chainHtml(r){
  const p=DB.person(r.personId);if(!p)return '';
  const chain=holChain(p);
  const approvals=(r.log||[]).filter(l=>/^approved/.test(l.action||''));
  let curIdx=chain.findIndex(s=>s.key===r.status);if(curIdx<0)curIdx=chain.length;
  const fmtAt=at=>{if(!at)return '';const d=new Date(at);return isNaN(+d)?'':String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');};
  const mine=holActsOnMe(r); // only say "YOUR TURN" when it actually is
  const parts=chain.map((s,i)=>{
    const name=s.key==='hr'?'HR':(s.who?s.who.name.split(' ')[0]:'?');
    if(i<curIdx){const ap=approvals[i];
      return '<span style="color:var(--green);font-weight:700">✓ '+esc(ap?ap.by.split(' ')[0]:name)+' approved'+(ap&&fmtAt(ap.at)?' '+fmtAt(ap.at):'')+'</span>';}
    if(i===curIdx)return mine?'<span style="color:var(--orange);font-weight:800">● YOUR TURN</span>'
      :'<span style="color:var(--amber);font-weight:700">● with '+esc(name)+'</span>';
    return '<span style="color:var(--muted)">then '+esc(name)+'</span>';
  });
  return '<div style="font-size:11.5px;margin:6px 0 2px">'+parts.join(' <span style="color:var(--muted)">→</span> ')+'</div>';
}
/* the message thread on a request. Approvers see everything; the requester only ever sees
   what was explicitly addressed to them (enforced server-side too). */

  if(amApprover){
    h+='<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px">'+
      '<input id="hm_'+r.id+'" placeholder="Message about this request…" style="flex:1 1 190px;font:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:7px">'+
      '<button class="btn" style="font-size:11.5px" data-hm="'+r.id+'" data-to="0" title="Only the other approvers see this">🔒 To approvers</button>'+
      '<button class="btn" style="font-size:11.5px" data-hm="'+r.id+'" data-to="1" title="'+esc(DB.personName(r.personId))+' will see this and get a notification">✉ Ask '+esc((DB.personName(r.personId)||'').split(' ')[0])+'</button>'+
      '</div>';
  }else if(opts.allowReply){
    h+='<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px">'+
      '<input id="hm_'+r.id+'" placeholder="Reply…" style="flex:1 1 190px;font:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:7px">'+
      '<button class="btn" style="font-size:11.5px" data-hm="'+r.id+'" data-to="1">Send</button></div>';
  }
  return h+'</div>';

/* shared by every panel that renders msgsHtml */

function decide(id,ok){
  const r=DB.holidays.find(x=>x.id==id);if(!r)return;
  const me=DB.currentUser;
  let note='';
  if(!ok){note=prompt('Reason for denying (shown to '+DB.personName(r.personId)+'):')||'';}
  r.log=(r.log||[]).concat([{by:me.name,at:new Date().toISOString(),action:(ok?'approved ('+r.status+' step)':'denied'),note}]);
  r.status=ok?holNextStatus(r):'denied';
  /* a fully approved CHANGE releases the holiday it replaces (kept visible as cancelled) */
  if(r.status==='approved'&&r.replaces){
    const o=DB.holidays.find(x=>x.id==r.replaces);
    if(o&&o.status!=='cancelled'){o.status='cancelled';
      o.log=(o.log||[]).concat([{by:me.name,at:new Date().toISOString(),action:'cancelled — replaced by the approved change to '+fmtRange(r)}]);}
  }
  /* audit: a decision must be CONFIRMED saved before we notify the requester —
     otherwise the notification announces an approval that never reached the server */
  DB.saveNow().then(saved=>{
    if(!saved){render();return;}   // banner explains; the decision retries in the background
    try{ // tell the requester what happened (🔔 inbox); silently no-ops if the inbox table isn't there yet
      let txt='Your time-off ('+fmtRange(r)+') was '+(ok?'approved':'denied')+' by '+me.name;
      if(ok&&r.status!=='approved')txt+=' — next: '+holStageLabel(r);
      notifySend(r.personId,'holiday',txt,'home.html');
    }catch(e){}
    render();
  });
}

function startChange(id,rearm){ // rearm=true: re-showing after a re-render — no fold-open, no scroll
  const o=DB.holidays.find(x=>x.id==id);if(!o)return;
  changeOf=id;
  if(!rearm)openFold('holFold');
  const ban=document.getElementById('chgBanner');
  ban.style.display='block';
  ban.innerHTML='🔁 Changing your approved '+(o.type==='remote'?'office days':'holidays')+' <b>'+fmtRange(o)+'</b> ('+o.workDays+'d). Pick the NEW dates below and send — the old dates stay until the change is approved, then they are released automatically. <a href="#" id="chgOff" style="color:#8a4a12;font-weight:700">never mind</a>';
  document.getElementById('chgOff').onclick=e=>{e.preventDefault();changeOf=null;ban.style.display='none';const ty2=document.getElementById('r_type');if(ty2)ty2.disabled=false;};
  const ty=document.getElementById('r_type');ty.value=o.type||'vacation';ty.disabled=true;
  if(!rearm)ban.scrollIntoView({block:'center',behavior:'smooth'});

function wireForm(){
  const f=document.getElementById('r_from'),t=document.getElementById('r_to'),ty=document.getElementById('r_type');
  if(!f)return;
  const upd=()=>{
    const days=document.getElementById('r_days'),fl=document.getElementById('r_flags'),cal=document.getElementById('r_cal');
    if(!f.value||!t.value||t.value<f.value){days.innerHTML='&nbsp;';fl.innerHTML='';if(cal)cal.innerHTML='';return;}
    const wd=workingDaysBetween(f.value,t.value);
    const hols=[];for(let d=ymd(f.value);toISO(d)<=t.value;d=addDays(d,1)){const n=madHol(toISO(d));if(n&&d.getDay()!==0&&d.getDay()!==6)hols.push(fmtD(d)+' — '+n);}
    days.innerHTML='<b>'+fmtHumanRange(f.value,t.value)+'</b> — '+wd+' working day'+(wd===1?'':'s')+
      (hols.length?' <span style="color:var(--muted)">(bank holidays not counted: '+esc(hols.join(', '))+')</span>':'');
    const fake={id:null,personId:DB.currentUser.id,dateFrom:f.value,dateTo:t.value,type:ty.value,workDays:wd,replaces:changeOf};
    let flags=reqAlarms(fake).map(a=>'<div>⚠ '+a+'</div>');
    /* say out loud which year's allowance these days come out of — the Jan/Feb surprise */
    if(ty.value==='vacation'&&!holExempt(DB.currentUser)&&inSpillWindow(f.value)){
      flags.unshift('<div style="color:#29ACE3">ℹ These days come out of your <b>'+holYearOfDate(f.value)+
        '</b> allowance — days taken in January and February belong to the previous year’s count.</div>');
    }
    fl.innerHTML=flags.join('');
    if(cal)cal.innerHTML=ty.value==='remote'?'':holMiniCal(f.value,t.value,{personId:DB.currentUser.id,excludeId:changeOf});
  };
  f.onchange=upd;t.onchange=upd;ty.onchange=upd;
  document.getElementById('r_send').onclick=()=>{
    const me=DB.currentUser;if(!me){alert('Log in first.');return;}
    if(!f.value||!t.value||t.value<f.value){alert('Pick a valid date range.');return;}
    const wd=workingDaysBetween(f.value,t.value);
    if(wd<=0){alert('That range has no working days (weekend / bank holidays).');return;}
    if(ty.value==='remote'&&remoteDaysUsed(me.id,f.value.slice(0,4))+wd>REMOTE_MAX_DAYS){
      alert('That would exceed the office-days limit of '+REMOTE_MAX_DAYS+' days this year.');return;}
    const chain=holChain(me);
    const orig=changeOf?DB.holidays.find(x=>x.id==changeOf):null;
    DB.holidays.push({id:DB.newId(),personId:me.id,dateFrom:f.value,dateTo:t.value,workDays:wd,type:ty.value,
      replaces:orig?orig.id:null,
      note:document.getElementById('r_note').value.trim(),status:chain[0].key,
      log:[{by:me.name,at:new Date().toISOString(),action:orig?('requested CHANGE of '+fmtRange(orig)+' ('+orig.workDays+'d)'):('requested '+(ty.value==='remote'?'office days':'holidays'))}]});
    /* audit: wait for the database before saying "Sent" — a backgrounded phone
       suspends the debounce timer and the request never existed */
    const sendBtn=document.getElementById('r_send');sendBtn.disabled=true;sendBtn.textContent='Sending…';
    DB.saveNow().then(ok=>{
      sendBtn.disabled=false;sendBtn.textContent='Send request';
      const m=document.getElementById('r_msg');
      if(!ok){if(m)m.textContent='⚠ Not sent yet — retrying in the background. Keep the app open.';return;}
      changeOf=null;
      render();   // rebuild FIRST, then write the confirmation on the fresh node (it used to be wiped instantly)
      openFold('holFold');
      const m2=document.getElementById('r_msg');
      if(m2){m2.textContent='Sent — '+(chain[0].key==='hr'?'HR':chain[0].who.name)+' has been flagged.';
        setTimeout(()=>{const m3=document.getElementById('r_msg');if(m3)m3.textContent='';},4000);}
    });
  };
}

/* ================= 🛠 report a clock mistake (fold; ported from hr.html) ================= */
const fmtMin=m=>Math.floor(m/60)+' h '+String(Math.round(m%60)).padStart(2,'0');
function entryLabel(e){return e.kind.toUpperCase()+' '+(e.time||'').slice(0,5)+(e.manual?' *':'');}
/* Fail-proof corrections (2026-07-15): the person states WHAT HAPPENED, the system
   works out the punches. Simple fixes apply at once (Belén ratifies after); odd ones
   wait for her. Falls back to the old free-text flow until dispatch_hr11_claims.sql runs. */
const CLAIM_TYPES=[
  ['forgot_out','I forgot to clock out'],
  ['forgot_in','I forgot to clock in'],
  ['wrong_time','A punch has the wrong time'],
  ['extra_punch','There is a punch that should not be there'],
  ['whole_day','The whole day is wrong'],
  ['other','Something else'],
];
function dayRecordLine(personId,day){
  const es=tcEffective(personId,day),info=pairTotals(es);
  if(!es.length)return '<span style="color:var(--muted)">no punches that day</span>';
  return es.map(e=>entryLabel(e)).join(' → ')
    +(info.open?' → <b style="color:#C77800">(no clock-out)</b>':'')
    +' &nbsp;=&nbsp; <b>'+fmtMin(info.total)+'</b>'+(info.open&&day<toISO(new Date())?' ⚠':'');
}
function renderReportFold(){
  const box=document.getElementById('reportFoldBody');if(!box)return;
  if(!DB.tcReady()){box.innerHTML='<p class="hint" style="margin-top:8px">Not active yet — run dispatch_hr3.sql in Supabase, then reload.</p>';return;}
  if(!window._claimReady){renderReportFoldOld(box);return;}
  const today=toISO(new Date());
  box.innerHTML=
    '<p class="hint" style="margin-top:8px">Pick the day, say what happened — simple fixes apply immediately (Belén reviews every one); anything unusual goes to her first.</p>'+
    '<div class="frm">'+
    '<label>Day<input type="date" id="cl_day" value="'+today+'" max="'+today+'"></label>'+
    '<label>What happened<select id="cl_type"><option value="">— pick —</option>'+CLAIM_TYPES.map(t=>'<option value="'+t[0]+'">'+t[1]+'</option>').join('')+'</select></label>'+
    '</div>'+
    '<div id="cl_rec" class="hint" style="margin:2px 0 8px"></div>'+
    '<div class="frm" id="cl_inputs"></div>'+
    '<div class="frm"><label style="min-width:60%">Anything HR should know (optional)<input id="cl_note" placeholder="e.g. the page crashed"></label></div>'+
    '<div id="cl_prev" style="border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:13px;display:none"></div>'+
    '<button class="btn primary" id="cl_send">Send</button><span id="cl_msg" style="font-size:12px;color:var(--green);margin-left:8px"></span>'+
    '<div id="myReports" style="margin-top:14px"></div>';
  wireClaim();renderMyReports();
}
function claimInputsHtml(type,es){
  const punchSel='<label>Which punch<select id="cl_entry">'+(es.length?es.map(e=>'<option value="'+e.id+'">'+entryLabel(e)+'</option>').join(''):'<option value="">— no punches that day —</option>')+'</select></label>';
  switch(type){
    case 'forgot_out': return '<label>I actually left at<input type="time" id="cl_time"></label>';
    case 'forgot_in':  return '<label>I actually arrived at<input type="time" id="cl_time"></label>';
    case 'wrong_time': return punchSel+'<label>It should say<input type="time" id="cl_time"></label>';
    case 'extra_punch':return punchSel;
    case 'whole_day':  return '<label>I worked from<input type="time" id="cl_from"></label><label>to<input type="time" id="cl_to"></label>';
    case 'other':      return '<label style="min-width:60%">Tell HR what happened<input id="cl_text" placeholder="describe it — Belén will handle it"></label>';

function readClaim(){
  const type=(document.getElementById('cl_type')||{}).value;if(!type)return null;
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  return {type,time:g('cl_time')||undefined,from:g('cl_from')||undefined,to:g('cl_to')||undefined,
    entryId:g('cl_entry')?+g('cl_entry'):undefined,text:g('cl_text')||undefined};
}
const CLAIM_HARD_BLOCK={future:1,insane:1,noop:1,no_target:1}; // stop these; too_old/manual go to Belén
function wireClaim(){
  const me=DB.currentUser;if(!me)return;
  const day=document.getElementById('cl_day'),type=document.getElementById('cl_type');
  const rec=document.getElementById('cl_rec'),inputs=document.getElementById('cl_inputs'),prev=document.getElementById('cl_prev');
  const refresh=()=>{
    rec.innerHTML='Your record for that day: &nbsp;'+dayRecordLine(me.id,day.value);
    const c=readClaim();
    if(!c||c.type==='other'||( !c.time&&!c.from&&!c.entryId )){prev.style.display='none';return;}
    const p=planAmendments(me.id,day.value,c);
    prev.style.display='block';
    if(p.blocked&&CLAIM_HARD_BLOCK[p.blocked]){prev.innerHTML='<b style="color:var(--red)">✋ '+esc(CLAIM_BLOCK_MSG[p.blocked]||p.blocked)+'</b>';return;}
    if(p.blocked){prev.innerHTML='📨 '+esc(CLAIM_BLOCK_MSG[p.blocked]||'Belén will handle this one.');return;}
    /* open day: the hours are still running, so show the corrected clock-in time
       rather than "0 h 00" (which reads as if nothing changed). */
    const openStart=p.after.open?[...tcEffective(me.id,day.value).filter(e=>e.kind==='in')].sort((a,b)=>(a.time||'').localeCompare(b.time||''))[0]:null;
    const result=p.after.open
      ? 'you stay clocked in'+(c.type==='forgot_in'||c.type==='wrong_time'?', starting at <b>'+esc((c.time||(openStart&&openStart.time)||'').slice(0,5))+'</b>':'')+' — your hours count from there'
      : 'the day reads <b>'+fmtMin(p.after.total)+'</b>';
    prev.innerHTML='You are claiming: <b>'+esc(p.describe)+'</b><br>Then '+result
      +(p.simple?' <span style="color:var(--green)">— applies immediately; Belén reviews it</span>'
                :' <span style="color:#C77800">— Belén approves this one</span>');
  };
  const rewire=()=>{inputs.innerHTML=claimInputsHtml(type.value,me?tcEffective(me.id,day.value):[]);
    inputs.querySelectorAll('input,select').forEach(e=>e.onchange=e.oninput=refresh);refresh();};
  day.onchange=rewire;type.onchange=rewire;refresh();
  document.getElementById('cl_send').onclick=async()=>{
    const c=readClaim();if(!c){alert('Say what happened first.');return;}
    const note=(document.getElementById('cl_note').value||'').trim();
    if(c.type==='other'&&!(c.text||note)){alert('Tell HR what happened.');return;}
    const p=planAmendments(me.id,day.value,c);
    if(p.blocked&&CLAIM_HARD_BLOCK[p.blocked]){alert(CLAIM_BLOCK_MSG[p.blocked]||p.blocked);return;}
    const human=(c.type==='other'?(c.text||note):p.describe+(note?' — '+note:''));
    const rep={id:DB.newId(),personId:me.id,day:day.value,entryId:c.entryId||null,claim:c,ratify:null,
      thread:[{by:me.name,at:new Date().toISOString(),text:human}],status:'open'};
    const btn=document.getElementById('cl_send');btn.disabled=true;
    DB.tcreports.push(rep);
    const okRep=await DB.saveNow();               // report FIRST — the punch RLS checks it exists
    let msg='Sent — Belén will make this one.';
    if(okRep&&!p.blocked&&p.simple){
      applyPlan(me.id,day.value,p,rep.id,'self-service: '+human);
      rep.ratify='pending';
      const okAmend=await DB.saveNow();
      msg=okAmend?('✔ Done — '+fmtHuman(day.value)+' now reads '+fmtMin(p.after.total)+'. Belén will review it.')
                 :'Saved the report, but the correction could not be written — Belén will apply it.';
      if(!okAmend)rep.ratify=null;
      window.dispatchEvent(new Event('dc-remote'));
    }
    btn.disabled=false;
    renderReportFold();renderClock&&renderClock();       // rebuild first (this resets the form)…
    const m=document.getElementById('cl_msg');if(m){m.textContent=msg;setTimeout(()=>{const m2=document.getElementById('cl_msg');if(m2)m2.textContent='';},8000);} // …then show the confirmation on the fresh element
  };
}

function wireReport(){
  const me=DB.currentUser;
  const daySel=document.getElementById('tr_day'),entSel=document.getElementById('tr_entry');
  if(!daySel)return;
  const fill=()=>{const es=me?tcEffective(me.id,daySel.value):[];
    entSel.innerHTML='<option value="">— whole day / forgot to clock —</option>'+es.map(e=>'<option value="'+e.id+'">'+entryLabel(e)+'</option>').join('');};
  daySel.onchange=fill;fill();
  document.getElementById('tr_send').onclick=()=>{
    if(!me){alert('Log in first.');return;}
    const txt=document.getElementById('tr_text').value.trim();
    if(!txt){alert('Say what happened — HR needs it to correct the record.');return;}
    DB.tcreports.push({id:DB.newId(),personId:me.id,day:daySel.value,entryId:entSel.value?+entSel.value:null,
      thread:[{by:me.name,at:new Date().toISOString(),text:txt}],status:'open'});
    DB.save();
    document.getElementById('tr_text').value='';
    const m=document.getElementById('tr_msg');m.textContent='Sent — HR has been flagged.';setTimeout(()=>{const m2=document.getElementById('tr_msg');if(m2)m2.textContent='';},4000);
    renderMyReports();
  };
}
function threadHtml(r){
  return '<div style="background:#faf9f6;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:6px 0;font-size:12.5px">'+
    (r.thread||[]).map(m=>'<div style="margin-bottom:4px"><b>'+esc(m.by)+'</b> <span style="color:var(--muted);font-size:11px">'+(m.at||'').slice(0,16).replace('T',' ')+'</span><br>'+esc(m.text)+'</div>').join('')+'</div>';
}
function reportChip(r){
  if(r.ratify==='pending')return '<span class="chip" style="background:var(--blue)">Applied — Belén reviewing</span>';
  if(r.ratify==='accepted')return '<span class="chip" style="background:var(--green)">Accepted</span>';
  if(r.ratify==='denied')return '<span class="chip" style="background:var(--red)">Denied — reversed</span>';
  return r.status==='resolved'?'<span class="chip" style="background:var(--green)">Resolved</span>'
    :r.status==='answered'?'<span class="chip" style="background:var(--blue)">Answered</span>'
    :'<span class="chip" style="background:var(--amber)">Open</span>';
}
function renderMyReports(){
  const me=DB.currentUser,box=document.getElementById('myReports');
  if(!me||!box)return;
  const mine=DB.tcreports.filter(r=>r.personId==me.id).sort((a,b)=>b.id-a.id).slice(0,6);
  if(!mine.length){box.innerHTML='';return;}
  box.innerHTML='<div style="font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px">My reports</div>'+
    mine.map(r=>'<div style="margin-bottom:10px"><b>'+fmtHuman(r.day)+'</b> '+reportChip(r)+threadHtml(r)+
      (r.status!=='resolved'?'<input id="rr_'+r.id+'" placeholder="reply…" style="width:70%;font-size:12px;padding:4px 8px"> <button class="btn" style="font-size:11px;padding:3px 9px" data-rr="'+r.id+'">Send</button>':'')+'</div>').join('');
  box.querySelectorAll('[data-rr]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.rr);const inp=document.getElementById('rr_'+r.id);
    if(!inp.value.trim())return;
    r.thread=(r.thread||[]).concat([{by:me.name,at:new Date().toISOString(),text:inp.value.trim()}]);
    if(r.status==='answered')r.status='open';
    DB.save();renderMyReports();});
}

/* ================= 📆 my month (fold; ported from hr.html) ================= */
function monthTable(personId){
  const y=tcM.getFullYear(),m=tcM.getMonth();
  const last=new Date(y,m+1,0).getDate(),today=toISO(new Date());
  let h='<table><tr><th>Day</th><th>Punches</th><th class="num">Worked</th><th class="num">Expected</th><th class="num">Diff</th></tr>';
  let wSum=0,eSum=0,any=false;
  for(let d=1;d<=last;d++){
    const iso=toISO(new Date(y,m,d));
    if(iso>today)break;
    const exp=tcExpectedDay(personId,iso);
    const info=tcDayInfo(personId,iso);
    if(exp<=0&&!info.entries.length)continue;
    any=true;wSum+=info.total;eSum+=exp*60;
    const diff=info.total-exp*60;
    h+='<tr><td>'+iso+'</td><td>'+(info.entries.length?info.entries.map(entryLabel).join(' · '):'<span style="color:var(--red)">no punches</span>')+'</td>'+
      '<td class="num">'+(info.total?fmtMin(info.total):'—')+'</td><td class="num">'+(exp||'—')+'</td>'+
      '<td class="num" style="color:'+(diff<-15?'var(--red)':diff>15?'var(--green)':'var(--muted)')+'">'+(info.total?((diff>=0?'+':'−')+fmtMin(Math.abs(diff))):'')+'</td></tr>';
  }
  if(!any)h+='<tr><td colspan="5" class="empty">Nothing this month.</td></tr>';
  h+='<tr class="total"><td>Total</td><td></td><td class="num">'+fmtMin(wSum)+'</td><td class="num">'+fmtMin(eSum)+'</td><td class="num">'+((wSum-eSum>=0?'+':'−')+fmtMin(Math.abs(wSum-eSum)))+'</td></tr>';
  return h+'</table>';
}
function renderMonthFold(){
  const box=document.getElementById('monthFoldBody');if(!box)return;
  if(!DB.tcReady()){box.innerHTML='<p class="hint" style="margin-top:8px">Not active yet — run dispatch_hr3.sql in Supabase, then reload.</p>';return;}
  box.innerHTML=
    '<div class="mnav" style="margin-top:8px"><button class="btn" id="tm_prev">‹</button><b id="tm_lab"></b><button class="btn" id="tm_next">›</button></div>'+
    '<div class="mx" id="myMonth"></div>'+
    '<p class="hint" style="margin-top:8px">* = entry added afterwards. Amended punches stop counting but stay in the permanent archive with who/when/why.</p>';
  renderMyMonth();
  document.getElementById('tm_prev').onclick=()=>{tcM.setMonth(tcM.getMonth()-1);renderMyMonth();};
  document.getElementById('tm_next').onclick=()=>{tcM.setMonth(tcM.getMonth()+1);renderMyMonth();};
}
function renderMyMonth(){
  const me=DB.currentUser;if(!me)return;
  const lab=['January','February','March','April','May','June','July','August','September','October','November','December'][tcM.getMonth()]+' '+tcM.getFullYear();
  const el=document.getElementById('tm_lab');if(el)el.textContent=lab;
  const mm=document.getElementById('myMonth');if(mm)mm.innerHTML=monthTable(me.id);
}
