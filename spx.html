<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#2B2B2B;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--green:#0CA30C;--amber:#B26A10;--blue:#2A78D6;--violet:#4A3AA7;--grey:#8A8781}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#3a3a3a;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1200px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 10px}
  .crmbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 14px}
  .tabs{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px}
  .tabs button{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:13px;padding:6px 13px;border-radius:8px;cursor:pointer}
  .tabs button.on{background:var(--orange);color:#fff}
  #saveChip{font-size:11.5px;color:var(--muted);margin-left:auto}
  #saveChip.saving{color:var(--amber)} #saveChip.err{color:#A32D2D;font-weight:700;cursor:pointer}
  h2{font-size:19px;font-weight:800;color:var(--ink);margin:0 0 3px;letter-spacing:-.01em}
  .lead{color:var(--muted);font-size:13px;margin:0 0 16px;max-width:82ch}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
  .tile .l{font-size:11.5px;color:var(--muted)}
  .tile .n{font-size:22px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.2}
  .tile .s{font-size:11px;color:#9aa2a6}
  .tile.good .n{color:var(--green)} .tile.bad .n{color:#C0392B}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:14px}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .filters select,.filters input{padding:6px 9px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:12.5px;background:#fff;color:var(--ink)}
  tr.byhand td{background:#efeeea}   /* grey = added by hand on the board, not from the Proposal Builder */
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:#fff;border:none;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--ink);color:#fff}
  .tablewrap{overflow-x:auto;border-radius:11px;border:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card)}
  th{text-align:left;background:#eceae3;color:#5f5e5a;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;font-weight:700;white-space:nowrap;position:sticky;top:0}
  td{padding:8px 10px;border-top:1px solid var(--line);vertical-align:middle}
  tr.prow{cursor:pointer} tr.prow:hover td{background:#faf9f7}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .mval{cursor:pointer;border-bottom:1px dashed transparent} .mval:hover{border-bottom-color:var(--muted)}
  .mval.ro{cursor:default} .mval.ro:hover{border-bottom-color:transparent}
  input.money,input.dt{font:inherit;font-size:12.5px;padding:3px 5px;border:1px solid var(--orange);border-radius:6px;width:100px}
  .stbadge{font-size:10.5px;font-weight:800;border-radius:20px;padding:2px 9px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
  .st-sent{background:#e9f0fb;color:var(--blue)} .st-approved{background:#e2f4e2;color:#0a7a0a} .st-lost{background:#f2e6e4;color:#9a4b40}
  select.stsel{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line);border-radius:16px;padding:2px 6px;background:#fff;cursor:pointer}
  .accb{font-size:10px;font-weight:700;border-radius:6px;padding:1px 7px;white-space:nowrap;margin-left:5px}
  .acc-none{background:#f0eee7;color:var(--grey)} .acc-invoiced{background:#fbf1d6;color:#9a7100} .acc-paid{background:#e2f4e2;color:#0a7a0a}
  .clip{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
  .warnpill{color:#b5541a;font-size:11px;cursor:pointer;font-weight:700}
  .setupbanner{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;border-radius:11px;padding:11px 15px;margin:0 0 14px;font-size:13px;line-height:1.5}
  .infobanner{background:#EEF4FB;border:1px solid #CFE0F3;color:#274b70;border-radius:11px;padding:9px 13px;margin:0 0 12px;font-size:12.5px;line-height:1.45}
  .hcgrid{width:100%;border-collapse:collapse;font-size:13px}
  .hcgrid th,.hcgrid td{padding:7px 12px;border-bottom:1px solid var(--line)}
  .hcgrid td.num{text-align:right}
  .hcgrid tr.section td{background:#f6f5f2;font-weight:800;text-transform:uppercase;font-size:10.5px;letter-spacing:.05em;color:var(--muted)}
  .hcgrid .row-total{font-weight:800}
  .pass{color:var(--green);font-weight:800} .fail{color:#C0392B;font-weight:800}
  .cvedit{width:60px;font:inherit;font-size:12.5px;padding:2px 5px;border:1px solid var(--line);border-radius:6px}
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .chartbox h3{margin:0 0 10px;font-size:14px;font-weight:700;color:var(--ink)}
  .chartbox .cw{position:relative;height:260px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  /* detail panel */
  #ov{position:fixed;inset:0;background:rgba(20,25,28,.45);z-index:9990;display:none} #ov.on{display:block}
  .panel{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:96vw;background:var(--bg);z-index:9991;transform:translateX(100%);transition:transform .22s ease;overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.18)}
  .panel.on{transform:none}
  .ph{background:var(--charcoal);color:#fff;padding:18px 20px}
  .ph .x{float:right;background:none;border:none;color:#aeb7bb;font-size:22px;cursor:pointer;line-height:1}
  .ph h3{margin:0;font-size:19px} .ph .role{color:#c3ccd0;font-size:13px;margin-top:2px}
  .pb{padding:16px 20px}
  .sec{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:12px}
  .sec h5{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .fld{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
  .fld label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .fld input,.fld textarea,.fld select{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .fld textarea{min-height:60px;resize:vertical}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:3px 0} .kv .k{color:var(--muted)}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;font:inherit;cursor:pointer;color:var(--ink)}
  .btn.p{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .ro-note{font-size:12px;color:var(--muted);font-style:italic}
  .lnk{background:none;border:none;color:var(--blue);cursor:pointer;font:inherit;font-size:12px;text-decoration:underline;padding:0}
</style>

<body>
<div class="app">
  <div id="nav"></div>
  <h1>💼 SPX — Sponsorship Sales</h1>
  <p class="sub">One shared board for every event's sponsorship proposals — fed automatically by the Proposal Builder. Everyone can see it; you edit your own (the sales lead and Belén edit any).</p>
  <div class="crmbar">
    <div class="tabs" id="tabs"></div>
    <span id="saveChip"></span>
  </div>
  <div id="banners"></div>
  <div id="app"></div>
</div>
<div id="ov" onclick="if(event.target===this)closePanel()"><div class="panel" id="panel"></div></div>

<script src="store.js?v=60"></script>
<script>
document.getElementById('nav').innerHTML=navBar('spx');

/* ---------- constants & small helpers ---------- */
const SALES_STATUSES=['Sent','Confirmed','Lost'];   // derived axis — Health-Check / Reporting / Invoiced-Paid all key on this
const ST_EN={Sent:'Sent',Confirmed:'Won',Lost:'Lost'};
const ST_CLASS={Sent:'st-sent',Confirmed:'st-approved',Lost:'st-lost'};
/* ---- Zoho-mirrored picklists (2026-07-14 — the SPX team's Zoho CRM options,
   translated to English). The Stage picklist is the primary status; the legacy
   salesStatus is DERIVED from it (Sent-* → Sent, Won → Confirmed, Lost → Lost)
   so Health-Check, Reporting and Invoiced/Paid keep working unchanged.
   Historical "Sent" proposals keep a BLANK stage — sales fill it by hand. */
const SPX_STAGES=['Sent - Just email','Sent - 1st call','Sent - 2nd call','Sent - Initial negotiation','Sent - Final negotiation','Won','Lost'];
const STAGE_PROB={'Sent - Just email':.15,'Sent - 1st call':.2,'Sent - 2nd call':.3,'Sent - Initial negotiation':.4,'Sent - Final negotiation':.7,'Won':1,'Lost':0};
const ACCOUNT_TYPES=['New Account','Transferred account','Existing Account'];
const SOURCES=['Apollo','External Events','Inbound','LinkedHelper','AC brochure','AC webinar','Past delegate 2026','Past sponsor 2026','Past sponsor previous','Past delegate previous','Referral','Outreach'];
const PRODUCT_PACKAGES=['Only Sponsorship Pack','Only Ticket','Only Content package','Bundle'];
const PACKAGE_TIERS=['Multi-event','General','Diamond','Gold','Silver','Bronze','Standard panel','Standard stand'];
const LOSS_REASONS=['No Budget','No Response','Timing','Not Relevant','Already Committed','Wrong Contact'];
function statusOfStage(st){return st==='Won'?'Confirmed':st==='Lost'?'Lost':st?'Sent':null;}
function stageClass(st){return st==='Won'?'st-approved':st==='Lost'?'st-lost':'st-sent';}
const ACC={none:{cls:'acc-none',txt:'not invoiced'},invoiced:{cls:'acc-invoiced',txt:'✓ invoiced'},paid:{cls:'acc-paid',txt:'✓ paid'}};
const money=n=>finFmt(n==null?0:n);
const pct=x=>(x==null?'—':(Math.round(x*1000)/10)+'%');
function stLabel(s){return ST_EN[s]||s||'—';}
/* company-name normalisation: uppercase, strip accents + punctuation + legal suffixes.
   (Fresh implementation — the CRM had no shared helper to reuse.) */
const LEGAL_SUFFIX={SAU:1,SLU:1,SASU:1,SARL:1,UNIPESSOAL:1,LDA:1,SA:1,SL:1,SRL:1,SAS:1,SPA:1,GMBH:1,AG:1,NV:1,BV:1,AS:1,OY:1,AB:1,PLC:1,LTD:1,LLC:1,INC:1,APS:1};
function normCompany(s){
  const n=(''+(s||'')).normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase()
    .replace(/[.,;()\/]/g,' ')
    .replace(/\s+/g,' ').trim();
  // strip legal-form tokens ONLY from the END ("SOLAR AB" → "SOLAR", but "AB SOLAR" stays "AB SOLAR")
  const parts=n.split(' ');
  while(parts.length>1&&LEGAL_SUFFIX[parts[parts.length-1]])parts.pop();
  return parts.join(' ');
}
function domainOf(email){const m=(''+(email||'')).split('@');return m.length===2?m[1].toLowerCase().trim():'';}

/* ---------- tab routing ---------- */
const TABLIST=[['proposals','Proposals'],['health','Health-Check'],['report','Reporting'],['before','Before']]; // Before parked at the end — empty until the first event closes
function activeTab(){const h=location.hash.replace('#','');return TABLIST.some(t=>t[0]===h)?h:'proposals';}
let TAB=activeTab();
let VIEW='general';                  // 'general' (parent rows) | 'event' (child rows)
let flt={event:'',sales:'',stage:'',accountType:'',source:'',productPackage:'',packageTier:'',reasonForLoss:'',from:'',to:'',q:''};
let HC=null;                         // dc_finance id selected for Health-Check

/* ---------- charts ---------- */
let charts={};
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(el,cfg);}

/* ---------- data helpers ---------- */
function eventLabel(l){ // l = a line
  if(l.eventId!=null){const f=DB.finance.find(f=>f.id==l.eventId);if(f)return finLabel(f);}
  return l.eventName||l.eventKey||'—';
}
function propEvents(p){return DB.spxLinesFor(p.id);}
/* hand-added rows (board "+ New proposal") are greyed so the team can tell them from
   Builder-fed ones. Builder rows always carry the deck fileName; the 2026-07-13
   sheet import has its own createdBy marker and stays normal. */
function byHand(p){return !p.fileName&&p.createdBy!=='spx-import-2026-07-13';}
function rowCls(p){return 'prow'+(byHand(p)?' byhand':'');}
function rowTitle(p){return byHand(p)?' title="Added by hand on the board — not from the Proposal Builder"':'';}
/* the authoritative value of a proposal = Σ its children, or its own value when it has none (General/single-with-value) */
function propValue(p){const ls=DB.spxLinesFor(p.id);if(ls.length)return ls.reduce((s,l)=>s+(+l.valueEur||0),0);return +p.valueEur||0;}
function distinctList(arr){return Array.from(new Set(arr.filter(x=>x!=null&&x!=='')));}

/* ---------- SPX event dimension ----------
   The events come from the PROPOSALS themselves (what's actually being sold),
   NOT from the Money (dc_finance) list — so the board shows your live events,
   not old empty ones. Each event = a stable key + name (+ an optional dc_finance
   match, used only for targets / Invoiced-Paid when that money row exists). */
function regEvents(){return (DB.spxEventReg||[]).filter(e=>!e.deleted);}
function hasReg(){return regEvents().length>0;}
function lineMapsReg(l,e){return (l.eventKey&&e.eventKey&&l.eventKey===e.eventKey)||(l.eventId!=null&&e.financeId!=null&&e.financeId==l.eventId);}
function lineEvKey(l){if(hasReg()){const e=regEvents().find(x=>lineMapsReg(l,x));if(e)return e.eventKey;}return l.eventKey||(l.eventId!=null?('fin'+l.eventId):(l.eventName?('nm:'+normCompany(l.eventName)):'?'));}
function lineEvName(l){if(hasReg()){const e=regEvents().find(x=>lineMapsReg(l,x));if(e)return e.name;}if(l.eventName)return l.eventName;if(l.eventId!=null){const f=DB.finance.find(f=>f.id==l.eventId);if(f)return f.name+' '+(f.year||'');}return l.eventKey||'—';}
function evFinanceId(key,name){
  const l=DB.spxLines.find(x=>!x.deleted&&lineEvKey(x)===key&&x.eventId!=null);
  if(l)return l.eventId;
  const nn=normCompany(name);if(!nn)return null;
  const f=DB.finance.find(x=>!x.deleted&&normCompany(x.name)&&nn.indexOf(normCompany(x.name))>=0);
  return f?f.id:null;
}
function evStats(key){let sent=0,total=0;liveProps().forEach(p=>{if(DB.spxLinesFor(p.id).some(l=>lineEvKey(l)===key)){total++;if(p.salesStatus==='Sent')sent++;}});return {sent,total};}
/* The SPX event list. Registry (dc_spx_events) drives it when present — active =
   current, inactive = "Before". Else fall back to events found in the proposals. */
function spxEvents(){
  if(hasReg())return regEvents().slice().sort((a,b)=>(+a.sort||0)-(+b.sort||0)).map(e=>{const s=evStats(e.eventKey);return {key:e.eventKey,name:e.name,financeId:e.financeId,active:e.active!==false,sent:s.sent,total:s.total,reg:e};});
  const map={};
  liveProps().forEach(p=>DB.spxLinesFor(p.id).forEach(l=>{const k=lineEvKey(l);if(k==='?')return;
    if(!map[k])map[k]={key:k,name:lineEvName(l),sent:0,total:0,active:true};
    map[k].total++;if(p.salesStatus==='Sent')map[k].sent++;}));
  const out=Object.values(map);out.forEach(e=>{e.financeId=evFinanceId(e.key,e.name);});
  return out.sort((a,b)=>(''+a.name).localeCompare(''+b.name));
}
function evCurrent(e){return hasReg()?!!e.active:e.sent>0;}
function currentEventKeys(){const s={};spxEvents().forEach(e=>{if(evCurrent(e))s[e.key]=1;});return s;}
/* a proposal is "current" if it's General or touches an event still in pipeline; else it's "Before".
   Keys NOT in the dc_spx_events registry count as CURRENT (never silently filed under Before) —
   only events explicitly registered with current=false belong there. */
function lineUnreg(l){return hasReg()&&!regEvents().some(e=>e.eventKey===lineEvKey(l));}
function propHasUnreg(p){return !p.isGeneral&&DB.spxLinesFor(p.id).some(lineUnreg);}
function unregChip(){return ' <span class="warnpill" title="⚠ event not in registry — add it in ⚙ Manage events">⚠</span>';}
function propIsCurrent(p,cur){if(p.isGeneral)return true;const ls=DB.spxLinesFor(p.id);if(!ls.length)return true;return ls.some(l=>cur[lineEvKey(l)]||lineUnreg(l));}

/* accounting derivation via the confirmed crosswalk (sales never type this) */
function canonicalFor(company){
  const n=normCompany(company);if(!n)return null;
  return DB.companyMap.find(m=>m.status==='confirmed'&&(
    (m.marketingAliases||[]).some(a=>normCompany(a)===n)||normCompany(m.canonicalName)===n))||null;
}
function invMatches(cm,eventId){
  if(!cm||!cm.invoiceClientKey||eventId==null)return [];   // eventId==null must NEVER match all allocations
  const key=normCompany(cm.invoiceClientKey);
  return DB.invoices.filter(inv=>inv.status!=='cancelado'
    &&(inv.producto==='sponsorship'||inv.producto==='upgrade')
    &&normCompany(inv.razon_social)===key
    &&DB.invoiceAllocs.some(a=>a.invoice_id==inv.id&&a.eventId==eventId));
}
function accountingFor(p){
  // 1) the explicit invoice ↔ contract link Jesús sets in Facturación — authoritative
  const direct=DB.invoices.filter(i=>i.spxProposalId==p.id&&i.status!=='cancelado');
  if(direct.length){
    const paid=direct.some(i=>i.status==='pagado'||i.fecha_cobro);
    return {state:paid?'paid':'invoiced',linked:true};
  }
  // 2) fallback: the company-name crosswalk (filled silently when a salesperson
  //    types the legal name at Won) — kept so pre-link history still derives
  const cm=canonicalFor(p.company);
  if(!cm)return {state:'none',linked:false};
  const scope=DB.spxLinesFor(p.id).map(l=>l.eventId).filter(x=>x!=null);   // ONLY event-linked lines — never [null]
  if(!scope.length)return {state:'none',linked:true,noEvent:true};         // no €-Dashboard event → derivation impossible
  let inv=false,paid=false;
  scope.forEach(ev=>invMatches(cm,ev).forEach(i=>{inv=true;if(i.status==='pagado'||i.fecha_cobro)paid=true;}));
  return {state:paid?'paid':inv?'invoiced':'none',linked:true};
}

/* ---------- filtering ---------- */
function liveProps(){return DB.spxProps.filter(p=>p.active!==false&&!p.superseded);}
function passFilters(p){
  const blankOr=(f,v)=>!f||(f==='(blank)'?!(v||''):(v||'')===f);   // every picklist filter also offers "(blank)" = needs filling in
  if(flt.sales&&(p.responsable!==flt.sales&&p.responsableName!==flt.sales))return false;
  if(!blankOr(flt.stage,p.stage))return false;
  if(!blankOr(flt.accountType,p.accountType))return false;
  if(!blankOr(flt.source,p.source))return false;
  if(!blankOr(flt.productPackage,p.productPackage))return false;
  if(!blankOr(flt.packageTier,p.packageTier))return false;
  if(!blankOr(flt.reasonForLoss,p.reasonForLoss))return false;
  if(flt.from&&(p.fechaEnvio||p.createdAt||'')<flt.from)return false;
  if(flt.to&&(p.fechaEnvio||p.createdAt||'').slice(0,10)>flt.to)return false;
  if(flt.event){const has=DB.spxLinesFor(p.id).some(l=>lineEvKey(l)===flt.event);if(!has)return false;}
  if(flt.q){const q=flt.q.toLowerCase();const hay=[p.company,p.responsableName,p.contents,p.notas,p.source,p.accountType,p.productPackage,p.packageTier,p.reasonForLoss,p.origen].join(' ').toLowerCase();if(!hay.includes(q))return false;}
  return true;
}

/* ---------- render root ---------- */
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABLIST.map(([k,l])=>'<button class="'+(k===TAB?'on':'')+'" onclick="location.hash=\''+k+'\'">'+l+'</button>').join('');
}
function banners(){
  let h='';
  if(USE_SUPABASE&&!DB.spxReady())
    h+='<div class="setupbanner"><b>One database step missing:</b> the SPX tables aren\'t in the dispatch Supabase yet — run <b>_sql/dispatch_spx.sql</b> in the Supabase SQL editor, then reload. You can look around, but nothing will save.</div>';
  document.getElementById('banners').innerHTML=h;
}
function render(){
  renderTabs();banners();
  const el=document.getElementById('app');
  if(TAB==='proposals')renderProposals(el,'current');
  else if(TAB==='before')renderProposals(el,'before');
  else if(TAB==='health')renderHealth(el);
  else renderReporting(el);
}

/* ================= PROPOSALS TAB ================= */
function renderProposals(app,scope){
  scope=scope||'current';
  const cur=currentEventKeys();
  const props=liveProps().filter(passFilters).filter(p=>scope==='before'?!propIsCurrent(p,cur):propIsCurrent(p,cur));
  // Event filter set → the tiles sum ONLY the lines of that event (not whole-proposal values)
  const val=p=>flt.event?DB.spxLinesFor(p.id).filter(l=>lineEvKey(l)===flt.event).reduce((s,l)=>s+(+l.valueEur||0),0):propValue(p);
  const sum=st=>props.filter(p=>p.salesStatus===st).reduce((s,p)=>s+val(p),0);
  const firmado=sum('Confirmed'),enviado=sum('Sent'),perdido=sum('Lost'),proceso=firmado+enviado;
  // target/stretch: only where the event has a Money (dc_finance) row + a target set
  const evObjs=spxEvents();
  const shownKeys=distinctList(props.flatMap(p=>DB.spxLinesFor(p.id).map(lineEvKey)));
  let tgt=0,str=0;evObjs.forEach(e=>{if(shownKeys.indexOf(e.key)<0)return;const t=hasReg()?(e.reg||{}):(e.financeId!=null?DB.spxTargetFor(e.financeId):null);if(t){tgt+=(+t.sponsorshipTarget||0);str+=(+t.sponsorshipStretch||0);}});
  const pctT=tgt?firmado/tgt:null,pctS=str?firmado/str:null;

  const salespeople=distinctList(DB.spxProps.map(p=>p.responsableName||p.responsable));
  const scopeEvents=evObjs.filter(e=>scope==='before'?!evCurrent(e):evCurrent(e));

    +tile('Lost',money(perdido),props.filter(p=>p.salesStatus==='Lost').length+' props')
    +tile('Won + pipeline',money(proceso),'')
    +tile('Target (sponsorship)',tgt?money(tgt):'—','where set in Money')
    +tile('% to target',pctT==null?'—':pct(pctT),'')

    +'</div>';

  if(scope!=='before'&&(DB.isSales()||DB.canSalesLead())){
    h+='<div style="margin:0 0 10px">';

    if(DB.canSalesLead())h+='<button class="btn" onclick="openManageEvents()">⚙ Manage events</button> ';
    h+='<span class="ro-note">Add a proposal by hand (or they arrive from the Builder). Manage events sets which events are being sold.</span></div>';
  }

  // filters
  h+='<div class="filters">';
  h+='<span class="seg"><button class="'+(VIEW==='general'?'on':'')+'" onclick="setView(\'general\')">General level</button>'
    +'<button class="'+(VIEW==='event'?'on':'')+'" onclick="setView(\'event\')">By event</button></span>';
  const pick=(id,label,list,cur)=>sel(id,label,list.map(s=>[s,s]).concat([['(blank)','(blank — to fill in)']]),cur);
  h+=sel('f_event','Event',scopeEvents.map(e=>[e.key,e.name]),flt.event);
  h+=sel('f_sales','Salesperson',salespeople.map(s=>[s,s]),flt.sales);
  h+=pick('f_stage','Stage',SPX_STAGES,flt.stage);
  h+=pick('f_atype','Account type',ACCOUNT_TYPES,flt.accountType);
  h+=pick('f_source','Source',SOURCES,flt.source);
  h+=pick('f_ppack','Product/Package',PRODUCT_PACKAGES,flt.productPackage);
  h+=pick('f_ptier','Package',PACKAGE_TIERS,flt.packageTier);
  h+=pick('f_loss','Reason for loss',LOSS_REASONS,flt.reasonForLoss);
  h+='<input type="date" id="f_from" value="'+esc(flt.from)+'" title="from (sent date)">';
  h+='<input type="date" id="f_to" value="'+esc(flt.to)+'" title="to (sent date)">';
  h+='<input type="text" id="f_q" placeholder="search company / contact…" value="'+esc(flt.q)+'" style="min-width:150px">';
  if(flt.event||flt.sales||flt.stage||flt.accountType||flt.source||flt.productPackage||flt.packageTier||flt.reasonForLoss||flt.from||flt.to||flt.q)
    h+='<button class="chip" onclick="clearFilters()">clear</button>';
  h+='</div>';

  // table

/* The bulk "Link companies" tray is GONE (2026-07-14): the legal name now comes
   from the salesperson at the moment a deal is Won (askLegalOnSigned below), and
   Jesús links each invoice to its contract in Facturación (invoice.spxProposalId),
   which accountingFor() reads first. The crosswalk table stays as silent fallback. */
/* when a deal turns Firmado, capture the contract's razón social so it matches its invoice.
   Cancel = the status still changes, nothing is written to the ledger. */
function askLegalOnSigned(p,prevStatus){
  if(!p||p.salesStatus!=='Confirmed'||prevStatus==='Confirmed')return;
  const cm=canonicalFor(p.company);
  const pre=cm?(cm.invoiceClientKey||(Array.isArray(cm.legalAliases)&&cm.legalAliases[0])||''):'';
  const ans=prompt('Contract signed 🎉 — type the client\'s FULL LEGAL NAME (razón social) exactly as it appears on the contract. Required: it is what invoicing uses to bill the deal.',pre);
  if(ans==null)return;
  const legal=ans.trim();if(!legal)return;
  const me=DB.currentUser;
  if(cm){
    if(!Array.isArray(cm.legalAliases))cm.legalAliases=cm.legalAliases?[cm.legalAliases]:[];
    if(!cm.legalAliases.some(a=>normCompany(a)===normCompany(legal)))cm.legalAliases.push(legal);
    cm.confirmedBy=(me&&me.email)||'';cm.confirmedAt=new Date().toISOString();
  }else{
    const dom=domainOf((p.contacts&&p.contacts[0]&&p.contacts[0].email)||'');
    const row={id:DB.newId(),canonicalName:p.company,marketingAliases:[p.company],legalAliases:[legal],
      emailDomains:dom?[dom]:[],invoiceClientKey:legal,confirmedBy:(me&&me.email)||'',confirmedAt:new Date().toISOString(),status:'confirmed'};
    DB.companyMap.push(row);
    const n=normCompany(p.company);
    liveProps().forEach(q=>{if(normCompany(q.company)===n)q.companyId=row.id;});
  }
}

/* best-effort event date: a matched Projects (dc_events) row, else the free-text
   "when" + year. Used to float ONGOING events to the top and demote finished ones. */
const HC_MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,march:2,april:3,june:5,july:6,
  ene:0,abr:3,ago:7,dic:11,enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,setiembre:8,octubre:9,noviembre:10,diciembre:11};
function finStartDate(f){
  const nf=normCompany(f.name);
  let e=(f.eventId!=null)?DB.events.find(x=>x.id==f.eventId):null;
  if(!e)e=DB.events.find(x=>x.date&&(''+f.year)===(''+ymd(x.date).getFullYear())&&nf&&normCompany(x.name).indexOf(nf)>=0);
  if(e&&e.date)return ymd(e.date);
  if(f.year){const w=(''+(f.when||'')).toLowerCase();let mo=null;for(const k in HC_MONTHS){if(w.indexOf(k)>=0){mo=HC_MONTHS[k];break;}}
    if(mo!=null){const dm=w.match(/(\d{1,2})/);return new Date(f.year,mo,dm?+dm[1]:1);}
    return new Date(f.year,11,31);}   // month unknown → treat as year-end (stays "ongoing" until then)
  return null;
}
function finOngoing(f){const s=finStartDate(f);if(!s)return true;const end=new Date(s);end.setDate(end.getDate()+2);const t=new Date();t.setHours(0,0,0,0);return end>=t;}
let _hcFid=null,_hcReg=null;
function renderHealth(app){
  const evsAll=spxEvents();
  const cur=evsAll.filter(evCurrent).sort((a,b)=>(''+a.name).localeCompare(''+b.name));
  const past=evsAll.filter(e=>!evCurrent(e)).sort((a,b)=>(''+a.name).localeCompare(''+b.name));
  if(HC==null||!evsAll.some(e=>e.key===HC))HC=(cur[0]&&cur[0].key)||(past[0]&&past[0].key)||null;
  const optE=e=>'<option value="'+esc(e.key)+'"'+(HC===e.key?' selected':'')+'>'+esc(e.name)+'</option>';
  let optsHtml=cur.map(optE).join('');
  if(past.length)optsHtml+='<option disabled>──── finished ────</option>'+past.map(e=>'<option value="'+esc(e.key)+'"'+(HC===e.key?' selected':'')+'>'+esc(e.name)+' · (finished)</option>').join('');
  let h='<div class="filters"><label style="font-weight:700;color:var(--ink)">Event:</label>'
    +'<select id="hc_ev">'+(optsHtml||'<option>—</option>')+'</select> <span class="ro-note">The events you\'re selling — same set as the board.</span></div>';
  const ev=evsAll.find(e=>e.key===HC);
  if(!ev){app.innerHTML=h+'<div class="card" style="color:var(--muted)">No events yet.</div>';const s=document.getElementById('hc_ev');if(s)s.onchange=()=>{HC=s.value;render();};return;}
  const fid=ev.financeId; _hcFid=fid; _hcReg=(hasReg()&&ev.reg)?ev.reg:null;
  const t=_hcReg||(fid!=null&&DB.spxTargetFor(fid))||{sponsorshipTarget:null,sponsorshipStretch:null,pasesTarget:null,pasesStretch:null,convByStatus:{Sent:0.35,Confirmed:0.7}};
  let conv=(t.convByStatus&&t.convByStatus.Sent!=null)?+t.convByStatus.Sent:0.35;
  if(conv>1)conv=conv/100;conv=Math.max(0,Math.min(1,conv));   // "35" means 35%, always a 0–1 fraction
  // pipeline (Sent sponsorship) for this event — proposals already Invoiced/Paid are
  // excluded (their money already sits in Confirmado; counting both double-counts)
  const sentLines=[];
  liveProps().filter(p=>p.salesStatus==='Sent').forEach(p=>{
    const acc=accountingFor(p).state;if(acc==='invoiced'||acc==='paid')return;
    DB.spxLinesFor(p.id).forEach(l=>{if(lineEvKey(l)===HC)sentLines.push(+l.valueEur||0);});});
  const pipeline=sentLines.reduce((a,b)=>a+b,0);
  const expected=pipeline*conv;
  // confirmed = sponsorship invoiced for this event (Invoiced/Paid), NOT sales-declared
  const spInvoiced=fid!=null?invoicedSponsorship(fid):{total:0,paid:0};
  const projection=spInvoiced.total+expected;
  const spTarget=+t.sponsorshipTarget||0,spStretch=+t.sponsorshipStretch||0;
  const gapT=projection-spTarget,gapS=projection-spStretch;
  const addT=gapT>=0?0:(conv>0?(-gapT)/conv:null),addS=gapS>=0?0:(conv>0?(-gapS)/conv:null);   // conv 0 → can't derive
  const pasesInv=fid!=null?invoicedPases(fid):{total:0,paid:0};
  const editable=DB.canSalesLead()&&(_hcReg!=null||fid!=null);   // targets editable if the registry or a Money row holds them

  h+='<div class="card"><h2>'+esc(ev.name)+' — sales health-check</h2>'
    +(fid==null?'<div class="setupbanner" style="margin:6px 0 10px">Not linked to a <b>Money</b> row yet, so <b>Invoiced/Paid</b> can\'t derive (targets &amp; pipeline still work). Link it in <b>⚙ Manage events</b> once it\'s in Money.</div>':'')
    +'<p class="lead">Sponsorship projection = confirmed (from Facturación) + expected pipeline (proposals sent × conversion). '
    +'Confirmed counts <b>Invoiced/Paid only</b>, never sales-declared.</p>';

  // targets table
  h+='<table class="hcgrid"><thead><tr><th>Concepto</th><th class="num">Pases</th><th class="num">Sponsorship</th><th class="num">TOTAL</th></tr></thead><tbody>';
  h+=hcRow('Target',t.pasesTarget,spTarget,(+t.pasesTarget||0)+spTarget,editable,'pasesTarget','sponsorshipTarget');
  h+=hcRow('Stretch',t.pasesStretch,spStretch,(+t.pasesStretch||0)+spStretch,editable,'pasesStretch','sponsorshipStretch');
  h+='<tr class="section"><td colspan="4">Pipeline & confirmed</td></tr>';
  h+='<tr><td>Confirmado (facturado)</td><td class="num">'+money(pasesInv.total)+'</td><td class="num">'+money(spInvoiced.total)+'</td><td class="num">'+money(pasesInv.total+spInvoiced.total)+'</td></tr>';
  h+='<tr><td><span class="ro-note">— del cual pagado</span></td><td class="num">'+money(pasesInv.paid)+'</td><td class="num">'+money(spInvoiced.paid)+'</td><td class="num">'+money(pasesInv.paid+spInvoiced.paid)+'</td></tr>';
  h+='<tr><td>En pipeline (propuestas enviadas)</td><td class="num">—</td><td class="num">'+money(pipeline)+'</td><td class="num">'+money(pipeline)+'</td></tr>';
  h+='<tr><td>% de conversión asumido</td><td class="num">—</td><td class="num">'+convCell(conv,editable)+'</td><td class="num"></td></tr>';
  h+='<tr><td>Ingreso esperado del pipeline</td><td class="num">—</td><td class="num">'+money(expected)+'</td><td class="num">'+money(expected)+'</td></tr>';
  h+='<tr class="row-total"><td>PROYECCIÓN (confirmado + esperado)</td><td class="num">'+money(pasesInv.total)+'</td><td class="num">'+money(projection)+'</td><td class="num">'+money(pasesInv.total+projection)+'</td></tr>';
  h+='</tbody></table>';

  // verdicts (sponsorship, consistent base)
  h+='<div class="tiles" style="margin-top:16px">'
    +tile('¿Llega a Target?',gapT>=0?'SÍ ✔':'NO ✘',money(spTarget)+' target',gapT>=0?'good':'bad')
    +tile('Diferencia vs Target',money(gapT),gapT>=0?'holgura':'falta por cerrar',gapT>=0?'good':'bad')
    +tile('¿Llega a Stretch?',gapS>=0?'SÍ ✔':'NO ✘',money(spStretch)+' stretch',gapS>=0?'good':'bad')
    +tile('Diferencia vs Stretch',money(gapS),gapS>=0?'holgura':'falta por cerrar',gapS>=0?'good':'bad')
    +'</div>';
  h+='<div class="tiles">'
    +tile('€ propuestas ADIC. → target',addT==null?'—':'+'+money(addT),addT==null?'conversión 0% — no calculable':'a firmar (÷ conv '+pct(conv)+')')
    +tile('€ propuestas ADIC. → stretch',addS==null?'—':'+'+money(addS),addS==null?'conversión 0% — no calculable':'a firmar (÷ conv '+pct(conv)+')')
    +'</div>';
  h+='<p class="ro-note">Lectura rápida: si la diferencia es negativa, ese es el volumen de propuestas NUEVAS que hay que mover (teniendo en cuenta la conversión) para cerrar el hueco.</p>';
  h+='</div>';
  app.innerHTML=h;
  const s=document.getElementById('hc_ev');if(s)s.onchange=()=>{HC=s.value;render();};
  wireHC(t);
}
function hcRow(label,pases,spons,total,editable,pf,sf){
  const c=(v,fld)=>editable?'<span class="mval" data-tf="'+fld+'" title="Click to edit">'+money(v)+'</span>':money(v);
  return '<tr><td>'+esc(label)+'</td><td class="num">'+c(pases,pf)+'</td><td class="num">'+c(spons,sf)+'</td><td class="num">'+money(total)+'</td></tr>';
}
function convCell(conv,editable){
  if(!editable)return pct(conv);
  return '<input class="cvedit" id="hc_conv" type="number" step="0.01" min="0" max="1" value="'+conv+'"> ('+pct(conv)+')';
}
function invoicedSponsorship(finId){
  let total=0,paid=0;
  DB.invoiceAllocs.forEach(a=>{if(a.eventId!=finId)return;const inv=DB.invoice(a.invoice_id);
    if(!inv||inv.status==='cancelado')return;if(inv.producto!=='sponsorship'&&inv.producto!=='upgrade')return;
    total+=(+a.amount||0);if(inv.status==='pagado'||inv.fecha_cobro)paid+=(+a.amount||0);});
  return {total,paid};
}
function invoicedPases(finId){
  let total=0,paid=0;
  DB.invoiceAllocs.forEach(a=>{if(a.eventId!=finId)return;const inv=DB.invoice(a.invoice_id);
    if(!inv||inv.status==='cancelado')return;if(inv.producto!=='tickets')return;
    total+=(+a.amount||0);if(inv.status==='pagado'||inv.fecha_cobro)paid+=(+a.amount||0);});
  return {total,paid};
}
function wireHC(t){
  const conv=document.getElementById('hc_conv');
  if(conv)conv.onchange=()=>{let c=+conv.value;if(c>1)c=c/100;c=Math.max(0,Math.min(1,c));const row=ensureTarget();row.convByStatus=Object.assign({},row.convByStatus||{},{Sent:c});DB.save();render();};
  document.querySelectorAll('.mval[data-tf]').forEach(sp=>sp.onclick=()=>{
    const fld=sp.dataset.tf;const row=ensureTarget();
    const td=sp.parentElement;td.innerHTML='<input class="money" type="number" step="any" value="'+(row[fld]==null?'':row[fld])+'">';
    const inp=td.firstChild;inp.focus();inp.select();let done=false;
    const commit=()=>{if(done)return;done=true;row[fld]=(inp.value===''?null:+inp.value);DB.save();render();};
    inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){done=true;render();}};
  });
}
function ensureTarget(){
  if(_hcReg)return _hcReg;                     // registry event row holds targets + conversion
  if(_hcFid==null)return {convByStatus:{}};
  let row=DB.spxTargetFor(_hcFid);
  if(!row){row={id:DB.newId(),eventId:_hcFid,sponsorshipTarget:null,sponsorshipStretch:null,pasesTarget:null,pasesStretch:null,convByStatus:{Sent:0.35,Confirmed:0.7}};DB.spxTargets.push(row);}
  return row;
}

/* ================= REPORTING TAB ================= */
function renderReporting(app){
  const props=liveProps();
  // per salesperson: built (all), firm (has value & not general), € out
  const bySp={};
  props.forEach(p=>{
    const k=p.responsableName||p.responsable||'—';
    bySp[k]=bySp[k]||{built:0,firm:0,out:0,general:0};
    bySp[k].built++;
    const v=propValue(p);
    if(p.isGeneral){bySp[k].general+=v;}else{bySp[k].firm++;bySp[k].out+=v;}
  });
  const sp=Object.keys(bySp).sort((a,b)=>bySp[b].out-bySp[a].out);
  // by source → conversion
  const bySrc={};
  props.forEach(p=>{const k=p.source||'(unspecified)';bySrc[k]=bySrc[k]||{n:0,confirmed:0};bySrc[k].n++;if(p.salesStatus==='Confirmed')bySrc[k].confirmed++;});
  const srcK=Object.keys(bySrc).sort((a,b)=>bySrc[b].n-bySrc[a].n);
  // weekly (by createdAt week)
  const byWk={};
  props.forEach(p=>{const d=(p.createdAt||p.fechaEnvio||'').slice(0,10);if(!d)return;const wk=weekStart(d);byWk[wk]=byWk[wk]||{n:0,val:0};byWk[wk].n++;byWk[wk].val+=propValue(p);});
  const wk=Object.keys(byWk).sort();
  // aging (Sent, days since fechaEnvio/createdAt)
  const now=new Date();
  const aging={'0-14':0,'15-30':0,'31-60':0,'60+':0};
  props.filter(p=>p.salesStatus==='Sent').forEach(p=>{const d=(p.fechaEnvio||p.createdAt||'').slice(0,10);if(!d)return;const days=Math.floor((now-new Date(d))/864e5);aging[days<=14?'0-14':days<=30?'15-30':days<=60?'31-60':'60+']++;});
  // by event (€ out across child lines)
  const byEv={};
  props.forEach(p=>DB.spxLinesFor(p.id).forEach(l=>{const k=lineEvName(l);byEv[k]=byEv[k]||{val:0,ids:{}};byEv[k].val+=(+l.valueEur||0);byEv[k].ids[p.id]=1;}));
  const evK=Object.keys(byEv).sort((a,b)=>byEv[b].val-byEv[a].val);

  let h='<p class="lead">The weekly sales report, in-app — proposals out per salesperson, over time, by source (and its conversion), and pipeline aging. Reborn from the old Proposals Dashboard.</p>';
  if(!props.length){app.innerHTML=h+'<div class="card" style="color:var(--muted)">No proposals yet — this fills in as the builder writes them.</div>';return;}

  // per-salesperson table
  h+='<div class="card"><h3 style="margin:0 0 10px">Per salesperson</h3><div class="tablewrap"><table><thead><tr>'
    +'<th>Salesperson</th><th class="num">Built</th><th class="num">Firm quotes</th><th class="num">€ out (firm)</th><th class="num">€ general</th></tr></thead><tbody>';
  sp.forEach(k=>{const r=bySp[k];h+='<tr><td>'+esc(k)+'</td><td class="num">'+r.built+'</td><td class="num">'+r.firm+'</td><td class="num">'+money(r.out)+'</td><td class="num">'+money(r.general)+'</td></tr>';});
  h+='</tbody></table></div></div>';

  h+='<div class="grid2">';
  h+='<div class="chartbox"><h3>€ out per salesperson</h3><div class="cw"><canvas id="c_sp"></canvas></div></div>';
  h+='<div class="chartbox"><h3>Proposals per week</h3><div class="cw"><canvas id="c_wk"></canvas></div></div>';
  h+='</div><div class="grid2">';
  h+='<div class="chartbox"><h3>By source — count & conversion</h3><div class="cw"><canvas id="c_src"></canvas></div></div>';
  h+='<div class="chartbox"><h3>Pipeline aging (Sent)</h3><div class="cw"><canvas id="c_age"></canvas></div></div>';
  h+='</div>';
  h+='<div class="chartbox"><h3>€ out by event</h3><div class="cw"><canvas id="c_ev"></canvas></div></div>';
  app.innerHTML=h;

  mkChart('c_sp',{type:'bar',data:{labels:sp,datasets:[{label:'€ out',data:sp.map(k=>bySp[k].out),backgroundColor:'#FF4A00'}]},
    options:{maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>money(v)}}}}});
  mkChart('c_wk',{type:'bar',data:{labels:wk,datasets:[{label:'proposals',data:wk.map(k=>byWk[k].n),backgroundColor:'#2A78D6'}]},
    options:{maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:0}}}}});
  mkChart('c_src',{type:'bar',data:{labels:srcK,datasets:[
      {label:'proposals',data:srcK.map(k=>bySrc[k].n),backgroundColor:'#8A8781'},
      {label:'confirmed',data:srcK.map(k=>bySrc[k].confirmed),backgroundColor:'#0CA30C'}]},
    options:{maintainAspectRatio:false,animation:false,scales:{y:{beginAtZero:true}}}});
  mkChart('c_age',{type:'bar',data:{labels:Object.keys(aging),datasets:[{label:'proposals',data:Object.values(aging),backgroundColor:['#0CA30C','#B26A10','#B5541A','#C0392B']}]},
    options:{maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}}}});
  mkChart('c_ev',{type:'bar',data:{labels:evK,datasets:[{label:'€ out',data:evK.map(k=>byEv[k].val),backgroundColor:'#4C3079'}]},
    options:{maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>money(v)}}}}});
}
function weekStart(iso){const d=new Date(iso);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10);}

function savePanel(id){
  const p=DB.spxProps.find(x=>x.id==id);if(!p)return;
  const prev=p.salesStatus;
  const NULLABLE={fechaEnvio:1,fechaSeguimiento:1,stage:1,accountType:1,source:1,productPackage:1,packageTier:1,reasonForLoss:1};
  document.querySelectorAll('#panel [data-pf]').forEach(e=>{const f=e.dataset.pf;let v=e.value;if(NULLABLE[f]&&v==='')v=null;p[f]=v;});
  if(document.querySelector('#panel [data-ci]')){   // contact rows were rendered → collect up to 3
    const cs=[];for(let i=0;i<3;i++){
      const g=k=>{const e=document.querySelector('#panel [data-ci="'+i+'"][data-ck="'+k+'"]');return e?e.value.trim():'';};
      const c={first:g('first'),last:g('last'),email:g('email'),phone:g('phone')};
      if(c.first||c.last||c.email||c.phone){if(!c.phone)delete c.phone;cs.push(c);}}
    p.contacts=cs;
  }
  const st=statusOfStage(p.stage);if(st)p.salesStatus=st;   // stage drives the derived status; blank stage keeps the legacy one
  if(p.stage!=='Lost')p.reasonForLoss=null;                 // a reason only makes sense on a lost deal
  askLegalOnSigned(p,prev);
  DB.save();closePanel();render();
}

/* ---------- add a proposal by hand ---------- */
function salespeopleOpts(){
  const me=DB.currentUser;
  const list=DB.people.filter(p=>!isTeamAccount(p)&&(p.role==='Sales'||p.role==='Lead'||p.access==='admin'||p.salesLead));
  return list.map(p=>'<option value="'+esc(p.email||'')+'" data-name="'+esc(p.name)+'"'+((me&&me.id===p.id)?' selected':'')+'>'+esc(p.name)+'</option>').join('');
}
function openCreate(){
  if(!DB.isSales()){alert('Only sales, the sales lead or an admin can add proposals.');return;}
  const evs=spxEvents().filter(evCurrent);   // the events being sold now
  window._ncEvOpts='<option value="">— pick event —</option>'+evs.map(e=>'<option value="'+esc(e.key)+'">'+esc(e.name)+'</option>').join('');
  const zoho=(id,opts,selDefault)=>'<select id="'+id+'"><option value=""'+(selDefault?'':' selected')+'>—</option>'+opts.map(o=>'<option value="'+esc(o)+'"'+(o===selDefault?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
  const b='<div class="sec"><h5>New proposal</h5>'
    +'<div class="fld"><label>Company (marketing name) *</label><input id="nc_company"></div>'
    +'<div class="fld"><label>Owner</label><select id="nc_resp">'+salespeopleOpts()+'</select></div>'
    +'<div class="fld"><label>Account type</label>'+zoho('nc_atype',ACCOUNT_TYPES)+'</div>'
    +'<div class="fld"><label>Source</label>'+zoho('nc_source',SOURCES)+'</div>'
    +'<div class="fld"><label>Stage</label>'+zoho('nc_stage',SPX_STAGES,'Sent - Just email')+'</div>'
    +'<div class="fld"><label>Product/Package</label>'+zoho('nc_ppack',PRODUCT_PACKAGES)+'</div>'
    +'<div class="fld"><label>Package</label>'+zoho('nc_ptier',PACKAGE_TIERS)+'</div>'
    +'<div class="fld"><label><input type="checkbox" id="nc_general" onchange="toggleGeneral()"> General proposal (no specific event)</label></div>'
    +'<div id="nc_events"><label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em">Events &amp; value</label>'
      +'<div id="nc_lines"></div><button class="lnk" onclick="addNcLine()">+ add event</button></div>'
    +'<div id="nc_genwrap" style="display:none"><div class="fld"><label>Value € (General)</label><input id="nc_genval" type="number" value="4000"></div></div>'
    +'<div class="fld"><label>Included in proposal / contents</label><textarea id="nc_contents"></textarea></div>'
    +'<div class="fld"><label>Contacts (up to 3) — <span style="color:#FF4A00">★</span> row 1 = main contact · first name / surname / email / phone</label>'
      +[0,1,2].map(i=>'<span style="display:flex;gap:5px;margin-bottom:4px;align-items:center">'
        +(i===0?'<span style="width:14px;color:#FF4A00;font-weight:700" title="Main contact — direct communications here">★</span>':'<span style="width:14px"></span>')
        +'<input id="nc_cf'+i+'" placeholder="first name"><input id="nc_cl'+i+'" placeholder="surname"><input id="nc_ce'+i+'" placeholder="email"><input id="nc_cp'+i+'" placeholder="phone"></span>').join('')+'</div>'
    +'<div class="fld"><label>Sent date</label><input id="nc_envio" type="date" value="'+toISO(new Date())+'"></div>'
    +'<div class="fld"><label>Follow up date (next touchpoint)</label><input id="nc_fu" type="date"></div>'
    +'<div class="fld"><label>Notes</label><textarea id="nc_notas"></textarea></div>'
    +'<button class="btn p" onclick="saveNew()">Create proposal</button> <button class="btn" onclick="closePanel()">Cancel</button></div>';
  panelShell('New proposal','added by hand',b);
  addNcLine();
}
function addNcLine(){const w=document.getElementById('nc_lines');if(!w)return;const d=document.createElement('div');
  d.className='ncrow';d.style.cssText='display:flex;gap:5px;margin-bottom:5px;align-items:center';
  d.innerHTML='<select class="nc_ev" style="flex:1;padding:6px;border:1px solid var(--line);border-radius:7px">'+window._ncEvOpts+'</select>'
    +'<input class="nc_val" type="number" placeholder="€" style="width:84px;padding:6px;border:1px solid var(--line);border-radius:7px">'
    +'<input class="nc_ct" placeholder="contents" style="flex:1;padding:6px;border:1px solid var(--line);border-radius:7px">'
    +'<button class="lnk" style="color:#A32D2D" onclick="this.parentElement.remove()">✕</button>';
  w.appendChild(d);}
function toggleGeneral(){const g=document.getElementById('nc_general').checked;
  document.getElementById('nc_events').style.display=g?'none':'';document.getElementById('nc_genwrap').style.display=g?'':'none';}
function saveNew(){
  const company=document.getElementById('nc_company').value.trim();
  if(!company){alert('Enter the company (empresa).');return;}
  const respSel=document.getElementById('nc_resp'),opt=respSel.options[respSel.selectedIndex];
  const respEmail=respSel.value||'',respName=(opt&&opt.getAttribute('data-name'))||'';
  const general=document.getElementById('nc_general').checked,me=DB.currentUser;
  const contacts=[];for(let i=0;i<3;i++){
    const gv=id=>{const e=document.getElementById(id+i);return e?e.value.trim():'';};
    const c={first:gv('nc_cf'),last:gv('nc_cl'),email:gv('nc_ce'),phone:gv('nc_cp')};
    if(c.first||c.last||c.email||c.phone){if(!c.phone)delete c.phone;contacts.push(c);}}
  const pid=DB.newId();let lines=[],value=0;
  if(general){value=+document.getElementById('nc_genval').value||0;}
  else{
    let noEvent=false;
    document.querySelectorAll('.ncrow').forEach(r=>{const evSel=r.querySelector('.nc_ev'),evKey=evSel.value,val=+r.querySelector('.nc_val').value||0,ct=r.querySelector('.nc_ct').value.trim();
      evSel.style.borderColor='';
      if(!evKey&&!val&&!ct)return;
      if(!evKey){noEvent=true;evSel.style.borderColor='#A32D2D';return;}   // value/contents without an event → reject, never create eventKey:null lines
      const e=spxEvents().find(x=>x.key===evKey);
      lines.push({id:DB.newId(),parentId:pid,eventId:e?e.financeId:null,eventKey:evKey,eventName:e?e.name:'',valueEur:val,valueEdited:false,contents:ct});value+=val;});
    if(noEvent){alert('Pick an event for every line that has a value or contents (or remove the line).');return;}
    if(!lines.length){alert('Add at least one event line, or tick “General proposal”.');return;}
  }
  const stage=document.getElementById('nc_stage').value||null;
  DB.spxProps.push({id:pid,createdAt:new Date().toISOString(),createdBy:(me&&me.email)||'',
    responsable:respName,responsableName:respName,responsableEmail:respEmail,company:company,companyId:null,
    source:document.getElementById('nc_source').value||null,origen:null,
    accountType:document.getElementById('nc_atype').value||null,
    stage:stage,salesStatus:statusOfStage(stage)||'Sent',
    productPackage:document.getElementById('nc_ppack').value||null,
    packageTier:document.getElementById('nc_ptier').value||null,
    reasonForLoss:null,
    contents:document.getElementById('nc_contents').value.trim()||(general?'General':''),
    valueEur:value,valueEdited:false,fechaEnvio:document.getElementById('nc_envio').value||null,
    fechaSeguimiento:document.getElementById('nc_fu').value||null,
    notas:document.getElementById('nc_notas').value.trim(),contacts:contacts,fileName:null,sentLink:null,
    isGeneral:general,mode:general?'general':(lines.length>1?'multi':'single'),active:true,superseded:false});
  lines.forEach(l=>DB.spxLines.push(l));
  DB.save();closePanel();render();
}
/* ---------- event lines on an existing proposal (multi-event) ---------- */
function panelAddLine(pid){
  const p=DB.spxProps.find(x=>x.id==pid);if(!p)return;
  if(!DB.canEditProp(p)){alert('You can only edit your own proposals (the sales lead and Belén can edit any).');return;}
  const sel=document.getElementById('pl_ev'),key=sel?sel.value:'';
  const val=+((document.getElementById('pl_val')||{}).value)||0;
  if(!key){if(sel)sel.style.borderColor='#A32D2D';return;}
  const e=spxEvents().find(x=>x.key===key);
  DB.spxLines.push({id:DB.newId(),parentId:p.id,eventId:e&&e.financeId!=null?e.financeId:null,eventKey:key,eventName:e?e.name:'',valueEur:val,valueEdited:true,contents:''});
  p.valueEur=propValue(p);p.valueEdited=true;
  p.mode=(DB.spxLinesFor(p.id).length>1?'multi':'single');
  DB.save();render();openPanel(p.id);
}
function panelLineVal(lineId,v){
  const l=DB.spxLines.find(x=>x.id==lineId);if(!l)return;
  const p=DB.spxProps.find(x=>x.id==l.parentId);
  if(p&&!DB.canEditProp(p))return;
  l.valueEur=(v===''?0:+v)||0;l.valueEdited=true;
  if(p){p.valueEur=propValue(p);p.valueEdited=true;}
  DB.save();render();   // board updates live; the panel's header total refreshes next open
}
/* ---------- delete ---------- */
function deleteProposal(id){
  const p=DB.spxProps.find(x=>x.id==id);if(!p)return;
  if(!DB.canEditProp(p)){alert('You can only delete your own proposals (the sales lead and Belén can delete any).');return;}
  if(!confirm('Delete the proposal for “'+(p.company||'')+'”? It can be recovered from the audit log.'))return;
  DB.data.spxProps=DB.spxProps.filter(x=>x.id!=id);
  DB.data.spxLines=DB.spxLines.filter(l=>l.parentId!=id);
  DB.save();closePanel();render();
}
function deleteLine(lineId){
  const l=DB.spxLines.find(x=>x.id==lineId);if(!l)return;
  const p=DB.spxProps.find(x=>x.id==l.parentId);
  if(p&&!DB.canEditProp(p)){alert('You can only edit your own proposals.');return;}
  DB.data.spxLines=DB.spxLines.filter(x=>x.id!=lineId);
  if(p){
    if(DB.spxLinesFor(p.id).length)p.valueEur=propValue(p);
    else{p.valueEur=0;p.valueEdited=false;}   // no lines left → the deleted line's value must not linger
  }
  DB.save();if(p)openPanel(p.id);render();
}

/* ---------- manage the SPX event list (sales lead / Belén) ---------- */
function openManageEvents(){
  if(!DB.canSalesLead()){alert('Only the sales lead or Belén can manage events.');return;}
  const notReady=(USE_SUPABASE&&!hasReg());
  const reg=regEvents().slice().sort((a,b)=>(+a.sort||0)-(+b.sort||0));
  const finSelect=(e)=>'<select data-mev-fin="'+e.id+'" style="padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12px"><option value="">— not in Money —</option>'+
    DB.finance.slice().sort((a,b)=>(b.year-a.year)||(''+a.name).localeCompare(''+b.name)).map(f=>'<option value="'+f.id+'"'+(e.financeId==f.id?' selected':'')+'>'+esc(finLabel(f))+'</option>').join('')+'</select>';
  const rowHtml=e=>'<div class="sec" style="padding:10px 12px;margin-bottom:8px">'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><input data-mev-name="'+e.id+'" value="'+esc(e.name)+'" style="flex:1;font-weight:700;padding:6px;border:1px solid var(--line);border-radius:7px">'
    +'<label style="font-size:12px;display:flex;gap:4px;align-items:center;white-space:nowrap"><input type="checkbox" data-mev-active="'+e.id+'"'+(e.active!==false?' checked':'')+'> current</label></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:12px">'
    +'<span>Money: '+finSelect(e)+'</span>'
    +'<span>Target €<input type="number" data-mev-t="'+e.id+'" value="'+(e.sponsorshipTarget==null?'':e.sponsorshipTarget)+'" style="width:88px;padding:5px;border:1px solid var(--line);border-radius:6px;margin-left:3px"></span>'
    +'<span>Stretch €<input type="number" data-mev-s="'+e.id+'" value="'+(e.sponsorshipStretch==null?'':e.sponsorshipStretch)+'" style="width:88px;padding:5px;border:1px solid var(--line);border-radius:6px;margin-left:3px"></span>'
    +'<span class="ro-note">key '+esc(e.eventKey)+'</span></div></div>';
  const body='<div class="sec"><h5>Events being sold</h5>'
    +(notReady?'<div class="setupbanner">Run <b>_sql/dispatch_spx_events.sql</b> in Supabase first — then this list is saved for everyone.</div>':'')
    +'<p class="ro-note">Untick <b>current</b> to move a finished event to the <b>Before</b> tab. Link an event to a Money row to track Invoiced/Paid.</p>'
    +(reg.map(rowHtml).join('')||'<div class="ro-note">No events yet — add one below.</div>')
    +'<div class="sec" style="background:#f6f5f2"><h5>Add an event</h5>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap"><input id="mev_key" placeholder="key e.g. E059" style="width:110px;padding:6px;border:1px solid var(--line);border-radius:7px">'
      +'<input id="mev_newname" placeholder="name e.g. Invest 2028" style="flex:1;min-width:140px;padding:6px;border:1px solid var(--line);border-radius:7px">'
      +'<button class="btn" onclick="addMevRow()">Add</button></div></div>'
    +'<button class="btn p" onclick="saveManageEvents()">Save</button> <button class="btn" onclick="closePanel()">Cancel</button></div>';
  panelShell('Manage SPX events','which events are being sold now',body);
}
function addMevRow(){
  const key=(document.getElementById('mev_key').value||'').trim(),name=(document.getElementById('mev_newname').value||'').trim();
  if(!key||!name){alert('Enter a key and a name.');return;}
  if(regEvents().some(e=>(''+e.eventKey).toLowerCase()===key.toLowerCase())){alert('That key already exists.');return;}
  saveManageEvents(true);   // persist current edits first
  const sort=regEvents().reduce((m,e)=>Math.max(m,+e.sort||0),0)+1;
  DB.spxEventReg.push({id:DB.newId(),eventKey:key,name:name,financeId:null,sponsorshipTarget:null,sponsorshipStretch:null,pasesTarget:null,pasesStretch:null,convByStatus:{Sent:0.35,Confirmed:0.7},active:true,sort});
  DB.save();openManageEvents();
}
function saveManageEvents(keepOpen){
  regEvents().forEach(e=>{
    const nm=document.querySelector('[data-mev-name="'+e.id+'"]');if(nm)e.name=nm.value.trim()||e.name;
    const ac=document.querySelector('[data-mev-active="'+e.id+'"]');if(ac)e.active=ac.checked;
    const fin=document.querySelector('[data-mev-fin="'+e.id+'"]');if(fin)e.financeId=fin.value?+fin.value:null;
    const t=document.querySelector('[data-mev-t="'+e.id+'"]');if(t)e.sponsorshipTarget=(t.value===''?null:+t.value);
    const s=document.querySelector('[data-mev-s="'+e.id+'"]');if(s)e.sponsorshipStretch=(s.value===''?null:+s.value);
  });
  DB.save();if(keepOpen!==true){closePanel();render();}
}

/* ---------- boot: everyone can view (RLS + canEditProp gate writes) ---------- */
window.addEventListener('dc-remote',render);
window.addEventListener('hashchange',()=>{TAB=activeTab();render();});
document.addEventListener('DOMContentLoaded',()=>{});
boot(async ()=>{
  saveChipInit();
  render();
});
/* light save-chip: reflect the shared DB.save lifecycle */
function saveChipInit(){
  const chip=document.getElementById('saveChip');if(!chip)return;chip.textContent='';
}
// expose handlers used by inline onclick
window.setView=setView;window.clearFilters=clearFilters;window.closePanel=closePanel;
window.doLinkEvent=doLinkEvent;window.savePanel=savePanel;
window.openCreate=openCreate;window.addNcLine=addNcLine;window.toggleGeneral=toggleGeneral;window.saveNew=saveNew;window.deleteProposal=deleteProposal;window.deleteLine=deleteLine;
window.openManageEvents=openManageEvents;window.addMevRow=addMevRow;window.saveManageEvents=saveManageEvents;
</script>
