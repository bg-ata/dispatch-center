<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RENMAD Dispatch Center — Team</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#E24B4A;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1000px}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 12px;font-size:22px;font-weight:700;color:var(--charcoal)}
  button{font:inherit;cursor:pointer}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal)}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn:hover{filter:brightness(.97)}
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 4px;overflow-x:auto}
  .app{max-width:1120px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  tr:last-child td{border-bottom:none}
  .who{font-weight:600;color:var(--charcoal);cursor:pointer}.who:hover{color:var(--orange)}
  .rolepill{font-size:11px;padding:2px 9px;border-radius:20px;background:#eceae3;color:#5f5e5a}
  .del{border:none;background:none;color:#c9c6bd;font-size:15px;cursor:pointer}.del:hover{color:var(--red)}
  .assign{background:#faf9f6;font-size:12px;color:var(--muted)}
  .assign td{padding:6px 18px}
  .assign .ev{color:var(--ink);font-weight:600}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:none;align-items:center;justify-content:center}#modal.on{display:flex}
  .card{background:#fff;border-radius:14px;padding:20px 22px;width:420px;max-width:92vw}
  .card h3{margin:0 0 14px;font-size:17px}
  .frm{display:flex;flex-direction:column;gap:12px}
  .frm label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px}
  .frm input,.frm select{font:inherit;padding:8px 9px;border:1px solid var(--line);border-radius:7px;color:var(--ink)}
  .mrow{display:flex;justify-content:space-between;margin-top:16px}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>👥 Team</h1>
  <div class="toolbar">
    <button class="btn primary" id="addBtn">+ Add person</button>
    <button class="btn" id="xlsBtn">⬇ Download Excel</button>
  </div>
  <div class="panel"><table id="tbl"></table></div>
  <p style="font-size:12px;color:var(--muted);margin-top:12px">Click a name to open their page — their events &amp; tasks on a timeline. Each person will eventually log in and see only their own.</p>
  <div id="devPanel"></div>
</div>
<div id="modal"><div class="card">
  <h3 id="m_title">Edit person</h3>
  <div class="frm">
    <label>Name<input id="m_name"></label>
    <label>Role<select id="m_role"></select></label>
    <label>Access<select id="m_access"></select></label>
    <label>Email (login)<input id="m_email" placeholder="name@ata.email"></label>
    <label>Work phone<input id="m_phone" placeholder="+34 …"></label>
    <label>Photo<span style="display:flex;gap:10px;align-items:center"><span id="m_avatar"></span><input type="file" id="m_photo" accept="image/*" style="font-size:12px"><button type="button" class="btn" id="m_photo_clear" style="font-size:11px;padding:3px 8px">Remove</button></span></label>
    <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink)"><input type="checkbox" id="m_fin" style="width:auto"> Finance editor — can add € figures (the accountant)</label>
    <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink)"><input type="checkbox" id="m_hr" style="width:auto"> HR — final step of the holiday approval chain</label>
    <label>Holiday allowance (working days / year)<input id="m_days" type="number" min="0" step="0.5" placeholder="23"></label>
  </div>
  <div class="mrow"><button class="btn" id="m_del" style="color:#A32D2D;border-color:#f0c4c4">Delete</button>
  <span><button class="btn" id="m_cancel">Cancel</button> <button class="btn primary" id="m_save">Save</button></span></div>
</div></div>
<script src="store.js?v=52"></script>
<script>
document.getElementById('nav').innerHTML=navBar('people');
let editingId=null, expanded=null;
function render(){
  const tbl=document.getElementById('tbl');
  const adm=DB.isAdmin(); // only admins manage people (also enforced server-side)
  const MONn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const untilTxt=iso=>{const d=ymd(iso);return d.getDate()+' '+MONn[d.getMonth()];};
  let h='<tr><th></th><th>Name</th><th>Role</th><th>Status</th><th>Work phone</th><th>Email</th><th>Access</th><th style="width:30px"></th></tr>';
  DB.people.forEach(p=>{
    if(isTeamAccount(p))return;   // HR is a service, not a team member — hide it from the Team roster (it still runs approvals in the HR page)
    const ts=DB.tasksOf(p.id);
    const acc=p.access||'member', accBg=acc==='admin'?'#FF4A00':acc==='manager'?'#E8A13C':'#eceae3', accCol=acc==='member'?'#5f5e5a':'#fff';
    const s=personStatusNow(p);
    let dtxt=s.detail||'';
    const um=dtxt.match(/^until (\d{4}-\d{2}-\d{2})$/); if(um)dtxt='until '+untilTxt(um[1]); // pretty-print the date
    const detail=dtxt?(' <span style="color:var(--muted);font-weight:400">· '+esc(dtxt)+'</span>'):'';
    const status='<span style="color:'+s.color+';font-weight:600">'+s.emoji+' '+esc(s.label)+'</span>'+detail;
    h+='<tr><td style="width:44px">'+avatarHtml(p,34)+'</td>'+
       '<td><span class="who" data-who="'+p.id+'">'+esc(p.name)+'</span></td>'+
       '<td><span class="rolepill">'+esc(p.role)+'</span></td>'+
       '<td style="font-size:12px">'+status+'</td>'+
       '<td style="color:var(--muted)">'+(p.phone||'—')+'</td>'+
       '<td style="color:var(--muted)">'+(p.email||'—')+'</td>'+
       '<td><span class="rolepill" style="background:'+accBg+';color:'+accCol+'">'+(ACCESS_LABEL[acc]||acc)+'</span>'+(p.finance?' <span class="rolepill" style="background:#185FA5;color:#fff">€</span>':'')+(p.hr?' <span class="rolepill" style="background:#4C3079;color:#fff">HR</span>':'')+'</td>'+
       '<td>'+(adm?'<button class="del" data-del="'+p.id+'">×</button> <button class="del" data-edit="'+p.id+'" style="color:#bdbab2">✎</button>':'')+'</td></tr>';
    if(expanded==p.id){
      if(ts.length) ts.forEach(t=>{const e=DB.event(t.eventId);
        h+='<tr class="assign"><td colspan="8"><span class="ev">'+esc(e?e.name:'?')+'</span> · '+esc(t.lane)+' · '+esc(t.title)+(t.deadline?' · due '+t.deadline:'')+' · '+esc(t.status)+'</td></tr>';});
      else h+='<tr class="assign"><td colspan="8">No tasks assigned yet.</td></tr>';
    }
  });
  tbl.innerHTML=h;
  tbl.querySelectorAll('[data-who]').forEach(el=>el.onclick=()=>location.href='person.html?id='+el.dataset.who);
  tbl.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>openModal(+el.dataset.edit));
  tbl.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>{const p=DB.person(+el.dataset.del);if(!confirm('Remove '+(p?p.name:'this person')+' from the team? Their tasks become unassigned. (recoverable from the audit log)'))return;DB.tasks.forEach(t=>{if(t.assignee==el.dataset.del)t.assignee=null;});DB.data.people=DB.people.filter(p=>p.id!=el.dataset.del);DB.save();render();});
}
const modal=document.getElementById('modal');
function openModal(idv){editingId=idv;const p=idv?DB.person(idv):{name:'',role:'PM',access:'member',email:'',finance:false,hr:false};
  const fin=document.getElementById('m_fin');fin.checked=!!p.finance;
  const hr=document.getElementById('m_hr');hr.checked=!!p.hr;
  /* the finance & HR permissions are Belén-only (also enforced by the database) */
  const isBelen=!!(DB.currentUser&&(DB.currentUser.email||'').toLowerCase()==='belen.gallego@ata.email');
  [fin,hr].forEach(cb=>{cb.disabled=!isBelen;cb.parentElement.style.opacity=isBelen?'1':'.45';
    cb.parentElement.title=isBelen?'':'Only Belén can change this permission';});
  document.getElementById('m_title').textContent=idv?'Edit person':'Add person';
  m_name.value=p.name;const rs=document.getElementById('m_role');rs.innerHTML=ROLES.map(r=>'<option '+(r===p.role?'selected':'')+'>'+r+'</option>').join('');
  const as=document.getElementById('m_access');as.innerHTML=ACCESS.map(a=>'<option value="'+a+'" '+(a===(p.access||'member')?'selected':'')+'>'+(ACCESS_LABEL[a]||a)+'</option>').join('');
  m_email.value=p.email||'';
  document.getElementById('m_phone').value=p.phone||'';
  editingPhoto=(p.photo||null);
  document.getElementById('m_avatar').innerHTML=avatarHtml({id:idv||0,name:p.name,photo:editingPhoto},40);
  document.getElementById('m_days').value=(p.holidayDays!=null?p.holidayDays:23);
  document.getElementById('m_del').style.display=idv?'inline-block':'none';modal.classList.add('on');}
let editingPhoto=null;
document.getElementById('m_photo').onchange=e=>{const f=e.target.files[0];if(!f)return;
  resizeImage(f,url=>{if(!url){alert('Could not read that image.');return;}editingPhoto=url;
    document.getElementById('m_avatar').innerHTML=avatarHtml({id:editingId||0,name:document.getElementById('m_name').value,photo:editingPhoto},40);});};
document.getElementById('m_photo_clear').onclick=()=>{editingPhoto=null;
  document.getElementById('m_avatar').innerHTML=avatarHtml({id:editingId||0,name:document.getElementById('m_name').value,photo:null},40);};
document.getElementById('addBtn').onclick=()=>openModal(null);
document.getElementById('m_cancel').onclick=()=>modal.classList.remove('on');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('on');};
document.getElementById('m_del').onclick=()=>{const p=DB.person(editingId);if(!confirm('Remove '+(p?p.name:'this person')+' from the team? Their tasks become unassigned. (recoverable from the audit log)'))return;DB.tasks.forEach(t=>{if(t.assignee==editingId)t.assignee=null;});DB.data.people=DB.people.filter(p=>p.id!==editingId);DB.save();modal.classList.remove('on');render();};
document.getElementById('m_save').onclick=()=>{const d={name:m_name.value.trim()||'New person',role:document.getElementById('m_role').value,access:document.getElementById('m_access').value,email:m_email.value.trim(),finance:document.getElementById('m_fin').checked,hr:document.getElementById('m_hr').checked,holidayDays:(+document.getElementById('m_days').value||23),phone:document.getElementById('m_phone').value.trim(),photo:editingPhoto};
  if(editingId)Object.assign(DB.person(editingId),d);else DB.people.push({id:DB.newId(),...d});DB.save();modal.classList.remove('on');render();};
document.getElementById('xlsBtn').onclick=()=>exportXLSX('RENMAD_personnel.xlsx',[
  {name:'People',rows:DB.people.map(p=>({Name:p.name,Role:p.role,Access:ACCESS_LABEL[p.access||'member']||p.access,Email:p.email,Tasks:DB.tasksOf(p.id).length}))},
  {name:'Assignments',rows:DB.tasks.filter(t=>t.assignee).map(t=>{const e=DB.event(t.eventId);return{Person:DB.personName(t.assignee),Event:e?e.name:'',Lane:t.lane,Task:t.title,Deadline:t.deadline,Status:t.status};})}
]);
/* ---- device visibility (Belén's eyes ONLY — server-enforced by RLS) ----
   Who opens the Dispatch Center on phone vs computer, and who has installed
   the app (opened it in standalone/PWA mode). One row per person/device/day;
   nothing else is recorded — no location, no IP, no page tracking. */
async function renderDevices(){
  const box=document.getElementById('devPanel');if(!box)return;
  const me=DB.currentUser;
  if(!me||!isBelenP(me)){box.innerHTML='';return;}
  let rows=null;
  if(!USE_SUPABASE)rows=DB.data.logins||[];
  else{
    try{const r=await sb.from('dc_logins').select('*');if(r.error)throw r.error;rows=r.data||[];}
    catch(e){box.innerHTML='<div class="panel" style="padding:14px 16px;margin-top:16px"><b>📱 Devices &amp; app adoption</b><div style="font-size:12.5px;color:var(--muted);margin-top:4px">Switches on when <b>dispatch_logins.sql</b> is run in Supabase.</div></div>';return;}
  }
  const by={}; // personId -> {phone:last,tablet:last,desktop:last,pwa:bool,pwaLast}
  rows.forEach(r=>{const o=by[r.personId]=by[r.personId]||{};
    if(!o[r.device]||o[r.device]<r.day)o[r.device]=r.day;
    if(r.standalone){o.pwa=true;if(!o.pwaLast||o.pwaLast<r.day)o.pwaLast=r.day;}});
  const MONn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const nice=iso=>{if(!iso)return '';const t=toISO(new Date());if(iso===t)return 'today';
    const d=ymd(iso);return d.getDate()+' '+MONn[d.getMonth()];};
  const people=DB.people.filter(p=>!isTeamAccount(p));
  const nPhone=people.filter(p=>by[p.id]&&by[p.id].phone).length;
  const nPwa=people.filter(p=>by[p.id]&&by[p.id].pwa).length;
  const nAny=people.filter(p=>by[p.id]).length;
  let h='<div class="panel" style="padding:14px 16px;margin-top:16px;overflow-x:auto">'
    +'<b>📱 Devices &amp; app adoption</b> <span class="rolepill" style="margin-left:6px">only you can see this</span>'
    +'<div style="font-size:12.5px;color:var(--muted);margin:4px 0 10px">One row per person, device and day — just phone/tablet/computer and whether it was the installed app. No location, no activity tracking.</div>'
    +'<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px;margin-bottom:10px">'
    +'<span><b style="font-size:17px;color:var(--charcoal)">'+nAny+'</b>/'+people.length+' seen</span>'
    +'<span><b style="font-size:17px;color:var(--charcoal)">'+nPhone+'</b> on a phone</span>'
    +'<span><b style="font-size:17px;color:var(--orange)">'+nPwa+'</b> installed the app</span></div>'
    +'<table><tr><th>Person</th><th>📱 Phone</th><th>Tablet</th><th>💻 Computer</th><th>App installed</th></tr>';
  people.forEach(p=>{const o=by[p.id];
    h+='<tr><td style="font-weight:600;color:var(--charcoal)">'+esc(p.name)+'</td>'
      +'<td>'+(o&&o.phone?nice(o.phone):'<span style="color:#c9c6bd">—</span>')+'</td>'
      +'<td>'+(o&&o.tablet?nice(o.tablet):'<span style="color:#c9c6bd">—</span>')+'</td>'
      +'<td>'+(o&&o.desktop?nice(o.desktop):'<span style="color:#c9c6bd">—</span>')+'</td>'
      +'<td>'+(o&&o.pwa?'<span style="color:var(--orange);font-weight:700">✓ yes</span> <span style="color:var(--muted);font-size:12px">· last '+nice(o.pwaLast)+'</span>':'<span style="color:#c9c6bd">not yet</span>')+'</td></tr>';
  });
  box.innerHTML=h+'</table></div>';
}
boot(()=>{if(!DB.isAdmin()){document.getElementById('addBtn').style.display='none';}render();renderDevices();});
window.addEventListener('dc-remote',render);
</script>
</body>
</html>
