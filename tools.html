<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RENMAD Dispatch Center — Tools</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1000px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;text-decoration:none;color:inherit;position:relative;transition:box-shadow .15s ease}
  a.tile:hover{box-shadow:0 8px 28px rgba(20,20,20,.10)}
  .tile.pending{opacity:.55}
  .ic{flex:0 0 44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .tile h3{margin:0;font-size:15px;color:var(--charcoal)}
  .tile p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
  .badge{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:#eceae3;color:#5f5e5a;border-radius:999px;padding:2px 9px}
  .badge.own{background:#FFF3E8;color:#8a4a12}
  .note{font-size:12px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>Team tools</h1>
  <p class="sub">Everything in one place — each tool opens inside the Dispatch Center. Tools marked “own login” still ask for their own credentials inside the window for now.</p>
  <div class="grid" id="grid"></div>
  <p class="note">Missing a tile you need? Ask Belén. Greyed tiles are being finished.</p>
</div>
<script src="store.js?v=58"></script>
<script>
document.getElementById('nav').innerHTML=navBar('tools');
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  /* the team request box lives here now (it left the top nav to keep it uncluttered) */
  const rq=document.createElement('a');rq.className='tile';rq.href='tickets.html';
  let rqBadge='';
  try{if(DB.isAdmin()&&DB.tickReady()){const nt=DB.tickets.filter(t=>t.status==='new').length;
    if(nt>0)rqBadge='<span class="badge" style="background:#D32230;color:#fff">'+nt+' new</span>';}}catch(e){}
  rq.innerHTML='<span class="ic" style="background:#C77800">💡</span>'+
    '<span><h3>Requests</h3><p>The team request box — bugs, usability, changes and ideas. Also one tap away via the 💡 button on any page.</p></span>'+rqBadge;
  g.appendChild(rq);
  DISPATCH_TOOLS.forEach(t=>{
    if(t.mgrOnly&&!DB.canManage())return; // Proposals Dashboard: admins & managers only
    const pending=!t.url;
    const el=document.createElement(pending?'div':'a');
    el.className='tile'+(pending?' pending':'');
    if(!pending){el.href='tool.html?id='+t.id;} // open through the dispatch shell, not a bare new tab
    const badge=pending?'coming soon':(t.game?'game':(t.ownLogin?'own login':''));
    el.innerHTML='<span class="ic" style="background:'+t.accent+'">'+t.ini+'</span>'+
      '<span><h3>'+t.name+'</h3><p>'+t.desc+'</p></span>'+
      (badge?'<span class="badge'+(t.ownLogin?' own':'')+'">'+badge+'</span>':'');
    g.appendChild(el);
  });
}
boot(render);
window.addEventListener('dc-remote',render);
</script>
</body>
</html>
