<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RENMAD Dispatch Center — Finance</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--green:#3E8C28;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1240px}
  .nav{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:13px;padding:5px 11px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 12px}
  button{font:inherit;cursor:pointer}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal)}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn:hover{filter:brightness(.97)}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .toolbar select{font:inherit;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 4px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:1040px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #efede8;white-space:nowrap}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.semhead td{background:#faf9f6;font-weight:700;color:var(--charcoal);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  tr.subtotal td{background:#f6f5f1;font-weight:700;border-top:2px solid var(--line)}
  .evname{font-weight:600;color:var(--charcoal)}
  a.evlink{color:var(--charcoal);text-decoration:none}
  a.evlink:hover{color:var(--orange)}
  .ed{font-size:10px;color:var(--muted);background:#eceae3;border-radius:10px;padding:1px 7px;margin-left:5px}
  .chip{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;border-radius:10px;padding:2px 9px;display:inline-block}
  td input{font-size:12px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;width:100%;min-width:56px}
  td input.money{text-align:right;width:92px}
  .del{border:none;background:none;color:#c9c6bd;font-size:14px;cursor:pointer}.del:hover{color:var(--red)}
  .cmp{border:none;background:none;color:#b4b1a8;font-size:12px;cursor:pointer;padding:0 4px}.cmp:hover{color:var(--orange)}
  tr.cmprow td{background:#fbfaf7;color:var(--muted);font-size:12px}
  tr.cmprow .evname{color:var(--muted);font-weight:500}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:none;align-items:center;justify-content:center}#modal.on{display:flex}
  .card{background:#fff;border-radius:14px;padding:20px 22px;width:560px;max-width:94vw;max-height:92vh;overflow-y:auto}
  .card h3{margin:0 0 14px;font-size:17px}
  .frm{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
  .frm label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px}
  .frm label.wide{grid-column:1/-1}
  .frm input,.frm select{font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:7px;color:var(--ink)}
  .mrow{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .empty{color:var(--muted);font-size:13px;font-style:italic;padding:18px}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>Finance</h1>
  <p class="sub">Targets, invoicing and margin per event. Figures are added by the accountant; every change is recorded. Result = facturado vs stretch target.</p>
  <div class="toolbar">
    <select id="yearSel"></select>
    <button class="btn primary" id="addBtn" style="display:none">+ Add event figures</button>
    <button class="btn" id="xlsBtn">⬇ Download Excel</button>
    <span style="font-size:12px;color:var(--muted)" id="who"></span>
  </div>
  <div id="warnbox"></div>
  <div class="panel"><table id="tbl"></table></div>
</div>

<div id="modal"><div class="card">
  <h3>Add event figures</h3>
  <div class="frm">
    <label class="wide">Link to a board event (optional)<select id="f_link"></select></label>
    <label>Event name<input id="f_name" placeholder="e.g. Almacenamiento"></label>
    <label>Edition nº<input id="f_edition" type="number" min="1" placeholder="7"></label>
    <label>Year<input id="f_year" type="number" placeholder="2026"></label>
    <label>Semester<select id="f_sem"><option value="1">S1</option><option value="2">S2</option></select></label>
    <label>Where<input id="f_city"></label>
    <label>When<input id="f_when" placeholder="17-18 March"></label>
    <label>PM<input id="f_pm"></label>
    <label>Sales<input id="f_sales"></label>
    <label>Target €<input id="f_target" type="number" step="any"></label>
    <label>Stretch €<input id="f_stretch" type="number" step="any"></label>
    <label>Facturado €<input id="f_invoiced" type="number" step="any"></label>
    <label>SPEX €<input id="f_spex" type="number" step="any"></label>
    <label class="wide">Notes<input id="f_notes"></label>
  </div>
  <div class="mrow"><button class="btn" id="f_cancel">Cancel</button><button class="btn primary" id="f_save">Save</button></div>
</div></div>

<script src="store.js?v=21"></script>
<script>
document.getElementById('nav').innerHTML=navBar('finance');
let yearFilter='all', expandId=null;

function grouped(){
  const fs=DB.finance.slice().filter(f=>yearFilter==='all'||f.year==yearFilter)
    .sort((a,b)=>(a.year-b.year)||(a.semester-b.semester)||((a.edition||0)-(b.edition||0))||(a.id-b.id));
  const g={};fs.forEach(f=>{const k=f.year+'·S'+f.semester;(g[k]=g[k]||[]).push(f);});
  return g;
}
function sum(list,fld){return list.reduce((a,f)=>a+(+f[fld]||0),0);}
function chipHtml(r){return r?'<span class="chip" style="background:'+r.color+'">'+r.label+'</span>':'<span style="color:#b4b1a8;font-size:11px">pending</span>';}

function render(){
  const warn=document.getElementById('warnbox');
  if(!DB.financeReady()){warn.innerHTML='<div class="warn">The finance module is not active yet — run <b>dispatch_finance.sql</b> in the Supabase SQL editor, then reload.</div>';document.getElementById('tbl').innerHTML='';return;}
  warn.innerHTML='';
  const canF=DB.canFinance();
  document.getElementById('addBtn').style.display=canF?'inline-block':'none';
  document.getElementById('who').textContent=canF?'You can edit figures — every change is recorded.':'Read-only · figures are maintained by the accountant.';
  const years=[...new Set(DB.finance.map(f=>f.year))].sort();
  const ys=document.getElementById('yearSel');
  ys.innerHTML='<option value="all">All years</option>'+years.map(y=>'<option '+(yearFilter==y?'selected':'')+'>'+y+'</option>').join('');
  ys.onchange=()=>{yearFilter=ys.value;render();};

  const g=grouped();
  let h='<tr><th></th><th>Event</th><th>Where</th><th>When</th><th>PM</th><th>Sales</th>'+
    '<th class="num">Target</th><th class="num">Stretch</th><th class="num">Facturado</th><th>Result</th><th class="num">SPEX</th><th class="num">Margin</th><th style="width:46px"></th></tr>';
  const keys=Object.keys(g);
  if(!keys.length)h+='<tr><td colspan="13" class="empty">No figures yet'+(canF?' — add the first event.':'.')+'</td></tr>';
  keys.forEach(k=>{
    const list=g[k];
    h+='<tr class="semhead"><td colspan="13">'+k.replace('·',' — ')+'</td></tr>';
    list.forEach(f=>{h+=rowHtml(f,canF);
      if(expandId===f.id){
        const eds=DB.finance.filter(x=>x.name===f.name&&x.id!==f.id).sort((a,b)=>a.year-b.year||(a.edition||0)-(b.edition||0));
        if(!eds.length)h+='<tr class="cmprow"><td></td><td colspan="12">No other editions of "'+f.name+'" recorded yet — add past years to compare.</td></tr>';
        eds.forEach(x=>{h+='<tr class="cmprow"><td></td><td class="evname">'+x.name+' '+(x.edition?x.edition+'ª':'')+' · '+x.year+'</td><td>'+(x.city||'')+'</td><td>'+(x['when']||'')+'</td><td>'+(x.pm||'')+'</td><td>'+(x.sales||'')+'</td>'+
          '<td class="num">'+finFmt(x.target)+'</td><td class="num">'+finFmt(x.stretch)+'</td><td class="num">'+finFmt(x.invoiced)+'</td><td>'+chipHtml(finResult(x))+'</td><td class="num">'+finFmt(x.spex)+'</td><td class="num">'+finFmt(finMargin(x))+'</td><td></td></tr>';});
      }
    });
    const agg={year:list[0].year,stretch:sum(list,'stretch'),invoiced:list.some(f=>f.invoiced!=null&&f.invoiced!=='')?sum(list,'invoiced'):null};
    h+='<tr class="subtotal"><td></td><td>'+k.replace('·',' ')+' TOTAL</td><td></td><td></td><td></td><td></td>'+
      '<td class="num">'+finFmt(sum(list,'target'))+'</td><td class="num">'+finFmt(sum(list,'stretch'))+'</td><td class="num">'+finFmt(agg.invoiced)+'</td>'+
      '<td>'+chipHtml(finResult(agg))+'</td><td class="num">'+finFmt(sum(list,'spex'))+'</td><td class="num">'+finFmt(sum(list,'invoiced')-sum(list,'spex'))+'</td><td></td></tr>';
  });
  document.getElementById('tbl').innerHTML=h;
  wire(canF);
}
function esc(s){return (s==null?'':''+s).replace(/"/g,'&quot;');}
function rowHtml(f,canF){
  const nameCell=(f.eventId&&DB.event(f.eventId))?('<a class="evlink" href="event.html?id='+f.eventId+'">'+f.name+'</a>'):f.name;
  const ed=f.edition?('<span class="ed">'+f.edition+'ª</span>'):'';
  if(!canF){
    return '<tr><td><button class="cmp" data-cmp="'+f.id+'" title="Compare editions">⇄</button></td>'+
      '<td class="evname" '+(f.notes?'title="'+esc(f.notes)+'"':'')+'>'+nameCell+ed+'</td><td>'+(f.city||'')+'</td><td>'+(f['when']||'')+'</td><td>'+(f.pm||'')+'</td><td>'+(f.sales||'')+'</td>'+
      '<td class="num">'+finFmt(f.target)+'</td><td class="num">'+finFmt(f.stretch)+'</td><td class="num">'+finFmt(f.invoiced)+'</td>'+
      '<td>'+chipHtml(finResult(f))+'</td><td class="num">'+finFmt(f.spex)+'</td><td class="num">'+finFmt(finMargin(f))+'</td><td></td></tr>';
  }
  const inp=(fld,cls)=>'<input class="'+(cls||'')+'" data-ff="'+fld+'" data-id="'+f.id+'" value="'+esc(f[fld])+'">';
  const mny=fld=>'<input class="money" type="number" step="any" data-ff="'+fld+'" data-id="'+f.id+'" value="'+(f[fld]==null?'':f[fld])+'">';
  return '<tr><td><button class="cmp" data-cmp="'+f.id+'" title="Compare editions">⇄</button></td>'+
    '<td>'+inp('name')+ed+'</td><td>'+inp('city')+'</td><td>'+inp('when')+'</td><td>'+inp('pm')+'</td><td>'+inp('sales')+'</td>'+
    '<td class="num">'+mny('target')+'</td><td class="num">'+mny('stretch')+'</td><td class="num">'+mny('invoiced')+'</td>'+
    '<td>'+chipHtml(finResult(f))+'</td><td class="num">'+mny('spex')+'</td><td class="num">'+finFmt(finMargin(f))+'</td>'+
    '<td><button class="del" data-fdel="'+f.id+'" title="Delete (recoverable)">×</button></td></tr>';
}
function wire(canF){
  document.querySelectorAll('[data-cmp]').forEach(b=>b.onclick=()=>{expandId=(expandId==b.dataset.cmp?null:+b.dataset.cmp);render();});
  if(!canF)return;
  document.querySelectorAll('[data-ff]').forEach(el=>el.onchange=()=>{
    const f=DB.finance.find(x=>x.id==el.dataset.id);if(!f)return;
    const fld=el.dataset.ff;let v=el.value;
    if(['target','stretch','invoiced','spex'].includes(fld))v=(v===''?null:+v);
    f[fld]=v;DB.save();render();
  });
  document.querySelectorAll('[data-fdel]').forEach(b=>b.onclick=()=>{
    const f=DB.finance.find(x=>x.id==b.dataset.fdel);
    if(!confirm('Delete the figures for "'+(f&&f.name)+'"? (recoverable from the audit log)'))return;
    DB.data.finance=DB.finance.filter(x=>x.id!=b.dataset.fdel);DB.save();render();
  });
}

/* ---- add modal ---- */
const modal=document.getElementById('modal');
document.getElementById('f_cancel').onclick=()=>modal.classList.remove('on');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('on');};
document.getElementById('addBtn').onclick=()=>{
  const sel=document.getElementById('f_link');
  sel.innerHTML='<option value="">— past event (not on the board) —</option>'+
    DB.events.map(e=>'<option value="'+e.id+'">'+e.name+' · '+dateRange(e)+'</option>').join('');
  sel.onchange=()=>{const ev=DB.event(+sel.value);if(!ev)return;
    f_name.value=ev.name.replace(/^E\d+\s*RENMAD\s*/i,'');f_city.value=ev.city||'';f_when.value=dateRange(ev);
    f_pm.value=ev.pm||'';f_sales.value=ev.sales||'';
    const d=ymd(ev.date);f_year.value=d.getFullYear();document.getElementById('f_sem').value=(d.getMonth()<6?'1':'2');};
  ['f_name','f_edition','f_city','f_when','f_pm','f_sales','f_target','f_stretch','f_invoiced','f_spex','f_notes'].forEach(id=>document.getElementById(id).value='');
  f_year.value=new Date().getFullYear();
  modal.classList.add('on');f_name.focus();
};
document.getElementById('f_save').onclick=()=>{
  const num=id=>{const v=document.getElementById(id).value;return v===''?null:+v;};
  const linked=document.getElementById('f_link').value;
  const row={id:DB.newId(),eventId:linked?+linked:null,
    name:f_name.value.trim()||'New event',edition:num('f_edition'),
    year:+f_year.value||new Date().getFullYear(),semester:+document.getElementById('f_sem').value,
    city:f_city.value.trim(),'when':f_when.value.trim(),pm:f_pm.value.trim(),sales:f_sales.value.trim(),
    target:num('f_target'),stretch:num('f_stretch'),invoiced:num('f_invoiced'),spex:num('f_spex'),
    notes:f_notes.value.trim()};
  DB.finance.push(row);DB.save();modal.classList.remove('on');render();
};

/* ---- Excel download: same shape as "S1 2026 Calculation" ---- */
document.getElementById('xlsBtn').onclick=()=>{
  const g=grouped(),rows=[];let n=1;
  Object.keys(g).forEach(k=>{
    g[k].forEach(f=>{const r=finResult(f);
      rows.push({'#':n++,'Event':f.name,'Ed':f.edition||'','Year':f.year,'S':f.semester,'Where':f.city||'','When':f['when']||'','PM':f.pm||'','Ventas':f.sales||'','Target':f.target,'Stretch':f.stretch,'TOTAL facturado':f.invoiced,'RESULT':r?r.label:'','SPEX':f.spex,'MARGIN':finMargin(f),'Notes':f.notes||''});});
    const list=g[k],agg={year:list[0].year,stretch:sum(list,'stretch'),invoiced:sum(list,'invoiced')},r=finResult(agg);
    rows.push({'#':'','Event':k.replace('·',' ')+' TOTAL','Ed':'','Year':'','S':'','Where':'','When':'','PM':'','Ventas':'','Target':sum(list,'target'),'Stretch':sum(list,'stretch'),'TOTAL facturado':sum(list,'invoiced'),'RESULT':r?r.label:'','SPEX':sum(list,'spex'),'MARGIN':sum(list,'invoiced')-sum(list,'spex'),'Notes':''});
  });
  exportXLSX('RENMAD_finance_'+new Date().toISOString().slice(0,10)+'.xlsx',[{name:'Events',rows}]);
};

boot(render);
window.addEventListener('dc-remote',render);
</script>
</body>
</html>
