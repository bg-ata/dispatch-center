<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — CRM</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#2B2B2B;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--green:#0CA30C;--amber:#B26A10;--blue:#2A78D6;--violet:#4A3AA7;--grey:#8A8781}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#3a3a3a;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1080px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 10px}
  /* header bar: tabs + backup/restore + save state */
  .crmbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 14px}
  .tabs{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px}
  .tabs button{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:13px;padding:6px 13px;border-radius:8px;cursor:pointer}
  .tabs button.on{background:var(--orange);color:#fff}
  .hbtn{background:#fff;border:1px solid var(--line);color:var(--muted);font:600 11.5px 'Segoe UI',sans-serif;border-radius:16px;padding:5px 12px;cursor:pointer}
  #saveChip{font-size:11.5px;color:var(--muted);margin-left:auto}
  #saveChip.err{color:#A32D2D;font-weight:700;cursor:pointer}
  h2{font-size:19px;font-weight:800;color:var(--ink);margin:0 0 3px;letter-spacing:-.01em}
  .lead{color:var(--muted);font-size:13px;margin:0 0 16px;max-width:80ch}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 15px}
  .tile .l{font-size:12px;color:var(--muted)}
  .tile .n{font-size:25px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.15}
  .tile .s{font-size:11px;color:#9aa2a6}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px}
  /* value map */
  .mapwrap{display:flex;gap:8px;align-items:stretch}
  .yax{writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px;color:var(--muted);text-align:center;padding:6px 0}
  .plot{position:relative;height:340px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);flex:1}
  .q{position:absolute;width:50%;height:50%}
  .q.tl{left:0;top:0;background:rgba(178,106,16,.09)} .q.tr{right:0;top:0;background:rgba(12,163,12,.09)}
  .q.bl{left:0;bottom:0;background:rgba(138,135,129,.07)} .q.br{right:0;bottom:0;background:rgba(42,120,214,.10)}
  .vline{position:absolute;left:50%;top:0;bottom:0;border-left:1px dashed var(--line)}
  .hline{position:absolute;top:50%;left:0;right:0;border-top:1px dashed var(--line)}
  .qlab{position:absolute;font-size:12px;font-weight:700;color:var(--ink);max-width:45%;line-height:1.3}
  .qlab small{display:block;font-weight:400;color:var(--muted);font-size:11px}
  .dot{position:absolute;border-radius:50%;box-shadow:0 0 0 2px #fff;transform:translate(-50%,50%);cursor:pointer}
  .dot:hover{box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(0,0,0,.15)}
  .dlab{position:absolute;font-size:11px;color:var(--ink);transform:translateY(50%);pointer-events:none;white-space:nowrap}
  .xax{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:5px 2px 0}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin:11px 2px 0;font-size:11.5px;color:var(--muted)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:-1px;margin-right:3px}
  /* work-now list */
  .work{margin-top:16px}
  .work h3{font-size:14px;font-weight:700;margin:0 0 8px;color:var(--ink)}
  .wrow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px;cursor:pointer}
  .wrow:hover{border-color:var(--orange)}
  .wrow .nm{font-weight:700;color:var(--ink)}
  .wrow .meta{color:var(--muted);font-size:12px}
  .wrow .sub{font-size:12px;color:var(--muted);margin:0}
  .wrow .val{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .eff{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;border-radius:20px;padding:2px 8px}
  .eff.invest{background:#e6f2e6;color:#0a7a0a} .eff.nurture{background:#fbeede;color:var(--amber)} .eff.hold{background:#e9f0fb;color:var(--blue)} .eff.ignore{background:#eeefef;color:var(--grey)}
  /* contacts table */
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  th{text-align:left;background:#eceae3;color:#5f5e5a;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;font-weight:700}
  td{padding:9px 12px;border-top:1px solid var(--line);vertical-align:middle}
  tr[data-open]{cursor:pointer} tr[data-open]:hover td{background:#faf9f7}
  .tchip{font-size:10.5px;font-weight:700;color:#fff;border-radius:20px;padding:1px 8px;white-space:nowrap}
  .bar{height:7px;border-radius:5px;background:#ece9e2;width:74px;overflow:hidden;display:inline-block;vertical-align:middle}
  .bar i{display:block;height:100%}
  .qtag{font-size:10.5px;font-weight:700;border-radius:6px;padding:1px 7px;white-space:nowrap}
  /* pipeline */
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .col{background:#eceae3;border-radius:11px;padding:9px}
  .col h4{margin:0 0 8px;font-size:12px;color:var(--ink);display:flex;justify-content:space-between}
  .col h4 span{color:var(--muted);font-weight:600}
  .deal{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:7px;cursor:pointer}
  .deal:hover{border-color:var(--orange)}
  .deal .t{font-weight:700;font-size:12.5px;color:var(--ink);line-height:1.25}
  .deal .v{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  /* detail panel */
  #ov{position:fixed;inset:0;background:rgba(20,25,28,.45);z-index:9990;display:none}
  #ov.on{display:block}
  .panel{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:96vw;background:var(--bg);z-index:9991;transform:translateX(100%);transition:transform .22s ease;overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.18)}
  .panel.on{transform:none}
  .ph{background:var(--charcoal);color:#fff;padding:18px 20px}
  .ph .x{float:right;background:none;border:none;color:#aeb7bb;font-size:22px;cursor:pointer;line-height:1}
  .ph h3{margin:0;font-size:19px}
  .ph .role{color:#c3ccd0;font-size:13px;margin-top:2px}
  .pb{padding:16px 20px}
  .sec{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:12px}
  .sec h5{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
  .kv .k{color:var(--muted)}
  .prt{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px solid #f2f0ea}
  .prt:last-child{border:none} .prt .pts{font-weight:700;color:var(--ink)}
  .msgbox{background:#fbfaf8;border:1px dashed var(--line);border-radius:9px;padding:12px;white-space:pre-wrap;font-size:13px;line-height:1.5;color:#2b3438}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;font:inherit;cursor:pointer;color:var(--ink)}
  .btn.p{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .lang{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .lang button{background:#fff;border:none;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
  .lang button.on{background:var(--ink);color:#fff}
  .why{font-size:12.5px;color:var(--muted);background:#f6f5f2;border-radius:8px;padding:9px 11px;margin-top:6px}
  .tg{display:inline-flex;align-items:center;gap:5px;background:#efede6;border:1px solid var(--line);border-radius:20px;padding:3px 6px 3px 11px;font-size:12px;color:#3a464b;margin:0 5px 5px 0}
  .tg b{cursor:pointer;color:#9aa2a6;font-weight:700} .tg b:hover{color:#c0392b}
  .taginput{display:flex;gap:6px;margin-top:4px} .taginput input{flex:1;padding:6px 9px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:13px}
  .note{border-left:2px solid var(--line);padding:3px 0 3px 10px;margin:7px 0;font-size:13px;color:#2b3438}
  .note .d{font-size:11px;color:#9aa2a6}
  .setupbanner{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;border-radius:11px;padding:11px 15px;margin:0 0 14px;font-size:13px;line-height:1.5}
  /* ===== Projects tab ===== */
  .tl{display:inline-block;font-size:10.5px;font-weight:800;border-radius:20px;padding:2px 9px;white-space:nowrap;letter-spacing:.02em}
  .tl.GREEN{background:#e2f4e2;color:#0a7a0a} .tl.YELLOW{background:#fbf1d6;color:#9a7100}
  .tl.ORANGE{background:#fde4d3;color:#b5541a} .tl.RED{background:#fbe1de;color:#b02a1f}
  .tldot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:-1px;margin-right:5px}
  .stat{display:inline-block;font-size:10.5px;font-weight:700;border-radius:6px;padding:1px 8px;white-space:nowrap;text-transform:capitalize}
  .stat.new{background:#eef1f4;color:#4a6b86} .stat.reviewing{background:#e9f0fb;color:var(--blue)}
  .stat.pursuing{background:#e2f4e2;color:#0a7a0a} .stat.parked{background:#f0eee7;color:var(--grey)} .stat.dead{background:#f2e6e4;color:#9a4b40}
  .slotb{font-size:10px;font-weight:800;border-radius:6px;padding:1px 7px;white-space:nowrap}
  .slotb.open{background:#e2f4e2;color:#0a7a0a} .slotb.ours{background:var(--orange);color:#fff} .slotb.taken{background:#efe7f3;color:var(--violet)}
  .pathpill{font-size:10.5px;font-weight:700;border-radius:6px;padding:1px 7px} .pathpill.direct{background:#e2f4e2;color:#0a7a0a} .pathpill.\31hop{background:#fbf1d6;color:#9a7100} .pathpill.cold{background:#eef0f1;color:#8a9096}
  .subtabs{display:inline-flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px}
  .subtabs button{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:12.5px;padding:5px 12px;border-radius:7px;cursor:pointer}
  .subtabs button.on{background:var(--ink);color:#fff}
  .pminib{height:6px;border-radius:4px;background:#ece9e2;width:52px;overflow:hidden;display:inline-block;vertical-align:middle}
  .pminib i{display:block;height:100%;background:var(--orange)}
  .scatter{width:100%;height:auto;display:block;background:#fff;border:1px solid var(--line);border-radius:12px}
  .scatter .dotp{cursor:pointer;transition:opacity .1s} .scatter .dotp:hover{stroke:#1C2529;stroke-width:1.5}
  .cg{width:100%;height:auto;display:block}
  .cg .node{cursor:pointer} .cg .node:hover circle{stroke:#1C2529;stroke-width:2}
  .cgpop{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-top:10px;font-size:12.5px}
  .moneybar{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0;border-bottom:1px solid #f2f0ea}
  .moneybar:last-child{border:none}
  .moneybar .bx{flex:1;height:9px;border-radius:5px;background:#ece9e2;overflow:hidden}
  .moneybar .bx i{display:block;height:100%;background:var(--orange)}
  .lightlead{display:flex;gap:12px;flex-wrap:wrap;margin:2px 0 14px}
  .lightlead .lc{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 13px}
  .lightlead .lc .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  .lightlead .lc .l{font-size:11px;color:var(--muted)}
  @media(max-width:760px){.tiles{grid-template-columns:1fr}.board{grid-template-columns:1fr;gap:14px}.mapwrap .yax{display:none}.crmbar{gap:6px}}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>📇 Leads CRM <span style="font-size:11px;font-weight:600;color:#8a4a12;background:#FFF3E8;border:1px solid #F3C49B;border-radius:16px;padding:3px 10px;vertical-align:3px">Private — only Belén</span></h1>
  <p class="sub">Fit × engagement value map, work queue, contacts and the DCE pipeline — now living inside the Dispatch Center.</p>
  <div class="crmbar" id="crmbar" style="display:none">
    <div class="tabs" id="tabs"></div>
    <button class="hbtn" onclick="exportCrm()" title="Download a backup of everything (contacts, tags, notes)">⬇ Backup</button>
    <label class="hbtn" title="Restore from a backup file (replaces what is here)" style="display:inline-block">Restore<input type="file" accept=".json" onchange="importCrm(event)" style="display:none"></label>
    <span id="saveChip"></span>
  </div>
  <div id="banners"></div>
  <div id="app"></div>
</div>

<div id="ov"></div>
<div class="panel" id="panel"></div>

<script src="store.js?v=71"></script>
<script>
document.getElementById('nav').innerHTML=navBar('crm');

/* ================================================================
   THE BRAIN — transparent, rule-based scoring (ported from the ata-crm
   sandbox; every point a contact scores traces back to a rule below).
   ================================================================ */
const CRM_VERSION = 4;
const DEMO_EMAILS = ['m.torres@sungrow.com','agil@fcirce.es','e.ricci@iberdrola.es','t.k@tecnalia.com',
  'lmendez@fluence.com','g.fontana@pv-magazine.com','carn@cartif.es','sofia.almeida@edp.pt','james@modoenergy.com',
  'pedro.ramos@gmail.com','aisha.k@outlook.com','rafael@epc.com.br','nina.berg@gmail.com','someone@example.com','marc.dubois@engie.com'];
const DEMO_DEAL_TITLES = ['Sungrow — RENMAD Storage sponsorship','CIRCE — DCE work package','Modo Energy — media/partner deal','Iberdrola — Invest sponsorship'];

const TRACKS = {
  sponsor:    {label:'Sponsor',        color:'#EB6834', sells:'event sponsorship'},
  consortium: {label:'Consortium / EU',color:'#2A78D6', sells:'a dissemination (DCE) slot'},
  media:      {label:'Media partner',  color:'#4A3AA7', sells:'a media partnership'},
  audience:   {label:'Audience',       color:'#8A8781', sells:'nothing — they are the reach'},
};
const QUADRANTS = {
  act:    {label:'Act now',            color:'#0CA30C', effort:'invest', do:'Route to sales — send the proposal.'},
  court:  {label:'Court & propose',    color:'#B26A10', effort:'nurture', do:'Reach out first / keep top-of-mind for the next good-fit call.'},
  fans:   {label:'Audience · superfans',color:'#2A78D6', effort:'hold',   do:'Monetise as reach. Do NOT sell.'},
  passive:{label:'Passive reach',      color:'#8A8781', effort:'ignore', do:'Keep warm, near-zero cost.'},
};
const SECTORS = ['Storage & BESS','Renewable Hydrogen','Biomethane','Data Centres & AI','Solar PV','Wind','Grids','Minigrids & energy access','Investment & Finance'];
const CORE_COUNTRIES = ['Spain','Italy','Portugal','Poland'];
const ENGLISH_TARGET = ['United Kingdom','Ireland','United States','Canada','Australia'];
/* stages of the DCE / sales pipeline (CRM_STAGES — "STAGES" is the dispatch gantt's) */
const CRM_STAGES = [
  {key:'identified', label:'Identified',   prob:0.10},
  {key:'contacted',  label:'Contacted',    prob:0.20},
  {key:'discussion', label:'In discussion',prob:0.40},
  {key:'bid',        label:'In bid',       prob:0.65},
  {key:'awarded',    label:'Awarded',      prob:1.00},
];

/* ---------- FIT: who they are + what they need (0–100) ---------- */
const ORGTYPE_FIT = {vendor:30, developer:22, research:30, media:20, consultancy:15, individual:0, ngo:8};
const SENIORITY_FIT = {clevel:20, head:15, manager:8, staff:2, unknown:4};
const INTENT_FIT = {sponsor:20, project:20, partner:16, hosting:12, insights:0, webinar:0, unknown:4};
function fitScore(c){
  const parts=[];
  const add=(label,pts)=>{ if(pts) parts.push({label,pts}); };
  add('Organisation type — '+(c.orgType||'unknown'), ORGTYPE_FIT[c.orgType]||0);
  add('Seniority — '+(c.seniority||'unknown'), SENIORITY_FIT[c.seniority]||0);
  if(SECTORS.includes(c.sector)) add('Sector we cover — '+c.sector, 15);
  if(CORE_COUNTRIES.includes(c.country)) add('Core market — '+c.country, 10);
  else if(ENGLISH_TARGET.includes(c.country)) add('Growth market (English-speaking) — '+c.country, 8);
  else if(c.country) add('Other market — '+c.country, 4);
  add('Told us why they came — '+(c.intent||'unknown'), INTENT_FIT[c.intent]||0);
  if(c.rel==='client') add('Past client / sponsor', 25);
  else if(c.rel==='speaker') add('Past speaker', 15);
  else if(c.rel==='relationship') add('Strong existing relationship (yellow flag)', 12);
  else if(c.rel==='attendee') add('Past event attendee', 8);
  if(c.euTier===1) add('Tier-1 target organisation', 8);
  else if(c.euTier===2) add('Tier-2 target organisation', 4);
  if(c.persona==='comms') add('Comms / dissemination buyer persona', 12);
  else if(c.persona==='coordinator') add('Project coordinator persona', 8);
  else if(c.persona==='PM') add('Project-manager persona', 5);
  let score=parts.reduce((a,p)=>a+p.pts,0);
  score=Math.max(0,Math.min(100,score));
  return {score, parts};
}

/* ---------- ENGAGEMENT: what they do with us (0–100, recent counts more) ---------- */
const SIGNAL_W = {
  meeting:35, reply:26, call:24, brochure_download:24, event_attend:30, proposal_click:22,
  webinar_attend:16, webinar_register:12, site_visit:9, brochure_view:7, newsletter_open:6,
};
const SIGNAL_LABEL = {
  meeting:'Meeting held', reply:'Replied to us', call:'Spoke on a call', brochure_download:'Downloaded the brochure',
  event_attend:'Attended an event', proposal_click:'Opened a proposal', site_visit:'Visited the site',
  webinar_attend:'Watched a webinar', webinar_register:'Registered for a webinar',
  brochure_view:'Viewed the brochure', newsletter_open:'Opened the newsletter',
};
function sigWeeks(s){
  if(s.date) return Math.max(0,(Date.now()-new Date(s.date).getTime())/(7*86400000));
  return s.weeks||0;
}
function decay(weeksAgo){ return Math.max(0.3, 1 - (weeksAgo||0)/52); }
function engScore(c){
  const parts=[];
  (c.signals||[]).forEach(s=>{
    const w=sigWeeks(s), base=SIGNAL_W[s.type]||0, pts=Math.round(base*decay(w));
    if(pts) parts.push({label:SIGNAL_LABEL[s.type]||s.type, pts, weeks:Math.round(w)});
  });
  parts.sort((a,b)=>a.weeks-b.weeks);
  let score=Math.min(100, parts.reduce((a,p)=>a+p.pts,0));
  return {score, parts};
}
const ACT_TYPES={
  note:    {label:'Note'},
  call:    {label:'Call — spoke', sig:'call'},
  call_no: {label:'Called — no answer'},
  reply:   {label:'They replied', sig:'reply'},
  meeting: {label:'Meeting', sig:'meeting'},
  email:   {label:'Email sent'},
  proposal:{label:'Proposal sent'},
};

/* ---------- derived: track, quadrant, value ---------- */
function track(c){
  if(c.trackOverride) return c.trackOverride;
  if(c.intent==='project') return 'consortium';
  if(c.orgType==='vendor'||c.orgType==='developer') return c.intent==='project'?'consortium':'sponsor';
  if(c.orgType==='research'||c.orgType==='ngo') return 'consortium';
  if(c.orgType==='media') return 'media';
  if(c.orgType==='consultancy') return c.intent==='sponsor'?'sponsor':'audience';
  return 'audience';
}
function quadrant(fit,eng){
  const hf=fit>=50, he=eng>=50;
  return hf&&he?'act' : hf&&!he?'court' : !hf&&he?'fans' : 'passive';
}
const ORG_TIER_VALUE = {1:60000, 2:40000, 3:25000};
function potentialValue(c){
  const t=track(c);
  if(t==='sponsor') return ORG_TIER_VALUE[c.tier||2]||40000;
  if(t==='consortium') return 60000;
  if(t==='media') return 8000;
  return 0;
}
function expectedValue(c){ const f=fitScore(c).score; return Math.round(potentialValue(c)*f/100); }

/* ---------- the PLAY ---------- */
function topSignal(c){ const p=engScore(c).parts; return p.length?p[0]:null; }
function suggestedPlay(c){
  const fit=fitScore(c).score, eng=engScore(c).score, q=quadrant(fit,eng), t=track(c);
  const Q=QUADRANTS[q];
  let action, hook='';
  const ev = c.eventFit || eventForSector(c.sector);
  if(t==='audience'){
    action = q==='fans'
      ? 'Keep nurturing — they love the free content. No sales touch; they are the reach you sell to sponsors.'
      : 'Leave in the audience nurture stream. Near-zero effort.';
  } else if(q==='act'){
    const ts=topSignal(c);
    action = 'Warm and a strong fit — send the proposal this week'+(ts?' (reference: '+ts.label.toLowerCase()+')':'')+'.';
    hook = t==='consortium' ? 'Follow up on the dissemination work package.' : 'Propose '+(ev?ev+' ':'')+'sponsorship.';
  } else if(q==='court'){
    action = t==='consortium'
      ? 'High fit, quiet. Light-touch nurture: invite to speak, stay their obvious DCE choice for the next good-fit call.'
      : 'High fit, hasn’t engaged. Proactive outreach: propose '+(ev?ev+' ':'')+'sponsorship before they go looking.';
    hook = 'Minimum to edge them toward a flip — be top-of-mind, don’t hard-sell.';
  } else {
    action = 'Low priority — keep warm through general nurture until fit or interest rises.';
  }
  return {action, hook, effort:Q.effort, quadrant:q, track:t, fit, eng};
}
function eventForSector(sector){
  const map={'Storage & BESS':'RENMAD Storage','Renewable Hydrogen':'RENMAD Hydrogen','Biomethane':'RENMAD Biomethane',
    'Data Centres & AI':'RENMAD Data Centers','Investment & Finance':'RENMAD Invest','Grids':'RENMAD Storage',
    'Solar PV':'RENMAD','Wind':'RENMAD','Minigrids & energy access':'RENMAD'};
  return map[sector]||'RENMAD';
}

/* ================= data store =================
   Cloud mode: ONE jsonb row in the dispatch Supabase (dc_crm, id=1), readable
   and writable ONLY by Belén (RLS on her login email — enforced server-side,
   the tab being hidden is just politeness). Every edit debounce-pushes the
   whole blob; a localStorage copy is kept as a same-device safety net.
   Local mode (dev rig, no Supabase URL): plain localStorage, like the sandbox. */
const CRM = {
  data:null, cloudOk:false, loadErr:'', firstRun:false, _t:null,
  async init(){
    if(!USE_SUPABASE){ this._loadLocal(); return; }
    try{
      const r=await sb.from('dc_crm').select('data').eq('id',1).maybeSingle();
      if(r.error) throw r.error;
      if(r.data&&r.data.data&&Array.isArray(r.data.data.contacts)){ this.data=r.data.data; }
      else{ this.data=seed(); this.firstRun=true; }
      this.cloudOk=true;
      if(this.data.v!==CRM_VERSION) this.data.v=CRM_VERSION; // migrate, never wipe
      this._cleanupDemo();
      if(this.firstRun) this._push();
    }catch(e){
      this.cloudOk=false; this.loadErr=(e&&(e.message||e.code))||'unknown error';
      this._loadLocal(); // the page still works; changes stay on this device until the table exists
    }
  },
  _loadLocal(){
    try{ this.data=JSON.parse(localStorage.getItem('ataCrm')); }catch(e){ this.data=null; }
    if(!this.data){ this.data=seed(); this.save(); }
    else if(this.data.v!==CRM_VERSION){ this.data.v=CRM_VERSION; this.save(); }
    this._cleanupDemo();
  },
  _cleanupDemo(){
    if(!this.data||!Array.isArray(this.data.contacts))return;
    const before=this.data.contacts.length+this.data.deals.length;
    this.data.contacts=this.data.contacts.filter(c=>!DEMO_EMAILS.includes((c.email||'').toLowerCase()));
    const ids=new Set(this.data.contacts.map(c=>c.id));
    this.data.deals=this.data.deals.filter(d=>ids.has(d.contactId)&&!DEMO_DEAL_TITLES.includes(d.title));
    if(before!==this.data.contacts.length+this.data.deals.length) this.save();
  },
  save(){
    try{ localStorage.setItem('ataCrm', JSON.stringify(this.data)); }catch(e){}
    if(USE_SUPABASE&&this.cloudOk){
      saveChip('saving'); clearTimeout(this._t);
      this._t=setTimeout(()=>{ this._t=null; this._push(); },700);
    }
  },
  async _push(){
    try{
      const {error}=await sb.from('dc_crm').upsert({id:1, data:this.data, updated:new Date().toISOString()});
      if(error) throw error;
      saveChip('saved');
    }catch(e){ saveChip('err'); }
  },
  get contacts(){ return this.data.contacts; },
  get deals(){ return this.data.deals; },
  contact(id){ return this.data.contacts.find(c=>c.id===id); },
  view(c){
    const f=fitScore(c), e=engScore(c), q=quadrant(f.score,e.score);
    return {c, fit:f.score, fitParts:f.parts, eng:e.score, engParts:e.parts, quad:q,
            track:track(c), value:potentialValue(c), expected:expectedValue(c), play:suggestedPlay(c)};
  },
  allViews(){ return this.contacts.map(c=>this.view(c)).sort((a,b)=>b.expected-a.expected); },
  allTags(){ const s=new Set(); this.contacts.forEach(c=>(c.tags||[]).forEach(t=>s.add(t))); return [...s].sort(); },
  addTag(id,tag){ tag=(tag||'').trim(); if(!tag) return; const c=this.contact(id); c.tags=c.tags||[]; if(!c.tags.includes(tag)) c.tags.push(tag); this.save(); },
  removeTag(id,tag){ const c=this.contact(id); c.tags=(c.tags||[]).filter(t=>t!==tag); this.save(); },
  addActivity(id,type,text){
    const c=this.contact(id); if(!c) return;
    const date=new Date().toISOString().slice(0,10);
    text=(text||'').trim();
    if(!text && type==='note') return;
    c.notes=c.notes||[]; c.notes.unshift({date,type,text});
    const sig=ACT_TYPES[type]&&ACT_TYPES[type].sig;
    if(sig){ c.signals=c.signals||[]; c.signals.push({type:sig,date}); }
    if(['call','call_no','email','proposal','meeting'].includes(type)){
      const today=new Date().toISOString().slice(0,10);
      if(!c.nextTouch || c.nextTouch<=today){
        const d=new Date(); d.setDate(d.getDate()+14);
        c.nextTouch=d.toISOString().slice(0,10); c.nextTouchAuto=true;
      }
    }
    this.save();
  },
  addNote(id,text){ this.addActivity(id,'note',text); },
  setNextTouch(id,dateISO){ const c=this.contact(id); c.nextTouch=dateISO||null; c.nextTouchAuto=false; this.save(); },
  addContact(d){
    const id=this.data.nextC||1000; this.data.nextC=id+1;
    const c=Object.assign({id,signals:[],notes:[],tags:[],source:'manual',intent:'project',rel:'none'},d);
    this.data.contacts.push(c); this.save(); return c;
  },
  updateContact(id,d){ const c=this.contact(id); if(!c) return; Object.assign(c,d); this.save(); },
  deleteContact(id){
    this.data.contacts=this.data.contacts.filter(c=>c.id!==id);
    this.data.deals=this.data.deals.filter(d=>d.contactId!==id);
    this.save();
  },
  lastTouch(c){ const n=(c.notes||[]).find(x=>x.type&&x.type!=='note'); return n?n.date:((c.notes||[])[0]?(c.notes||[])[0].date:null); },
  due(){ const t=new Date().toISOString().slice(0,10);
    return this.allViews().filter(v=>v.c.nextTouch && v.c.nextTouch<=t); },
  counts(){
    const vs=this.allViews(), by={act:0,court:0,fans:0,passive:0};
    vs.forEach(v=>by[v.quad]++);
    const audience = vs.filter(v=>v.track==='audience').length;
    const pipeline = vs.filter(v=>v.track!=='audience' && v.fit>=50).length;
    const openVal = this.deals.filter(d=>d.stage!=='awarded'&&d.stage!=='lost')
      .reduce((a,d)=>{ const st=CRM_STAGES.find(s=>s.key===d.stage); return a+(d.value||0)*(st?st.prob:0); },0);
    return {by, audience, pipeline, openVal:Math.round(openVal)};
  },
};

/* ---------- Work queue ---------- */
function queueItems(){
  const today=new Date().toISOString().slice(0,10);
  const vs=CRM.allViews().filter(v=>v.track!=='audience');
  const seen=new Set(); const out=[];
  const push=(v,why,color)=>{ if(seen.has(v.c.id))return; seen.add(v.c.id); out.push({v,why,color}); };
  vs.filter(v=>v.c.nextTouch&&v.c.nextTouch<=today).sort((a,b)=>a.c.nextTouch.localeCompare(b.c.nextTouch))
    .forEach(v=>push(v,'Follow-up due '+v.c.nextTouch,'#b5341f'));
  vs.filter(v=>(v.c.tags||[]).includes('Active discussion')&&!(v.c.notes||[]).some(n=>n.type&&n.type!=='note'))
    .forEach(v=>push(v,'Active discussion — keep it moving','#0a7a0a'));
  vs.filter(v=>v.quad==='court'&&!(v.c.notes||[]).length&&!v.c.nextTouch)
    .slice(0,25).forEach(v=>push(v,'High-fit, never contacted — court them','#b26a10'));
  return out.slice(0,40);
}

/* ---------- value map ---------- */
function renderMap(){
  const vs=CRM.allViews(), c=CRM.counts();
  const app=document.getElementById('app');
  const maxExp=Math.max(1,...vs.map(v=>v.expected));
  const size=v=>{ if(v.track==='audience') return 12; return 13+Math.round(22*Math.sqrt(v.expected/maxExp)); };
  const op=v=>v.track==='audience'?.55:1;
  const labelled=vs.filter(v=>v.track!=='audience').slice(0,6).map(v=>v.c.id);
  const plotted=new Set();
  vs.forEach(v=>{ if(v.eng>0||(v.c.tags||[]).includes('Active discussion')) plotted.add(v.c.id); });
  vs.slice(0,60).forEach(v=>plotted.add(v.c.id));
  const restCount={act:0,court:0,fans:0,passive:0};
  const plotVs=vs.filter(v=>{ if(plotted.has(v.c.id)) return true; restCount[v.quad]++; return false; });
  const bubblePos={court:[26,60],act:[74,60],fans:[74,26],passive:[26,26]};
  const bubbles=Object.keys(restCount).filter(q=>restCount[q]>0).map(q=>{
    const [x,y]=bubblePos[q];

  }).join('');

    dueStrip()+

function tile(l,n,s){ return '<div class="tile"><div class="l">'+l+'</div><div class="n">'+n+'</div><div class="s">'+s+'</div></div>'; }
function dueStrip(){
  const due=CRM.due(); if(!due.length) return '';
  const shown=due.slice(0,8);
  return '<div style="background:#fff5f2;border:1px solid #ffd0bf;border-radius:11px;padding:11px 15px;margin-bottom:14px;font-size:13px">'+
    '<b style="color:#b5341f">⏰ Follow-ups due ('+due.length+'):</b> '+
    shown.map(v=>'<a href="#" data-open="'+v.c.id+'" style="color:var(--ink);font-weight:600;text-decoration:none;border-bottom:1px dashed #d99">'+esc(v.c.name)+'</a> <span style="color:var(--muted)">('+esc(v.c.org)+' · '+v.c.nextTouch+')</span>').join(' &nbsp;·&nbsp; ')+
    (due.length>shown.length?' &nbsp;·&nbsp; <span style="color:var(--muted)">+'+(due.length-shown.length)+' more</span>':'')+
  '</div>';
}
function workRow(v){
  const t=TRACKS[v.track];
  return '<div class="wrow" data-open="'+v.c.id+'"><span style="width:9px;height:9px;border-radius:50%;background:'+t.color+';flex:0 0 auto"></span>'+
    '<div style="flex:1;min-width:0"><span class="nm">'+esc(v.c.name)+'</span> <span class="meta">· '+esc(v.c.org)+' · '+t.label+'</span>'+
    '<div class="sub">'+v.play.action+'</div></div>'+
    '<div><span class="eff '+v.play.effort+'">'+v.play.effort+'</span></div>'+
    '<div class="val">'+(v.value?fmt(v.expected):'reach')+'<div style="font-size:10px;color:#9aa2a6;font-weight:400">fit '+v.fit+' · eng '+v.eng+'</div></div></div>';
}

/* ---------- contacts ---------- */
function renderContacts(){
  const app=document.getElementById('app');
  let vs=CRM.allViews();
  if(FILTER!=='all') vs=vs.filter(v=>FILTER==='pipeline'?(v.track!=='audience'&&v.fit>=50):v.quad===FILTER);
  if(TAGFILTER) vs=vs.filter(v=>(v.c.tags||[]).includes(TAGFILTER));
  if(SEARCH){ const q=SEARCH.toLowerCase();
    vs=vs.filter(v=>((v.c.name||'')+' '+(v.c.org||'')+' '+(v.c.email||'')+' '+(v.c.tags||[]).join(' ')).toLowerCase().includes(q)); }
  const total=vs.length, PAGE=100, pages=Math.max(1,Math.ceil(total/PAGE));
  if(PAGEN>=pages)PAGEN=pages-1; if(PAGEN<0)PAGEN=0;
  vs=vs.slice(PAGEN*PAGE,(PAGEN+1)*PAGE);
  const pager= pages>1 ? '<div style="display:flex;gap:8px;align-items:center;justify-content:center;margin:14px 0 4px">'+
      '<button class="btn" id="pgPrev" '+(PAGEN===0?'disabled style="opacity:.4"':'')+'>&#8249; Prev</button>'+
      '<span style="font-size:13px;color:var(--muted)">Page <b style="color:var(--ink)">'+(PAGEN+1)+'</b> of '+pages+' · '+total+' contacts</span>'+
      '<button class="btn" id="pgNext" '+(PAGEN>=pages-1?'disabled style="opacity:.4"':'')+'>Next &#8250;</button></div>' : '';
  const chips=[['all','All'],['act','Act now'],['court','Court'],['fans','Audience'],['pipeline','Qualified only']];
  const tags=CRM.allTags();
  const TAG_COUNTRIES=['Spain','Italy','Portugal','Poland','France','Germany','Belgium','Netherlands','Greece','Austria','United Kingdom','Ireland','Denmark','Sweden','Finland','Norway','Switzerland','Czechia','Romania','Slovenia','Croatia','Hungary','Turkey'];
  const groups={ 'Work status':[], 'Tier':[], 'Outreach plan':[], 'Country':[], 'EU project':[], 'My tags':[] };
  tags.forEach(t=>{
    if(['Active discussion','Relationship','EU targeting','EU project','Comms / DCE lead','Project manager'].includes(t)) groups['Work status'].push(t);
    else if(/^Tier \d/.test(t)) groups['Tier'].push(t);
    else if(/^Plan [A-Z]/.test(t)) groups['Outreach plan'].push(t);
    else if(TAG_COUNTRIES.includes(t)) groups['Country'].push(t);
    else if(/^[A-Z0-9][A-Za-z0-9-]*$/.test(t)&&t===t.toUpperCase()||['ShieldBot','HyperMorpH'].includes(t)) groups['EU project'].push(t);
    else groups['My tags'].push(t);
  });
  const tagSel='<select id="tagSel" style="padding:8px 10px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px;max-width:240px">'+
    '<option value="">All tags</option>'+
    Object.keys(groups).filter(g=>groups[g].length).map(g=>'<optgroup label="'+g+'">'+groups[g].map(t=>'<option value="'+esc(t)+'"'+(TAGFILTER===t?' selected':'')+'>'+esc(t)+'</option>').join('')+'</optgroup>').join('')+
    '</select>';
  app.innerHTML='<h2>Contacts</h2><p class="lead">Sorted by expected value. Click a row to see the why, edit their details, tag them, log a call and copy the drafted next message.</p>'+
    dueStrip()+
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">'+
      '<input id="srch" value="'+esc(SEARCH)+'" placeholder="Search name, organisation, email or tag…" style="flex:1;min-width:220px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px">'+
      tagSel+
      '<button class="btn p" id="newC" style="background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600">+ New contact</button></div>'+
    '<div class="filters">'+chips.map(([k,l])=>'<span class="chip '+(k===FILTER?'on':'')+'" data-f="'+k+'">'+l+'</span>').join('')+'</div>'+
    '<table><tr><th>Contact</th><th>Type</th><th>Fit</th><th>Engagement</th><th>Quadrant</th><th>Last / next touch</th><th style="text-align:right">Exp. value</th></tr>'+
    vs.map(v=>{
      const t=TRACKS[v.track], q=QUADRANTS[v.quad];
      const lt=CRM.lastTouch(v.c);
      return '<tr data-open="'+v.c.id+'"><td><b>'+esc(v.c.name)+'</b><div style="color:var(--muted);font-size:12px">'+esc(v.c.org)+' · '+esc(v.c.country||'—')+'</div></td>'+
        '<td><span class="tchip" style="background:'+t.color+'">'+t.label+'</span></td>'+
        '<td>'+barCell(v.fit,t.color)+'</td>'+
        '<td>'+barCell(v.eng,'#5f6b70')+'</td>'+
        '<td><span class="qtag" style="background:'+q.color+'22;color:'+q.color+'">'+q.label+'</span></td>'+
        '<td style="font-size:12px;color:var(--muted);white-space:nowrap">'+(lt?lt:'—')+' / '+(v.c.nextTouch?'<b style="color:var(--ink)">'+v.c.nextTouch+'</b>':'—')+'</td>'+
        '<td style="text-align:right;font-variant-numeric:tabular-nums">'+(v.value?fmt(v.expected):'<span style="color:#9aa2a6">reach</span>')+'</td></tr>';
    }).join('')+'</table>'+pager;
  document.querySelectorAll('[data-f]').forEach(c=>c.onclick=()=>{FILTER=c.dataset.f;PAGEN=0;renderContacts();});
  const ts=document.getElementById('tagSel');
  ts.onchange=()=>{ TAGFILTER=ts.value||null; PAGEN=0; renderContacts(); };
  const si=document.getElementById('srch');
  si.oninput=()=>{ SEARCH=si.value; PAGEN=0; const pos=si.selectionStart; renderContacts(); const s2=document.getElementById('srch'); s2.focus(); s2.setSelectionRange(pos,pos); };
  const pp=document.getElementById('pgPrev'); if(pp)pp.onclick=()=>{PAGEN--;renderContacts();window.scrollTo(0,0);};
  const pn=document.getElementById('pgNext'); if(pn)pn.onclick=()=>{PAGEN++;renderContacts();window.scrollTo(0,0);};
  document.getElementById('newC').onclick=()=>{ const c=CRM.addContact({name:'New contact',org:'',email:''}); EDITING=true; openContact(c.id); };
  wireOpens();
}
function barCell(v,col){ return '<span class="bar"><i style="width:'+v+'%;background:'+col+'"></i></span> <span style="font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px">'+v+'</span>'; }

function renderPipeline(){

    '<div class="board">'+CRM_STAGES.map(st=>{

function startEdit(){ EDITING=true; renderPanel(); }
function cancelEdit(){ EDITING=false; renderPanel(); }
function saveEdit(){
  const g=id=>document.getElementById(id).value.trim();
  CRM.updateContact(OPEN,{ name:g('ed_name')||'(no name)', org:g('ed_org'), role:g('ed_role'), email:g('ed_email').toLowerCase(),
    phone:g('ed_phone'), linkedin:g('ed_li'), country:g('ed_country'), sector:g('ed_sector'),
    persona:g('ed_persona'), seniority:g('ed_sen'), orgType:g('ed_ot'),
    euTier:g('ed_tier')?+g('ed_tier'):null, rel:g('ed_rel'), trackOverride:g('ed_track')||null });
  EDITING=false; renderPanel(); render();
}
function delContact(){
  const c=CRM.contact(OPEN);
  if(!confirm('Delete '+c.name+' ('+(c.org||'no org')+') and their deals? This cannot be undone (except from a backup).'))return;
  CRM.deleteContact(OPEN); closePanel(); render();
}
function kv(k,val){ return '<div class="kv"><span class="k">'+k+'</span><span>'+val+'</span></div>'; }

function exportCrm(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(CRM.data,null,1)],{type:'application/json'}));
  a.download='ata-crm-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();

function importCrm(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!Array.isArray(d.contacts)) throw new Error('bad file');
      d.v=CRM_VERSION; CRM.data=d; CRM.save(); closePanel(); render();
      alert('Restored '+d.contacts.length+' contacts from the backup.');
    }catch(err){ alert('That is not a valid CRM backup file.'); } };
  r.readAsText(f); e.target.value='';
}

/* ================================================================
   PROJECTS — the Consortium Gravity engine. One row per relevant EU
   project (dc_crm_projects), fed by the gravity.py pipeline. data.computed
   is pipeline-owned; data.user (status/notes) is Belén's — the UI only ever
   writes data.user, mirroring how the pipeline only ever writes data.computed.
   ================================================================ */
const LIGHT_C={GREEN:'#0CA30C',YELLOW:'#E0A800',ORANGE:'#E8730C',RED:'#C0392B'};
const LIGHT_LABEL={GREEN:'GREEN',YELLOW:'YELLOW',ORANGE:'ORANGE',RED:'RED'};
const LIGHT_DOT={GREEN:'🟢',YELLOW:'🟡',ORANGE:'🟠',RED:'🔴'};
const PSTATUS=['new','reviewing','pursuing','parked','dead'];
const PSECTORS=[
  ['Renewable Hydrogen',/hydrogen|electrolys|fuel cell|\bH2\b|ammonia/i],
  ['Storage & BESS',/storage|batter|BESS|li-ion|lithium|redox|flywheel|supercapacit/i],
  ['Biomethane & gases',/biomethane|biogas|anaerobic|renewable gas|methanation/i],
  ['Data Centres & AI',/data cent(er|re)|\bAI\b|computing|digital twin/i],
  ['Solar PV',/photovoltaic|solar|\bPV\b|perovskite/i],
  ['Wind',/wind (energy|farm|turbine|power)|offshore wind|floating wind/i],
  ['Grids & flexibility',/grid|flexib|HVDC|microgrid|smart meter|interconnect|balancing/i],
  ['Minigrids & access',/mini-?grid|energy access|rural electrif|off-grid/i],
];
function projSector(c){
  const t=(c.acronym+' '+c.title+' '+(c.summary||'')+' '+c.topic).toLowerCase();
  for(const [name,rx] of PSECTORS) if(rx.test(t)) return name;
  return 'Other energy';
}

const PROJ={
  rows:[], byId:{}, ready:false, cloudOk:false, loadErr:'', tableMissing:false, _t:null,
  async init(){
    if(!USE_SUPABASE){ await this._loadLocal(); return; }
    try{
      const r=await sb.from('dc_crm_projects').select('id,data,updated');
      if(r.error) throw r.error;
      this.rows=(r.data||[]).map(x=>({id:x.id, computed:(x.data||{}).computed||{}, user:(x.data||{}).user||null}));
      this.cloudOk=true;
    }catch(e){
      this.loadErr=(e&&(e.message||e.code))||'unknown error';
      if((e&&e.code)==='PGRST205'||(e&&e.code)==='42P01'||/dc_crm_projects/.test(this.loadErr)) this.tableMissing=true;
    }
    this._index(); this.ready=true;
  },
  async _loadLocal(){
    try{ const res=await fetch('gravity_seed.json',{cache:'no-store'});
      if(res.ok){ const j=await res.json(); this.rows=j.map(x=>({id:x.id, computed:(x.data||{}).computed||{}, user:(x.data||{}).user||null})); } }
    catch(e){ this.loadErr=String(e); }
    try{ const u=JSON.parse(localStorage.getItem('projUser')||'{}');
      this.rows.forEach(r=>{ if(u[r.id]) r.user=Object.assign(r.user||{}, u[r.id]); }); }catch(e){}
    this.cloudOk=false; this._index(); this.ready=true;
  },
  _index(){ this.byId={}; this.rows.forEach(r=>{ if(!r.user) r.user={status:'new',notes:[],overrides:{}}; this.byId[r.id]=r; }); },
  get(id){ return this.byId[id]; },
  setStatus(id,st){ const r=this.get(id); if(!r) return; r.user.status=st; this._saveUser(id); },
  addNote(id,text){ text=(text||'').trim(); if(!text) return; const r=this.get(id); if(!r) return;
    r.user.notes=r.user.notes||[]; r.user.notes.unshift({date:new Date().toISOString().slice(0,10),text}); this._saveUser(id); },
  _saveUser(id){
    const r=this.get(id); if(!r) return;
    if(!USE_SUPABASE){
      try{ const u=JSON.parse(localStorage.getItem('projUser')||'{}'); u[id]={status:r.user.status,notes:r.user.notes,overrides:r.user.overrides||{}};
        localStorage.setItem('projUser',JSON.stringify(u)); }catch(e){} projSaveChip('saved'); return;
    }
    projSaveChip('saving'); clearTimeout(this._t);
    this._t=setTimeout(async()=>{ this._t=null;
      try{ const {error}=await sb.from('dc_crm_projects').update({data:{computed:r.computed,user:r.user},updated:new Date().toISOString()}).eq('id',id);
        if(error) throw error; projSaveChip('saved'); }catch(e){ projSaveChip('err'); }
    },500);
  },
  counts(){ const by={GREEN:0,YELLOW:0,ORANGE:0,RED:0}; this.rows.forEach(r=>by[r.computed.comms.light]++); return by; },
};
function projSaveChip(state){
  const el=document.getElementById('saveChip'); if(!el) return; el.className='';
  if(!USE_SUPABASE){ el.textContent='local test mode'; return; }
  if(state==='saving'){ el.textContent='☁ saving…'; el.onclick=null; }
  else if(state==='err'){ el.className='err'; el.textContent='⚠ could not save — click to retry'; el.onclick=()=>PROJ._saveUser(POPEN); }
  else el.textContent='☁ saved '+new Date().toTimeString().slice(0,5);
}

let PTAB='list', PSEARCH='', POPEN=null, PNODE=null, PKIND='call';
let PFILTER={light:'',status:'',slot:'',path:'',year:'',sector:'',callstatus:''};
const isCall=c=>c && c.kind==='call';

function projFiltered(){
  let rows=PROJ.rows.filter(r=> PKIND==='call' ? isCall(r.computed) : !isCall(r.computed));
  if(PKIND==='call'){
    if(PFILTER.callstatus) rows=rows.filter(r=>r.computed.status===PFILTER.callstatus);
    if(PFILTER.sector) rows=rows.filter(r=>projSector(r.computed)===PFILTER.sector);
    if(PFILTER.path) rows=rows.filter(r=>r.computed.bestPath.type===PFILTER.path);
    if(PFILTER.status) rows=rows.filter(r=>((r.user&&r.user.status)||'new')===PFILTER.status);
    if(PSEARCH){ const q=PSEARCH.toLowerCase();
      rows=rows.filter(r=>((r.computed.acronym+' '+r.computed.title)||'').toLowerCase().includes(q)); }
    rows.sort((a,b)=>b.computed.score-a.computed.score);
    return rows;
  }
  // ---- signed projects ----
  // default view hides RED (no comms money) and slot-taken; a light/slot filter reveals them
  if(!PFILTER.light && !PFILTER.slot) rows=rows.filter(r=>r.computed.inDefaultRank);
  if(PFILTER.light) rows=rows.filter(r=>r.computed.comms.light===PFILTER.light);
  if(PFILTER.slot) rows=rows.filter(r=>r.computed.comms.slot===PFILTER.slot);
  if(PFILTER.status) rows=rows.filter(r=>((r.user&&r.user.status)||'new')===PFILTER.status);
  if(PFILTER.path) rows=rows.filter(r=>r.computed.bestPath.type===PFILTER.path);
  if(PFILTER.sector) rows=rows.filter(r=>projSector(r.computed)===PFILTER.sector);
  if(PFILTER.year) rows=rows.filter(r=>(r.computed.startDate||'').slice(0,4)===PFILTER.year);
  if(PSEARCH){ const q=PSEARCH.toLowerCase();
    rows=rows.filter(r=>((r.computed.acronym+' '+r.computed.title+' '+(r.computed.coordinator||{}).name)||'').toLowerCase().includes(q)); }
  rows.sort((a,b)=>b.computed.score-a.computed.score);
  return rows;
}

  const app=document.getElementById('app');
  if(!PROJ.ready){ app.innerHTML='<div class="card" style="text-align:center;color:var(--muted)">Loading projects…</div>';
    if(!PROJ._kick){ PROJ._kick=true; PROJ.init().then(()=>{ if(TAB==='projects') renderProjects(); }); } return; }
  if(PROJ.tableMissing){
    app.innerHTML='<h2>Projects</h2>'+
      '<div class="setupbanner"><b>One database step first:</b> the projects table (dc_crm_projects) isn’t in Supabase yet — run '+
      '<b>_sql/dispatch_crm_projects.sql</b> in the SQL editor, then run the gravity pipeline to publish. Nothing else is affected.</div>';
    return; }
  if(!PROJ.rows.length){
    app.innerHTML='<h2>Projects</h2><div class="card" style="text-align:center;color:var(--muted)">No projects yet — run the gravity pipeline to populate this tab.</div>'; return; }
  const calls=PROJ.rows.filter(r=>isCall(r.computed));

      '<button class="'+(PKIND==='call'?'on':'')+'" data-pk="call">📢 Open calls to bid ('+calls.length+')</button>'+
      '<button class="'+(PKIND==='project'?'on':'')+'" data-pk="project">📁 Signed projects (intel)</button></div>';

    const opn=calls.filter(r=>r.computed.status==='Open').length;
    const fth=calls.filter(r=>r.computed.status==='Forthcoming').length;
    const withDoor=calls.filter(r=>r.computed.bestDoorStrength>0).length;
    const soon=calls.map(r=>r.computed.deadline).filter(Boolean).sort()[0]||'—';
    head='<h2>Open calls — what we can still bid on</h2>'+
      '<p class="lead">Open &amp; forthcoming Horizon calls in our sectors, each with a real <b>proposal deadline</b>. For every call we predict the likely-winning organisations from the historical record and flag <b>which of them we already know</b> — your warmest doors into a bid consortium. Click a call.</p>';
    cards='<div class="lightlead">'+
      '<div class="lc"><div class="n">'+calls.length+'</div><div class="l">📢 open/forthcoming calls</div></div>'+
      '<div class="lc"><div class="n" style="color:#0a7a0a">'+opn+'</div><div class="l">🟢 open now</div></div>'+
      '<div class="lc"><div class="n" style="color:var(--blue)">'+fth+'</div><div class="l">🔵 forthcoming</div></div>'+
      '<div class="lc"><div class="n" style="color:var(--orange)">'+withDoor+'</div><div class="l">🚪 with a door we know</div></div>'+
      '</div>';
    subtabs='';
  } else {
    const by=PROJ.counts();
    head='<h2>Signed projects — follow the money</h2>'+
      '<p class="lead">Already-awarded EU projects (relationship intel, <b>not</b> biddable). Ranked by comms money × how warm our way in is — who holds the DCE slots, and the anchor orgs. Red = no comms money (hidden by default).</p>';
    cards='<div class="lightlead">'+
      lightCard('GREEN',by.GREEN,'&gt; €500k comms')+lightCard('YELLOW',by.YELLOW,'€200–500k')+
      lightCard('ORANGE',by.ORANGE,'&lt; €200k')+lightCard('RED',by.RED,'no comms money')+'</div>';
    subtabs='<div class="subtabs"><button class="'+(PTAB==='list'?'on':'')+'" data-pt="list">List</button>'+
        '<button class="'+(PTAB==='graph'?'on':'')+'" data-pt="graph">Money × access map</button></div>';
  }
  app.innerHTML=kindToggle+head+cards+
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">'+subtabs+
      '<input id="psrch" value="'+esc(PSEARCH)+'" placeholder="Search…" style="flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px">'+
    '</div>'+
    projFilterBar()+
    '<div id="pbody"></div>';
  document.querySelectorAll('[data-pk]').forEach(b=>b.onclick=()=>{PKIND=b.dataset.pk;PTAB='list';renderProjects();});
  document.querySelectorAll('[data-pt]').forEach(b=>b.onclick=()=>{PTAB=b.dataset.pt;renderProjects();});
  const si=document.getElementById('psrch');
  si.oninput=()=>{ PSEARCH=si.value; renderPBody(); };

function lightCard(k,n,sub){ return '<div class="lc"><div class="n" style="color:'+LIGHT_C[k]+'">'+n+'</div><div class="l">'+LIGHT_DOT[k]+' '+sub+'</div></div>'; }

function projFilterBar(){
  const sel=(id,label,opts,cur)=>'<select data-pf="'+id+'" style="padding:7px 9px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:12.5px">'+
    '<option value="">'+label+'</option>'+opts.map(o=>{const[v,l]=Array.isArray(o)?o:[o,o];return '<option value="'+esc(v)+'"'+(cur===v?' selected':'')+'>'+esc(l)+'</option>';}).join('')+'</select>';
  if(PKIND==='call'){
    return '<div class="filters" style="gap:7px">'+
      sel('callstatus','Any stage',[['Open','🟢 Open now'],['Forthcoming','🔵 Forthcoming']],PFILTER.callstatus)+
      sel('sector','Any sector',PSECTORS.map(s=>s[0]).concat(['Other energy']),PFILTER.sector)+
      sel('path','Any door',[['direct','Door we know'],['cold','No door yet']],PFILTER.path)+
      sel('status','Any status',PSTATUS.map(s=>[s,s[0].toUpperCase()+s.slice(1)]),PFILTER.status)+
      '</div>';
  }
  const yrs=[...new Set(PROJ.rows.filter(r=>!isCall(r.computed)).map(r=>(r.computed.startDate||'').slice(0,4)).filter(Boolean))].sort().reverse();
  return '<div class="filters" style="gap:7px">'+
    sel('light','Any light',[['GREEN','🟢 Green'],['YELLOW','🟡 Yellow'],['ORANGE','🟠 Orange'],['RED','🔴 Red (no money)']],PFILTER.light)+
    sel('status','Any status',PSTATUS.map(s=>[s,s[0].toUpperCase()+s.slice(1)]),PFILTER.status)+
    sel('sector','Any sector',PSECTORS.map(s=>s[0]).concat(['Other energy']),PFILTER.sector)+
    sel('path','Any path',[['direct','Direct'],['1hop','1-hop'],['cold','Cold']],PFILTER.path)+
    sel('slot','Any slot',[['open','Slot open'],['ours','Ours ✓'],['taken','Slot taken']],PFILTER.slot)+
    sel('year','Any year',yrs,PFILTER.year)+
    '</div>';
}
function wireProjFilters(){ document.querySelectorAll('[data-pf]').forEach(s=>s.onchange=()=>{ PFILTER[s.dataset.pf]=s.value; renderPBody(); }); }

function renderPBody(){
  const rows=projFiltered();
  const el=document.getElementById('pbody'); if(!el) return;
  el.innerHTML = PTAB==='graph' ? projScatter(rows) : projTable(rows);
  if(PTAB==='list') el.querySelectorAll('[data-popen]').forEach(t=>t.onclick=()=>openProject(t.dataset.popen));
  if(PTAB==='graph') el.querySelectorAll('[data-popen]').forEach(t=>t.onclick=()=>openProject(t.getAttribute('data-popen')));
}

function deadlineChip(c){
  const d=c.deadline||''; const days=c.daysToDeadline;
  let col='#7c7c78'; if(days!=null){ col = days<=60?'#b5341f':(days<=180?'#b26a10':'#0a7a0a'); }
  const rel = days==null?'date TBC':(days<0?'closed':(days===0?'today':'in '+days+'d'));
  return '<span style="white-space:nowrap"><b style="color:'+col+'">'+esc(d||'—')+'</b> <span style="color:#9aa2a6;font-size:11px">'+rel+'</span></span>';
}
function projTable(rows){
  if(!rows.length) return '<div class="card" style="text-align:center;color:var(--muted)">Nothing matches these filters.</div>';
  if(PKIND==='call'){
    return '<div style="font-size:12px;color:var(--muted);margin:2px 2px 8px">'+rows.length+' open/forthcoming calls · soonest deadline first within score</div>'+
     '<table><tr><th>#</th><th>Fit</th><th>Call topic</th><th>Sector</th><th>Type</th><th>Deadline</th><th>Stage</th><th>Our door</th><th>Status</th></tr>'+
     rows.map((r,i)=>{ const c=r.computed, st=(r.user&&r.user.status)||'new';
       const toa=(c.typeOfAction||'').replace(/HORIZON /,'').replace(/ Actions?/,'');
       return '<tr data-popen="'+esc(r.id)+'">'+
         '<td style="color:var(--muted)">'+(i+1)+'</td>'+
         '<td><b>'+Math.round(c.score)+'</b></td>'+
         '<td><b>'+esc(c.acronym)+'</b><div style="color:var(--muted);font-size:11.5px;max-width:40ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.title)+'</div></td>'+
         '<td style="font-size:11.5px;color:var(--muted)">'+esc(projSector(c))+'</td>'+
         '<td style="font-size:11px;color:var(--muted)">'+esc(toa||'—')+'</td>'+
         '<td style="font-size:12px">'+deadlineChip(c)+'</td>'+
         '<td><span class="slotb '+(c.status==='Open'?'open':'taken')+'">'+esc(c.status)+'</span></td>'+
         '<td>'+(c.bestDoorStrength>0?'<span class="pathpill direct">door '+Math.round(c.bestDoorStrength)+'</span>':'<span class="pathpill cold">none yet</span>')+'</td>'+
         '<td><span class="stat '+st+'">'+st+'</span></td></tr>';
     }).join('')+'</table>';
  }
  return '<div style="font-size:12px;color:var(--muted);margin:2px 2px 8px">'+rows.length+' projects</div>'+
   '<table><tr><th>#</th><th>Light</th><th>Project</th><th>Sector</th><th style="text-align:right">EC €</th><th style="text-align:right">Comms €</th><th>Slot</th><th>Best path</th><th>Status</th><th>Start</th></tr>'+
   rows.map((r,i)=>{ const c=r.computed, bp=c.bestPath, st=(r.user&&r.user.status)||'new';
     return '<tr data-popen="'+esc(r.id)+'">'+
       '<td style="color:var(--muted)">'+(i+1)+'</td>'+
       '<td><span class="tl '+c.comms.light+'">'+LIGHT_DOT[c.comms.light]+' '+Math.round(c.score)+'</span></td>'+
       '<td><b>'+esc(c.acronym)+'</b><div style="color:var(--muted);font-size:11.5px;max-width:34ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.title)+'</div></td>'+
       '<td style="font-size:11.5px;color:var(--muted)">'+esc(projSector(c))+'</td>'+
       '<td style="text-align:right;font-variant-numeric:tabular-nums">'+pmoney(c.ecMax)+'</td>'+
       '<td style="text-align:right;font-variant-numeric:tabular-nums">'+pmoney(c.comms.commsBudget)+'</td>'+
       '<td><span class="slotb '+c.comms.slot+'">'+(c.comms.slot==='ours'?'ours ✓':c.comms.slot)+'</span></td>'+
       '<td><span class="pathpill '+bp.type+'">'+bp.type+'</span> '+(bp.strength?'<span class="pminib"><i style="width:'+Math.min(100,bp.strength)+'%"></i></span>':'')+'</td>'+
       '<td><span class="stat '+st+'">'+st+'</span></td>'+
       '<td style="font-size:11.5px;color:var(--muted);white-space:nowrap">'+esc((c.startDate||'').slice(0,7))+'</td></tr>';
   }).join('')+'</table>';
}
function pmoney(n){ if(!n) return '—'; return n>=1e6?'€'+(n/1e6).toFixed(1)+'M':'€'+Math.round(n/1000)+'k'; }

/* ---------- scatter: x = link strength, y = comms money, size = EC, colour = light ---------- */
function projScatter(rows){
  rows=rows.slice(0,600);
  const W=760,H=430,L=52,R=18,T=18,B=44, pw=W-L-R, ph=H-T-B;
  const YMAX=1600000;
  const yv=v=>Math.min(YMAX,v)/YMAX;
  const xf=s=>L+(Math.max(0,Math.min(100,s))/100)*pw;
  const yf=v=>T+ph-yv(v)*ph;
  const maxEC=Math.max(1,...rows.map(r=>r.computed.ecMax));
  const rad=ec=>4+9*Math.sqrt(ec/maxEC);
  const hj=id=>{ let h=0; const s=String(id); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&255; return (h/255-0.5)*3.2; };
  // horizontal traffic-light bands
  const band=(v0,v1,col)=>'<rect x="'+L+'" y="'+yf(v1)+'" width="'+pw+'" height="'+(yf(v0)-yf(v1))+'" fill="'+col+'"/>';
  let svg='<svg class="scatter" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  svg+=band(0,200000,'rgba(232,115,12,.06)')+band(200000,500000,'rgba(224,168,0,.08)')+band(500000,YMAX,'rgba(12,163,12,.07)');
  // gridlines + y labels at 200k,500k,1M
  [[200000,'€200k'],[500000,'€500k'],[1000000,'€1M']].forEach(([v,lab])=>{
    svg+='<line x1="'+L+'" y1="'+yf(v)+'" x2="'+(W-R)+'" y2="'+yf(v)+'" stroke="#e3e1da" stroke-dasharray="3 3"/>';
    svg+='<text x="'+(L-6)+'" y="'+(yf(v)+3)+'" text-anchor="end" font-size="10" fill="#9aa2a6">'+lab+'</text>';
  });
  // axes
  svg+='<line x1="'+L+'" y1="'+(T+ph)+'" x2="'+(W-R)+'" y2="'+(T+ph)+'" stroke="#c9c6bd"/>';
  svg+='<line x1="'+L+'" y1="'+T+'" x2="'+L+'" y2="'+(T+ph)+'" stroke="#c9c6bd"/>';
  svg+='<text x="'+(L+pw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="11" fill="#7c7c78">how warm our way in is  →</text>';
  svg+='<text transform="translate(13,'+(T+ph/2)+') rotate(-90)" text-anchor="middle" font-size="11" fill="#7c7c78">comms money  ↑</text>';
  svg+='<text x="'+(W-R)+'" y="'+(T+12)+'" text-anchor="end" font-size="10.5" font-weight="700" fill="#0a7a0a">money + access → work first</text>';
  // dots (low money first so juicy ones sit on top)
  rows.slice().sort((a,b)=>a.computed.comms.commsBudget-b.computed.comms.commsBudget).forEach(r=>{
    const c=r.computed, x=xf(c.bestPath.strength)+hj(r.id), y=yf(c.comms.commsBudget);
    svg+='<circle class="dotp" data-popen="'+esc(r.id)+'" cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rad(c.ecMax).toFixed(1)+'" '+

  });
  svg+='</svg>';
  return svg+'<div style="font-size:11.5px;color:var(--muted);margin:8px 2px">Dot size = total EC budget · colour = traffic light · click a dot to open the project. '+rows.length+' shown.</div>';
}

function bestPathBlock(c){

      '<div class="why" style="margin-top:8px">First move: reach '+esc((ppl[0]||{}).name||'the contact')+' at '+esc(bp.org||'')+' directly and offer the DCE / dissemination work package.</div>';
  }
  if(bp.type==='1hop'){
    return '<div style="font-size:13px;color:var(--ink);font-weight:600;margin-bottom:6px">1-HOP — no direct contact, but a partner we know sits in this consortium (link '+Math.round(bp.strength)+').</div>'+
      '<div class="why">Ask our contact at <b>'+esc(bp.bridgeOrg||'')+'</b>'+((bp.bridgePerson&&bp.bridgePerson.name)?' ('+esc(bp.bridgePerson.name)+')':'')+' for a warm introduction into the consortium.</div>';
  }
  return '<div style="font-size:13px;color:var(--muted)">COLD — no existing contact in this consortium. Best cold approach: the coordinator, <b>'+esc((c.coordinator||{}).name||'')+'</b>. Apollo for the comms/PM lead.</div>';
}

/* ---------- consortium hub-and-spoke SVG ---------- */
function consortiumGraph(c){
  const parts=(c.consortium||[]); const n=parts.length; if(!n) return '';
  const W=480,H=380,cx=W/2,cy=H/2, ring=Math.min(150,120+n*1.5);
  const maxec=Math.max(1,...parts.map(p=>p.ec));
  let svg='<svg class="cg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  // spokes first
  parts.forEach((p,i)=>{ const a=-Math.PI/2+i/n*2*Math.PI; const x=cx+Math.cos(a)*ring, y=cy+Math.sin(a)*ring;
    const warm=p.path&&p.path.type==='direct'; svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+(warm?'#0CA30C':'#e3e1da')+'" stroke-width="'+(warm?2:1)+'"/>'; });
  // centre = project
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="26" fill="'+LIGHT_C[c.comms.light]+'" fill-opacity="0.2" stroke="'+LIGHT_C[c.comms.light]+'" stroke-width="2"/>';
  svg+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="11" font-weight="800" fill="#1C2529">'+esc((c.acronym||'').slice(0,10))+'</text>';
  // nodes
  parts.forEach((p,i)=>{ const a=-Math.PI/2+i/n*2*Math.PI; const x=cx+Math.cos(a)*ring, y=cy+Math.sin(a)*ring;
    const rr=7+11*Math.sqrt(p.ec/maxec); const warm=p.path&&(p.path.type==='direct'||p.path.type==='1hop');
    // green ring = a DIRECT door (we actually know someone here); thickness = link strength.
    // 1-hop orgs stay plain — the bridge story shows when you click them.
    const ringw=p.path&&p.path.type==='direct'?Math.max(2.5,Math.min(7,(p.path.strength||0)/14)):0;
    const fill=p.role==='coordinator'?'#1C2529':'#8a9096';
    svg+='<g class="node" data-cgnode="'+i+'"><circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rr.toFixed(1)+'" fill="'+fill+'" '+
      (ringw?'stroke="#0CA30C" stroke-width="'+ringw.toFixed(1)+'"':'stroke="#fff" stroke-width="1"')+'>'+
      '<title>'+esc((p.role==='coordinator'?'★ ':'')+p.name+' · '+p.country+' · '+pmoney(p.ec)+(warm?' · we have a path here':''))+'</title></circle>'+
      (p.role==='coordinator'?'<text x="'+x.toFixed(1)+'" y="'+(y-rr-3).toFixed(1)+'" text-anchor="middle" font-size="10" fill="#1C2529">★</text>':'')+
      '</g>'; });
  svg+='</svg>';
  return svg;
}
function projNodePop(i){
  const r=PROJ.get(POPEN); if(!r) return; const p=(r.computed.consortium||[])[i]; if(!p) return;
  PNODE=i; const el=document.getElementById('cgpop'); if(!el) return;
  const pt=p.path||{type:'cold'};
  let inner='<b>'+esc(p.name)+'</b> <span style="color:var(--muted)">· '+esc(p.country)+' · '+esc(p.role)+' · '+pmoney(p.ec)+'</span>';
  if(pt.type==='direct'&&pt.people&&pt.people.length){
    inner+='<div style="margin-top:6px;font-size:12.5px">'+pt.people.slice(0,4).map(pe=>'• <b>'+esc(pe.name)+'</b> <span style="color:var(--muted)">'+esc(pe.role||'')+(pe.lastTouch?' · '+esc(pe.lastTouch):'')+'</span> <span class="pathpill direct">link '+Math.round(pe.strength)+'</span>').join('<br>')+'</div>'+
      '<div class="why" style="margin-top:7px">First move: warm intro to '+esc(pt.people[0].name)+' — offer the dissemination work package.</div>';
  } else if(pt.type==='1hop'){
    inner+='<div class="why" style="margin-top:7px">1-hop — ask our contact at '+esc(pt.bridgeOrg||'a partner we know')+' for an introduction.</div>';
  } else {
    inner+='<div style="margin-top:6px;font-size:12.5px;color:var(--muted)">No contact here yet — cold. Apollo for the comms/PM lead.</div>';
  }
  el.innerHTML='<div class="cgpop">'+inner+'</div>';
}
function projAddNote(){ const el=document.getElementById('pnote'); PROJ.addNote(POPEN,el.value); renderProjectPanel(); }
function projMakeDeal(){
  const r=PROJ.get(POPEN); if(!r) return; const c=r.computed;
  // strongest-path CRM contact; if only a targeting person exists, create the contact
  let contactId=null, pers=null;
  const bp=c.bestPath;
  if(bp&&bp.type==='direct'&&bp.people&&bp.people.length){
    pers=bp.people.slice().sort((a,b)=>b.strength-a.strength)[0];
    if(pers.crmId!=null && CRM.contact(pers.crmId)) contactId=pers.crmId;
  }
  if(contactId==null && pers){
    const nc=CRM.addContact({name:pers.name||'(consortium contact)', org:bp.org||'', email:pers.email||'',
      intent:'project', persona:'comms', tags:['EU project',c.acronym,'From Projects']});
    contactId=nc.id;
  }
  if(contactId==null){ // cold — seed a sensible placeholder contact
    let nm, org;
    if(isCall(c)){ const b=(c.predictedBidders||[])[0];
      org=b?b.orgKey.toLowerCase().replace(/\b\w/g,m=>m.toUpperCase()):c.acronym; nm=org+' — bid lead'; }
    else { nm=(c.coordinator||{}).name||c.acronym+' coordinator'; org=(c.coordinator||{}).name||''; }
    const nc=CRM.addContact({name:nm, org:org, country:(c.coordinator||{}).country||'',
      intent:'project', persona:isCall(c)?'coordinator':'coordinator', tags:['EU project',c.acronym,isCall(c)?'Open call':'From Projects']});
    contactId=nc.id;
  }
  const deals=CRM.data.deals; const nd=CRM.data.nextD||(Math.max(0,...deals.map(d=>d.id))+1);
  if(deals.some(d=>d.title===c.acronym+' — dissemination (DCE)')){ alert('A deal for '+c.acronym+' already exists in the Pipeline.'); return; }
  deals.push({id:nd, contactId, title:c.acronym+' — dissemination (DCE)', value:45000, stage:'identified'});
  CRM.data.nextD=nd+1; CRM.save();
  PROJ.setStatus(POPEN,'pursuing');
  alert('Added “'+c.acronym+' — dissemination (DCE)” (€45,000, Identified) to your Pipeline, linked to '+ (CRM.contact(contactId)||{}).name +'.');
  renderProjectPanel();
}
