<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — Invoicing</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--purple:#8E5BC9;--green:#3E8C28;--amber:#C77800;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 90px;max-width:1500px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  button{font:inherit;cursor:pointer}
  .btn{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);font-size:13px}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.sm{padding:3px 9px;font-size:12px}
  .btn:hover{filter:brightness(.97)}
  .btn:disabled{opacity:.55;cursor:default}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 8px;font-size:15px}
  .hint{font-size:12px;color:var(--muted);font-weight:400}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .cardk{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:120px}
  .cardk .v{font-size:18px;font-weight:800;color:var(--charcoal);font-variant-numeric:tabular-nums}
  .cardk .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .flt{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .flt input,.flt select{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:7px}
  .tblwrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  td,th{text-align:left;padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap}
  th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.abono td{background:#EFE3FB}   /* invoice-level colour: Abono = purple */
  tr.cancelado td{background:#F8D7D7} /* Cancelado = red */
  td select.inl{font-size:11.5px;padding:2px 4px;border:1px solid var(--line);border-radius:6px}
  .allocchip{display:inline-block;background:#f0eee8;border:1px solid var(--line);border-radius:10px;padding:1px 8px;font-size:11px;margin:1px 2px}
  .stbadge{display:inline-block;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
  .del{border:none;background:none;color:#c9c6bd;font-size:14px;cursor:pointer}
  .del:hover{color:var(--red)}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:999;display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:14px 12px}
  #modal.on{display:flex}
  #modal .card{background:#fff;border-radius:14px;padding:14px 20px 16px;width:1160px;max-width:97vw}
  #modal h3{margin:0 0 8px;font-size:16px}
  .frm{display:grid;grid-template-columns:repeat(6,1fr);gap:5px 9px}
  .frm label{font-size:9.5px;color:var(--muted);display:flex;flex-direction:column;gap:2px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden}
  .frm label.w2{grid-column:span 2}
  .frm label.w3{grid-column:span 3}
  .frm label.w4{grid-column:1/-1}
  .frm input,.frm select{font:inherit;font-size:12.5px;padding:4px 7px;border:1px solid var(--line);border-radius:7px;color:var(--ink);min-width:0}
  .frm input[readonly]{background:#f6f5f1;color:var(--muted)}
  .mrow{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;align-items:center}
  .amsg{margin-right:auto;font-size:12px;min-height:15px}
  .lntbl td,.lntbl th{padding:2px 5px}
  .lntbl input,.lntbl select{font:inherit;font-size:12.5px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;width:100%}
  .lntbl input.auto{background:#eef4ff;border-color:#cfe0f7;color:#185FA5;font-weight:600}
  .sect{grid-column:1/-1;border-top:1px solid var(--line);padding-top:5px;margin-top:1px;font-size:10.5px;font-weight:700;color:var(--charcoal);text-transform:uppercase;letter-spacing:.5px}
  .totbox{background:#faf9f6;border:1px solid var(--line);border-radius:10px;padding:10px 14px;min-width:290px}
  .totline{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:3px 0;font-size:13px}
  .totline.big{font-size:15px;font-weight:700;color:var(--charcoal);border-top:1px solid var(--line);margin-top:4px;padding-top:8px}
  .totline input,.totline select{font:inherit;font-size:12.5px;padding:3px 6px;border:1px solid var(--line);border-radius:6px}
  .draftbar{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;border-radius:10px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>🧾 Invoicing</h1>
  <p class="sub">The invoicing engine — every euro starts life here as an invoice line. Lines cascade into the 💶 Money figures, the per-event delegate lists (catering) and sales attribution. Every change is recorded.</p>
  <div id="warnbox"></div>
  <div id="draftbox"></div>
  <div id="content"></div>
</div>

<div id="modal"><div class="card"><div id="modalbody"></div></div></div>

<script src="store.js?v=67"></script>
<script>
document.getElementById('nav').innerHTML=navBar('fact');
let editingId=null, allocRows=[], flt={item:'all',prod:'all',status:'all',text:'',from:'',to:''}, showCodigos=false;
const todayISO=()=>toISO(new Date());
/* European display format DD/MM/YYYY (inputs stay type=date; this is for tables/exports) */
function ddmmyyyy(iso){if(!iso)return '';const p=(''+iso).slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:(''+iso);}
function actorName(){const u=DB.currentUser;return u?(u.name||u.email||''):'';}
function finById(id){return DB.finance.find(f=>f.id==id);}
/* clean event label — no location (Jesús: "Invest Italia 2026", not "· Milan"; keeps Excel exports clean) */
function finLabelClean(f){return f?((f.name||'?')+' '+(f.year||'')).replace(/\s+/g,' ').trim():'';}
function eurF(n){return finFmt(n);}
function num2(v){return Math.round((+v||0)*100)/100;}
function isAbono(i){return i.producto==='abono'||i.status==='abono';}
function cobrado(i){if(i.importe_cobrado!=null&&i.importe_cobrado!=='')return +i.importe_cobrado;return i.status==='pagado'?(+i.total_factura||0):0;}
/* items ordered BY CÓDIGO, shown código-first — Jesús's A5: "(01) Webinars … (70316) Chile 26" */
function codsSorted(){return DB.codigos.slice().sort((a,b)=>(''+(a.codigo||'')).localeCompare(''+(b.codigo||''),undefined,{numeric:true}));}
function codLabel(c){return c.codigo?('('+c.codigo+') '+(c.item||'#'+c.id)):((c.item||'#'+c.id)+' — código pending');}
/* credit notes carry their OWN sequence — R1, R2, R3… (Jesús Q7) */
function nextRNumber(){let mx=0;DB.invoices.forEach(i=>{const m=/^R(\d+)$/i.exec((i.numero_factura||'').trim());if(m)mx=Math.max(mx,+m[1]);});return 'R'+(mx+1);}
/* per-line amount = Qty × Price (the maths does itself — Jesús's model) */
function lineAmount(r){return num2((+r.qty||0)*(+r.price||0));}
function lineHasData(r){return lineAmount(r)!==0||(+r.passes||0)!==0||(+r.amount||0)!==0;}
/* line product with legacy fallback: pre-2.0 alloc rows have no producto of their own */
function lineProd(a,inv){return a.producto||(inv?inv.producto:'')||'';}
function invPasses(i){return DB.allocsFor(i.id).reduce((s,a)=>s+(+a.passes||0),0);}
/* Σ net of every live invoice linked to an SPX contract — the A11 check reads this */
function linkedNet(propId,exceptId){return DB.invoices.filter(x=>x.spxProposalId==propId&&x.status!=='cancelado'&&x.id!=exceptId).reduce((s,x)=>s+(+x.importe_base||0),0);}

/* ---------- main render ---------- */
function render(){
  const W=document.getElementById('warnbox'),C=document.getElementById('content');
  if(!DB.canBill()){
    C.innerHTML='<div class="panel"><h3>🔒 Billing only</h3><p class="hint">This area is for the invoicing editor (billing permission) and admins. '+
      'The figures it produces are visible to everyone in 💶 Money and the event delegate lists.</p></div>';W.innerHTML='';return;
  }
  W.innerHTML=(DB.billReady()?'':'<div class="warn">The invoicing module is not active yet — run <b>dispatch_facturacion.sql</b> in the Supabase SQL editor, then reload. You can look around, but nothing will save.</div>')+
    (DB.billReady()&&window._inv2Ready===false?'<div class="warn">Invoicing 2.0 line details (product · qty · price per line) will not persist until <b>dispatch_invoicing2.sql</b> is run in Supabase. Amounts, códigos and passes still save fine.</div>':'');
  renderDraftBar();
  const rows=filtered();
  /* cancelled invoices are OUT of every card (they were inflating Net/Total while the
     € Dashboard correctly excluded them — the two screens disagreed) */
  const live=rows.filter(i=>i.status!=='cancelado');
  const base=live.reduce((a,i)=>a+(+i.importe_base||0),0), tot=live.reduce((a,i)=>a+(+i.total_factura||0),0);
  const cob=live.reduce((a,i)=>a+cobrado(i),0);
  const pend=live.reduce((a,i)=>a+Math.max(0,(+i.total_factura||0)-cobrado(i)),0);
  /* the item filter lists only items actually used in an analítica (E1) — so Webinars/ATA are filterable too */
  const usedIds={};DB.invoiceAllocs.forEach(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);if(c)usedIds[c.id]=1;});
  const itemOpts=codsSorted().filter(c=>usedIds[c.id]).map(c=>'<option value="'+c.id+'" '+(flt.item==c.id?'selected':'')+'>'+esc(codLabel(c))+'</option>').join('');
  C.innerHTML=
    '<div class="cards">'+
      '<div class="cardk"><div class="v">'+rows.length+'</div><div class="k">Invoices</div></div>'+
      '<div class="cardk"><div class="v">'+eurF(base)+'</div><div class="k">Net</div></div>'+
      '<div class="cardk"><div class="v">'+eurF(tot)+'</div><div class="k">Total (incl. VAT)</div></div>'+
      '<div class="cardk"><div class="v" style="color:var(--green)">'+eurF(cob)+'</div><div class="k">Collected</div></div>'+
      '<div class="cardk"><div class="v" style="color:'+(pend>0?'var(--red)':'var(--charcoal)')+'">'+eurF(pend)+'</div><div class="k">Outstanding</div></div>'+
    '</div>'+
    '<div class="panel"><h3>Invoices <button class="btn primary sm" id="addInv">+ New invoice</button> <button class="btn sm" id="addCredit" title="Pick an invoice → total or partial → it is created automatically in negative, numbered R1, R2, R3…">+ Credit note</button> <button class="btn sm" id="cfgCod">⚙ Items &amp; codes</button> <button class="btn sm" id="xls" title="Download the invoices under the current filters + an Analítica sheet (one row per line: product · item · código · qty · price)">⬇ Excel</button></h3>'+
    '<div class="flt">'+
      '<select id="f_item"><option value="all">— item —</option>'+itemOpts+'</select>'+
      '<select id="f_prod"><option value="all">— product —</option>'+PRODUCTOS.map(p=>'<option value="'+p+'" '+(flt.prod===p?'selected':'')+'>'+PRODUCTO_LABEL[p]+'</option>').join('')+'</select>'+
      '<select id="f_st"><option value="all">— status —</option>'+Object.keys(INV_STATUS).map(s=>'<option value="'+s+'" '+(flt.status===s?'selected':'')+'>'+INV_STATUS[s]+'</option>').join('')+'</select>'+
      '<input id="f_txt" placeholder="search: company, invoice nº, order, comment…" value="'+esc(flt.text)+'" style="width:250px">'+
      '<span class="hint">from</span><input id="f_from" type="date" value="'+flt.from+'"><span class="hint">to</span><input id="f_to" type="date" value="'+flt.to+'">'+
      '<button class="btn sm" id="f_clear">clear</button>'+
      '<span class="hint" style="margin-left:auto"><span class="allocchip" style="background:#EFE3FB">credit note</span><span class="allocchip" style="background:#F8D7D7">cancelled</span></span>'+
    '</div>'+
    '<div class="tblwrap"><table id="itbl"></table></div>'+
    '<p class="hint">Sorted by date, then invoice nº. When you save a <b>tickets</b> or <b>sponsorship</b> invoice with passes on an event line, its seats appear automatically on the event&#39;s delegate list (yellow until a name is filled in). <b>Cancelled</b> only happens through a total credit note — never by hand.</p></div>'+
    (showCodigos?codigosPanel():'');
  renderTable(rows);
  document.getElementById('addInv').onclick=()=>openModal(null);
  document.getElementById('addCredit').onclick=openCreditPicker;
  document.getElementById('cfgCod').onclick=()=>{showCodigos=!showCodigos;render();};
  document.getElementById('xls').onclick=exportExcel;
  const set=(id,k)=>{const el=document.getElementById(id);el.onchange=()=>{flt[k]=el.value;render();};};
  set('f_item','item');set('f_prod','prod');set('f_st','status');set('f_from','from');set('f_to','to');
  const tx=document.getElementById('f_txt');tx.oninput=()=>{flt.text=tx.value;renderTable(filtered());};
  document.getElementById('f_clear').onclick=()=>{flt={item:'all',prod:'all',status:'all',text:'',from:'',to:''};render();};
  if(showCodigos)wireCodigos();
}
function filtered(){
  const t=(flt.text||'').toLowerCase();
  return DB.invoices.filter(i=>{
    if(flt.item!=='all'&&!DB.allocsFor(i.id).some(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);return c&&c.id==flt.item;}))return false;
    if(flt.prod!=='all'&&i.producto!==flt.prod&&!DB.allocsFor(i.id).some(a=>a.producto===flt.prod))return false;
    if(flt.status!=='all'&&i.status!==flt.status)return false;
    if(flt.from&&(i.fecha||'')<flt.from)return false;
    if(flt.to&&(i.fecha||'')>flt.to)return false;
    if(t&&!([i.razon_social,i.numero_factura,i.pedido,i.comentarios,i.entered_by,i.codigo_contable,i.producto].join(' ').toLowerCase().includes(t)))return false;
    return true;
  }).sort((a,b)=>((a.fecha||'').localeCompare(b.fecha||''))||((a.numero_factura||'').localeCompare(b.numero_factura||'',undefined,{numeric:true})));
}
/* which products live on an invoice — line products first, invoice product as legacy fallback */
function prodCell(i){
  const set={},out=[];
  DB.allocsFor(i.id).forEach(a=>{const p=lineProd(a,i);if(p&&!set[p]){set[p]=1;out.push(PRODUCTO_LABEL[p]||p);}});
  if(!out.length&&i.producto)out.push(PRODUCTO_LABEL[i.producto]||i.producto);
  return out.join(' + ');
}
function renderTable(rows){
  let h='<tr><th>Invoice nº</th><th>Date</th><th>Due date</th><th>Company</th><th>Product</th><th class="num">Passes</th><th class="num">Subtotal €</th><th class="num">Subtotal $</th><th class="num">VAT</th><th class="num">Total</th><th>Status</th><th>Contract salesperson</th><th>Analítica (item · código)</th><th>Comments</th><th>Entered by</th><th style="width:50px"></th></tr>';
  if(!rows.length)h+='<tr><td colspan="16" class="hint" style="white-space:normal">No invoices'+(DB.invoices.length?' under these filters.':' yet — create the first one with “+ New invoice”.')+'</td></tr>';
  rows.forEach(i=>{
    const allocs=DB.allocsFor(i.id);
    const chips=allocs.map(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);const f=finById(a.eventId);
      const label=c?(esc(c.item||'?')+(c.codigo?' · '+esc(c.codigo):'')):(f?esc(finLabelClean(f)):('#'+(a.eventId||'?')));
      return '<span class="allocchip">'+label+' · '+eurF(a.amount)+((+a.passes||0)?' · '+a.passes+'🎟':'')+'</span>';}).join('')||'<span class="hint">—</span>';
    /* C2: Cancelled is NOT offered by hand — it only arrives via a total credit note */
    const stOpts=Object.keys(INV_STATUS).filter(s=>s!=='cancelado'||i.status==='cancelado');
    const stSel='<select class="inl" data-st="'+i.id+'" '+(i.status==='cancelado'?'disabled title="Cancelled via credit note — final"':'')+'>'+stOpts.map(s=>'<option value="'+s+'" '+(i.status===s?'selected':'')+'>'+INV_STATUS[s]+'</option>').join('')+'</select>';
    const passes=invPasses(i);
    h+='<tr class="'+(i.status==='abono'?'abono':i.status==='cancelado'?'cancelado':'')+'">'+
      '<td><b>'+esc(i.numero_factura||'')+'</b>'+(i.abono_de?' <span class="hint" title="credit note for invoice '+esc((DB.invoice(i.abono_de)||{}).numero_factura||'#'+i.abono_de)+'">↩</span>':'')+'</td>'+
      '<td>'+ddmmyyyy(i.fecha)+'</td><td>'+ddmmyyyy(i.vencimiento)+'</td><td style="white-space:normal">'+esc(i.razon_social||'')+'</td>'+
      '<td>'+prodCell(i)+'</td>'+
      '<td class="num">'+(passes?passes:'<span class="hint">—</span>')+'</td>'+
      '<td class="num">'+eurF(i.importe_base)+'</td>'+
      '<td class="num">'+(i.en_usd&&i.importe_usd!=null&&i.importe_usd!==''?'$'+(+i.importe_usd).toFixed(2):'<span class="hint">—</span>')+'</td>'+
      '<td class="num">'+eurF(i.iva_importe)+' <span class="hint">'+(i.iva_pct!=null?i.iva_pct+'%':'')+'</span></td>'+
      '<td class="num"><b>'+eurF(i.total_factura)+'</b></td>'+
      '<td>'+stSel+'</td>'+
      '<td style="white-space:normal">'+contractOwnerCell(i)+'</td>'+
      '<td style="white-space:normal">'+chips+'</td>'+
      '<td style="white-space:normal;max-width:180px;overflow:hidden;text-overflow:ellipsis" title="'+esc(i.comentarios||'')+'">'+esc(i.comentarios||'')+'</td>'+
      '<td>'+esc(i.entered_by||'')+'</td>'+
      '<td><button class="btn sm" data-edit="'+i.id+'">✎</button><button class="del" data-kill="'+i.id+'" title="Delete (recoverable from the audit log)">×</button></td></tr>';
  });
  document.getElementById('itbl').innerHTML=h;
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openModal(DB.invoice(b.dataset.edit)));
  document.querySelectorAll('[data-ctr]').forEach(b=>{b.onclick=e=>{e.stopPropagation();openModal(DB.invoice(b.dataset.ctr));};});
  document.querySelectorAll('[data-st]').forEach(s=>s.onchange=()=>{
    const i=DB.invoice(s.dataset.st);if(!i)return;
    if(s.value==='abono'&&!(''+(i.numero_factura||'')).toUpperCase().startsWith('R')){alert('A credit note must have an invoice number starting with R — use “+ Credit note”.');s.value=i.status;return;}
    i.status=s.value;
    if(i.status==='pagado'){if(!i.fecha_cobro)i.fecha_cobro=todayISO();}
    else i.fecha_cobro=null; // leaving Paid clears the stamp — a stale one made SPX count it as paid forever
    DB.save();render();
  });
  document.querySelectorAll('[data-kill]').forEach(b=>b.onclick=()=>{
    const i=DB.invoice(b.dataset.kill);if(!i)return;
    const dl=DB.delegates.filter(d=>d.invoice_id==i.id).length;
    if(!confirm('Delete invoice '+(i.numero_factura||'')+' with its analítica lines'+(dl?' and its '+dl+' delegate seats':'')+'? (recoverable from the audit log)'))return;
    DB.data.invoices=DB.invoices.filter(x=>x.id!=i.id);
    DB.data.invalloc=DB.invoiceAllocs.filter(a=>a.invoice_id!=i.id);
    DB.data.delegates=DB.delegates.filter(d=>d.invoice_id!=i.id);
    DB.save();render();
  });
}

/* Contract salesperson — derived from the SPX link (the "who sold it" Jesús kept, B1).
   A11: the ⚠ now compares the CONTRACT VALUE vs the linked invoices' net — warn only, never block. */
function contractOwnerCell(i){
  if(!i.spxProposalId){
    if((i.producto==='sponsorship'||i.producto==='upgrade'||DB.allocsFor(i.id).some(a=>a.producto==='sponsorship'||a.producto==='upgrade'))&&i.status!=='cancelado')
      return '<button class="btn sm" data-ctr="'+i.id+'" title="Link this invoice to the contract the salesperson sent — mandatory for new SPX/upgrade invoices" style="color:#C77800">link contract</button>';
    return '<span class="hint">—</span>';
  }
  const p=(DB.spxProps||[]).find(x=>x.id==i.spxProposalId);
  if(!p)return '<span class="hint">#'+esc(''+i.spxProposalId)+'</span>';
  const owner=p.responsableName||p.responsable||'';
  const cVal=+p.valueEur||0;
  const invTot=linkedNet(i.spxProposalId,null);
  if(cVal&&Math.abs(invTot-cVal)>0.01)

  return esc(owner||'—');
}

/* net from the lines; VAT/total off the accounting base (EUR — manual when USD) */
function calcTotals(){
  const usd=document.getElementById('m_usd').checked;
  const net=num2(allocRows.reduce((s,r)=>s+lineAmount(r),0));
  const baseEur=usd?(+document.getElementById('m_eur').value||0):net;
  const pct=+document.getElementById('m_iva').value||0;
  return {usd,net,baseEur,iva:num2(baseEur*pct/100),tot:num2(baseEur*(1+pct/100))};
}

    }

async function saveInvoice(){
  const $=id=>document.getElementById(id),msg=$('m_msg');
  const err=t=>{msg.style.color='var(--red)';msg.textContent=t;};
  const num=$('m_num').value.trim(),st=$('m_st').value;
  if(!num)return err('Invoice nº is missing.');
  if(!$('m_rs').value.trim())return err('Company name is missing.');
  const lines=allocRows.filter(lineHasData);
  if(!lines.length)return err('The invoice needs at least one line (product · qty · price).');
  if(lines.some(r=>!r.producto))return err('Every line needs a product.');
  /* analítica: every line MUST have an item (código contable) — mandatory */
  if(lines.some(r=>!r.codigoId))return err('Every line needs an item / código contable — it is mandatory.');
  /* duplicate invoice numbers are BLOCKED (also enforced by the DB unique index) */
  if(DB.invoices.some(x=>x.id!=editingId&&(x.numero_factura||'').trim().toLowerCase()===num.toLowerCase()))return err('That invoice nº already exists — duplicates are blocked.');
  const fecha=$('m_fecha').value;
  if(!fecha)return err('Date is missing.');
  const yr=+fecha.slice(0,4);
  if(yr>new Date().getFullYear())return err('The date cannot go beyond the current year.');
  if(yr<2020)return err('That date looks wrong ('+fecha.slice(0,4)+') — check the year.');
  /* A6: a due date before the invoice date is now blocked */
  if($('m_venc').value&&$('m_venc').value<fecha)return err('The due date cannot be before the invoice date.');
  if($('m_iva').value==='0'&&!$('m_motivo').value)return err('0% VAT: choose the reason (exempt / not subject / reverse charge / export).');
  const esAbono=(st==='abono');
  /* abonos must start with R (own sequence — use “+ Credit note” to get the next one) */
  if(esAbono&&!num.toUpperCase().startsWith('R'))return err('A credit note must start with R (e.g. '+nextRNumber()+').');
  if(!esAbono&&num.toUpperCase().startsWith('R')&&/^R\d+$/i.test(num))return err('R-numbers are reserved for credit notes.');
  /* A7: SPX & upgrade invoices must carry their contract */
  const needsSpx=lines.some(r=>r.producto==='sponsorship'||r.producto==='upgrade');
  if(needsSpx&&!$('m_spx').value&&!esAbono)return err('Sponsorship / upgrade invoices must be linked to their SPX contract — pick it under Contract.');
  const t=calcTotals();
  if(t.usd&&$('m_eur').value==='')return err('Invoiced in USD: type the final EUR figure for accounting in the totals box.');
  /* credit notes are stored NEGATIVE — everywhere downstream (Money, KPIs, Excel) sums
     them, so a positive abono would double-count revenue instead of reversing it. */
  if(esAbono&&t.net>0){
    allocRows.forEach(r=>{if((+r.price||0)>0)r.price=-Math.abs(+r.price);if((+r.passes||0)>0)r.passes=-Math.abs(+r.passes);});
    renderLines();
  }
  const t2=calcTotals();
  const baseEur=esAbono&&t2.baseEur>0?-Math.abs(t2.baseEur):t2.baseEur;
  /* invoice-level product, derived from the lines (legacy filters + the SPX crosswalk read it) */
  const lineProds=lines.map(r=>r.producto);
  const producto=esAbono?'abono':(lineProds.includes('sponsorship')?'sponsorship':lineProds.includes('upgrade')?'upgrade':lineProds.includes('tickets')?'tickets':lineProds[0]);
  stashDraft();   /* from here the network is involved — the draft survives any failure */
  const prev=editingId?Object.assign({},DB.invoice(editingId)):null;
  const row={
    id:editingId||DB.newId(),
    codigo_contable:(DB.codigoById(+lines[0].codigoId)||{}).codigo||null,
    producto,cantidad:null,
    tipo_pase:null,pase_cantidad:null,
    fecha,numero_factura:num,
    pedido:$('m_pedido').value.trim()||'N/A',
    vencimiento:$('m_venc').value||fecha,
    responsable_comercial:prev?prev.responsable_comercial:null, /* A10: field gone, legacy data preserved */
    spxProposalId:needsSpx&&$('m_spx').value?+$('m_spx').value:(prev?prev.spxProposalId:null),
    razon_social:$('m_rs').value.trim(),importe_base:baseEur,
    en_usd:t2.usd,
    importe_usd:t2.usd?(esAbono?-Math.abs(t2.net):t2.net):null,
    usd_rate:null,usd_rate_date:null,
    iva_pct:+$('m_iva').value,iva_motivo:$('m_iva').value==='0'?$('m_motivo').value:null,
    iva_importe:num2(baseEur*(+$('m_iva').value)/100),total_factura:num2(baseEur*(1+(+$('m_iva').value)/100)),
    descuento_pct:$('m_dto').value===''?null:+$('m_dto').value,
    status:st,
    fecha_cobro:st==='pagado'?((prev&&prev.fecha_cobro)||todayISO()):null,
    importe_cobrado:prev?(prev.importe_cobrado!=null?prev.importe_cobrado:null):null,
    metodo_pago:$('m_pago').value,
    comentarios:$('m_com').value.trim(),
    abono_de:esAbono&&$('m_abde').value?+$('m_abde').value:null,
    entered_by:$('m_by').value.trim()||actorName(),
  };
  if(editingId){const old=DB.invoice(editingId);Object.assign(old,row);}
  else DB.invoices.push(row);
  /* sync allocations: update kept rows, add new, drop removed */
  const keep={};
  lines.forEach(a=>{
    const c=DB.codigoById(+a.codigoId)||{};
    const evId=(c.eventId!=null&&c.eventId!=='')?+c.eventId:null; // RENMAD item → feeds the € Dashboard; Webinars/ATA/etc → null
    const codStr=c.codigo||a.codigo||'';
    const vals={eventId:evId,amount:lineAmount(a)||(+a.amount||0),passes:+a.passes||0,codigo:codStr,codigoId:+a.codigoId,
      producto:a.producto||null,tipo_pase:a.producto==='tickets'?(a.tipo_pase||null):null,
      qty:a.qty===''||a.qty==null?null:+a.qty,price:a.price===''||a.price==null?null:+a.price};
    if(a.id){const ex=DB.invoiceAllocs.find(x=>x.id==a.id);if(ex){Object.assign(ex,vals);keep[ex.id]=1;return;}}
    const na=Object.assign({id:DB.newId(),invoice_id:row.id},vals);
    DB.invoiceAllocs.push(na);keep[na.id]=1;
  });
  DB.data.invalloc=DB.invoiceAllocs.filter(x=>x.invoice_id!=row.id||keep[x.id]);
  /* C2: a TOTAL credit note cancels its invoice automatically — the only road to Cancelled */
  let cancelledOriginal=null;
  if(esAbono&&row.abono_de){
    const orig=DB.invoice(row.abono_de);
    if(orig&&orig.status!=='cancelado'&&Math.abs(Math.abs(baseEur)-Math.abs(+orig.importe_base||0))<=0.01){
      orig.status='cancelado';orig.fecha_cobro=null;cancelledOriginal=orig.numero_factura;
    }
  }
  syncDelegates(row);
  /* audit Critical 3: WAIT for the database before telling anyone it saved */
  const btn=$('m_save');btn.disabled=true;btn.textContent='Saving…';msg.style.color='var(--muted)';msg.textContent='Saving…';
  const ok=await DB.saveNow();
  btn.disabled=false;btn.textContent='Save';
  if(!ok){err('Could not save — your draft is kept.');return;}
  clearDraft();
  closeModal();render();
  if(cancelledOriginal)alert('Invoice '+cancelledOriginal+' is now Cancelled — covered by this total credit note '+num+'.');
}

/* ---------- C1: + Credit note — pick invoice → total or partial → auto-negative draft ---------- */
function openCreditPicker(){
  const cands=DB.invoices.filter(i=>i.status!=='cancelado'&&i.status!=='abono'&&i.producto!=='abono')
    .sort((a,b)=>((b.fecha||'').localeCompare(a.fecha||'')));
  document.getElementById('modalbody').innerHTML=
    '<h3>+ Credit note</h3>'+
    '<p class="hint" style="margin:0 0 10px">Pick the invoice to credit. A <b>total</b> credit note reverses everything and marks the invoice Cancelled; a <b>partial</b> one auto-splits money, passes and lines proportionally — and you can still edit every line before saving.</p>'+
    '<div class="frm" style="grid-template-columns:repeat(2,1fr)">'+
    '<label class="w2">Invoice to credit *<select id="cn_inv"><option value="">—</option>'+cands.map(x=>'<option value="'+x.id+'">'+esc(x.numero_factura||('#'+x.id))+' · '+esc(x.razon_social||'')+' · '+eurF(x.importe_base)+'</option>').join('')+'</select></label>'+
    '<label>Type<select id="cn_type"><option value="total">Total — reverses everything, cancels the invoice</option><option value="partial">Partial — you set the amount</option></select></label>'+
    '<label id="cn_amtl" style="display:none">Net amount to credit €<input id="cn_amt" type="number" step="any" min="0"></label>'+
    '</div>'+
    '<div class="mrow"><span class="amsg" id="cn_msg"></span><button class="btn" id="cn_cancel">Cancel</button><button class="btn primary" id="cn_go">Create draft →</button></div>';
  document.getElementById('modal').classList.add('on');
  const $=id=>document.getElementById(id);
  $('cn_type').onchange=()=>{$('cn_amtl').style.display=$('cn_type').value==='partial'?'':'none';};
  $('cn_cancel').onclick=closeModal;
  $('cn_go').onclick=()=>{
    const inv=DB.invoice($('cn_inv').value);
    if(!inv){$('cn_msg').style.color='var(--red)';$('cn_msg').textContent='Pick the invoice to credit.';return;}
    const total=$('cn_type').value==='total';
    const origNet=Math.abs(+inv.importe_base||0);
    let credit=total?origNet:Math.abs(+$('cn_amt').value||0);
    if(!credit){$('cn_msg').style.color='var(--red)';$('cn_msg').textContent='Enter the net amount to credit.';return;}
    if(credit>origNet+0.01){$('cn_msg').style.color='var(--red)';$('cn_msg').textContent='That is more than the invoice net ('+eurF(origNet)+').';return;}
    const ratio=origNet?credit/origNet:1;
    /* proportional lines, negated — then fully editable (Jesús Q8) */
    const lines=rowsFromInvoice(inv).map(r=>{
      const q=+r.qty||1;
      const scaledAmt=num2(lineAmount(r)*ratio);
      return Object.assign({},r,{id:null,price:-num2(scaledAmt/q),passes:-(Math.round((+r.passes||0)*ratio)),amount:-scaledAmt});
    }).filter(r=>lineAmount(r)!==0||(+r.passes||0)!==0);
    openModal(null,{title:'New credit note for '+esc(inv.numero_factura||''),lines,fields:{
      numero_factura:nextRNumber(),fecha:todayISO(),vencimiento:todayISO(),
      razon_social:inv.razon_social,pedido:inv.pedido,en_usd:!!inv.en_usd,
      importe_base:inv.en_usd?-num2(credit):'',
      iva_pct:inv.iva_pct!=null?inv.iva_pct:21,iva_motivo:inv.iva_motivo||'',
      status:'abono',metodo_pago:'abono',abono_de:inv.id,spxProposalId:inv.spxProposalId||'',
      comentarios:(total?'Total':'Partial')+' credit note for '+(inv.numero_factura||'')}});
  };
}

/* tickets & sponsorship: top the event's delegate rows up to each line's pass count
   (never duplicates on re-save; extra rows are left alone — remove them on the event page). */
function syncDelegates(inv){
  if(inv.status==='cancelado'||inv.status==='abono')return;
  if(!(inv.producto==='tickets'||inv.producto==='sponsorship'))return;
  const src=inv.producto==='tickets'?'ticket':'sponsor';
  /* passes are summed PER EVENT first: two analítica lines on the same event (e.g. stand +
     extra passes) used to top up to the max of the two instead of the total. */
  const wantByEvent={};
  DB.allocsFor(inv.id).forEach(a=>{
    if(a.eventId==null||a.eventId==='')return; // non-event item (Webinars/ATA/…) → no delegate seats
    wantByEvent[a.eventId]=(wantByEvent[a.eventId]||0)+(+a.passes||0);
  });
  Object.keys(wantByEvent).forEach(evId=>{
    const want=wantByEvent[evId];if(want<=0)return;
    const have=DB.delegates.filter(d=>d.invoice_id==inv.id&&d.eventId==evId).length;
    for(let k=have;k<want;k++){
      DB.delegates.push({id:DB.newId(),eventId:+evId,source:src,invoice_id:inv.id,
        sponsor_name:src==='sponsor'?(inv.razon_social||''):null,
        name:'',email:'',company:src==='ticket'?(inv.razon_social||''):'',job_title:'',
        seller:inv.responsable_comercial||null,crm_tagged:false,materials_sent:false,
        added_by:'invoicing · '+(inv.entered_by||''),notes:''});
    }
  });
}

/* ---------- Excel (billing-only by construction — this whole page is canBill-gated) ---------- */
function exportExcel(){
  const list=filtered();
  exportXLSX('RENMAD_invoices_'+todayISO()+'.xlsx',[
    {name:'Invoices',rows:list.map(i=>({
      'Invoice nº':i.numero_factura||'',
      'Date':ddmmyyyy(i.fecha),
      'Due date':ddmmyyyy(i.vencimiento),
      'Company':i.razon_social||'',
      'Product':prodCell(i),
      'Passes':invPasses(i)||'',
      'Subtotal €':+i.importe_base||0,
      'Subtotal $ (USD)':(i.en_usd&&i.importe_usd!=null&&i.importe_usd!=='')?+i.importe_usd:'',
      'VAT %':i.iva_pct!=null?+i.iva_pct:'',
      'VAT €':+i.iva_importe||0,
      'Total €':+i.total_factura||0,
      'Status':INV_STATUS[i.status]||i.status||'',
      'Contract salesperson':(function(){const p=i.spxProposalId?(DB.spxProps||[]).find(x=>x.id==i.spxProposalId):null;return p?(p.responsableName||p.responsable||''):'';})(),
      'Comments':i.comentarios||'',
      'Entered by':i.entered_by||''
    }))},
    {name:'Analítica',rows:list.flatMap(i=>DB.allocsFor(i.id).map(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);const f=finById(a.eventId);return{
      'Invoice nº':i.numero_factura||'',
      'Order (pedido)':(i.pedido&&i.pedido!=='N/A')?i.pedido:'',
      'Company (razón social)':i.razon_social||'',
      'Product':PRODUCTO_LABEL[lineProd(a,i)]||lineProd(a,i)||'',
      'Item':c?(c.item||''):(f?finLabelClean(f):''),
      'Código contable':a.codigo||(c?(c.codigo||''):''),
      'Qty':a.qty!=null&&a.qty!==''?+a.qty:'',
      'Price':a.price!=null&&a.price!==''?+a.price:'',
      'Amount €':+a.amount||0,
      'Passes':+a.passes||0
    };}))}
  ]);
}
