<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — Invoicing</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--purple:#8E5BC9;--green:#3E8C28;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 90px;max-width:1500px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  button{font:inherit;cursor:pointer}
  .btn{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);font-size:13px}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.sm{padding:3px 9px;font-size:12px}
  .btn:hover{filter:brightness(.97)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 8px;font-size:15px}
  .hint{font-size:12px;color:var(--muted);font-weight:400}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .cardk{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:120px}
  .cardk .v{font-size:18px;font-weight:800;color:var(--charcoal);font-variant-numeric:tabular-nums}
  .cardk .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .flt{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .flt input,.flt select{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:7px}
  .tblwrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  td,th{text-align:left;padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap}
  th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.abono td{background:#EFE3FB}   /* invoice-level colour: Abono = purple */
  tr.cancelado td{background:#F8D7D7} /* Cancelado = red */
  td select.inl{font-size:11.5px;padding:2px 4px;border:1px solid var(--line);border-radius:6px}
  .allocchip{display:inline-block;background:#f0eee8;border:1px solid var(--line);border-radius:10px;padding:1px 8px;font-size:11px;margin:1px 2px}
  .stbadge{display:inline-block;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
  .del{border:none;background:none;color:#c9c6bd;font-size:14px;cursor:pointer}
  .del:hover{color:var(--red)}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:999;display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:14px 12px}
  #modal.on{display:flex}
  #modal .card{background:#fff;border-radius:14px;padding:14px 20px 16px;width:1120px;max-width:97vw}
  #modal h3{margin:0 0 8px;font-size:16px}
  .frm{display:grid;grid-template-columns:repeat(6,1fr);gap:5px 9px}
  .frm label{font-size:9.5px;color:var(--muted);display:flex;flex-direction:column;gap:2px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden}
  .frm label.w2{grid-column:span 2}
  .frm label.w3{grid-column:span 3}
  .frm label.w4{grid-column:1/-1}
  .frm input,.frm select{font:inherit;font-size:12.5px;padding:4px 7px;border:1px solid var(--line);border-radius:7px;color:var(--ink);min-width:0}
  .frm input[readonly]{background:#f6f5f1;color:var(--muted)}
  .mrow{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;align-items:center}
  .amsg{margin-right:auto;font-size:12px;min-height:15px}
  .alloctbl td,.alloctbl th{padding:2px 5px}
  .alloctbl input,.alloctbl select{font:inherit;font-size:12.5px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;width:100%}
  .sect{grid-column:1/-1;border-top:1px solid var(--line);padding-top:5px;margin-top:1px;font-size:10.5px;font-weight:700;color:var(--charcoal);text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>🧾 Invoicing</h1>
  <p class="sub">The invoicing engine — every euro starts life here as an invoice line. Lines cascade into the 💶 Money figures, the per-event delegate lists (catering) and sales attribution. Every change is recorded.</p>
  <div id="warnbox"></div>
  <div id="content"></div>
</div>

<div id="modal"><div class="card"><div id="modalbody"></div></div></div>

<script src="store.js?v=57"></script>
<script>
document.getElementById('nav').innerHTML=navBar('fact');
let editingId=null, allocRows=[], flt={ev:'all',prod:'all',status:'all',text:'',from:'',to:''}, showCodigos=false;
const todayISO=()=>toISO(new Date());
/* European display format DD/MM/YYYY (inputs stay type=date; this is for tables/exports) */
function ddmmyyyy(iso){if(!iso)return '';const p=(''+iso).slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:(''+iso);}
function actorName(){const u=DB.currentUser;return u?(u.name||u.email||''):'';}
function finSorted(){return DB.finance.slice().sort((a,b)=>(b.year-a.year)||(a.semester-b.semester)||(a.name||'').localeCompare(b.name||''));}
function finById(id){return DB.finance.find(f=>f.id==id);}
/* clean event label — no location (Jesús: "Invest Italia 2026", not "· Milan"; keeps Excel exports clean) */
function finLabelClean(f){return f?((f.name||'?')+' '+(f.year||'')).replace(/\s+/g,' ').trim():'';}
function eurF(n){return finFmt(n);}
function num2(v){return Math.round((+v||0)*100)/100;}
function isAbono(i){return i.producto==='abono'||i.status==='abono';}
function cobrado(i){if(i.importe_cobrado!=null&&i.importe_cobrado!=='')return +i.importe_cobrado;return i.status==='pagado'?(+i.total_factura||0):0;}

/* ---------- main render ---------- */
function render(){
  const W=document.getElementById('warnbox'),C=document.getElementById('content');
  if(!DB.canBill()){
    C.innerHTML='<div class="panel"><h3>🔒 Billing only</h3><p class="hint">This area is for the invoicing editor (billing permission) and admins. '+
      'The figures it produces are visible to everyone in 💶 Money and the event delegate lists.</p></div>';W.innerHTML='';return;
  }
  W.innerHTML=DB.billReady()?'':'<div class="warn">The invoicing module is not active yet — run <b>dispatch_facturacion.sql</b> in the Supabase SQL editor, then reload. You can look around, but nothing will save.</div>';
  const rows=filtered();
  /* cancelled invoices are OUT of every card (they were inflating Net/Total while the
     € Dashboard correctly excluded them — the two screens disagreed) */
  const live=rows.filter(i=>i.status!=='cancelado');
  const base=live.reduce((a,i)=>a+(+i.importe_base||0),0), tot=live.reduce((a,i)=>a+(+i.total_factura||0),0);
  const cob=live.reduce((a,i)=>a+cobrado(i),0);
  const pend=live.reduce((a,i)=>a+Math.max(0,(+i.total_factura||0)-cobrado(i)),0);
  C.innerHTML=
    '<div class="cards">'+
      '<div class="cardk"><div class="v">'+rows.length+'</div><div class="k">Invoices</div></div>'+
      '<div class="cardk"><div class="v">'+eurF(base)+'</div><div class="k">Net</div></div>'+
      '<div class="cardk"><div class="v">'+eurF(tot)+'</div><div class="k">Total (incl. VAT)</div></div>'+
      '<div class="cardk"><div class="v" style="color:var(--green)">'+eurF(cob)+'</div><div class="k">Collected</div></div>'+
      '<div class="cardk"><div class="v" style="color:'+(pend>0?'var(--red)':'var(--charcoal)')+'">'+eurF(pend)+'</div><div class="k">Outstanding</div></div>'+
    '</div>'+
    '<div class="panel"><h3>Invoices <button class="btn primary sm" id="addInv">+ New invoice</button> <button class="btn sm" id="cfgCod">⚙ Items &amp; codes</button> <button class="btn sm" id="xls" title="Download the invoices under the current filters + an Analítica sheet (item · código · pedido · razón social)">⬇ Excel</button></h3>'+
    '<div class="flt">'+
      '<select id="f_ev"><option value="all">— all events —</option>'+finSorted().map(f=>'<option value="'+f.id+'" '+(flt.ev==f.id?'selected':'')+'>'+esc(finLabelClean(f))+'</option>').join('')+'</select>'+
      '<select id="f_prod"><option value="all">— product —</option>'+PRODUCTOS.map(p=>'<option value="'+p+'" '+(flt.prod===p?'selected':'')+'>'+PRODUCTO_LABEL[p]+'</option>').join('')+'</select>'+
      '<select id="f_st"><option value="all">— status —</option>'+Object.keys(INV_STATUS).map(s=>'<option value="'+s+'" '+(flt.status===s?'selected':'')+'>'+INV_STATUS[s]+'</option>').join('')+'</select>'+
      '<input id="f_txt" placeholder="search: company, invoice nº, order, comment…" value="'+esc(flt.text)+'" style="width:250px">'+
      '<span class="hint">from</span><input id="f_from" type="date" value="'+flt.from+'"><span class="hint">to</span><input id="f_to" type="date" value="'+flt.to+'">'+
      '<button class="btn sm" id="f_clear">clear</button>'+
      '<span class="hint" style="margin-left:auto"><span class="allocchip" style="background:#EFE3FB">credit note</span><span class="allocchip" style="background:#F8D7D7">cancelled</span></span>'+
    '</div>'+
    '<div class="tblwrap"><table id="itbl"></table></div>'+
    '<p class="hint">Sorted by date, then invoice nº. When you save a <b>tickets</b> or <b>sponsorship</b> invoice with passes assigned, its seats appear automatically on the event&#39;s delegate list (yellow until a name is filled in).</p></div>'+
    (showCodigos?codigosPanel():'');
  renderTable(rows);
  document.getElementById('addInv').onclick=()=>openModal(null);
  document.getElementById('cfgCod').onclick=()=>{showCodigos=!showCodigos;render();};
  document.getElementById('xls').onclick=()=>{
    const list=filtered();
    exportXLSX('RENMAD_invoices_'+todayISO()+'.xlsx',[
      {name:'Invoices',rows:list.map(i=>({
        'Invoice nº':i.numero_factura||'',
        'Date':ddmmyyyy(i.fecha),
        'Company':i.razon_social||'',
        'Product':PRODUCTO_LABEL[i.producto]||i.producto||'',
        'Pass type':i.producto==='tickets'&&i.tipo_pase?(i.tipo_pase+((+i.pase_cantidad||0)>1?' ×'+i.pase_cantidad:'')):'',
        'Subtotal €':+i.importe_base||0,
        'Subtotal $ (USD)':(i.en_usd&&i.importe_usd!=null&&i.importe_usd!=='')?+i.importe_usd:'',
        'VAT %':i.iva_pct!=null?+i.iva_pct:'',
        'VAT €':+i.iva_importe||0,
        'Total €':+i.total_factura||0,
        'Status':INV_STATUS[i.status]||i.status||'',
        'Collected €':(i.status!=='cancelado'&&cobrado(i))?cobrado(i):'',
        'Sales rep':i.responsable_comercial?DB.personName(i.responsable_comercial):'',
        'Entered by':i.entered_by||'',
        'Comments':i.comentarios||''
      }))},
      {name:'Analítica',rows:list.flatMap(i=>DB.allocsFor(i.id).map(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);const f=finById(a.eventId);return{
        'Invoice nº':i.numero_factura||'',
        'Order (pedido)':(i.pedido&&i.pedido!=='N/A')?i.pedido:'',
        'Company (razón social)':i.razon_social||'',
        'Item':c?(c.item||''):(f?finLabelClean(f):''),
        'Código contable':a.codigo||(c?(c.codigo||''):''),
        'Amount €':+a.amount||0,
        'Passes':+a.passes||0
      };}))}
    ]);
  };
  const set=(id,k)=>{const el=document.getElementById(id);el.onchange=()=>{flt[k]=el.value;render();};};
  set('f_ev','ev');set('f_prod','prod');set('f_st','status');set('f_from','from');set('f_to','to');
  const tx=document.getElementById('f_txt');tx.oninput=()=>{flt.text=tx.value;renderTable(filtered());};
  document.getElementById('f_clear').onclick=()=>{flt={ev:'all',prod:'all',status:'all',text:'',from:'',to:''};render();};
  if(showCodigos)wireCodigos();
}
function filtered(){
  const t=(flt.text||'').toLowerCase();
  return DB.invoices.filter(i=>{
    if(flt.ev!=='all'&&!DB.allocsFor(i.id).some(a=>a.eventId==flt.ev))return false;
    if(flt.prod!=='all'&&i.producto!==flt.prod)return false;
    if(flt.status!=='all'&&i.status!==flt.status)return false;
    if(flt.from&&(i.fecha||'')<flt.from)return false;
    if(flt.to&&(i.fecha||'')>flt.to)return false;
    if(t&&!([i.razon_social,i.numero_factura,i.pedido,i.comentarios,i.entered_by,i.codigo_contable,i.producto].join(' ').toLowerCase().includes(t)))return false;
    return true;
  }).sort((a,b)=>((a.fecha||'').localeCompare(b.fecha||''))||((a.numero_factura||'').localeCompare(b.numero_factura||'',undefined,{numeric:true})));
}
function renderTable(rows){
  let h='<tr><th>Invoice nº</th><th>Date</th><th>Company</th><th>Product</th><th class="num">Subtotal</th><th class="num">VAT</th><th class="num">Total</th><th>Status</th><th>Collected</th><th>Sales rep</th><th>Contract (SPX) <span class="hint" style="text-transform:none">optional</span></th><th>Contract salesperson</th><th>Analítica (item · código)</th><th>Entered by</th><th style="width:50px"></th></tr>';
  if(!rows.length)h+='<tr><td colspan="15" class="hint" style="white-space:normal">No invoices'+(DB.invoices.length?' under these filters.':' yet — create the first one with “+ New invoice”.')+'</td></tr>';
  rows.forEach(i=>{
    const allocs=DB.allocsFor(i.id);
    const chips=allocs.map(a=>{const c=DB.codigoById(a.codigoId)||DB.codigoForEvent(a.eventId);const f=finById(a.eventId);
      const label=c?(esc(c.item||'?')+(c.codigo?' · '+esc(c.codigo):'')):(f?esc(finLabelClean(f)):('#'+(a.eventId||'?')));
      return '<span class="allocchip">'+label+' · '+eurF(a.amount)+((+a.passes||0)?' · '+a.passes+'🎟':'')+'</span>';}).join('')||'<span class="hint">—</span>';
    const stSel='<select class="inl" data-st="'+i.id+'">'+Object.keys(INV_STATUS).map(s=>'<option value="'+s+'" '+(i.status===s?'selected':'')+'>'+INV_STATUS[s]+'</option>').join('')+'</select>';
    h+='<tr class="'+(i.status==='abono'?'abono':i.status==='cancelado'?'cancelado':'')+'">'+
      '<td><b>'+esc(i.numero_factura||'')+'</b>'+(i.abono_de?' <span class="hint" title="credit note for invoice '+esc((DB.invoice(i.abono_de)||{}).numero_factura||'#'+i.abono_de)+'">↩</span>':'')+'</td>'+
      '<td>'+ddmmyyyy(i.fecha)+'</td><td style="white-space:normal">'+esc(i.razon_social||'')+'</td>'+
      '<td>'+(PRODUCTO_LABEL[i.producto]||i.producto||'')+((+i.cantidad||0)>1?' ×'+i.cantidad:'')+(i.producto==='tickets'&&i.tipo_pase?' · '+i.tipo_pase+((+i.pase_cantidad||0)>1?'×'+i.pase_cantidad:''):'')+'</td>'+
      '<td class="num">'+eurF(i.importe_base)+(i.en_usd?' <span class="hint" title="Invoiced in USD">/ '+(i.importe_usd!=null&&i.importe_usd!==''?'$'+(+i.importe_usd).toFixed(2):'$ —')+'</span>':'')+'</td>'+
      '<td class="num">'+eurF(i.iva_importe)+' <span class="hint">'+(i.iva_pct!=null?i.iva_pct+'%':'')+'</span></td>'+
      '<td class="num"><b>'+eurF(i.total_factura)+'</b></td>'+
      '<td>'+stSel+'</td>'+
      '<td>'+(i.status==='cancelado'?'':(cobrado(i)?eurF(cobrado(i)):'<span class="hint">—</span>'))+'</td>'+
      '<td>'+(i.responsable_comercial?esc(DB.personName(i.responsable_comercial)):'—')+'</td>'+
      '<td style="white-space:normal">'+contractCell(i)+'</td>'+
      '<td style="white-space:normal">'+contractOwnerCell(i)+'</td>'+
      '<td style="white-space:normal">'+chips+'</td>'+
      '<td>'+esc(i.entered_by||'')+'</td>'+
      '<td><button class="btn sm" data-edit="'+i.id+'">✎</button><button class="del" data-kill="'+i.id+'" title="Delete (recoverable from the audit log)">×</button></td></tr>';
  });
  document.getElementById('itbl').innerHTML=h;
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openModal(DB.invoice(b.dataset.edit)));
  document.querySelectorAll('[data-ctr]').forEach(b=>{b.onclick=e=>{e.stopPropagation();openModal(DB.invoice(b.dataset.ctr));};});
  document.querySelectorAll('[data-st]').forEach(s=>s.onchange=()=>{
    const i=DB.invoice(s.dataset.st);if(!i)return;
    if(s.value==='abono'&&!(''+(i.numero_factura||'')).toUpperCase().startsWith('R')){alert('A credit note must have an invoice number starting with R — edit the invoice.');s.value=i.status;return;}
    i.status=s.value;
    if(i.status==='cancelado')i.metodo_pago='na';
    if(i.status==='pagado'){if(!i.fecha_cobro)i.fecha_cobro=todayISO();}
    else i.fecha_cobro=null; // leaving Paid clears the stamp — a stale one made SPX count it as paid forever
    DB.save();render();
  });
  document.querySelectorAll('[data-kill]').forEach(b=>b.onclick=()=>{
    const i=DB.invoice(b.dataset.kill);if(!i)return;
    const dl=DB.delegates.filter(d=>d.invoice_id==i.id).length;
    if(!confirm('Delete invoice '+(i.numero_factura||'')+' with its event split'+(dl?' and its '+dl+' delegate seats':'')+'? (recoverable from the audit log)'))return;
    DB.data.invoices=DB.invoices.filter(x=>x.id!=i.id);
    DB.data.invalloc=DB.invoiceAllocs.filter(a=>a.invoice_id!=i.id);
    DB.data.delegates=DB.delegates.filter(d=>d.invoice_id!=i.id);
    DB.save();render();
  });
}

/* the Contract (SPX) cell: linked → the contract's company; a sponsorship/upgrade
   invoice with no link gets a soft OPTIONAL nudge (click opens the edit modal) */
function contractCell(i){
  if(i.spxProposalId){
    const p=(DB.spxProps||[]).find(x=>x.id==i.spxProposalId);
    if(p)return '🔗 '+esc(p.company||'?');
    return '🔗 <span class="hint">#'+esc(''+i.spxProposalId)+'</span>';
  }
  if((i.producto==='sponsorship'||i.producto==='upgrade')&&i.status!=='cancelado')
    return '<button class="btn sm" data-ctr="'+i.id+'" title="Optional — link this invoice to the contract the salesperson sent (SPX Invoiced/Paid follows it)" style="color:#C77800">link contract</button>';
  return '<span class="hint">—</span>';
}
/* the contract's salesperson, for double-checking against the invoice's own Sales
   rep column — a mismatch turns orange, it never blocks anything */
function contractOwnerCell(i){
  if(!i.spxProposalId)return '<span class="hint">—</span>';
  const p=(DB.spxProps||[]).find(x=>x.id==i.spxProposalId);
  if(!p)return '<span class="hint">?</span>';
  const owner=p.responsableName||p.responsable||'';
  if(!owner)return '<span class="hint">—</span>';
  const rep=i.responsable_comercial?(DB.personName(i.responsable_comercial)||''):'';
  if(rep&&rep.trim().toLowerCase()!==owner.trim().toLowerCase())
    return '<span style="color:#C77800;font-weight:700" title="Does not match the invoice Sales rep ('+esc(rep)+') — double-check">⚠ '+esc(owner)+'</span>';
  return esc(owner);
}

/* ---------- códigos contables (mini-BD, hand-maintained) ---------- */
function codigosPanel(){
  const evOpts=sel=>'<option value="">— no event —</option>'+finSorted().map(f=>'<option value="'+f.id+'" '+(f.id==sel?'selected':'')+'>'+esc(finLabelClean(f))+'</option>').join('');
  let h='<div class="panel"><h3>Items &amp; accounting codes <span class="hint">— the mini-database of every billable item (events, Webinars, ATA, consultancy…) linked to its código contable; the analítica picks from this list</span></h3>'+
    '<table style="max-width:860px"><tr><th>Item</th><th>Código</th><th>€ Dashboard event <span class="hint">(optional link)</span></th><th>Notes</th><th style="width:24px"></th></tr>';
  DB.codigos.slice().sort((a,b)=>(''+(a.codigo||'')).localeCompare(''+(b.codigo||''),undefined,{numeric:true})).forEach(c=>{
    h+='<tr><td><input data-cf="item" data-id="'+c.id+'" value="'+esc(c.item||'')+'" style="width:190px" placeholder="e.g. Almacenamiento 26"></td>'+
    '<td><input data-cf="codigo" data-id="'+c.id+'" value="'+esc(c.codigo||'')+'" style="width:90px"></td>'+
    '<td><select data-cf="eventId" data-id="'+c.id+'" style="width:220px">'+evOpts(c.eventId)+'</select></td>'+
    '<td><input data-cf="descripcion" data-id="'+c.id+'" value="'+esc(c.descripcion||'')+'" style="width:100%"></td>'+

  h+='</table><div style="margin-top:8px"><button class="btn sm" id="addCod">+ Add item</button> <span class="hint">linking an item to a € Dashboard event is what makes a RENMAD line roll into the money totals.</span></div></div>';
  return h;

function wireCodigos(){

function paseTotal(){
  const t=document.getElementById('m_pase').value,n=+document.getElementById('m_pasec').value||1;
  return t?(TIPO_PASES[t]||0)*n:0;
}
function renderAllocs(){
  const cods=DB.codigos.slice().sort((a,b)=>(''+(a.item||'')).localeCompare(''+(b.item||'')));
  const itemOpts=sel=>'<option value="">— item —</option>'+cods.map(c=>'<option value="'+c.id+'" '+(c.id==sel?'selected':'')+'>'+esc(c.item||('#'+c.id))+(c.codigo?' ('+esc(c.codigo)+')':'')+'</option>').join('');
  let h='<tr><th>Item</th><th style="width:92px">Código *</th><th style="width:120px">Amount €</th><th style="width:96px">Passes 🎟</th><th style="width:24px"></th></tr>';
  allocRows.forEach((a,ix)=>{const cod=a.codigo||'';const warn=a.codigoId&&!cod;
    h+='<tr><td><select data-af="codigoId" data-ix="'+ix+'">'+itemOpts(a.codigoId)+'</select></td>'+
    '<td><input data-cod="'+ix+'" value="'+esc(cod)+'" readonly tabindex="-1" title="comes from the chosen item" style="color:#555;background:'+(warn?'#ffe2c4':'#f0eee7')+'"></td>'+
    '<td><input type="number" step="any" data-af="amount" data-ix="'+ix+'" value="'+(a.amount!=null?a.amount:'')+'"></td>'+
    '<td><input type="number" step="1" min="0" data-af="passes" data-ix="'+ix+'" value="'+(a.passes!=null?a.passes:'')+'" placeholder="0"></td>'+
    '<td><button class="del" data-adel="'+ix+'">×</button></td></tr>';});
  document.getElementById('atbl').innerHTML=h;
  document.querySelectorAll('[data-af]').forEach(el=>el.onchange=()=>{
    const r=allocRows[+el.dataset.ix];
    if(el.dataset.af==='codigoId'){const c=DB.codigoById(+el.value);r.codigoId=el.value?+el.value:'';r.codigo=c?(c.codigo||''):'';r.eventId=(c&&c.eventId!=null)?c.eventId:'';renderAllocs();}
    else r[el.dataset.af]=el.value;
    allocSummary();});
  document.querySelectorAll('[data-adel]').forEach(b=>b.onclick=()=>{allocRows.splice(+b.dataset.adel,1);renderAllocs();allocSummary();});
  allocSummary();
}
function allocSummary(){
  const base=+document.getElementById('m_base').value||0;
  const sum=allocRows.reduce((a,r)=>a+(+r.amount||0),0);
  const el=document.getElementById('asum');
  el.innerHTML='split '+eurF(sum)+' of net '+eurF(base)+(Math.abs(sum-base)>0.01&&sum>0?' — <b style="color:#C77800">does not add up</b>':'');
}
function wireModal(i){
  const $=id=>document.getElementById(id);
  const showIf=(id,on)=>{const el=$(id);if(el)el.style.display=on?'':'none';};
  const refreshVis=()=>{
    const prod=$('m_prod').value;
    showIf('l_pase',prod==='tickets');showIf('l_pasec',prod==='tickets');showIf('l_pedido',prod==='tickets');
    showIf('l_resp',prod==='sponsorship'); // sólo SPX — the commission hook
    showIf('l_contract',prod==='sponsorship'||prod==='upgrade'); // invoice ↔ contract link (Jesús)
    showIf('l_motivo',$('m_iva').value==='0');
    showIf('l_abde',$('m_st').value==='abono'||prod==='abono');
    document.querySelectorAll('.usdf').forEach(el=>el.style.display=$('m_usd').checked?'':'none');
  };
  const calc=()=>{
    const base=+$('m_base').value||0,pct=+$('m_iva').value||0;
    $('m_ivai').value=num2(base*pct/100);$('m_tot').value=num2(base*(1+pct/100));
    allocSummary();
    // single-event invoice: prefill the allocation amount with the base
    if(allocRows.length===1&&(allocRows[0].amount===''||allocRows[0].amount==null)){allocRows[0].amount=base||'';renderAllocs();}
  };
  ['m_prod','m_iva','m_st','m_usd'].forEach(id=>$(id).addEventListener('change',refreshVis));
  ['m_base','m_iva'].forEach(id=>$(id).addEventListener('input',calc));
  ['m_pase','m_pasec'].forEach(id=>$(id).addEventListener('change',()=>{
    // tickets: suggest total passes (Single=1 … Quad=4 × packs) into a single allocation
    if($('m_prod').value==='tickets'&&allocRows.length===1&&!(+allocRows[0].passes)){allocRows[0].passes=paseTotal()||'';renderAllocs();}
  }));
  $('m_st').addEventListener('change',()=>{if($('m_st').value==='cancelado')$('m_pago').value='na';});
  /* paying by Card marks the invoice Paid automatically */
  $('m_pago').addEventListener('change',()=>{if($('m_pago').value==='tarjeta'&&$('m_st').value!=='cancelado')$('m_st').value='pagado';});
  $('addAlloc').onclick=()=>{allocRows.push({id:null,codigoId:'',codigo:'',eventId:'',amount:'',passes:''});renderAllocs();};
  $('m_cancel').onclick=closeModal;
  $('m_save').onclick=saveInvoice;
  renderAllocs();refreshVis();calc();
}
function closeModal(){document.getElementById('modal').classList.remove('on');editingId=null;}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeModal();};

function saveInvoice(){
  const $=id=>document.getElementById(id),msg=$('m_msg');
  const err=t=>{msg.style.color='var(--red)';msg.textContent=t;};
  const num=$('m_num').value.trim(),prod=$('m_prod').value,st=$('m_st').value;
  if(!num)return err('Invoice nº is missing.');
  if(!prod)return err('Product is missing.');
  if(!$('m_rs').value.trim())return err('Company name is missing.');
  if($('m_base').value==='')return err('Net amount is missing.');
  /* duplicate invoice numbers are BLOCKED (also enforced by the DB unique index) */
  if(DB.invoices.some(x=>x.id!=editingId&&(x.numero_factura||'').trim().toLowerCase()===num.toLowerCase()))return err('That invoice nº already exists — duplicates are blocked.');
  /* abonos must start with R */
  if((prod==='abono'||st==='abono')&&!num.toUpperCase().startsWith('R'))return err('A credit note must start with R (e.g. R20260012).');
  const fecha=$('m_fecha').value;
  if(!fecha)return err('Date is missing.');
  const yr=+fecha.slice(0,4);
  if(yr>new Date().getFullYear())return err('The date cannot go beyond the current year.');
  if(yr<2020)return err('That date looks wrong ('+fecha.slice(0,4)+') — check the year.');
  if($('m_iva').value==='0'&&!$('m_motivo').value)return err('0% VAT: choose the reason (exempt / not subject / reverse charge / export).');
  if($('m_usd').checked&&$('m_usdi').value==='')return err('Invoiced in USD: enter the USD amount too (both EUR and USD go in by hand).');
  /* analítica: every line carrying money/passes MUST have an item (código contable) — mandatory */
  const dataLines=allocRows.filter(r=>((+r.amount||0)!==0||(+r.passes||0)>0));
  if(dataLines.some(r=>!r.codigoId))return err('Every analítica line needs an item / código contable — it is mandatory.');
  const allocs=dataLines.filter(r=>r.codigoId);
  let base=+$('m_base').value||0;
  /* credit notes are stored NEGATIVE — everywhere downstream (Money, KPIs, Excel) sums
     them, so a positive abono would double-count revenue instead of reversing it. */
  const esAbono=(prod==='abono'||st==='abono');
  if(esAbono&&base>0){
    base=-base;
    allocRows.forEach(r=>{if((+r.amount||0)>0)r.amount=-Math.abs(+r.amount);});
  }
  const sum=allocs.reduce((a,r)=>a+(+r.amount||0),0);
  if(allocs.length&&Math.abs(sum-base)>0.01){
    if(!confirm('The analítica ('+finFmt(sum)+') does not add up to the net amount ('+finFmt(base)+'). Save anyway?'))return;
  }
  const row={
    id:editingId||DB.newId(),
    codigo_contable:(allocs[0]&&(DB.codigoById(+allocs[0].codigoId)||{}).codigo)||null,
    producto:prod,cantidad:$('m_cant').value===''?null:+$('m_cant').value,
    tipo_pase:prod==='tickets'?($('m_pase').value||null):null,
    pase_cantidad:prod==='tickets'?(+$('m_pasec').value||1):null,
    fecha,numero_factura:num,
    pedido:prod==='tickets'?($('m_pedido').value.trim()||''):'N/A',
    vencimiento:$('m_venc').value||todayISO(),
    responsable_comercial:prod==='sponsorship'&&$('m_resp').value?+$('m_resp').value:null,
    spxProposalId:(prod==='sponsorship'||prod==='upgrade')&&$('m_spx').value?+$('m_spx').value:null,
    razon_social:$('m_rs').value.trim(),importe_base:base,
    en_usd:$('m_usd').checked,
    importe_usd:$('m_usd').checked&&$('m_usdi').value!==''?+$('m_usdi').value:null,
    usd_rate:null,
    usd_rate_date:null,
    iva_pct:+$('m_iva').value,iva_motivo:$('m_iva').value==='0'?$('m_motivo').value:null,
    iva_importe:num2(base*(+$('m_iva').value)/100),total_factura:num2(base*(1+(+$('m_iva').value)/100)),
    descuento_pct:$('m_dto').value===''?null:+$('m_dto').value,
    /* collections: importe_cobrado (legacy partial payments) is PRESERVED on edit — never
       wiped by an unrelated change. fecha_cobro follows the status: stamped when Paid,
       CLEARED when not (a stale stamp used to make SPX report unpaid invoices as paid). */
    status:st,
    fecha_cobro:st==='pagado'?((editingId&&(DB.invoice(editingId)||{}).fecha_cobro)||todayISO()):null,
    importe_cobrado:editingId?((DB.invoice(editingId)||{}).importe_cobrado!=null?(DB.invoice(editingId)||{}).importe_cobrado:null):null,
    metodo_pago:st==='cancelado'?'na':$('m_pago').value,
    comentarios:$('m_com').value.trim(),
    abono_de:(st==='abono'||prod==='abono')&&$('m_abde').value?+$('m_abde').value:null,
    entered_by:$('m_by').value.trim()||actorName(),
  };
  if(editingId){const old=DB.invoice(editingId);Object.assign(old,row);}
  else DB.invoices.push(row);
  /* sync allocations: update kept rows, add new, drop removed */
  const keep={};
  allocs.forEach(a=>{
    const c=DB.codigoById(+a.codigoId)||{};
    const evId=(c.eventId!=null&&c.eventId!=='')?+c.eventId:null; // RENMAD item → feeds the € Dashboard; Webinars/ATA/etc → null
    const codStr=c.codigo||a.codigo||'';
    if(a.id){const ex=DB.invoiceAllocs.find(x=>x.id==a.id);if(ex){ex.eventId=evId;ex.amount=+a.amount||0;ex.passes=+a.passes||0;ex.codigo=codStr;ex.codigoId=+a.codigoId;keep[ex.id]=1;return;}}
    const na={id:DB.newId(),invoice_id:row.id,eventId:evId,amount:+a.amount||0,passes:+a.passes||0,codigo:codStr,codigoId:+a.codigoId};
    DB.invoiceAllocs.push(na);keep[na.id]=1;
  });
  DB.data.invalloc=DB.invoiceAllocs.filter(x=>x.invoice_id!=row.id||keep[x.id]);
  syncDelegates(row);
  DB.save();
  closeModal();render();
}
/* tickets & sponsorship: top the event's delegate rows up to each allocation's pass count
   (never duplicates on re-save; extra rows are left alone — remove them on the event page). */
function syncDelegates(inv){
  if(inv.status==='cancelado')return;
  if(!(inv.producto==='tickets'||inv.producto==='sponsorship'))return;
  const src=inv.producto==='tickets'?'ticket':'sponsor';
  /* passes are summed PER EVENT first: two analítica lines on the same event (e.g. stand +
     extra passes) used to top up to the max of the two instead of the total. */
  const wantByEvent={};
  DB.allocsFor(inv.id).forEach(a=>{
    if(a.eventId==null||a.eventId==='')return; // non-event item (Webinars/ATA/…) → no delegate seats
    wantByEvent[a.eventId]=(wantByEvent[a.eventId]||0)+(+a.passes||0);
  });
  Object.keys(wantByEvent).forEach(evId=>{
    const want=wantByEvent[evId];if(want<=0)return;
    const have=DB.delegates.filter(d=>d.invoice_id==inv.id&&d.eventId==evId).length;
    for(let k=have;k<want;k++){
      DB.delegates.push({id:DB.newId(),eventId:+evId,source:src,invoice_id:inv.id,
        sponsor_name:src==='sponsor'?(inv.razon_social||''):null,
        name:'',email:'',company:src==='ticket'?(inv.razon_social||''):'',job_title:'',
        seller:inv.responsable_comercial||null,crm_tagged:false,materials_sent:false,
        added_by:'invoicing · '+(inv.entered_by||''),notes:''});
    }
  });
}

boot(render);
