<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — HR</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--green:#3E8C28;--amber:#C77800;--blue:#29ACE3;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1240px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 10px}
  /* SPX pill tabs */
  .tabs{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px}
  .tabs button{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:13px;padding:6px 13px;border-radius:8px;cursor:pointer}
  .tabs button.on{background:var(--orange);color:#fff}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 4px;font-size:15px;color:var(--charcoal)}
  .panel .hint,.hint{font-size:12px;color:var(--muted);font-weight:400;margin:0 0 10px}
  select,button,input{font:inherit}
  input,select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;color:var(--ink)}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);cursor:pointer}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.ok{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
  .btn.no{color:var(--red);border-color:#f0c4c4}
  .btn:hover{filter:brightness(.97)}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .alarm{background:#FBEAEA;border:1px solid #E8B4B4;color:#8a1d1d;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .decide{border-left:3px solid var(--orange)}
  .banner{background:#fff;border:1px solid var(--line);border-left:4px solid var(--orange);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--ink);margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #efede8;vertical-align:top}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .chip{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;border-radius:10px;padding:2px 9px;display:inline-block;white-space:nowrap}
  .empty{color:var(--muted);font-style:italic;padding:10px 2px}
  .mnav{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .mnav b{font-size:14px;color:var(--charcoal);min-width:150px;text-align:center}
  tr.total td{font-weight:700;border-top:2px solid var(--line);background:#f6f5f1}
  .code{font-size:11px;color:var(--muted)}
  .mx{overflow-x:auto}
  .mx table{font-size:12px;min-width:640px}
  .mx td.c{text-align:center}
  .ok2{color:var(--green);font-weight:700}.no2{color:var(--red);font-weight:700}.na{color:#c9c6bd}
  .padd{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:10px}
  .padd label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px}
  /* collapsible fold (same pattern as the Me page) */
  .fold{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:12px}
  .fold>button.fhead{width:100%;text-align:left;background:none;border:none;padding:12px 16px;font:600 14px 'Segoe UI',sans-serif;color:var(--charcoal);cursor:pointer}
  .fold>.fbody{display:none;padding:0 16px 14px}
  .fold.open>.fbody{display:block}
  .fbody h4{margin:16px 0 2px;font-size:13.5px;color:var(--charcoal)}
  .fbody h4:first-child{margin-top:4px}
  /* phones: tabs that fit, thumb-sized decision buttons, tables scroll in their box */
  @media(max-width:680px){
    .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tabs button{padding:11px 13px;white-space:nowrap;font-size:14px}
    .btn.ok,.btn.no{padding:12px 16px;margin:2px 0}
    .padd input,.padd select{width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>🌴 HR</h1>
  <p class="sub">Managing the team's time — holiday balances &amp; leave, weekly hour allocation and the legal time clock. Working days follow the official Madrid labour calendar — Mon–Thu 8 h + Fri 5.5 h, and 7 h days in July &amp; August.</p>
  <div id="banner"></div>
  <div class="tabs" id="tabs" style="width:max-content;max-width:100%;margin:10px 0 14px"></div>
  <div id="warnbox"></div>
  <div id="content"></div>
</div>
<script src="store.js?v=55"></script>
<script>
document.getElementById('nav').innerHTML=navBar('hr');
/* today's device logins (dc_logins) — loaded once at boot, Belén/HR-only via RLS.
   Tolerant: table missing / RLS says no / local mode → LOGINS stays empty and the
   device icons simply don't show. */
let LOGINS=[];
/* tiny visibility chip next to panel titles — who can see this information */
function visBadge(t){const pub=t==='everyone';return '<span title="'+(pub?'Visible to the whole team':'Private — '+t)+'" style="font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;vertical-align:2px;margin-left:6px;background:'+(pub?'#E9F0FB':'#F0EEE7')+';color:'+(pub?'#185FA5':'#7c7c78')+'">'+(pub?'👁 everyone':'🔒 '+t)+'</span>'}
/* collapsible fold — open/closed state survives re-renders */
const _open={};
function foldHtml(id,title){
  return '<div class="fold'+(_open[id]?' open':'')+'" id="'+id+'"><button class="fhead" type="button">'+title+' <span class="arr">'+(_open[id]?'▾':'▸')+'</span></button><div class="fbody" id="'+id+'Body"></div></div>';
}
function wireFolds(){
  document.querySelectorAll('.fold>.fhead').forEach(b=>b.onclick=()=>{
    const f=b.parentElement,open=f.classList.toggle('open');
    _open[f.id]=open;const a=b.querySelector('.arr');if(a)a.textContent=open?'▾':'▸';
  });
}
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
/* ---- tabs & access -----------------------------------------------------
   Full HR admins (Belén + the HR flag) get all three tabs.
   Finance-only users (Jesús) get ONLY Allocation.
   Everyone else meets a wall — their own stuff lives in 🙋 Me. */
const HRTABS=[['holidays','Holidays admin'],['allocation','Allocation'],['timeclock','Time clock admin']];
function fullHR(){return DB.isHRAdmin()||DB.isHR();}
function myTabs(){return fullHR()?HRTABS:HRTABS.filter(t=>t[0]==='allocation');}
function activeTab(){const h=location.hash.replace('#','');const ts=myTabs();return ts.some(t=>t[0]===h)?h:ts[0][0];}
function render(){
  const tabsEl=document.getElementById('tabs'),warn=document.getElementById('warnbox'),banner=document.getElementById('banner');
  if(!DB.canSeeHR()){
    tabsEl.style.display='none';banner.innerHTML='';warn.innerHTML='';
    document.getElementById('content').innerHTML=
      '<div class="panel" style="text-align:center;padding:46px 20px"><div style="font-size:36px;margin-bottom:6px">🔒</div>'+
      '<h3 style="margin:0 0 8px">HR — this area is for Belén &amp; HR.</h3>'+
      '<p class="hint" style="max-width:540px;margin:0 auto;font-size:13px">Everything about YOUR OWN day (clock, hours, holidays, to-dos) now lives in <a href="home.html" style="color:var(--orange);font-weight:700">🙋 Me</a>.</p></div>';
    return;
  }
  banner.innerHTML='<div class="banner">Your own clock, hours &amp; holidays are in <a href="home.html" style="color:var(--orange);font-weight:700">🙋 Me</a> — this page is for managing the team’s time.</div>';
  const tab=activeTab();
  tabsEl.style.display='';
  tabsEl.innerHTML=myTabs().map(([k,l])=>'<button class="'+(k===tab?'on':'')+'" data-tab="'+k+'">'+l+'</button>').join('');
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{location.hash=b.dataset.tab;render();});
  if(!DB.hrReady()){warn.innerHTML='<div class="warn">The HR module is not active yet — run <b>dispatch_hr.sql</b> (and <b>dispatch_hr2.sql</b>) in Supabase, then reload.</div>';document.getElementById('content').innerHTML='';return;}
  warn.innerHTML='';
  ({holidays:renderHolidays,allocation:renderAlloc,timeclock:renderTimeclock})[tab]();
}
function fmtRange(h){return h.dateFrom===h.dateTo?h.dateFrom:(h.dateFrom+' → '+h.dateTo);}
/* ================= TAB 1: HOLIDAYS ADMIN ================= */
function renderHolidays(){
  document.getElementById('content').innerHTML=
    '<p class="hint" style="margin:0 0 10px">📆 The team calendar lives in <a href="people.html" style="color:var(--orange);font-weight:700">👥 Team</a> now.</p>'+
    foldHtml('adminFold','⚙ Admin actions')+
    '<div class="panel"><h3>Holiday balances — who to chase'+visBadge('Belén + HR')+'</h3><p class="hint">People take their holidays whenever they like — the <b>Pace</b> colour just flags anyone who\'s taken little for how far into the year we are, so you can check in (by mid-year, nothing taken is worth a nudge). '+
    '<b style="color:#D32230">Behind</b> · <b style="color:#C77800">a bit behind</b> · <b style="color:#3E8C28">on track</b> · <span style="color:#7c7c78">plenty of time</span> early in the year. Carry-over days from last year are the only ones with a hard deadline — <b>use before 28 Feb</b> (flagged under the name). Most-behind first.</p><div id="balBox"></div></div>';
  document.getElementById('adminFoldBody').innerHTML=
    '<h4>Load past holidays</h4><p class="hint">Enter what people already took or booked this year — added directly as APPROVED so the balances are right.</p>'+
    '<div class="padd"><label>Person<select id="b_who"></select></label>'+
    '<label>Type<select id="b_type"><option value="vacation">Holidays</option><option value="remote">Office day</option></select></label>'+
    '<label>From<input type="date" id="b_from"></label><label>To<input type="date" id="b_to"></label>'+
    '<label>Note<input id="b_note" placeholder="loaded from record" style="width:160px"></label>'+
    '<button class="btn primary" id="b_add">Add as approved</button><span id="b_msg" style="font-size:12px;color:var(--green)"></span></div>'+
    '<div class="padd" style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px"><label>Cancel an approved holiday<select id="x_hol" style="max-width:340px"></select></label>'+
    '<button class="btn no" id="x_go">Cancel it</button><span id="x_msg" style="font-size:12px;color:var(--green)"></span></div>'+
    '<h4>Place someone on leave</h4><p class="hint">Sick / maternity / paternity leave. During it the person doesn’t have to clock in or allocate hours — the app stops expecting either. This does <b>not</b> use their 23-day holiday allowance.</p>'+
    '<div class="padd"><label>Person<select id="lv_who"></select></label>'+
    '<label>Type<select id="lv_type"><option value="sick">Sick leave</option><option value="maternity">Maternity</option><option value="paternity">Paternity</option></select></label>'+
    '<label>From<input type="date" id="lv_from"></label><label>To<input type="date" id="lv_to"></label>'+
    '<label>Note<input id="lv_note" placeholder="optional" style="width:150px"></label>'+
    '<button class="btn primary" id="lv_add">Add leave</button><span id="lv_msg" style="font-size:12px;color:var(--green)"></span></div>'+
    '<h4>Carry-over / borrowed days</h4><p class="hint">Add days a person carries over from last year, or lets them borrow from next year (upon approval). Positive = extra days available this year; use a negative number to remove. Carried-over days should be enjoyed before 28 Feb.</p>'+
    '<div class="padd"><label>Person<select id="aj_who"></select></label>'+
    '<label>Year<input type="number" id="aj_year" value="'+new Date().getFullYear()+'" style="width:90px"></label>'+
    '<label>Days (+/−)<input type="number" step="0.5" id="aj_days" style="width:90px" placeholder="e.g. 3"></label>'+
    '<label>Reason<select id="aj_kind"><option value="carryover">Carry-over from last year</option><option value="borrow">Borrowed from next year</option><option value="other">Other adjustment</option></select></label>'+
    '<button class="btn primary" id="aj_add">Add</button><span id="aj_msg" style="font-size:12px;color:var(--green)"></span></div>';
  renderBackfill();renderBalances();wireFolds();
}
function renderBackfill(){
  const who=document.getElementById('b_who');if(!who)return;
  const roster=DB.people.filter(p=>!isTeamAccount(p)).sort((a,b)=>a.name.localeCompare(b.name));
  who.innerHTML=roster.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('');
  document.getElementById('b_add').onclick=()=>{
    const f=document.getElementById('b_from').value,t=document.getElementById('b_to').value;
    if(!f||!t||t<f){alert('Pick a valid date range.');return;}
    const wd=workingDaysBetween(f,t);
    if(wd<=0){alert('No working days in that range.');return;}
    const me=DB.currentUser;
    DB.holidays.push({id:DB.newId(),personId:+who.value,dateFrom:f,dateTo:t,workDays:wd,
      type:document.getElementById('b_type').value,
      note:document.getElementById('b_note').value.trim()||'loaded from record',status:'approved',
      log:[{by:me.name,at:new Date().toISOString(),action:'loaded from record (pre-approved)'}]});
    DB.save();
    const m=document.getElementById('b_msg');m.textContent='Added ✓';setTimeout(()=>m.textContent='',3000);
    renderBackfill();renderBalances();
  };
  /* HR admin: cancel any approved holiday on request (kept visible as cancelled, reason logged) */
  const xh=document.getElementById('x_hol');
  if(xh){
    const opts=DB.holidays.filter(h=>h.status==='approved').sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));
    xh.innerHTML=opts.length?opts.map(h=>'<option value="'+h.id+'">'+esc(DB.personName(h.personId))+' — '+fmtRange(h)+' ('+h.workDays+'d'+(h.type==='remote'?', office':'')+')</option>').join(''):'<option value="">— none approved —</option>';
    document.getElementById('x_go').onclick=()=>{
      const h=DB.holidays.find(x=>x.id==xh.value);if(!h)return;
      const reason=prompt('Reason for cancelling '+DB.personName(h.personId)+'’s '+fmtRange(h)+' (they will see it):');
      if(reason===null)return;
      h.status='cancelled';
      h.log=(h.log||[]).concat([{by:DB.currentUser.name,at:new Date().toISOString(),action:'cancelled by HR on request',note:reason}]);
      DB.save();
      const m=document.getElementById('x_msg');m.textContent='Cancelled ✓';setTimeout(()=>m.textContent='',3000);
      renderBackfill();renderBalances();
    };
  }
  /* HR: place someone on sick / maternity / paternity leave */
  const lw=document.getElementById('lv_who');
  if(lw){
    lw.innerHTML=roster.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('');
    document.getElementById('lv_add').onclick=()=>{
      const f=document.getElementById('lv_from').value,t=document.getElementById('lv_to').value;
      if(!f||!t||t<f){alert('Pick a valid date range.');return;}
      const wd=workingDaysBetween(f,t);
      const ty=document.getElementById('lv_type').value;
      DB.holidays.push({id:DB.newId(),personId:+lw.value,dateFrom:f,dateTo:t,workDays:wd,type:ty,
        note:document.getElementById('lv_note').value.trim()||TYPE_LABEL[ty],status:'approved',
        log:[{by:DB.currentUser.name,at:new Date().toISOString(),action:'placed on '+TYPE_LABEL[ty].toLowerCase()+' by HR'}]});
      DB.save();
      const m=document.getElementById('lv_msg');m.textContent='Leave added ✓';setTimeout(()=>m.textContent='',3000);
      renderBackfill();renderBalances();
    };
  }
  /* HR: carry-over / borrowed days adjustment (a signed balance change for a year) */
  const aw=document.getElementById('aj_who');
  if(aw){
    aw.innerHTML=roster.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('');
    document.getElementById('aj_add').onclick=()=>{
      const yr=+document.getElementById('aj_year').value,days=+document.getElementById('aj_days').value,kind=document.getElementById('aj_kind').value;
      if(!yr||!days){alert('Enter a year and a number of days (can be negative).');return;}
      const d0=yr+'-01-01';
      DB.holidays.push({id:DB.newId(),personId:+aw.value,dateFrom:d0,dateTo:d0,workDays:days,type:'adjust',
        note:(kind==='carryover'?'Carry-over from '+(yr-1):kind==='borrow'?'Borrowed from '+(yr+1):'Adjustment'),status:'approved',
        log:[{by:DB.currentUser.name,at:new Date().toISOString(),action:(days>0?'+':'')+days+' days '+kind+' by HR'}]});
      DB.save();
      const m=document.getElementById('aj_msg');m.textContent='Adjustment added ✓';setTimeout(()=>m.textContent='',3000);
      renderBackfill();renderBalances();
    };
  }
}
/* HR + Belén: everyone's holiday balance at a glance. Colour = PACE (taken vs how
   far into the year we are) — regular holidays have no deadline, so what matters is
   whether someone is falling behind and needs a nudge. Carry-over days (from last
   year) are the exception: they carry a hard 28-Feb deadline, flagged per person. */
function renderBalances(){
  const box=document.getElementById('balBox');if(!box)return;
  const now=new Date(), y=now.getFullYear();
  const yearFrac=(now-new Date(y,0,1))/(new Date(y+1,0,1)-new Date(y,0,1));
  const ramp=Math.max(0,Math.min(1,(yearFrac-0.25)/0.60)); // nothing "due" before ~April, full spread by ~Nov
  const feb28=new Date(y,1,28,23,59);
  // exclude the HR team login (not a person) and Belén (she tracks her own — don't nudge)
  const rows=DB.people.filter(p=>!isTeamAccount(p)&&!isBelenP(p)).map(p=>{
    const allow=holAllowance(p),used=holUsed(p.id,y),adj=holAdjust(p.id,y),rem=holRemaining(p.id,y);
    const pending=DB.holidays.filter(h=>h.personId==p.id&&(h.type||'vacation')==='vacation'&&!['approved','denied','cancelled'].includes(h.status)&&(h.dateFrom||'').slice(0,4)===String(y)).reduce((a,h)=>a+(+h.workDays||0),0);
    const dueByNow=allow*ramp;
    return {p,allow,adj,used,rem,pending,dueByNow,deficit:dueByNow-used,over:rem<0};
  }).sort((a,b)=>(b.over-a.over)||b.deficit-a.deficit||b.rem-a.rem); // over-allowance first
  const band=r=>{
    if(r.over)return {c:'#fff',bg:'#B00020',lab:'⚠ over by '+Math.abs(r.rem)+'d'};
    if(ramp<0.05)return {c:'#7c7c78',bg:'#f0eee9',lab:'plenty of time'};
    if(r.used>=r.dueByNow)return {c:'#3E8C28',bg:'#EAF5E4',lab:'on track'};
    if(r.used>=r.dueByNow*0.5)return {c:'#C77800',bg:'#FFF3E8',lab:'a bit behind'};
    return {c:'#D32230',bg:'#FBEAEA',lab:'behind — nudge'};
  };
  const over=rows.filter(r=>r.over);
  let h=over.length?('<div class="alarm" style="margin-bottom:10px">⚠ <b>'+over.length+' over their holiday allowance:</b> '+
    over.map(r=>esc(r.p.name)+' (by '+Math.abs(r.rem)+' day'+(Math.abs(r.rem)===1?'':'s')+')').join(' · ')+
    ' — if any of these came from <b>last year\'s</b> allocation, add them under “Carry-over / borrowed days” in the ⚙ Admin actions fold so the balance is right.</div>'):'';
  h+='<table><tr><th>Person</th><th class="num">Allowance</th><th class="num">Taken</th><th class="num">Pending</th><th class="num">Left</th><th style="width:210px">Pace</th></tr>';
  rows.forEach(r=>{const b=band(r),base=r.allow||1,pct=Math.max(0,Math.min(100,100*r.used/base));
    const carry=r.adj>0?('<div style="font-size:10px;color:'+(now<=feb28?'#C77800':'#D32230')+';margin-top:1px">'+r.adj+' carry-over day'+(r.adj===1?'':'s')+' · '+(now<=feb28?'use before 28 Feb':'past 28 Feb')+'</div>'):'';
    h+='<tr><td>'+esc(r.p.name)+' <span class="code">'+esc(r.p.role)+'</span>'+carry+'</td>'+
      '<td class="num">'+r.allow+(r.adj?' <span style="color:#29ACE3">('+(r.adj>0?'+':'')+r.adj+')</span>':'')+'</td>'+
      '<td class="num">'+r.used+'</td>'+
      '<td class="num">'+(r.pending?'<span style="color:#C77800">+'+r.pending+'</span>':'—')+'</td>'+
      '<td class="num"><b style="font-size:15px'+(r.over?';color:#B00020':'')+'">'+r.rem+'</b></td>'+
      '<td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;min-width:70px;height:9px;border-radius:5px;background:#ece9e2;overflow:hidden"><div style="height:100%;width:'+pct.toFixed(0)+'%;background:'+b.c+'"></div></div>'+
        '<span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:'+b.c+';background:'+b.bg+';border-radius:10px;padding:1px 8px;white-space:nowrap">'+b.lab+'</span></div></td></tr>';
  });
  box.innerHTML=h+'</table>';
}
/* ================= TAB 2: ALLOCATION (Jesús's whole view) ================= */
const fmtH=v=>(Math.round(v*100)/100).toLocaleString('es-ES');
/* project numbers follow an order: category prefix ("02.") first, then the running
   accounting code, then insertion order. New event codes continue the sequence. */
function projPrefix(p){const m=(p.label||'').match(/^\s*(\d+)/);return m?+m[1]:99;}
function projCodeNum(p){const m=(p.code||'').match(/\d+/);return m?+m[0]:0;}
function projCmp(a,b){return projPrefix(a)-projPrefix(b)||projCodeNum(a)-projCodeNum(b)||(a.sort||0)-(b.sort||0);}
function nextProjectCode(){const mx=Math.max(70314,...DB.projects.map(projCodeNum));return String(mx+1);}
function autoProject(kind){return DB.projects.find(p=>p.kind===kind);}

function lastWeeks(n){
  const out=[],cur=monday(new Date());
  for(let i=n-1;i>=0;i--){const w=toISO(addDays(cur,-7*i));if(w>=HR_START)out.push(w);}
  return out;
}

function exportHours(){
  const rows=[];
  DB.timesheets.forEach(t=>{
    const who=DB.personName(t.personId);
    Object.keys(t.hours||{}).forEach(pid=>{const p=DB.projects.find(x=>x.id==pid);
      rows.push({Person:who,Week:t.week,Project:p?p.label:pid,Code:p&&p.code||'',Hours:+t.hours[pid]||0});});
  });
  const cur=toISO(monday(new Date()));
  const fp=autoProject('festivos'),vp=autoProject('vacaciones');
  DB.people.forEach(p=>{for(let m=ymd(HR_START);toISO(m)<=cur;m=addDays(m,7)){
    const w=weekWorkInfo(toISO(m),p.id);
    if(w.fest>0&&fp)rows.push({Person:p.name,Week:toISO(m),Project:fp.label,Code:'',Hours:w.fest});
    if(w.vac>0&&vp)rows.push({Person:p.name,Week:toISO(m),Project:vp.label,Code:'',Hours:w.vac});
  }});
  rows.sort((a,b)=>a.Week===b.Week?a.Person.localeCompare(b.Person):a.Week.localeCompare(b.Week));
  exportXLSX('RENMAD_hours_'+new Date().toISOString().slice(0,10)+'.xlsx',[{name:'Allocations',rows}]);
}

function renderAttendance(){
  const box=document.getElementById('tcToday');if(!box)return;
  const today=toISO(new Date());
  const people=DB.people.filter(p=>!isTeamAccount(p));
  const rows=people.map(p=>{
    const s=personStatusNow(p);
    const info=tcDayInfo(p.id,today);
    const firstIn=info.entries.find(e=>e.kind==='in');
    const expected=tcExpectedDay(p.id,today)>0;
    const missing=expected&&s.key==='out';
    const devs=LOGINS.filter(l=>l.personId==p.id&&l.day===today);
    return {p,s,firstIn,expected,missing,devs};
  });
  const ord={out:0,working:1,done:2,pause:3,event:4,remote:5,holiday:6,leave:7,off:8,unknown:9};
  rows.sort((a,b)=>{if(a.missing!==b.missing)return a.missing?-1:1;return (ord[a.s.key]??10)-(ord[b.s.key]??10)||a.p.name.localeCompare(b.p.name);});
  const nWork=rows.filter(r=>r.s.key==='working').length,nDone=rows.filter(r=>r.s.key==='done').length,nMiss=rows.filter(r=>r.missing).length,nOff=rows.filter(r=>['holiday','leave','off'].includes(r.s.key)).length;
  let h='<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">'+nWork+' working now · '+nDone+' done for the day · <b style="color:'+(nMiss?'#D32230':'var(--muted)')+'">'+nMiss+' expected but not clocked in</b> · '+nOff+' off/away</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
  rows.forEach(r=>{
    h+='<tr style="border-bottom:1px solid #f2f0ea'+(r.missing?';background:#FBEAEA':'')+'">'+
      '<td style="padding:5px 8px;width:38px">'+avatarHtml(r.p,28)+'</td>'+
      '<td style="padding:5px 8px;font-weight:600;color:var(--charcoal)">'+esc(r.p.name)+' <span style="color:var(--muted);font-weight:400;font-size:11px">'+esc(r.p.role)+'</span></td>'+
      '<td style="padding:5px 8px"><span style="color:'+r.s.color+';font-weight:600">'+r.s.emoji+' '+esc(r.s.label)+'</span>'+(r.s.detail?' <span style="color:var(--muted);font-size:11px">· '+esc(r.s.detail)+'</span>':'')+'</td>'+
      '<td style="padding:5px 8px;font-size:14px;white-space:nowrap">'+(r.devs.length?devIcons(r.devs):'')+'</td>'+
      '<td style="padding:5px 8px;color:var(--muted);font-size:12px;text-align:right;white-space:nowrap">'+(r.firstIn?('in '+(r.firstIn.time||'').slice(0,5)):(r.missing?'<span style="color:#D32230;font-weight:600">no punch yet</span>':''))+'</td></tr>';
  });
  h+='</table>';
  box.innerHTML=h;
}

function monthTable(personId,refDate){
  const ref=refDate||tcM;
  const y=ref.getFullYear(),m=ref.getMonth();
  const last=new Date(y,m+1,0).getDate(),today=toISO(new Date());
  let h='<table><tr><th>Day</th><th>Punches</th><th class="num">Worked</th><th class="num">Expected</th><th class="num">Diff</th></tr>';
  let wSum=0,eSum=0,any=false;
  for(let d=1;d<=last;d++){
    const iso=toISO(new Date(y,m,d));
    if(iso>today)break;
    const exp=tcExpectedDay(personId,iso);
    const info=tcDayInfo(personId,iso);
    if(exp<=0&&!info.entries.length)continue;
    any=true;wSum+=info.total;eSum+=exp*60;
    const diff=info.total-exp*60;
    h+='<tr><td>'+iso+'</td><td>'+(info.entries.length?info.entries.map(entryLabel).join(' · '):'<span style="color:var(--red)">no punches</span>')+'</td>'+
      '<td class="num">'+(info.total?fmtMin(info.total):'—')+'</td><td class="num">'+(exp||'—')+'</td>'+
      '<td class="num" style="color:'+(diff<-15?'var(--red)':diff>15?'var(--green)':'var(--muted)')+'">'+(info.total?((diff>=0?'+':'−')+fmtMin(Math.abs(diff))):'')+'</td></tr>';
  }
  if(!any)h+='<tr><td colspan="5" class="empty">Nothing this month.</td></tr>';
  h+='<tr class="total"><td>Total</td><td></td><td class="num">'+fmtMin(wSum)+'</td><td class="num">'+fmtMin(eSum)+'</td><td class="num">'+((wSum-eSum>=0?'+':'−')+fmtMin(Math.abs(wSum-eSum)))+'</td></tr>';
  return h+'</table>';
}

  box.innerHTML=list.map(r=>{
    const p=DB.person(r.personId);
    const es=tcEffective(r.personId,r.day||toISO(new Date()));
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px">'+
      '<b>'+esc(p?p.name:'?')+'</b> · '+(r.day||'')+' '+reportChip(r)+threadHtml(r)+
      '<input id="qr_'+r.id+'" placeholder="reply…" style="width:46%;font-size:12px;padding:4px 8px"> <button class="btn" style="font-size:11px;padding:3px 9px" data-qr="'+r.id+'">Reply</button> '+
      '<span style="margin-left:12px"></span>'+
      '<select id="qa_act_'+r.id+'" style="font-size:12px"><option value="add">add missed punch</option><option value="fix">correct a punch</option><option value="void">void a punch</option></select> '+
      '<select id="qa_ent_'+r.id+'" style="font-size:12px">'+es.map(e=>'<option value="'+e.id+'" '+(r.entryId==e.id?'selected':'')+'>'+entryLabel(e)+'</option>').join('')+'</select> '+
      '<select id="qa_kind_'+r.id+'" style="font-size:12px"><option>in</option><option>out</option></select> '+
      '<input id="qa_time_'+r.id+'" type="time" style="font-size:12px;padding:4px 6px"> '+
      '<button class="btn ok" style="font-size:11px;padding:4px 10px" data-qa="'+r.id+'">Apply amendment</button> '+
      '<button class="btn" style="font-size:11px;padding:4px 10px" data-qres="'+r.id+'">Resolve without change</button>'+
      '</div>';
  }).join('');
  box.querySelectorAll('[data-qr]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qr);const inp=document.getElementById('qr_'+r.id);
    if(!inp.value.trim())return;
    r.thread=(r.thread||[]).concat([{by:DB.currentUser.name,at:new Date().toISOString(),text:inp.value.trim()}]);
    r.status='answered';DB.save();renderTcQueue();});
  box.querySelectorAll('[data-qres]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qres);
    r.thread=(r.thread||[]).concat([{by:DB.currentUser.name,at:new Date().toISOString(),text:'Resolved without changes to the record.'}]);
    r.status='resolved';DB.save();renderTcQueue();});
  box.querySelectorAll('[data-qa]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qa);if(!r)return;
    const act=document.getElementById('qa_act_'+r.id).value;
    const entId=document.getElementById('qa_ent_'+r.id).value;
    const kind=document.getElementById('qa_kind_'+r.id).value;
    const time=document.getElementById('qa_time_'+r.id).value;
    if(act!=='void'&&!time){alert('Set the time for the amendment.');return;}
    if((act==='fix'||act==='void')&&!entId){alert('Pick the punch to amend.');return;}
    const reason=prompt('Reason for the amendment (goes in the permanent record):',(r.thread[0]&&r.thread[0].text)||'');
    if(!reason){alert('A reason is mandatory for amendments.');return;}
    const me=DB.currentUser;
    const target=entId?DB.timeclock.find(x=>x.id==entId):null;
    DB.timeclock.push({id:DB.newId(),personId:r.personId,day:r.day||toISO(new Date()),
      time:act==='void'?(target?target.time:'00:00'):time,
      kind:act==='void'?'void':kind,
      manual:act==='add',
      amends:act==='add'?null:+entId,
      reason,note:null,reportId:r.id});
    r.thread=(r.thread||[]).concat([{by:me.name,at:new Date().toISOString(),
      text:'✔ Amendment applied: '+(act==='add'?('added '+kind.toUpperCase()+' '+time):act==='fix'?('corrected to '+kind.toUpperCase()+' '+time):'voided the punch')+' — '+reason}]);
    r.status='resolved';
    DB.save();renderTcQueue();renderTeamMonth();renderPersonHistory();
  });
}
function exportTcMonth(){
  const y=tcM.getFullYear(),m=tcM.getMonth();
  const last=new Date(y,m+1,0).getDate(),today=toISO(new Date());
  const rows=[],raw=[];
  DB.people.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{
    for(let d=1;d<=last;d++){
      const iso=toISO(new Date(y,m,d));if(iso>today)break;
      const exp=tcExpectedDay(p.id,iso),info=tcDayInfo(p.id,iso);
      if(exp<=0&&!info.entries.length)continue;
      rows.push({Person:p.name,Day:iso,Punches:info.entries.map(entryLabel).join(' · '),
        'Worked (h)':Math.round(info.total/60*100)/100,'Expected (h)':exp,'Diff (h)':Math.round((info.total/60-exp)*100)/100});
      info.entries.forEach(e=>raw.push({Person:p.name,Day:e.day,Time:e.time,Kind:e.kind,Manual:e.manual?'yes':'',
        Reason:e.reason||'',RecordedAt:e.created_at||'',RecordedBy:e.created_by||'',Hash:e.hash||''}));
    }
  });
  exportXLSX('RENMAD_timeclock_'+y+'-'+String(m+1).padStart(2,'0')+'.xlsx',[{name:'Month',rows},{name:'Raw entries',rows:raw}]);
}
function exportTcArchive(){
  const rows=DB.timeclock.slice().sort((a,b)=>a.id-b.id).map(e=>({
    Id:e.id,Person:DB.personName(e.personId),Day:e.day,Time:e.time,Kind:e.kind,Manual:e.manual?'yes':'',
    Amends:e.amends||'',Reason:e.reason||'',ReportId:e.reportId||'',
    RecordedAt:e.created_at||'',RecordedBy:e.created_by||'',Hash:e.hash||''}));
  exportXLSX('RENMAD_timeclock_ARCHIVE_'+new Date().toISOString().slice(0,16).replace(':','')+'.xlsx',
    [{name:'Archive',rows}]);
}
boot(async()=>{
  if(USE_SUPABASE&&sb){
    try{const r=await sb.from('dc_logins').select('*');if(!r.error)LOGINS=r.data||[];}catch(e){}
  }
  render();
});
window.addEventListener('hashchange',render);
window.addEventListener('dc-remote',render);
