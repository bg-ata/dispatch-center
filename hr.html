<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RENMAD Dispatch Center — HR</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#D32230;--green:#3E8C28;--amber:#C77800;--blue:#29ACE3;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 80px;max-width:1240px}
  .nav{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:13px;padding:5px 11px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 10px}
  .tabs{display:flex;gap:4px;margin:10px 0 16px;border-bottom:2px solid var(--line)}
  .tabs button{border:none;background:none;padding:8px 16px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tabs button.on{color:var(--charcoal);border-bottom-color:var(--orange)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 4px;font-size:15px;color:var(--charcoal)}
  .panel .hint{font-size:12px;color:var(--muted);font-weight:400;margin:0 0 10px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.two{grid-template-columns:1fr}}
  select,button,input{font:inherit}
  input,select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;color:var(--ink)}
  .btn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);cursor:pointer}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.ok{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
  .btn.no{color:var(--red);border-color:#f0c4c4}
  .btn:hover{filter:brightness(.97)}
  .warn{background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .alarm{background:#FBEAEA;border:1px solid #E8B4B4;color:#8a1d1d;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:12px}
  .alarm a{color:#8a1d1d;font-weight:700}
  .decide{border-left:3px solid var(--orange)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #efede8;vertical-align:top}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .chip{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;border-radius:10px;padding:2px 9px;display:inline-block;white-space:nowrap}
  .empty{color:var(--muted);font-style:italic;padding:10px 2px}
  .frm label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
  .days{font-size:13px;color:var(--charcoal);font-weight:600;margin:2px 0 6px}
  .flags{font-size:12px;color:var(--red);margin:0 0 10px;min-height:15px}
  .flags div{margin-bottom:2px}
  .flag{color:var(--red);font-size:12px}
  /* calendar */
  .cal{overflow-x:auto}
  .cal table{border-collapse:collapse;font-size:11px;min-width:900px}
  .cal th{padding:2px 0;text-align:center;font-size:9px}
  .cal td{padding:0;border-bottom:1px solid #f0eee9;height:24px}
  .cal td.lab{white-space:nowrap;padding:2px 10px 2px 4px;font-weight:600;color:var(--charcoal);font-size:12px;position:sticky;left:0;background:var(--card);z-index:2}
  .cal td.lab .m{color:var(--muted);font-weight:400;font-size:10.5px}
  .dcell{width:26px;min-width:26px;text-align:center}
  .dcell.we{background:#f2f0ea}
  .dcell.hol{background:#E9DEF5}
  .dcell .blk{display:block;height:16px;margin:2px 1px;border-radius:3px}
  .blk.ok{background:var(--green)}
  .blk.pend{background:repeating-linear-gradient(45deg,#F0B429,#F0B429 4px,#fce9bb 4px,#fce9bb 8px)}
  .blk.rmt{background:var(--blue)}
  .blk.rmtp{background:repeating-linear-gradient(45deg,#29ACE3,#29ACE3 4px,#cdeaf7 4px,#cdeaf7 8px)}
  .blk.lv{background:var(--amber)}
  .legend{font-size:11.5px;color:var(--muted);margin-top:8px}
  .legend span.sw{display:inline-block;width:14px;height:11px;border-radius:3px;vertical-align:-1px;margin:0 4px 0 10px}
  .mnav{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .mnav b{font-size:14px;color:var(--charcoal);min-width:150px;text-align:center}
  /* allocation */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 12px}
  .chipbox{background:#faf9f6;border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--muted)}
  .chipbox b{display:block;font-size:16px;color:var(--charcoal);font-variant-numeric:tabular-nums}
  .chipbox.good b{color:var(--green)}.chipbox.bad b{color:var(--red)}
  td input.hrs{width:76px;text-align:right;padding:4px 7px}
  tr.auto td{color:var(--muted);background:#faf9f6}
  tr.total td{font-weight:700;border-top:2px solid var(--line);background:#f6f5f1}
  .code{font-size:11px;color:var(--muted)}
  /* compact allocation form: projects flow into as many columns as fit → one screen */
  .autoline{font-size:12px;color:var(--muted);background:#faf9f6;border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-bottom:10px}
  .autoline b{color:var(--charcoal)}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:2px 18px}
  .acell{display:flex;align-items:center;gap:8px;padding:5px 2px;border-bottom:1px solid #efede8;min-width:0}
  .acell .alab{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acell input.hrs{width:70px;text-align:right;padding:4px 7px;flex:0 0 auto}
  .atot{display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:700;border-top:2px solid var(--line);background:#f6f5f1;padding:9px 11px;margin-top:8px;border-radius:0 0 9px 9px}
  .atot .num{font-variant-numeric:tabular-nums}
  .mx{overflow-x:auto}
  .mx table{font-size:12px;min-width:640px}
  .mx td.c{text-align:center}
  .ok2{color:var(--green);font-weight:700}.no2{color:var(--red);font-weight:700}.na{color:#c9c6bd}
  .padd{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:10px}
  .padd label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>
<div class="app">
  <div id="nav"></div>
  <h1>🌴 HR</h1>
  <p class="sub">Holidays, weekly hour allocation and the time clock. Working days follow the official Madrid labour calendar — Mon–Thu 8 h + Fri 5.5 h, and 7 h days in July &amp; August.</p>
  <div class="tabs" id="tabs"></div>
  <div id="warnbox"></div>
  <div id="content"></div>
</div>
<script src="store.js?v=33"></script>
<script>
document.getElementById('nav').innerHTML=navBar('hr');
let calM=new Date();calM.setDate(1);
let weekISO=toISO(monday(new Date()));
const HRTABS=[['holidays','Holidays'],['allocation','Allocation'],['timeclock','Time clock']];
function activeTab(){const h=location.hash.replace('#','');return HRTABS.some(t=>t[0]===h)?h:'holidays';}
function render(){
  if(_tcTick){clearInterval(_tcTick);_tcTick=null;} // stop the live clock when leaving the time-clock tab
  const tab=activeTab();
  document.getElementById('tabs').innerHTML=HRTABS.map(([k,l])=>'<button class="'+(k===tab?'on':'')+'" data-tab="'+k+'">'+l+'</button>').join('');
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{location.hash=b.dataset.tab;render();});
  const warn=document.getElementById('warnbox');
  if(!DB.hrReady()){warn.innerHTML='<div class="warn">The HR module is not active yet — run <b>dispatch_hr.sql</b> (and <b>dispatch_hr2.sql</b>) in Supabase, then reload.</div>';document.getElementById('content').innerHTML='';return;}
  warn.innerHTML='';
  ({holidays:renderHolidays,allocation:renderAlloc,timeclock:renderTimeclock})[tab]();
}
/* ================= shared: alarms ================= */
function fmtRange(h){return h.dateFrom===h.dateTo?h.dateFrom:(h.dateFrom+' → '+h.dateTo);}
function isExemptDay(iso){ // periods where team overlaps are normal: August, Christmas, Easter week
  const d=ymd(iso),m=d.getMonth(),day=d.getDate();
  if(m===7)return true;
  if((m===11&&day>=22)||(m===0&&day<=6))return true;
  const e=easter(d.getFullYear());
  return d>=addDays(e,-7)&&d<=addDays(e,1);
}
function overlapDays(aF,aT,bF,bT){ // shared NON-EXEMPT working days of two ranges
  const from=aF>bF?aF:bF,to=aT<bT?aT:bT,out=[];
  if(from>to)return out;
  for(let d=ymd(from);toISO(d)<=to;d=addDays(d,1)){const iso=toISO(d);
    if(d.getDay()===0||d.getDay()===6||madHol(iso))continue;
    if(!isExemptDay(iso))out.push(iso);}
  return out;
}
function reqAlarms(r){ // ⚠ strings for one request (used at request time AND in the approval panel)
  const p=DB.person(r.personId),alarms=[];if(!p)return alarms;
  if(r.type==='remote'){
    const yr=r.dateFrom.slice(0,4);
    const used=remoteDaysUsed(r.personId,yr)+(r.id?0:(+r.workDays||0));
    if(used>REMOTE_MAX_DAYS)alarms.push('Remote quota: '+used+' of '+REMOTE_MAX_DAYS+' working days in '+yr+' — over the 4-week limit.');
    return alarms;
  }
  DB.holidays.filter(o=>o.id!=r.id&&(o.type||'vacation')!=='remote'&&o.status!=='denied'&&o.status!=='cancelled'&&o.personId!=r.personId
    &&DB.person(o.personId)&&DB.person(o.personId).role===p.role).forEach(o=>{
    const ov=overlapDays(r.dateFrom,r.dateTo,o.dateFrom,o.dateTo);
    if(ov.length)alarms.push('Team overlap: '+DB.personName(o.personId)+' is also off '+ov.length+' of these working day'+(ov.length===1?'':'s')+' (outside Xmas / Easter / August).');
  });
  DB.holidays.filter(o=>o.id!=r.id&&(o.type||'vacation')!=='remote'&&o.status!=='denied'&&o.status!=='cancelled'&&o.personId==r.personId&&o.id!=r.replaces).forEach(o=>{
    let gap=null;
    if(o.dateTo<r.dateFrom)gap=workingDaysBetween(toISO(addDays(ymd(o.dateTo),1)),toISO(addDays(ymd(r.dateFrom),-1)));
    else if(r.dateTo<o.dateFrom)gap=workingDaysBetween(toISO(addDays(ymd(r.dateTo),1)),toISO(addDays(ymd(o.dateFrom),-1)));
    if(gap!=null&&gap>0&&gap<=5)alarms.push('Broken-up holidays: only '+gap+' working day'+(gap===1?'':'s')+' in the office between this and '+fmtRange(o)+' — something is not quite right.');
  });
  return alarms;
}
function typeChip(r){const ty=r.type||'vacation';if(ty==='vacation')return '';
  const col=ty==='remote'?'var(--blue)':'var(--amber)';
  return '<span class="chip" style="background:'+col+'">'+TYPE_LABEL[ty]+'</span> ';}
function statusChip(h){
  if(h.status==='approved')return '<span class="chip" style="background:var(--green)">Approved</span>';
  if(h.status==='denied')return '<span class="chip" style="background:var(--red)">Denied</span>';
  if(h.status==='cancelled')return '<span class="chip" style="background:#9AA0A8">Cancelled</span>';
  return '<span class="chip" style="background:var(--amber)">'+holStageLabel(h)+'</span>';
}
function changeAdvice(r){ // what a change request means for the final holiday
  if(!r.replaces)return null;
  const o=DB.holidays.find(x=>x.id==r.replaces);if(!o)return null;
  const net=(+r.workDays||0)-(+o.workDays||0);
  return 'CHANGE of '+fmtRange(o)+' ('+o.workDays+'d) → '+fmtRange(r)+' ('+r.workDays+'d) · net '+(net>0?'+':'')+net+' day'+(Math.abs(net)===1?'':'s')+' on the balance.';
}
/* ================= TAB 1: HOLIDAYS ================= */
function renderHolidays(){
  const me=DB.currentUser;
  document.getElementById('content').innerHTML=
    '<div id="decidebox"></div>'+
    '<div class="two">'+
    '<div class="panel"><h3>Request time off</h3>'+
    '<p class="hint">Your request goes to <span id="chainTxt"></span>. Remote working: up to 4 weeks ('+REMOTE_MAX_DAYS+' working days) per year. Approved holidays can be changed — use “Request change” next to them.</p>'+
    '<div id="chgBanner" style="display:none;background:#FFF3E8;border:1px solid #F3C49B;color:#8a4a12;font-size:12.5px;padding:8px 12px;border-radius:8px;margin-bottom:10px"></div>'+
    '<div class="frm">'+
    '<label>Type<select id="r_type"><option value="vacation">Holidays</option><option value="remote">Remote working</option></select></label>'+
    '<label>From<input type="date" id="r_from"></label>'+
    '<label>To (inclusive)<input type="date" id="r_to"></label>'+
    '<div class="days" id="r_days">&nbsp;</div><div class="flags" id="r_flags"></div>'+
    '<label>Note (optional)<input id="r_note" placeholder="e.g. family trip"></label></div>'+
    '<button class="btn primary" id="r_send">Send request</button>'+
    '<span id="r_msg" style="font-size:12px;color:var(--green);margin-left:8px"></span></div>'+
    '<div class="panel"><h3>My requests</h3><p class="hint" id="myBal"></p><table id="mine"></table></div>'+
    '</div>'+
    (DB.isHRAdmin()?
      '<div class="panel"><h3>Load past holidays (HR)</h3><p class="hint">Enter what people already took or booked this year — added directly as APPROVED so the balances are right.</p>'+
      '<div class="padd"><label>Person<select id="b_who"></select></label>'+
      '<label>Type<select id="b_type"><option value="vacation">Holidays</option><option value="remote">Remote</option></select></label>'+
      '<label>From<input type="date" id="b_from"></label><label>To<input type="date" id="b_to"></label>'+
      '<label>Note<input id="b_note" placeholder="loaded from record" style="width:160px"></label>'+
      '<button class="btn primary" id="b_add">Add as approved</button><span id="b_msg" style="font-size:12px;color:var(--green)"></span></div>'+
      '<div class="padd" style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px"><label>Cancel an approved holiday<select id="x_hol" style="max-width:340px"></select></label>'+
      '<button class="btn no" id="x_go">Cancel it</button><span id="x_msg" style="font-size:12px;color:var(--green)"></span></div>'+
      '</div>'+
      '<div class="panel"><h3>Place someone on leave (HR)</h3><p class="hint">Sick / maternity / paternity leave. During it the person doesn’t have to clock in or allocate hours — the app stops expecting either. This does <b>not</b> use their 23-day holiday allowance.</p>'+
      '<div class="padd"><label>Person<select id="lv_who"></select></label>'+
      '<label>Type<select id="lv_type"><option value="sick">Sick leave</option><option value="maternity">Maternity</option><option value="paternity">Paternity</option></select></label>'+
      '<label>From<input type="date" id="lv_from"></label><label>To<input type="date" id="lv_to"></label>'+
      '<label>Note<input id="lv_note" placeholder="optional" style="width:150px"></label>'+
      '<button class="btn primary" id="lv_add">Add leave</button><span id="lv_msg" style="font-size:12px;color:var(--green)"></span></div></div>'+
      '<div class="panel"><h3>Carry-over / borrowed days (HR)</h3><p class="hint">Add days a person carries over from last year, or lets them borrow from next year (upon approval). Positive = extra days available this year; use a negative number to remove. Carried-over days should be enjoyed before 28 Feb.</p>'+
      '<div class="padd"><label>Person<select id="aj_who"></select></label>'+
      '<label>Year<input type="number" id="aj_year" value="'+new Date().getFullYear()+'" style="width:90px"></label>'+
      '<label>Days (+/−)<input type="number" step="0.5" id="aj_days" style="width:90px" placeholder="e.g. 3"></label>'+
      '<label>Reason<select id="aj_kind"><option value="carryover">Carry-over from last year</option><option value="borrow">Borrowed from next year</option><option value="other">Other adjustment</option></select></label>'+
      '<button class="btn primary" id="aj_add">Add</button><span id="aj_msg" style="font-size:12px;color:var(--green)"></span></div></div>'
      :'')+
    '<div class="panel"><h3>Team calendar</h3><p class="hint" id="calHint"></p>'+
    '<div class="mnav"><button class="btn" id="c_prev">‹</button><b id="c_lab"></b><button class="btn" id="c_next">›</button></div>'+
    '<div class="cal" id="cal"></div>'+
    '<div class="legend"><span class="sw" style="background:var(--green)"></span>holidays'+
    '<span class="sw" style="background:repeating-linear-gradient(45deg,#F0B429,#F0B429 4px,#fce9bb 4px,#fce9bb 8px)"></span>pending'+
    '<span class="sw" style="background:var(--blue)"></span>remote'+
    '<span class="sw" style="background:var(--amber)"></span>sick / parental leave'+
    '<span class="sw" style="background:#E9DEF5"></span>Madrid bank holiday'+
    '<span class="sw" style="background:#f2f0ea"></span>weekend</div>'+
    '<p class="hint" id="holList" style="margin-top:8px"></p></div>'+
    '<div class="panel"><h3>Madrid bank holidays <span id="yhY"></span></h3><p class="hint">The official “calendario laboral” this app deducts automatically — review against the BOCM each January and tell Claude if any date moved.</p><div id="yearHols"></div></div>';
  renderDecide();renderMine();renderBackfill();renderCal();wireForm();
  document.getElementById('c_prev').onclick=()=>{calM.setMonth(calM.getMonth()-1);renderCal();};
  document.getElementById('c_next').onclick=()=>{calM.setMonth(calM.getMonth()+1);renderCal();};
}
function renderDecide(){
  const box=document.getElementById('decidebox');
  const list=DB.holidays.filter(holActsOnMe);
  if(!list.length){box.innerHTML='';return;}
  let h='<div class="panel decide"><h3>⏰ Needs your decision</h3><p class="hint">Requests at your step of the chain. Red flags are automatic checks — they don’t block, they warn.</p><table>'+
    '<tr><th>Who</th><th>Type</th><th>Dates</th><th>Days</th><th>Note</th><th>⚠ Flags</th><th></th></tr>';
  list.forEach(r=>{
    const p=DB.person(r.personId);
    const flags=reqAlarms(r);
    const adv=changeAdvice(r);
    h+='<tr><td><b>'+(p?p.name:'?')+'</b> <span style="color:var(--muted);font-size:11px">'+(p?p.role:'')+'</span></td>'+
      '<td>'+(r.type==='remote'?'Remote':'Holidays')+'</td>'+
      '<td>'+fmtRange(r)+'</td><td>'+(r.workDays||'?')+'</td><td>'+(r.note||'')+'</td>'+
      '<td>'+(adv?'<div class="flag" style="color:var(--amber)">🔁 '+adv+'</div>':'')+
      (flags.length?flags.map(f=>'<div class="flag">⚠ '+f+'</div>').join(''):(adv?'':'<span style="color:var(--muted)">none</span>'))+'</td>'+
      '<td style="white-space:nowrap"><button class="btn ok" data-ap="'+r.id+'">Approve</button> <button class="btn no" data-dn="'+r.id+'">Deny</button></td></tr>';
  });
  box.innerHTML=h+'</table></div>';
  box.querySelectorAll('[data-ap]').forEach(b=>b.onclick=()=>decide(b.dataset.ap,true));
  box.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>decide(b.dataset.dn,false));
}
function decide(id,ok){
  const r=DB.holidays.find(x=>x.id==id);if(!r)return;
  const me=DB.currentUser;
  let note='';
  if(!ok){note=prompt('Reason for denying (shown to '+DB.personName(r.personId)+'):')||'';}
  r.log=(r.log||[]).concat([{by:me.name,at:new Date().toISOString(),action:(ok?'approved ('+r.status+' step)':'denied'),note}]);
  r.status=ok?holNextStatus(r):'denied';
  /* a fully approved CHANGE releases the holiday it replaces (kept visible as cancelled) */
  if(r.status==='approved'&&r.replaces){
    const o=DB.holidays.find(x=>x.id==r.replaces);
    if(o&&o.status!=='cancelled'){o.status='cancelled';
      o.log=(o.log||[]).concat([{by:me.name,at:new Date().toISOString(),action:'cancelled — replaced by the approved change to '+fmtRange(r)}]);}
  }
  DB.save();render();
}
function renderMine(){
  const me=DB.currentUser;const tbl=document.getElementById('mine');
  if(!me){tbl.innerHTML='<tr><td class="empty">Log in to request holidays.</td></tr>';return;}
  document.getElementById('chainTxt').textContent=holChain(me).map(s=>s.key==='hr'?'HR':s.who.name).join(' → ');
  const yr=new Date().getFullYear();
  const mine=DB.holidays.filter(h=>h.personId==me.id&&(h.type||'vacation')!=='adjust').sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));
  const used=holUsed(me.id,yr),adj=holAdjust(me.id,yr),rem=holRemaining(me.id,yr);
  document.getElementById('myBal').innerHTML='Holidays '+yr+': <b>'+used+' used · '+rem+' left</b> of '+holAllowance(me)+(adj?' ('+(adj>0?'+':'')+adj+' carry/borrow)':'')+
    ' — <span style="color:#8a4a12">'+holDeadlineText(yr)+'</span>.';
  let h='<tr><th>Dates</th><th>Days</th><th>Status</th><th></th></tr>';
  if(!mine.length)h+='<tr><td colspan="4" class="empty">No requests yet.</td></tr>';
  mine.forEach(r=>{

    h+='<tr><td>'+typeChip(r)+fmtRange(r)+chg+'</td><td>'+(r.workDays||'?')+'</td>'+
      '<td>'+statusChip(r)+(deny?' <span style="color:var(--muted);font-size:11px">'+deny+'</span>':'')+'</td>'+
      '<td>'+(pending&&!hrLeave?'<button class="btn" style="font-size:11px;padding:3px 9px" data-cx="'+r.id+'">Cancel</button>':'')+
      (r.status==='approved'&&r.type==='vacation'?'<button class="btn" style="font-size:11px;padding:3px 9px" data-chg="'+r.id+'">Request change</button>':'')+'</td></tr>';
  });

    if(!confirm('Withdraw this request?'))return;

    const wd=workingDaysBetween(f.value,t.value);
    const hols=[];for(let d=ymd(f.value);toISO(d)<=t.value;d=addDays(d,1)){const n=madHol(toISO(d));if(n&&d.getDay()!==0&&d.getDay()!==6)hols.push(toISO(d).slice(5)+' '+n);}

    fl.innerHTML=reqAlarms(fake).map(a=>'<div>⚠ '+a+'</div>').join('');
  };
  f.onchange=upd;t.onchange=upd;ty.onchange=upd;

    if(!f.value||!t.value||t.value<f.value){alert('Pick a valid date range.');return;}
    const wd=workingDaysBetween(f.value,t.value);
    if(wd<=0){alert('That range has no working days (weekend / bank holidays).');return;}
    if(ty.value==='remote'&&remoteDaysUsed(me.id,f.value.slice(0,4))+wd>REMOTE_MAX_DAYS){
      alert('That would exceed the remote-working limit of 4 weeks ('+REMOTE_MAX_DAYS+' working days) this year.');return;}
    const chain=holChain(me);
    const orig=changeOf?DB.holidays.find(x=>x.id==changeOf):null;
    DB.holidays.push({id:DB.newId(),personId:me.id,dateFrom:f.value,dateTo:t.value,workDays:wd,type:ty.value,
      replaces:orig?orig.id:null,
      note:document.getElementById('r_note').value.trim(),status:chain[0].key,
      log:[{by:me.name,at:new Date().toISOString(),action:orig?('requested CHANGE of '+fmtRange(orig)+' ('+orig.workDays+'d)'):('requested '+(ty.value==='remote'?'remote working':'holidays'))}]});
    DB.save();

    f.value='';t.value='';document.getElementById('r_note').value='';upd();
    const m=document.getElementById('r_msg');m.textContent='Sent — '+(chain[0].key==='hr'?'HR':chain[0].who.name)+' has been flagged.';
    setTimeout(()=>m.textContent='',4000);

}

const fmtH=v=>(Math.round(v*100)/100).toLocaleString('es-ES');
/* project numbers follow an order: category prefix ("02.") first, then the running
   accounting code, then insertion order. New event codes continue the sequence. */
function projPrefix(p){const m=(p.label||'').match(/^\s*(\d+)/);return m?+m[1]:99;}
function projCodeNum(p){const m=(p.code||'').match(/\d+/);return m?+m[0]:0;}
function projCmp(a,b){return projPrefix(a)-projPrefix(b)||projCodeNum(a)-projCodeNum(b)||(a.sort||0)-(b.sort||0);}
function nextProjectCode(){const mx=Math.max(70314,...DB.projects.map(projCodeNum));return String(mx+1);}
function activeProjects(){return DB.projects.filter(p=>p.active!==false&&!p.kind).sort(projCmp);}
function autoProject(kind){return DB.projects.find(p=>p.kind===kind);}

function renderWeek(){
  const me=DB.currentUser;
  const mon=ymd(weekISO),fri=addDays(mon,4);
  document.getElementById('w_lab').textContent='Week of '+weekISO+' ('+fmtD(mon)+' – '+fmtD(fri)+')';
  if(!me){document.getElementById('ts').innerHTML='<tr><td class="empty">Log in to fill your hours.</td></tr>';return;}
  const w=weekWorkInfo(weekISO,me.id);
  const t=tsFor(me.id,weekISO);
  const manual=t?Object.assign({},t.hours):{};
  const sum=Object.values(manual).reduce((a,v)=>a+(+v||0),0);
  const remaining=Math.round((w.toAllocate-sum)*100)/100;
  const over=remaining<-0.01, exact=Math.abs(remaining)<0.01;
  document.getElementById('chips').innerHTML=
    '<span class="chipbox">Required<b>'+fmtH(w.required)+' h</b></span>'+
    (w.fest>0?'<span class="chipbox" title="'+w.festNames.join(', ')+'">00. Festivos (auto)<b>'+fmtH(w.fest)+' h</b></span>':'')+
    (w.vac>0?'<span class="chipbox">04. Vacaciones (auto)<b>'+fmtH(w.vac)+' h</b></span>':'')+
    (w.leave>0?'<span class="chipbox">On leave (auto)<b>'+fmtH(w.leave)+' h</b></span>':'')+
    '<span class="chipbox">To allocate<b>'+fmtH(w.toAllocate)+' h</b></span>'+
    '<span class="chipbox '+(exact?'good':'bad')+'" id="remChip">'+(over?'⚠ Over by':'Remaining')+'<b>'+(exact?'✓ 0':fmtH(Math.abs(remaining))+' h')+'</b></span>';
  const fp=autoProject('festivos'),vp=autoProject('vacaciones');
  const autos=[];
  if(w.fest>0&&fp)autos.push('<b>'+fp.label+'</b> '+fmtH(w.fest)+' h <span class="code">('+w.festNames.join(', ')+')</span>');
  if(w.vac>0&&vp)autos.push('<b>'+vp.label+'</b> '+fmtH(w.vac)+' h <span class="code">(approved holidays)</span>');
  let h=autos.length?'<div class="autoline">Auto-filled for you: '+autos.join(' &nbsp;·&nbsp; ')+'</div>':'';
  h+='<div class="agrid">'+activeProjects().map(p=>
      '<label class="acell" title="'+p.label+(p.code?' ('+p.code+')':'')+'"><span class="alab">'+p.label+(p.code?' <span class="code">('+p.code+')</span>':'')+'</span>'+
      '<input class="hrs" type="number" min="0" step="0.25" data-pid="'+p.id+'" value="'+(manual[p.id]!=null?manual[p.id]:'')+'" placeholder="0"></label>').join('')+'</div>';
  h+='<div class="atot"><span>Total (with auto-filled lines)</span><span class="num" id="tsTotal">'+fmtH(sum+w.fest+w.vac)+' / '+fmtH(w.required)+' h</span></div>';
  document.getElementById('ts').innerHTML=h;
  document.querySelectorAll('#ts input').forEach(inp=>inp.oninput=()=>{
    let s=0;document.querySelectorAll('#ts input').forEach(i=>s+=(+i.value||0));
    document.getElementById('tsTotal').textContent=fmtH(s+w.fest+w.vac)+' / '+fmtH(w.required)+' h';
    const rem=Math.round((w.toAllocate-s)*100)/100,ov=rem<-0.01,ex=Math.abs(rem)<0.01;
    const chip=document.getElementById('remChip');
    chip.className='chipbox '+(ex?'good':'bad');
    chip.innerHTML=(ov?'⚠ Over by':'Remaining')+'<b>'+(ex?'✓ 0':fmtH(Math.abs(rem))+' h')+'</b>';
    // flag the over amount on the total row too
    const tot=document.getElementById('tsTotal');tot.style.color=ov?'var(--red)':'';
  });
}
function saveWeek(){
  const me=DB.currentUser;if(!me){alert('Log in first.');return;}
  const hours={};
  document.querySelectorAll('#ts input').forEach(i=>{const v=+i.value;if(v>0)hours[i.dataset.pid]=v;});
  const w=weekWorkInfo(weekISO,me.id);
  const sum=Object.values(hours).reduce((a,v)=>a+(+v||0),0);
  if(sum-w.toAllocate>0.01){ // the week can't hold more than it has — block it
    alert('You have allocated '+fmtH(sum)+' h but this week only has '+fmtH(w.toAllocate)+' h to allocate'+
      ((w.fest||w.vac)?' (bank holidays / holidays already take the rest)':'')+'.\n\nPlease take '+fmtH(sum-w.toAllocate)+' h off before saving.');
    return;
  }
  let t=tsFor(me.id,weekISO);
  if(t)t.hours=hours;else DB.timesheets.push({id:DB.newId(),personId:me.id,week:weekISO,hours});
  DB.save();
  const m=document.getElementById('w_msg');
  m.style.color=Math.abs(sum-w.toAllocate)<0.01?'var(--green)':'var(--amber)';
  m.textContent=Math.abs(sum-w.toAllocate)<0.01?'Saved — week complete ✓':'Saved — '+fmtH(w.toAllocate-sum)+' h still unallocated';
  setTimeout(()=>m.textContent='',5000);
  renderAlarms();renderWeek();renderMgr();
}
function lastWeeks(n){
  const out=[],cur=monday(new Date());
  for(let i=n-1;i>=0;i--){const w=toISO(addDays(cur,-7*i));if(w>=HR_START)out.push(w);}
  return out;
}

    if(fp&&festT>0)h+=row(fp.label+' (auto)','',festT);
    if(vp&&vacT>0)h+=row(vp.label+' (auto)','',vacT);
    DB.projects.filter(p=>!p.kind).sort(projCmp).forEach(p=>{
      if(totals[p.id])h+=row(p.label,p.code,totals[p.id]);
    });
    h+='<tr class="total"><td>Total</td><td></td><td class="num">'+fmtH(allT)+'</td><td></td></tr></table>'+
      '<div style="margin-top:10px"><button class="btn" id="xlsBtn">⬇ Excel (all allocations)</button></div>';
    h+='</div>';
  }
  // Project numbers: created / retired ONLY by Belén, Carlos and Jesús (accounting).
  // They follow an order — new event codes continue the running accounting sequence.
  if(DB.canManageProjects()){
    h+='<div class="panel"><h3>Project numbers</h3><p class="hint">Add next year’s events here; retire finished ones (their history stays). '+
      'Only Belén, Carlos and Jesús can create these — and the code follows the running order.</p><table>'+
      '<tr><th>#</th><th>Project</th><th>Code</th><th></th></tr>'+
      DB.projects.filter(p=>!p.kind).sort(projCmp).map((p,i)=>'<tr'+(p.active===false?' style="opacity:.45"':'')+'><td class="code">'+(i+1)+'</td><td>'+p.label+'</td><td class="code">'+(p.code||'—')+'</td>'+
        '<td><button class="btn" style="font-size:11px;padding:3px 9px" data-tgl="'+p.id+'">'+(p.active===false?'Reactivate':'Retire')+'</button></td></tr>').join('')+
      '</table><div class="padd"><label>New project label<input id="np_label" placeholder="02. Hidrógeno 27"></label>'+
      '<label>Cost code<input id="np_code" value="'+nextProjectCode()+'" style="width:100px"></label>'+
      '<button class="btn primary" id="np_add" style="font-size:12px">+ Add</button></div>'+
      '<p class="hint" style="margin-top:8px">Next code in sequence: <b>'+nextProjectCode()+'</b> — change it only if this event isn’t the next in line.</p></div>';
  }
  box.innerHTML=h;
  const xb=document.getElementById('xlsBtn');
  if(xb)xb.onclick=exportHours;
  box.querySelectorAll('[data-tgl]').forEach(b=>b.onclick=()=>{
    if(!DB.canManageProjects()){alert('Only Belén, Carlos and Jesús can retire project numbers.');return;}
    const p=DB.projects.find(x=>x.id==b.dataset.tgl);if(!p)return;
    p.active=(p.active===false);DB.save();renderMgr();renderWeek();});
  const ab=document.getElementById('np_add');
  if(ab)ab.onclick=()=>{
    if(!DB.canManageProjects()){alert('Only Belén, Carlos and Jesús can create project numbers.');return;}
    const l=document.getElementById('np_label').value.trim();if(!l){alert('Give the project a label.');return;}
    const code=document.getElementById('np_code').value.trim()||null;
    if(code&&DB.projects.some(p=>(p.code||'')===code)){alert('Code '+code+' is already in use by "'+DB.projects.find(p=>(p.code||'')===code).label+'". Codes must be unique and follow the order.');return;}
    const suggested=nextProjectCode();
    if(code&&/^\d+$/.test(code)&&+code<+suggested&&!confirm('Code '+code+' is below the next number in sequence ('+suggested+'). Add it out of order anyway?'))return;
    DB.projects.push({id:DB.newId(),label:l,code:code,kind:null,
      sort:Math.max(0,...DB.projects.map(p=>p.sort||0))+1,active:true});
    DB.save();renderMgr();renderWeek();};
}
function exportHours(){
  const rows=[];
  DB.timesheets.forEach(t=>{
    const who=DB.personName(t.personId);
    Object.keys(t.hours||{}).forEach(pid=>{const p=DB.projects.find(x=>x.id==pid);
      rows.push({Person:who,Week:t.week,Project:p?p.label:pid,Code:p&&p.code||'',Hours:+t.hours[pid]||0});});
  });
  const cur=toISO(monday(new Date()));
  const fp=autoProject('festivos'),vp=autoProject('vacaciones');
  DB.people.forEach(p=>{for(let m=ymd(HR_START);toISO(m)<=cur;m=addDays(m,7)){
    const w=weekWorkInfo(toISO(m),p.id);
    if(w.fest>0&&fp)rows.push({Person:p.name,Week:toISO(m),Project:fp.label,Code:'',Hours:w.fest});
    if(w.vac>0&&vp)rows.push({Person:p.name,Week:toISO(m),Project:vp.label,Code:'',Hours:w.vac});
  }});
  rows.sort((a,b)=>a.Week===b.Week?a.Person.localeCompare(b.Person):a.Week.localeCompare(b.Week));
  exportXLSX('RENMAD_hours_'+new Date().toISOString().slice(0,10)+'.xlsx',[{name:'Allocations',rows}]);
}
/* ================= TAB 3: TIME CLOCK (registro horario) ================= */
let tcM=new Date();tcM.setDate(1);
let _tcTick=null;
let tcWho=null;
const fmtMin=m=>Math.floor(m/60)+' h '+String(Math.round(m%60)).padStart(2,'0');
const nowHM=()=>{const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
function entryLabel(e){return e.kind.toUpperCase()+' '+(e.time||'').slice(0,5)+(e.manual?' *':'');} // display HH:MM, full HH:MM:SS kept in the record
function renderTimeclock(){
  const me=DB.currentUser;
  if(!DB.tcReady()){document.getElementById('content').innerHTML='<div class="warn">The time clock is not active yet — run <b>dispatch_hr3.sql</b> in Supabase, then reload.</div>';return;}

    '<div id="tcAlarm"></div>'+
    '<div class="two">'+

    '<div id="tcState"></div></div>'+
    '<div class="panel"><h3>Report a mistake</h3><p class="hint">Forgot to clock, or a punch is wrong? Say what happened — it opens a message thread with HR (Belén / Jesús), who make the correction. Everything is logged.</p>'+
    '<div class="frm"><label>Day<input type="date" id="tr_day" value="'+toISO(new Date())+'"></label>'+
    '<label>Punch concerned (optional)<select id="tr_entry"></select></label>'+
    '<label>What happened<input id="tr_text" placeholder="e.g. I forgot to clock out yesterday — I left at 18:15"></label></div>'+
    '<button class="btn primary" id="tr_send">Send to HR</button><span id="tr_msg" style="font-size:12px;color:var(--green);margin-left:8px"></span>'+
    '<div id="myReports" style="margin-top:14px"></div></div>'+
    '</div>'+
    '<div class="panel"><h3>My month</h3>'+
    '<div class="mnav"><button class="btn" id="tm_prev">‹</button><b id="tm_lab"></b><button class="btn" id="tm_next">›</button></div>'+
    '<div class="mx" id="myMonth"></div>'+
    '<p class="hint" style="margin-top:8px">* = entry added afterwards. Amended punches stop counting but stay in the permanent archive with who/when/why.</p></div>'+
    (hradmin?'<div class="panel decide"><h3>🛠 Corrections queue (HR)</h3><p class="hint">Workers report, you correct. Amendments are new linked entries — the original is never touched. Replies and resolutions are all logged.</p><div id="tcQueue"></div></div>'+
    '<div class="panel"><h3>Team time sheet (HR)</h3><div class="mnav"><select id="tw_who"></select><button class="btn" id="tw_prev">‹</button><b id="tw_lab"></b><button class="btn" id="tw_next">›</button>'+
    '<button class="btn" id="tcXlsM" style="font-size:12px">⬇ Month, everyone</button><button class="btn" id="tcXlsA" style="font-size:12px">⬇ Full archive (hash-chained)</button></div>'+

  renderTcState();renderTcAlarm();wireReport();renderMyReports();renderMyMonth();
  document.getElementById('tm_prev').onclick=()=>{tcM.setMonth(tcM.getMonth()-1);renderMyMonth();renderTeamMonth();};
  document.getElementById('tm_next').onclick=()=>{tcM.setMonth(tcM.getMonth()+1);renderMyMonth();renderTeamMonth();};
  if(hradmin){

    if(!tcWho)tcWho=+tw.value;
    tw.onchange=()=>{tcWho=+tw.value;renderTeamMonth();};
    document.getElementById('tw_prev').onclick=()=>{tcM.setMonth(tcM.getMonth()-1);renderMyMonth();renderTeamMonth();};
    document.getElementById('tw_next').onclick=()=>{tcM.setMonth(tcM.getMonth()+1);renderMyMonth();renderTeamMonth();};
    document.getElementById('tcXlsM').onclick=exportTcMonth;
    document.getElementById('tcXlsA').onclick=exportTcArchive;
    renderTcQueue();renderTeamMonth();
  }
}
function renderTcState(){
  const me=DB.currentUser,box=document.getElementById('tcState');
  if(_tcTick){clearInterval(_tcTick);_tcTick=null;}
  if(!me){box.innerHTML='<div class="empty">Log in to clock in.</div>';return;}
  const today=toISO(new Date()),info=tcDayInfo(me.id,today),exp=tcExpectedDay(me.id,today);
  box.innerHTML=
    '<div style="font-size:16px;font-weight:700;color:'+(info.open?'var(--green)':'var(--charcoal)')+';margin-bottom:2px" id="tcStateLbl">'+
    (info.open?'🟢 Clocked IN':'⚪ Clocked out')+'</div>'+
    '<div style="font-size:34px;font-weight:800;color:var(--charcoal);font-variant-numeric:tabular-nums;line-height:1.05" id="tcLive">0:00:00</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">worked today'+(exp?' · '+exp+' h expected':' · no work expected today')+'</div>'+
    '<button class="btn primary" id="punchBtn" style="font-size:15px;padding:10px 22px">'+(info.open?'Clock OUT':'Clock IN')+'</button>'+
    '<div style="margin-top:12px;font-size:12.5px">'+(info.entries.length?('Today: '+info.entries.map(entryLabel).join(' · ')):'No punches yet today.')+'</div>';
  const tick=()=>{const li=tcLiveSeconds(me.id,today);const el=document.getElementById('tcLive');if(el)el.textContent=fmtHMS(li.seconds);};
  tick();if(info.open)_tcTick=setInterval(tick,1000);
  document.getElementById('punchBtn').onclick=()=>{
    DB.timeclock.push({id:DB.newId(),personId:me.id,day:today,time:nowHMS(),kind:info.open?'out':'in',manual:false,amends:null,reason:null,note:null,reportId:null});
    DB.save();renderTcState();renderMyMonth();
  };
}
function renderTcAlarm(){
  const me=DB.currentUser,box=document.getElementById('tcAlarm');
  if(!me){box.innerHTML='';return;}
  const miss=tcMissingDays(me.id);
  const ot=tcOvertimeWeeks(me.id);
  let h='';
  if(miss.length)h+='<div class="alarm">⏰ <b>Days with no punches:</b> '+miss.join(' · ')+' — report what happened so HR can complete the record.</div>';
  if(ot.length)h+='<div class="alarm">⚠ <b>Over the weekly hours:</b> '+ot.map(o=>o.week+' — '+fmtHMS(o.worked*3600).replace(/:\d\d$/,'')+' h clocked vs '+o.allowed+' h allowed (+'+(Math.round(o.over*10)/10)+' h)').join(' · ')+'. The day-to-day is flexible, but the weekly total is over — please balance it.</div>';
  box.innerHTML=h;
}
function wireReport(){
  const me=DB.currentUser;
  const daySel=document.getElementById('tr_day'),entSel=document.getElementById('tr_entry');
  const fill=()=>{const es=me?tcEffective(me.id,daySel.value):[];
    entSel.innerHTML='<option value="">— whole day / forgot to clock —</option>'+es.map(e=>'<option value="'+e.id+'">'+entryLabel(e)+'</option>').join('');};
  daySel.onchange=fill;fill();
  document.getElementById('tr_send').onclick=()=>{
    if(!me){alert('Log in first.');return;}
    const txt=document.getElementById('tr_text').value.trim();
    if(!txt){alert('Say what happened — HR needs it to correct the record.');return;}
    DB.tcreports.push({id:DB.newId(),personId:me.id,day:daySel.value,entryId:entSel.value?+entSel.value:null,
      thread:[{by:me.name,at:new Date().toISOString(),text:txt}],status:'open'});
    DB.save();
    document.getElementById('tr_text').value='';
    const m=document.getElementById('tr_msg');m.textContent='Sent — HR has been flagged.';setTimeout(()=>m.textContent='',4000);
    renderMyReports();
  };
}
function threadHtml(r){
  return '<div style="background:#faf9f6;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:6px 0;font-size:12.5px">'+
    (r.thread||[]).map(m=>'<div style="margin-bottom:4px"><b>'+m.by+'</b> <span style="color:var(--muted);font-size:11px">'+(m.at||'').slice(0,16).replace('T',' ')+'</span><br>'+m.text+'</div>').join('')+'</div>';
}
function reportChip(r){
  return r.status==='resolved'?'<span class="chip" style="background:var(--green)">Resolved</span>'
    :r.status==='answered'?'<span class="chip" style="background:var(--blue)">Answered</span>'
    :'<span class="chip" style="background:var(--amber)">Open</span>';
}
function renderMyReports(){
  const me=DB.currentUser,box=document.getElementById('myReports');
  if(!me||!box)return;
  const mine=DB.tcreports.filter(r=>r.personId==me.id).sort((a,b)=>b.id-a.id).slice(0,6);
  if(!mine.length){box.innerHTML='';return;}
  box.innerHTML='<div style="font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px">My reports</div>'+
    mine.map(r=>'<div style="margin-bottom:10px"><b>'+(r.day||'')+'</b> '+reportChip(r)+threadHtml(r)+
      (r.status!=='resolved'?'<input id="rr_'+r.id+'" placeholder="reply…" style="width:70%;font-size:12px;padding:4px 8px"> <button class="btn" style="font-size:11px;padding:3px 9px" data-rr="'+r.id+'">Send</button>':'')+'</div>').join('');
  box.querySelectorAll('[data-rr]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.rr);const inp=document.getElementById('rr_'+r.id);
    if(!inp.value.trim())return;
    r.thread=(r.thread||[]).concat([{by:me.name,at:new Date().toISOString(),text:inp.value.trim()}]);
    if(r.status==='answered')r.status='open';
    DB.save();renderMyReports();});
}
function monthTable(personId){
  const y=tcM.getFullYear(),m=tcM.getMonth();
  const last=new Date(y,m+1,0).getDate(),today=toISO(new Date());
  let h='<table><tr><th>Day</th><th>Punches</th><th class="num">Worked</th><th class="num">Expected</th><th class="num">Diff</th></tr>';
  let wSum=0,eSum=0,any=false;
  for(let d=1;d<=last;d++){
    const iso=toISO(new Date(y,m,d));
    if(iso>today)break;
    const exp=tcExpectedDay(personId,iso);
    const info=tcDayInfo(personId,iso);
    if(exp<=0&&!info.entries.length)continue;
    any=true;wSum+=info.total;eSum+=exp*60;
    const diff=info.total-exp*60;
    h+='<tr><td>'+iso+'</td><td>'+(info.entries.length?info.entries.map(entryLabel).join(' · '):'<span style="color:var(--red)">no punches</span>')+'</td>'+
      '<td class="num">'+(info.total?fmtMin(info.total):'—')+'</td><td class="num">'+(exp||'—')+'</td>'+
      '<td class="num" style="color:'+(diff<-15?'var(--red)':diff>15?'var(--green)':'var(--muted)')+'">'+(info.total?((diff>=0?'+':'−')+fmtMin(Math.abs(diff))):'')+'</td></tr>';
  }
  if(!any)h+='<tr><td colspan="5" class="empty">Nothing this month.</td></tr>';
  h+='<tr class="total"><td>Total</td><td></td><td class="num">'+fmtMin(wSum)+'</td><td class="num">'+fmtMin(eSum)+'</td><td class="num">'+((wSum-eSum>=0?'+':'−')+fmtMin(Math.abs(wSum-eSum)))+'</td></tr>';
  return h+'</table>';
}
function renderMyMonth(){
  const me=DB.currentUser;if(!me)return;
  const lab=['January','February','March','April','May','June','July','August','September','October','November','December'][tcM.getMonth()]+' '+tcM.getFullYear();
  document.getElementById('tm_lab').textContent=lab;
  const tw=document.getElementById('tw_lab');if(tw)tw.textContent=lab;
  document.getElementById('myMonth').innerHTML=monthTable(me.id);
}
function renderTeamMonth(){
  const el=document.getElementById('teamMonth');
  if(el&&tcWho)el.innerHTML=monthTable(tcWho);
}
function renderTcQueue(){
  const box=document.getElementById('tcQueue');if(!box)return;
  const list=DB.tcreports.filter(r=>r.status!=='resolved').sort((a,b)=>a.id-b.id);
  if(!list.length){box.innerHTML='<div class="empty">No open reports — the record is clean.</div>';return;}
  box.innerHTML=list.map(r=>{
    const p=DB.person(r.personId);
    const es=tcEffective(r.personId,r.day||toISO(new Date()));
    return '<div style="border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px">'+
      '<b>'+(p?p.name:'?')+'</b> · '+(r.day||'')+' '+reportChip(r)+threadHtml(r)+
      '<input id="qr_'+r.id+'" placeholder="reply…" style="width:46%;font-size:12px;padding:4px 8px"> <button class="btn" style="font-size:11px;padding:3px 9px" data-qr="'+r.id+'">Reply</button> '+
      '<span style="margin-left:12px"></span>'+
      '<select id="qa_act_'+r.id+'" style="font-size:12px"><option value="add">add missed punch</option><option value="fix">correct a punch</option><option value="void">void a punch</option></select> '+
      '<select id="qa_ent_'+r.id+'" style="font-size:12px">'+es.map(e=>'<option value="'+e.id+'" '+(r.entryId==e.id?'selected':'')+'>'+entryLabel(e)+'</option>').join('')+'</select> '+
      '<select id="qa_kind_'+r.id+'" style="font-size:12px"><option>in</option><option>out</option></select> '+
      '<input id="qa_time_'+r.id+'" type="time" style="font-size:12px;padding:4px 6px"> '+
      '<button class="btn ok" style="font-size:11px;padding:4px 10px" data-qa="'+r.id+'">Apply amendment</button> '+
      '<button class="btn" style="font-size:11px;padding:4px 10px" data-qres="'+r.id+'">Resolve without change</button>'+
      '</div>';
  }).join('');
  box.querySelectorAll('[data-qr]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qr);const inp=document.getElementById('qr_'+r.id);
    if(!inp.value.trim())return;
    r.thread=(r.thread||[]).concat([{by:DB.currentUser.name,at:new Date().toISOString(),text:inp.value.trim()}]);
    r.status='answered';DB.save();renderTcQueue();});
  box.querySelectorAll('[data-qres]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qres);
    r.thread=(r.thread||[]).concat([{by:DB.currentUser.name,at:new Date().toISOString(),text:'Resolved without changes to the record.'}]);
    r.status='resolved';DB.save();renderTcQueue();});
  box.querySelectorAll('[data-qa]').forEach(b=>b.onclick=()=>{
    const r=DB.tcreports.find(x=>x.id==b.dataset.qa);if(!r)return;
    const act=document.getElementById('qa_act_'+r.id).value;
    const entId=document.getElementById('qa_ent_'+r.id).value;
    const kind=document.getElementById('qa_kind_'+r.id).value;
    const time=document.getElementById('qa_time_'+r.id).value;
    if(act!=='void'&&!time){alert('Set the time for the amendment.');return;}
    if((act==='fix'||act==='void')&&!entId){alert('Pick the punch to amend.');return;}
    const reason=prompt('Reason for the amendment (goes in the permanent record):',(r.thread[0]&&r.thread[0].text)||'');
    if(!reason){alert('A reason is mandatory for amendments.');return;}
    const me=DB.currentUser;
    const target=entId?DB.timeclock.find(x=>x.id==entId):null;
    DB.timeclock.push({id:DB.newId(),personId:r.personId,day:r.day||toISO(new Date()),
      time:act==='void'?(target?target.time:'00:00'):time,
      kind:act==='void'?'void':kind,
      manual:act==='add',
      amends:act==='add'?null:+entId,
      reason,note:null,reportId:r.id});
    r.thread=(r.thread||[]).concat([{by:me.name,at:new Date().toISOString(),
      text:'✔ Amendment applied: '+(act==='add'?('added '+kind.toUpperCase()+' '+time):act==='fix'?('corrected to '+kind.toUpperCase()+' '+time):'voided the punch')+' — '+reason}]);
    r.status='resolved';
    DB.save();renderTcQueue();renderTeamMonth();renderMyMonth();
  });
}
function exportTcMonth(){
  const y=tcM.getFullYear(),m=tcM.getMonth();
  const last=new Date(y,m+1,0).getDate(),today=toISO(new Date());
  const rows=[],raw=[];
  DB.people.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{
    for(let d=1;d<=last;d++){
      const iso=toISO(new Date(y,m,d));if(iso>today)break;
      const exp=tcExpectedDay(p.id,iso),info=tcDayInfo(p.id,iso);
      if(exp<=0&&!info.entries.length)continue;
      rows.push({Person:p.name,Day:iso,Punches:info.entries.map(entryLabel).join(' · '),
        'Worked (h)':Math.round(info.total/60*100)/100,'Expected (h)':exp,'Diff (h)':Math.round((info.total/60-exp)*100)/100});
      info.entries.forEach(e=>raw.push({Person:p.name,Day:e.day,Time:e.time,Kind:e.kind,Manual:e.manual?'yes':'',
        Reason:e.reason||'',RecordedAt:e.created_at||'',RecordedBy:e.created_by||'',Hash:e.hash||''}));
    }
  });
  exportXLSX('RENMAD_timeclock_'+y+'-'+String(m+1).padStart(2,'0')+'.xlsx',[{name:'Month',rows},{name:'Raw entries',rows:raw}]);
}
function exportTcArchive(){
  const rows=DB.timeclock.slice().sort((a,b)=>a.id-b.id).map(e=>({
    Id:e.id,Person:DB.personName(e.personId),Day:e.day,Time:e.time,Kind:e.kind,Manual:e.manual?'yes':'',
    Amends:e.amends||'',Reason:e.reason||'',ReportId:e.reportId||'',
    RecordedAt:e.created_at||'',RecordedBy:e.created_by||'',Hash:e.hash||''}));
  exportXLSX('RENMAD_timeclock_ARCHIVE_'+new Date().toISOString().slice(0,16).replace(':','')+'.xlsx',
    [{name:'Archive',rows}]);
}
