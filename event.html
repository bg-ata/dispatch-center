<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — Event</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#ee2233;--purple:#8E5BC9;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 90px;max-width:1300px}
  .nav{display:flex;align-items:center;gap:3px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:5px 8px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  button{font:inherit;cursor:pointer}
  .btn{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);font-size:13px}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.sm{padding:3px 9px;font-size:12px}
  .btn:hover{filter:brightness(.97)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal);display:flex;align-items:center;gap:8px}
  .chip{width:13px;height:13px;border-radius:4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 6px;font-size:15px}
  .team{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .member{display:flex;align-items:center;gap:6px;background:#f6f5f1;border:1px solid var(--line);border-radius:20px;padding:3px 5px 3px 11px;font-size:13px}
  .member b{font-weight:600} .member select{font:inherit;font-size:11px;border:1px solid var(--line);border-radius:12px;padding:2px 5px;background:#fff}
  .member .x{border:none;background:none;color:#bbb;cursor:pointer;font-size:15px} .member .x:hover{color:var(--red)}
  .addmem{display:flex;gap:6px;align-items:center}
  select,input{font:inherit}
  .hint{font-size:12px;color:var(--muted);font-weight:400}
  .tlwrap{overflow-x:auto;border:1px solid var(--line);border-radius:0;background:#fff}
  .tlflex{display:flex;align-items:stretch;border:1px solid var(--line);background:#fff;overflow:hidden}
  .tlflex .tlwrap{border:0;border-left:1px solid var(--line);flex:1 1 auto;min-width:0}
  .lanerail{position:relative;flex:0 0 142px;background:#faf9f6}
  .lanetog{position:absolute;left:0;width:142px;box-sizing:border-box;padding:3px 10px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid #eee}
  .lanetog:hover{background:#f2f0ea}
  .lanetog.exp{background:#fff;box-shadow:inset 3px 0 0 var(--orange)}
  .lanetog .nm{font-size:12.5px;font-weight:700;color:var(--charcoal);display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lanetog .nm .cv{color:var(--muted);font-size:10px;flex:0 0 auto;transition:transform .12s}
  .lanetog .sw{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
  .lanetog .ct{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap}
  .tl{position:relative}
  .thd{border-bottom:1px solid var(--line);background:#faf9f6}
  .mo{position:absolute;top:2px;font-size:11px;font-weight:600;color:var(--charcoal);border-left:1px solid var(--line);padding-left:4px;height:15px}
  .wn{position:absolute;top:18px;font-size:9px;color:#a9a79f;text-align:center;border-left:1px solid #eee}
  .ll{position:absolute;left:4px;font-size:9px;font-weight:800;color:#b4b1a8;z-index:2}
  .stg{position:absolute;border-radius:0;overflow:hidden;z-index:2}
  .stglab{position:absolute;font-size:11px;font-weight:700;color:#43414d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:15px;z-index:11;pointer-events:none}
  .rb{position:absolute;border:none;background:rgba(255,255,255,.85);color:#222;font-size:11px;font-weight:800;padding:0;cursor:pointer;border-radius:0;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .rb:hover{background:#fff}
  .subpill{position:absolute;border-radius:0;font-size:11px;color:#2b2b2b;font-weight:600;padding:0 14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;user-select:none;border:1px solid rgba(0,0,0,.25)}
  .subpill:active{cursor:grabbing}
  .subpill.sel{outline:2px solid var(--charcoal);outline-offset:-1px;font-weight:700}
  .subpill.open{white-space:normal;line-height:1.16;display:flex;align-items:center;padding:3px 22px 3px 10px;overflow:hidden;border-radius:5px;font-size:11.5px}
  .pb{position:absolute;height:17px;width:12px;border:none;background:rgba(255,255,255,.85);color:#222;font-size:11px;font-weight:800;line-height:15px;text-align:center;padding:0;cursor:pointer;z-index:12;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .pb:hover{background:#fff}
  .addsub{position:absolute;height:17px;border:1px dashed #c9c6bd;background:#fff;color:#8a887f;font-size:9px;border-radius:0;padding:0 6px;cursor:pointer;z-index:6}
  .addsub:hover{border-color:var(--orange);color:var(--orange)}
  .colband{position:absolute;z-index:4;opacity:.34;cursor:grab}
  .colchip{position:absolute;height:14px;z-index:8;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border-radius:0;cursor:grab;user-select:none;box-shadow:0 0 0 1px #fff}
  .colchip .x{margin-left:3px;background:rgba(255,255,255,.9);color:#333;border-radius:50%;width:11px;height:11px;line-height:10px;text-align:center;font-size:9px;cursor:pointer}
  .today{position:absolute;z-index:7;width:2px;background:var(--orange)}
  .todaylab{position:absolute;z-index:9;background:var(--orange);color:#fff;font-size:8px;font-weight:800;padding:0 4px;border-radius:2px;top:1px}
  .etabs{display:flex;gap:4px;margin:2px 0 14px;border-bottom:2px solid var(--line)}
  .etabs button{border:none;background:none;padding:7px 15px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
  .etabs button.on{color:var(--charcoal);border-bottom-color:var(--orange)}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .cardk{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:120px}
  .cardk .v{font-size:18px;font-weight:800;color:var(--charcoal);font-variant-numeric:tabular-nums}
  .cardk .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .etbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .etbl th,.etbl td{text-align:right;padding:5px 8px;border-bottom:1px solid #f0eee9;font-variant-numeric:tabular-nums}
  .etbl th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  .etbl td:first-child,.etbl th:first-child,.etbl td:nth-child(2),.etbl th:nth-child(2){text-align:left}
  .etbl tr.now td{background:#FFF3E8}
  .neg{color:#D32230}.pos{color:#3E8C28}
  .funrow{display:flex;gap:18px;flex-wrap:wrap}
  .funcol{flex:1 1 220px;max-width:340px}
  .funcol h4{margin:0 0 8px;font-size:13px;color:var(--charcoal)}
  .fstage{margin-bottom:7px}
  .fbar{height:26px;border-radius:4px;min-width:2%;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap;overflow:visible}
  .fmeta{font-size:10.5px;color:var(--muted);margin-top:1px}
  .fmeta b{color:var(--charcoal)}
  .fconv{color:var(--orange);font-weight:700}
  .subedit{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .subedit input{padding:4px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{text-align:left;padding:5px 7px;border-bottom:1px solid #eee}
  th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  td input,td select{font-size:12px;padding:3px 5px;border:1px solid var(--line);border-radius:6px;width:100%}
  td .del{border:none;background:none;color:#c9c6bd;font-size:14px;cursor:pointer}
  .empty{color:var(--muted);font-size:12px;font-style:italic;padding:4px 2px}
</style>
</head>
<body>
<div class="app"><div id="nav"></div><div id="content"></div></div>
<script src="store.js?v=48"></script>
<script>
document.getElementById('nav').innerHTML=navBar('');
const id=+new URLSearchParams(location.search).get('id');
let ev=null, selSub=null, dragMk=null, dragW0=null, dragSub=null, expandedLane=null, curTab='time', delFilter='all';
let ZOOM=(parseFloat(localStorage.getItem('evZoom'))||1);
let WEEKW=Math.round(55*ZOOM), WD=WEEKW/5;
const TOPH=30, STGH=21, SUBH=21, GAP=1, LANEPAD=3;
function setZoom(z){ZOOM=Math.max(0.5,Math.min(2.6,Math.round(z*100)/100));WEEKW=Math.round(55*ZOOM);WD=WEEKW/5;try{localStorage.setItem('evZoom',ZOOM);}catch(e){}renderTimeline();const zl=document.getElementById('zLbl');if(zl)zl.textContent=Math.round(ZOOM*100)+'%';}
const LANE_LETTER={project:'PM',marketing:'MKT',sales:'SAL',logistics:'LOG'};
/* which stage covers a given week (used to colour/assign substages by position) */
function stageKeyAtWeek(lane,wk){
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const c=evIdx-wk, bars=layLane(ev,lane,evIdx);
  for(const b of bars){if(c>=b.x&&c<b.x+b.w)return b.s.key;}
  return bars.length?bars[bars.length-1].s.key:null;
}
/* substages = a shade darker than their stage: clearly a different row, same colour family */
function darken(hex,f){if(typeof hex!=='string'||hex[0]!=='#'||hex.length<7)return hex;const c=i=>Math.round(parseInt(hex.slice(i,i+2),16)*f),h=v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0');return '#'+h(c(1))+h(c(3))+h(c(5));}
function lum(hex){if(typeof hex!=='string'||hex[0]!=='#'||hex.length<7)return 1;return (0.299*parseInt(hex.slice(1,3),16)+0.587*parseInt(hex.slice(3,5),16)+0.114*parseInt(hex.slice(5,7),16))/255;}
function addSubstage(lane){
  expandedLane=lane; // opening the lane so the new item is visible
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const bars=layLane(ev,lane,evIdx);
  const subs=DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane&&s.week!=null);
  const span=1,occ=new Set();subs.forEach(s=>{const c0=evIdx-s.week,sp=Math.max(s.span||1,1);for(let k=0;k<sp;k++)occ.add(c0+k);});
  const startCol=bars[0]?bars[0].x:0;let col=startCol;
  for(let c=startCol;c<=evIdx;c++){let ok=true;for(let k=0;k<span;k++)if(occ.has(c+k)){ok=false;break;}if(ok){col=c;break;}}
  const wk=evIdx-col, stKey=stageKeyAtWeek(lane,wk)||(bars[0]&&bars[0].s.key), nid=DB.newId();
  DB.substages.push({id:nid,eventId:ev.id,lane,stage:stKey,name:lane==='marketing'?'Webinar':'New item',order:DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane).length,week:wk,span});
  selSub=nid;DB.save();renderTimeline();renderTasks();const f=document.getElementById('subname');if(f){f.focus();f.select();}
}
function renderAddBar(){const bar=document.getElementById('addbar');if(!bar)return;
  if(!DB.canManage()){bar.style.display='none';return;} // members: timeline is read-only (server enforces it too)
  bar.innerHTML='<span style="font-size:12px;color:var(--muted);font-weight:600">＋ Add substage to:</span>';
  evLanes(ev).forEach(lane=>{const b=document.createElement('button');b.className='btn sm';b.textContent=LANE_LABEL[lane]||lane;b.onclick=()=>addSubstage(lane);bar.appendChild(b);});
}

function scrollToToday(){const wrap=document.querySelector('.tlwrap');if(!wrap)return;
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const todayIdx=Math.round((+monday(new Date())-+start)/(7*86400000));
  wrap.scrollLeft=Math.max(0,todayIdx*WEEKW-6);}
boot(()=>{ev=DB.event(id);const C=document.getElementById('content');
  if(!ev){C.innerHTML='<p>Event not found. <a href="gantt.html">Back to overview</a></p>';return;}render();scrollToToday();});
window.addEventListener('dc-remote',()=>{if(!DB.event(id)){location.href='gantt.html';return;}ev=DB.event(id);render();});

function peopleOpts(sel){return '<option value="">— unassigned —</option>'+DB.people.map(p=>'<option value="'+p.id+'" '+(p.id==sel?'selected':'')+'>'+esc(p.name)+'</option>').join('');}

function render(){
  if(!ev.team)ev.team=[];
  document.getElementById('content').innerHTML=
    '<h1><span class="chip" style="background:'+(TOPICS[ev.topic]||'#999')+'"></span>'+esc(ev.name)+'</h1>'+
    '<p class="sub">'+(ev.city||'')+(ev.city&&ev.country?', ':'')+(ev.country||'')+' · '+dateRange(ev)+' &nbsp; <a href="gantt.html'+(evKind(ev)==='external'?'#external':'')+'">← overview</a> &nbsp;·&nbsp; <a href="#" id="xls">⬇ Excel</a></p>'+
    (function(){const f=DB.financeFor(ev.id);if(!f)return'';const fx=Object.assign({},f,{invoiced:DB.finInvoiced(f)});const r=finResult(fx);
      return '<p class="sub" style="margin-top:-8px">€ <a href="dashboard.html#year" style="color:inherit">Target '+finFmt(f.target)+' · Stretch '+finFmt(f.stretch)+' · Facturado '+finFmt(fx.invoiced)+
      (r?' · <b style="color:'+r.color+'">'+r.label+'</b>':'')+' · Margin '+finFmt(finMargin(fx))+'</a></p>';})()+
    '<div class="etabs"><button class="on" data-et="time">Timeline</button>'+(evKind(ev)!=='external'?'<button data-et="eur">€ Results</button><button data-et="imp">Impact</button><button data-et="del">Delegates</button>':'')+'</div>'+
    '<div id="sec-time">'+
    '<div class="panel"><h3>Team</h3><div class="team" id="team"></div>'+
      '<div class="addmem"><select id="newp"></select><select id="newr">'+ROLES.map(r=>'<option>'+r+'</option>').join('')+'</select><button class="btn sm" id="addmem">+ Attach person</button></div></div>'+
    '<div class="panel"><h3>Timeline <span class="hint">— same lanes as the overview · <b>click a lane</b> to open its substages in full · drag a substage to move · +/− to resize · click it to edit tasks</span></h3>'+
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:2px 0 8px"><div id="addbar" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"></div>'+
      '<div style="margin-left:auto;display:flex;align-items:center;gap:5px"><span class="hint">Zoom</span><button class="btn sm" id="zOut">−</button><span id="zLbl" class="hint" style="min-width:40px;text-align:center;font-weight:600">'+Math.round(ZOOM*100)+'%</span><button class="btn sm" id="zIn">+</button></div></div>'+
      '<div class="tlflex"><div class="lanerail" id="lanerail"></div><div class="tlwrap"><div class="tl" id="tl"></div></div></div></div>'+
    '<div class="panel" id="tkpanel"></div>'+
    '</div><div id="sec-eur" style="display:none"></div><div id="sec-imp" style="display:none"></div><div id="sec-del" style="display:none"></div>';
  document.querySelectorAll('[data-et]').forEach(b=>b.onclick=()=>{
    curTab=b.dataset.et;
    document.querySelectorAll('[data-et]').forEach(x=>x.classList.toggle('on',x===b));
    document.getElementById('sec-time').style.display=b.dataset.et==='time'?'':'none';
    document.getElementById('sec-eur').style.display=b.dataset.et==='eur'?'':'none';
    document.getElementById('sec-imp').style.display=b.dataset.et==='imp'?'':'none';
    document.getElementById('sec-del').style.display=b.dataset.et==='del'?'':'none';
    if(b.dataset.et==='eur')renderEuroTab();
    if(b.dataset.et==='imp')renderImpactTab();
    if(b.dataset.et==='del')renderDelegatesTab();
  });
  renderTeam(); renderAddBar(); renderTimeline(); renderTasks(); wire();
  document.getElementById('zOut').onclick=()=>setZoom(ZOOM-0.2);
  document.getElementById('zIn').onclick=()=>setZoom(ZOOM+0.2);
  // live updates (dc-remote) rebuild the page — put the user back on the tab they were on
  if(curTab!=='time'){const b=document.querySelector('[data-et="'+curTab+'"]');if(b)b.click();}
}

/* ---- € Results tab: this event's finance summary + weekly money ---- */
function evCode(){const m=(ev.name||'').match(/^E\d+/);return m?m[0]:null;}
function evWeekly(){const c=evCode();return c?DB.weekly.filter(r=>r.eventCode===c).sort((a,b)=>a.week-b.week):[];}
function famKey(n){return (n||'').replace(/\s*(20\d{2}|\d{2})\s*$/,'').trim();}
function renderEuroTab(){
  const S=document.getElementById('sec-eur');
  const f=DB.financeFor(ev.id),rows=evWeekly();
  let target=f&&f.target, stretch=f&&f.stretch, soFar=f&&DB.finInvoiced(f);
  rows.forEach(r=>{if(r.target!=null)target=+r.target;if(r.stretch!=null)stretch=+r.stretch;});
  const lastMoney=rows.filter(r=>r.soFarEur!=null&&+r.soFarEur>0).slice(-1)[0];
  if(lastMoney)soFar=+lastMoney.soFarEur;
  if(!f&&!rows.length){S.innerHTML='<div class="panel"><span class="empty">No financial data for this event yet — it will populate as the event advances (€ Dashboard → Add event figures, or the weekly Excel import).</span></div>';return;}
  const res=finResult({invoiced:soFar,stretch:stretch,year:ymd(ev.date).getFullYear()});
  let h='<div class="panel"><h3>€ Results so far</h3><div class="cards">'+
    '<div class="cardk"><div class="v">'+finFmt(soFar)+'</div><div class="k">So far</div></div>'+
    '<div class="cardk"><div class="v">'+finFmt(target)+'</div><div class="k">Target</div></div>'+
    '<div class="cardk"><div class="v">'+finFmt(stretch)+'</div><div class="k">Stretch</div></div>'+
    (f?'<div class="cardk"><div class="v">'+finFmt(f.spex)+'</div><div class="k">SPEX</div></div>'+
       '<div class="cardk"><div class="v">'+finFmt(finMargin(f))+'</div><div class="k">Margin</div></div>':'')+
    '<div class="cardk"><div class="v">'+(res?'<span style="color:'+res.color+'">'+res.label+'</span>':'—')+'</div><div class="k">Status</div></div>'+
    '</div>'+
    '<p class="hint" style="font-size:12px;color:var(--muted)">Full curves and comparisons live in the <a href="dashboard.html#compare">€ Dashboard</a>.</p></div>';
  const money=rows.filter(r=>(+r.totalEur||0)||(+r.soFarEur||0));
  if(money.length){
    const today=new Date().toISOString().slice(0,10);
    const isNow=r=>r.date&&r.date<=today&&addDays(ymd(r.date),7).toISOString().slice(0,10)>today;
    h+='<div class="panel"><h3>Money week by week</h3><table class="etbl"><tr><th>Week</th><th>Date</th><th>Sponsors €</th><th>Tickets €</th><th>Week total</th><th>So far</th>'+(target?'<th>vs Target</th>':'')+'</tr>';
    money.forEach(r=>{const d=target!=null&&r.soFarEur!=null?(+r.soFarEur-target):null;
      h+='<tr'+(isNow(r)?' class="now"':'')+'><td>W'+(r.week<0?r.week:'+'+r.week)+'</td><td>'+(r.date||'')+'</td>'+
      '<td>'+(+r.sponsorsEur?finFmt(+r.sponsorsEur):'')+'</td><td>'+(+r.ticketsEur?finFmt(+r.ticketsEur):'')+'</td>'+
      '<td><b>'+(+r.totalEur?finFmt(+r.totalEur):'')+'</b></td><td>'+finFmt(r.soFarEur)+'</td>'+
      (target?'<td class="'+(d<0?'neg':'pos')+'">'+(d==null?'':(d>0?'+':'')+new Intl.NumberFormat('es-ES',{maximumFractionDigits:0}).format(d))+'</td>':'')+'</tr>';});
    h+='</table></div>';
  }
  S.innerHTML=h;
}
/* ---- Impact tab: this event's funnel vs previous editions ---- */
function renderImpactTab(){
  const S=document.getElementById('sec-imp');
  const rows=evWeekly();
  if(!rows.length){S.innerHTML='<div class="panel"><span class="empty">No marketing data for this event yet — it will populate as campaigns run (see the Impact area for all events).</span></div>';return;}
  const myName=rows[0].name||'',fam=famKey(myName);
  const byC={};DB.weekly.forEach(r=>{(byC[r.eventCode]=byC[r.eventCode]||[]).push(r);});
  const sibs=Object.keys(byC).filter(c=>c!==evCode()&&famKey(byC[c][0].name)===fam)
    .map(c=>({code:c,name:byC[c][0].name,rows:byC[c].sort((a,b)=>a.week-b.week)}))
    .sort((a,b)=>(a.rows[0].year||0)-(b.rows[0].year||0)).slice(-2);
  const list=[{code:evCode(),name:myName,rows:rows}].concat(sibs);
  const carry=(e,k)=>{let last=0;e.rows.forEach(r=>{if(r[k]!=null)last=+r[k];});return last;};
  const sum=(e,k)=>e.rows.reduce((a,r)=>a+(+r[k]||0),0);
  const nf=v=>new Intl.NumberFormat('es-ES').format(Math.round(v));
  const pc=(a,b)=>b>0?((100*a/b)<10?(100*a/b).toFixed(1):Math.round(100*a/b))+' %':'—';
  const cols=list.map(e=>{
    const t=carry(e,'topicLeads'),l=carry(e,'eventLeads'),d=sum(e,'delegatesN'),s=sum(e,'sponsorsN');
    return {e,stages:[
      {n:'👍 Topic leads',v:t,conv:null,lab:'',c:'#FFD3BC'},
      {n:'💰 Event leads',v:l,conv:pc(l,t),lab:'of topic leads',c:'#FFA873'},
      {n:'Ticket delegates',v:d,conv:pc(d,l),lab:'of event leads',c:'#FF7A3D'},
      {n:'Sponsors signed',v:s,conv:pc(s,l),lab:'of event leads',c:'#FF4A00'}]};
  });
  const maxTop=Math.max.apply(null,cols.map(c=>c.stages[0].v||1));
  S.innerHTML='<div class="panel"><h3>Marketing funnel — this event vs previous editions</h3>'+
    '<p class="hint" style="font-size:12px;color:var(--muted)">More marketing data will feed this over time. Full comparisons live in the <a href="impact.html">Impact area</a>.</p>'+
    '<div class="funrow">'+cols.map(c=>'<div class="funcol"><h4>'+esc(c.e.name)+'</h4>'+c.stages.map(s=>{
      const w=Math.max(1.5,100*(s.v||0)/maxTop),dark=(s.v||0)/maxTop>0.04;
      return '<div class="fstage"><div class="fbar" style="width:'+w.toFixed(1)+'%;background:'+s.c+(dark?'':';color:#8a4a12')+'">'+nf(s.v)+'</div>'+
        '<div class="fmeta"><b>'+s.n+'</b>'+(s.conv!=null?' · <span class="fconv">'+s.conv+'</span> '+s.lab:'')+'</div></div>';
    }).join('')+'</div>').join('')+'</div></div>';
}

/* ---- Delegates tab: the per-event roster (catering base + marketing lane) ----
   Rows live in dc_delegates keyed on the event's dc_finance row. Colour is DERIVED:
   white = paid · red = invoice unpaid · yellow = reserved pass with no name yet.
   Editing is gated app-side for now (SQL row-ownership hardening = follow-up):
   billing/admin = everything · Sales = sponsor-pass names · PMs/managers = speakers
   & freebies · Marketing = the ¿CRM? / materials ticks (on ALL rows). */
function canEditDelegate(d){
  if(DB.canBill())return true;
  const me=DB.currentUser;if(!me)return false;
  if(DB.canManage())return d.source!=='ticket'; // managers: sponsor/speaker/freebie details (ticket names = billing)
  if(d.source==='sponsor'&&me.role==='Sales')return true;
  if((d.source==='speaker'||d.source==='freebie')&&me.role==='PM')return true;
  return false;
}
function canTickMarketing(){const me=DB.currentUser;return !!(me&&(me.role==='Marketing'||DB.canBill()||DB.canManage()));}
function canAddSpeaker(){const me=DB.currentUser;return !!(me&&(me.role==='PM'||DB.canBill()||DB.canManage()));}

  const all=DB.delegatesFor(f.id);

    Object.keys(DELSRC).map(s=>{const n=all.filter(d=>d.source===s).length;return n?'<div class="cardk"><div class="v">'+n+'</div><div class="k">'+DELSRC[s].slice(3)+'s</div></div>':'';}).join('')+
    (unnamed?'<div class="cardk" style="background:#FFF3C4"><div class="v">'+unnamed+'</div><div class="k">Names missing</div></div>':'')+
    (unpaid?'<div class="cardk" style="background:#F8D7D7"><div class="v">'+unpaid+'</div><div class="k">Invoice unpaid</div></div>':'')+
    '</div>'+
    (sponsors.length?'<p class="hint" style="margin:0 0 10px"><b>Sponsors:</b> '+sponsors.map(esc).join(' · ')+'</p>':'')+
    '<div class="subedit"><span class="hint">Show:</span><select id="delflt">'+

    '<span class="hint" style="margin-left:auto">⬜ paid · <span style="background:#F8D7D7;padding:0 5px;border-radius:3px">invoice unpaid</span> · <span style="background:#FFF3C4;padding:0 5px;border-radius:3px">name missing</span></span></div>'+
    '<table><tr><th>Type</th><th>Sponsor</th><th>Name</th><th>Email</th><th>Company</th><th>Job title</th><th>Sold by</th><th title="Araceli: tagged right in the CRM">CRM?</th><th title="Araceli: info emails sent on payment">Materials</th><th>Notes</th><th style="width:24px"></th></tr>';
  if(!list.length)h+='<tr><td colspan="11" class="empty">No delegates yet — ticket &amp; sponsor passes appear automatically when Invoicing registers an invoice'+(canAddSpeaker()?'; speakers &amp; freebies you can add below.':'.')+'</td></tr>';
  list.forEach(d=>{

      '<td style="white-space:nowrap">'+(DELSRC[d.source]||d.source||'')+(d.invoice_id?' <a href="facturacion.html" class="hint" title="from invoice '+esc((DB.invoice(d.invoice_id)||{}).numero_factura||'')+'">🧾</a>':'')+'</td>'+
      '<td>'+(d.source==='sponsor'?cell('sponsor_name'):esc(d.sponsor_name||''))+'</td>'+
      '<td>'+cell('name',st.key==='unnamed'?'name needed!':'')+'</td><td>'+cell('email')+'</td><td>'+cell('company')+'</td><td>'+cell('job_title')+'</td>'+
      '<td>'+esc(d.seller?DB.personName(d.seller):((DB.invoice(d.invoice_id)||{}).responsable_comercial?DB.personName(DB.invoice(d.invoice_id).responsable_comercial):'—'))+'</td>'+
      '<td style="text-align:center">'+tick('crm_tagged')+'</td><td style="text-align:center">'+tick('materials_sent')+'</td>'+

  });
  h+='</table>';
  if(canAddSpeaker()){

    h+='<div class="subedit" style="margin-top:12px;border-top:1px solid var(--line);padding-top:10px"><b style="font-size:12px">＋ Add</b>'+

      '<input id="nd_name" placeholder="name" style="width:150px"><input id="nd_email" placeholder="email" style="width:170px">'+

      '<button class="btn sm primary" id="nd_add">Add</button></div>';

  h+='</div>';

  document.getElementById('delflt').onchange=e=>{delFilter=e.target.value;renderDelegatesTab();};
  document.getElementById('del_xls').onclick=()=>{
    const rows=all.slice()
      .sort((a,b)=>(a.source||'').localeCompare(b.source||'')||(a.sponsor_name||'').localeCompare(b.sponsor_name||'')||(a.id-b.id))
      .map(d=>({
        'Type':(DELSRC[d.source]||d.source||'').replace(/^[^A-Za-z]*/,''),
        'Sponsor':d.sponsor_name||'',
        'Name':d.name||'',
        'Email':d.email||'',
        'Company':d.company||'',
        'Job title':d.job_title||'',
        'Sold by':d.seller?DB.personName(d.seller):((DB.invoice(d.invoice_id)||{}).responsable_comercial?DB.personName(DB.invoice(d.invoice_id).responsable_comercial):''),
        'CRM':d.crm_tagged?'✓':'',

      }));
    exportXLSX(ev.name.replace(/[^\w]+/g,'_')+'_delegates.xlsx',[{name:'Delegates',rows}]);
  };
  S.querySelectorAll('[data-df]').forEach(el=>el.onchange=()=>{const d=DB.delegates.find(x=>x.id==el.dataset.id);if(!d)return;d[el.dataset.df]=el.value;DB.save();});
  S.querySelectorAll('[data-dt]').forEach(el=>el.onchange=()=>{const d=DB.delegates.find(x=>x.id==el.dataset.id);if(!d)return;d[el.dataset.dt]=el.checked;DB.save();});

    DB.data.delegates=DB.delegates.filter(x=>x.id!=b.dataset.deldel);DB.save();renderDelegatesTab();});
  const ad=document.getElementById('nd_add');if(ad)ad.onclick=()=>{
    const me=DB.currentUser||{};
    DB.delegates.push({id:DB.newId(),eventId:f.id,source:document.getElementById('nd_src').value,invoice_id:null,
      sponsor_name:null,name:document.getElementById('nd_name').value.trim(),email:document.getElementById('nd_email').value.trim(),
      company:document.getElementById('nd_co').value.trim(),job_title:document.getElementById('nd_job').value.trim(),

function subColor(sub,stageColor){return (sub.type&&MKT_TYPES[sub.type])?MKT_TYPES[sub.type]:stageColor;}

function renderTimeline(){
  const tl=document.getElementById('tl'), rail=document.getElementById('lanerail');
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const NW=preExtent(ev)+2+6, BW=NW*WEEKW;
  const todayIdx=Math.round((+monday(new Date())-+start)/(7*86400000));
  const mg=DB.canManage();
  const OPENH=54, SUBROW=OPENH+3, COLLH=STGH+11; // expanded rows are tall so substages can hold longer text
  // a selected substage keeps its lane open
  if(selSub){const ss=DB.substages.find(s=>s.id===selSub);if(ss)expandedLane=ss.lane;}

  // ---- per-lane layout: stages always; the OPEN lane also unfolds its substages into
  //      as many rows as needed (accordion) so one topic gets the full space ----
  const laneLay=evLanes(ev).map(lane=>{ // external projects: only their chosen timelines
    const bars=layLane(ev,lane,evIdx);
    const subs=DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane);
    let dirty=false;
    // default week (spread across its stage) for any substage missing one
    const byStage={};subs.forEach(s=>{(byStage[s.stage]=byStage[s.stage]||[]).push(s);});
    Object.keys(byStage).forEach(k=>{const bar=bars.find(b=>b.s.key===k);if(!bar)return;const list=byStage[k];
      list.forEach((s,i)=>{if(s.week==null){const col=Math.round(bar.x+(i+0.5)*bar.w/list.length-0.5);s.week=evIdx-col;dirty=true;}});});
    // default span for any substage missing one: wide enough to read the name
    const arr0=subs.map(s=>({s,c:evIdx-s.week})).sort((a,b)=>a.c-b.c);
    arr0.forEach((o,i)=>{if(o.s.span==null){const nextC=(i+1<arr0.length)?arr0[i+1].c:(evIdx+1);const gap=Math.max(1,nextC-o.c);const need=Math.max(1,Math.ceil(((o.s.name||'').length*6.6+34)/WEEKW));o.s.span=Math.min(need,gap);dirty=true;}});
    if(dirty&&(!USE_SUPABASE||mg))DB.save(); // members never push layout defaults
    const expanded=(expandedLane===lane);
    // greedy pack substages into non-overlapping rows (only needed when open)
    let rows=[];
    if(expanded){
      const arr=subs.map(s=>({s,c:evIdx-s.week,span:Math.max(s.span||1,1)})).sort((a,b)=>a.c-b.c);
      arr.forEach(o=>{let placed=false;
        for(const row of rows){if(row.every(x=> o.c>=x.c+x.span || o.c+o.span<=x.c )){row.push(o);placed=true;break;}}
        if(!placed)rows.push([o]);});
    }
    const laneH=expanded?(STGH+GAP+Math.max(1,rows.length)*SUBROW+(mg?24:6)+2):COLLH;
    return {lane,bars,subs,expanded,rows,h:laneH};
  });
  let acc=TOPH;laneLay.forEach(L=>{L.y=acc;acc+=L.h+GAP;});
  const bodyH=acc+4;

  tl.style.cssText='width:'+BW+'px;height:'+bodyH+'px';
  let h='';
  for(let w=0;w<NW;w++){h+='<div style="position:absolute;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px;left:'+(w*WEEKW)+'px;border-left:1px solid #e3e0d8;z-index:0"></div>';
    for(let dc=1;dc<5;dc++)h+='<div style="position:absolute;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px;left:'+(w*WEEKW+dc*WD)+'px;border-left:1px solid #f2f0ea;z-index:0"></div>';}
  h+='<div class="thd" style="position:absolute;left:0;top:0;width:'+BW+'px;height:'+TOPH+'px"></div>';
  for(let w=0;w<NW;w++){const d=addDays(start,w*7);
    if(d.getDate()<=7)h+='<div class="mo" style="left:'+(w*WEEKW)+'px">'+MON[d.getMonth()]+(d.getMonth()===0?" '"+String(d.getFullYear()).slice(2):'')+'</div>';
    const diff=evIdx-w;h+='<div class="wn" style="left:'+(w*WEEKW)+'px;width:'+WEEKW+'px">'+(diff===0?'W0':diff>0?('W-'+diff):('+'+(-diff)))+'</div>';}
  if(todayIdx>=0&&todayIdx<NW)h+='<div class="todaylab" style="left:'+(todayIdx*WEEKW)+'px">TODAY</div>';
  tl.innerHTML=h;
  if(todayIdx>=0&&todayIdx<NW){const t2=document.createElement('div');t2.className='today';t2.style.cssText='left:'+(todayIdx*WEEKW)+'px;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px';tl.appendChild(t2);}

  const btnLayer=document.createElement('div');btnLayer.style.cssText='position:absolute;inset:0;z-index:9;pointer-events:none';tl.appendChild(btnLayer);
  function addBtn(x,y,lane,key,delta,label){const b=document.createElement('button');b.className='rb';b.textContent=label;b.style.cssText='left:'+x+'px;top:'+y+'px;width:13px;height:'+STGH+'px;pointer-events:auto';b.onclick=e=>{e.stopPropagation();const o=ev.dur[lane];o[key]=Math.max(1,(o[key]||1)+delta);if(lane==='project'&&key==='scaling')ev.milestones.launch=o.scaling;DB.save();renderTimeline();};btnLayer.appendChild(b);}
  function stageAtCol(bars,c){for(const b of bars){if(c>=b.x&&c<b.x+b.w)return b.s;}return bars[bars.length-1].s;}

  laneLay.forEach(L=>{
    const lane=L.lane, y=L.y;
    const ll=document.createElement('div');ll.className='ll';ll.style.top=(y+2)+'px';ll.textContent=LANE_LETTER[lane];tl.appendChild(ll);
    // ---- stage bars (always shown — the overview look) ----
    L.bars.forEach(bar=>{
      const x=bar.x*WEEKW, w=Math.max(bar.w*WEEKW,10);
      const seg=document.createElement('div');seg.className='stg';seg.style.cssText='left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+STGH+'px;background:'+bar.s.color;seg.title=bar.s.name;tl.appendChild(seg);
      const sl=document.createElement('div');sl.className='stglab';sl.style.cssText='left:'+(x+15)+'px;top:'+(y+4)+'px;max-width:'+(w-30)+'px;color:'+(bar.s.color==='#111111'?'#fff':'#3a3844');sl.textContent=bar.s.name;tl.appendChild(sl);
      if(mg){addBtn(x,y,lane,bar.s.key,-1,'−'); addBtn(x+w-13,y,lane,bar.s.key,1,'+');}
    });
    // ---- substages: only the OPEN lane unfolds them, packed into rows for room ----
    if(L.expanded){
      const sy0=y+STGH+GAP;
      L.rows.forEach((row,ri)=>{const sy=sy0+ri*SUBROW;
        row.forEach(o=>{
          const sub=o.s, span=o.span, c=o.c, st=stageAtCol(L.bars,c);
          const x=c*WEEKW+2, pw=span*WEEKW-4;
          const fill=darken(subColor(sub,st.color),0.78);
          const pill=document.createElement('div');pill.className='subpill open'+(selSub===sub.id?' sel':'');
          pill.style.cssText='left:'+x+'px;top:'+sy+'px;width:'+pw+'px;height:'+(OPENH-4)+'px;background:'+fill+';color:'+(lum(fill)<0.5?'#fff':'#2b2b2b')+';z-index:10';
          pill.textContent=sub.name;pill.title=sub.name+' — drag to move · +/− to resize · click to edit tasks';
          pill.addEventListener('mousedown',e=>{dragSub={sub,startX:e.clientX,dx:0,el:pill,baseWeek:sub.week,moved:false};e.preventDefault();});
          tl.appendChild(pill);
          if(mg){const rb=(left,label,delta,tip)=>{const b=document.createElement('button');b.className='pb';b.textContent=label;b.style.cssText='left:'+left+'px;top:'+sy+'px;height:'+(OPENH-4)+'px;line-height:'+(OPENH-8)+'px';b.title=tip+' '+sub.name;
            b.addEventListener('mousedown',e=>e.stopPropagation());
            b.onclick=e=>{e.stopPropagation();let ns=Math.max(1,(sub.span||1)+delta);
              if(delta>0)ns=Math.min(ns,Math.max(1,evIdx-c+1)); // rows resolve overlaps, so grow up to the event edge
              sub.span=ns;DB.save();renderTimeline();if(selSub===sub.id)renderTasks();};tl.appendChild(b);};
            rb(x,'−',-1,'shorten'); rb(x+pw-12,'+',1,'lengthen');}
        });
      });
      if(mg){const ax=((L.bars[0]?L.bars[0].x:0)*WEEKW)+2, ay=sy0+Math.max(1,L.rows.length)*SUBROW;
        const ab=document.createElement('button');ab.className='addsub';ab.textContent='+ add item';
        ab.style.cssText='left:'+ax+'px;top:'+ay+'px;height:17px;z-index:8';
        ab.onclick=e=>{e.stopPropagation();addSubstage(lane);};tl.appendChild(ab);}
    }
  });

  const colTop=TOPH, colH=bodyH-TOPH;
  function col(off,label,color,kind,field){
    const x=(evIdx-off)*WEEKW;
    const band=document.createElement('div');band.className='colband';band.style.cssText='left:'+x+'px;width:'+WEEKW+'px;top:'+colTop+'px;height:'+colH+'px;background:'+color;tl.appendChild(band);
    const chip=document.createElement('div');chip.className='colchip';chip.style.cssText='left:'+x+'px;width:'+WEEKW+'px;top:'+(TOPH-16)+'px;background:'+color;
    chip.innerHTML='<span style="pointer-events:none">'+label+'</span>'+(kind==='ld'?'<span class="x" title="remove">×</span>':'');
    chip.title=label+' (W-'+off+')'+(kind==='w0'?' — drag to reschedule':' — drag to move');
    const st=e=>{if(e.target.classList.contains('x'))return;if(kind==='w0')dragW0={ev,startX:e.clientX,dx:0,band,chip};else dragMk={ev,field,kind,startX:e.clientX,dx:0,band,chip};e.preventDefault();};
    chip.addEventListener('mousedown',st);band.addEventListener('mousedown',st);
    const xb=chip.querySelector('.x');if(xb)xb.onclick=ev2=>{ev2.stopPropagation();ev.alerts.LD.on=false;DB.save();renderTimeline();};
    tl.appendChild(chip);
  }
  if(evKind(ev)!=='external'){ // milestone + discount-week machinery is RENMAD-only
    col(ev.milestones.goNoGo,'G','var(--red)','mile','goNoGo');
    col(ev.milestones.launch,'L','var(--red)','mile','launch');
    if(ev.alerts.LD.on) col(ev.alerts.LD.off,'LD','var(--purple)','ld','LD');
    col(ev.alerts.SE.off,'SE','var(--purple)','alert','SE');
    col(ev.alerts.EB.off,'EB','var(--purple)','alert','EB');
    col(ev.alerts.LC.off,'LC','var(--purple)','alert','LC');
  }
  col(0,'W0','#111','w0','');

  // ---- left rail: clickable lane toggles (accordion) ----
  rail.style.height=bodyH+'px';
  rail.innerHTML='<div style="position:absolute;left:0;top:0;width:100%;height:'+TOPH+'px;font-size:9px;color:#b4b1a8;padding:2px 10px;font-weight:700">TIMELINES</div>';
  laneLay.forEach(L=>{
    const t=document.createElement('div');t.className='lanetog'+(L.expanded?' exp':'');
    t.style.cssText='top:'+L.y+'px;height:'+L.h+'px';
    const col0=(L.bars[0]&&L.bars[0].s.color)||'#ccc', n=L.subs.length;
    t.innerHTML='<div class="nm"><span class="cv">'+(L.expanded?'▾':'▸')+'</span><span class="sw" style="background:'+col0+'"></span>'+(LANE_LABEL[L.lane]||L.lane)+'</div>'+
      '<div class="ct">'+(L.expanded?(n+' item'+(n===1?'':'s')+' · open'):(n?(n+' item'+(n===1?'':'s')+' — open'):'no items — '+(mg?'click to add':'empty')))+'</div>';
    t.onclick=()=>{const nl=(expandedLane===L.lane?null:L.lane);
      const ss=selSub&&DB.substages.find(s=>s.id===selSub);
      if(!ss||ss.lane!==nl){selSub=null;renderTasks();} // switching/closing a lane deselects a substage not in it
      expandedLane=nl;renderTimeline();};
    rail.appendChild(t);
  });
}

function renderTasks(){
  const p=document.getElementById('tkpanel');
  if(!selSub){p.innerHTML='<span class="empty">Click a substage in the timeline to rename it, set its week/type, and edit its tasks &amp; owners.</span>';return;}
  const sub=DB.substages.find(s=>s.id===selSub);
  if(!sub){selSub=null;p.innerHTML='';return;}
  const tks=DB.tasksForSub(sub.id);
  const mg=DB.canManage(); // managers & admins edit everything; members tick the status of their OWN tasks
  let h='<div class="subedit"><b style="color:var(--muted);font-size:11px;text-transform:uppercase">'+stageName(sub.lane,sub.stage)+'</b>'+
    (mg?'<input id="subname" value="'+esc(sub.name||'')+'" placeholder="Name / short description — type as much as you need" style="width:min(560px,100%);flex:1 1 320px">'
       :'<span style="font-weight:600">'+esc(sub.name||'')+'</span>');
  if(sub.lane==='marketing'){h+=mg?('<select id="subtype">'+['','Content','Product','Sales','Webinar'].map(t=>'<option '+(t===(sub.type||'')?'selected':'')+'>'+(t||'— type —')+'</option>').join('')+'</select>')
                                 :(sub.type?'<span class="hint">'+esc(sub.type)+'</span>':'');}
  h+='<span class="hint">week W-'+(sub.week!=null?sub.week:'?')+((sub.span||1)>1?(' · '+(sub.span||1)+' wks'):'')+'</span>';
  if(mg)h+='<button class="btn sm" id="delsub" style="color:#A32D2D;border-color:#f0c4c4">Delete substage</button>'+
    '<button class="btn sm" id="addtask" style="margin-left:auto">+ Add task</button>';
  h+='</div>';
  h+='<table><tr><th>Task</th><th style="width:160px">Responsible</th><th style="width:140px">Deadline</th><th style="width:120px">Status'+(mg?'':' <span style="text-transform:none;letter-spacing:0;color:#b4b1a8">· you can tick your own</span>')+'</th><th style="width:24px"></th></tr>';
  if(!tks.length)h+='<tr><td colspan="5" class="empty">No tasks yet'+(mg?' — add one.':'.')+'</td></tr>';
  tks.forEach(t=>{const canS=DB.canEditStatus(t);h+='<tr>'+
    '<td>'+(mg?'<input data-tf="title" data-id="'+t.id+'" value="'+esc(t.title||'')+'">':esc(t.title||''))+'</td>'+
    '<td>'+(mg?'<select data-tf="assignee" data-id="'+t.id+'">'+peopleOpts(t.assignee)+'</select>':esc(DB.personName(t.assignee)))+'</td>'+
    '<td>'+(mg?'<input type="date" data-tf="deadline" data-id="'+t.id+'" value="'+(t.deadline||'')+'">':(t.deadline||'—'))+'</td>'+
    '<td>'+(canS?('<select data-tf="status" data-id="'+t.id+'">'+STATUS.map(s=>'<option '+(s===t.status?'selected':'')+'>'+s+'</option>').join('')+'</select>'):('<span class="rostat" style="font-size:12px;color:#6f6e6a">'+(t.status||'')+'</span>'))+'</td>'+
    '<td>'+(mg?'<button class="del" data-deltask="'+t.id+'">×</button>':'')+'</td></tr>';});
  h+='</table>';
  p.innerHTML=h;
  const sn=document.getElementById('subname');if(sn)sn.onchange=e=>{sub.name=e.target.value;DB.save();renderTimeline();};
  const ts=document.getElementById('subtype');if(ts)ts.onchange=e=>{sub.type=e.target.value.startsWith('—')?'':e.target.value;DB.save();renderTimeline();};
  const ds=document.getElementById('delsub');if(ds)ds.onclick=()=>{const n=DB.tasksForSub(sub.id).length;if(!confirm('Delete this substage'+(n?' and its '+n+' task'+(n>1?'s':''):'')+'? (recoverable from the audit log)'))return;DB.data.substages=DB.substages.filter(s=>s.id!==sub.id);DB.data.tasks=DB.tasks.filter(t=>t.substageId!==sub.id);selSub=null;DB.save();renderTimeline();renderTasks();};
  const at=document.getElementById('addtask');if(at)at.onclick=()=>{DB.tasks.push({id:DB.newId(),eventId:ev.id,lane:sub.lane,stage:sub.stage,substageId:sub.id,title:'New task',assignee:null,deadline:'',status:'To do'});DB.save();renderTasks();};
  p.querySelectorAll('[data-tf]').forEach(el=>el.onchange=()=>{const t=DB.tasks.find(x=>x.id==el.dataset.id);let v=el.value;if(el.dataset.tf==='assignee')v=v?+v:null;t[el.dataset.tf]=v;DB.save();});
  p.querySelectorAll('[data-deltask]').forEach(b=>b.onclick=()=>{if(!confirm('Delete this task?'))return;DB.data.tasks=DB.tasks.filter(t=>t.id!=b.dataset.deltask);DB.save();renderTasks();});
}

/* drag: milestones/discounts (mirror), W0 (reschedule), substages (move week / click to open) */
document.addEventListener('mousemove',e=>{
  if(dragMk){dragMk.dx=e.clientX-dragMk.startX;const px=Math.round(dragMk.dx/WEEKW)*WEEKW;dragMk.band.style.transform='translateX('+px+'px)';dragMk.chip.style.transform='translateX('+px+'px)';}
  else if(dragW0){dragW0.dx=e.clientX-dragW0.startX;const px=Math.round(dragW0.dx/WEEKW)*WEEKW;dragW0.band.style.transform='translateX('+px+'px)';dragW0.chip.style.transform='translateX('+px+'px)';}
  else if(dragSub){dragSub.dx=e.clientX-dragSub.startX;if(Math.abs(dragSub.dx)>3)dragSub.moved=true;dragSub.el.style.transform='translateX('+(Math.round(dragSub.dx/WEEKW)*WEEKW)+'px)';}
});
document.addEventListener('mouseup',()=>{
  if(dragMk){const wks=Math.round((dragMk.dx||0)/WEEKW);if(wks){dragMk.ev.milestones&&dragMk.kind==='mile'?(dragMk.ev.milestones[dragMk.field]=Math.max(0,dragMk.ev.milestones[dragMk.field]-wks)):(dragMk.ev.alerts[dragMk.field].off=Math.max(0,dragMk.ev.alerts[dragMk.field].off-wks));if(dragMk.field==='launch'){const off=dragMk.ev.milestones.launch;dragMk.ev.dur.project.scaling=Math.max(1,off);dragMk.ev.dur.marketing.onmarket=Math.max(1,off);}DB.save();}dragMk=null;renderTimeline();}
  else if(dragW0){const wks=Math.round((dragW0.dx||0)/WEEKW);if(wks){dragW0.ev.date=toISO(addDays(ymd(dragW0.ev.date),wks*7));dragW0.ev.prov=false;DB.save();}dragW0=null;renderTimeline();}
  else if(dragSub){const s=dragSub;if(s.moved){const wks=Math.round((s.dx||0)/WEEKW);s.sub.week=s.baseWeek-wks;s.sub.stage=stageKeyAtWeek(s.sub.lane,s.sub.week)||s.sub.stage;DB.save();renderTimeline();if(selSub===s.sub.id)renderTasks();}else{selSub=(selSub===s.sub.id?null:s.sub.id);renderTimeline();renderTasks();}dragSub=null;}
});

function wire(){
  document.getElementById('xls').onclick=e=>{e.preventDefault();exportXLSX(ev.name.replace(/[^\w]+/g,'_')+'.xlsx',[
    {name:'Tasks',rows:DB.tasksFor(ev.id).map(t=>{const s=DB.substages.find(x=>x.id==t.substageId);return{Lane:t.lane,Stage:stageName(t.lane,t.stage),Substage:s?s.name:'',Task:t.title,Responsible:DB.personName(t.assignee),Deadline:t.deadline,Status:t.status};})},
    {name:'Team',rows:ev.team.map(m=>({Name:DB.personName(m.personId),Role:m.role}))}]);};
  document.getElementById('addmem').onclick=()=>{const v=document.getElementById('newp').value;if(!v)return;ev.team.push({personId:+v,role:document.getElementById('newr').value});DB.save();renderTeam();};
}
