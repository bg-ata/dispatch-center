<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>RENMAD Dispatch Center — Event</title>
<style>
  :root{--orange:#FF4A00;--charcoal:#2B2B2B;--ink:#3a3a3a;--muted:#7c7c78;--bg:#f3f2ee;--card:#fff;--line:#e3e1da;--red:#ee2233;--purple:#8E5BC9;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .app{padding:16px 22px 90px;max-width:1300px}
  .nav{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .nav a{text-decoration:none;color:var(--muted);font-weight:600;font-size:13px;padding:5px 11px;border-radius:8px}
  .nav a.on{background:var(--orange);color:#fff}
  .nav .brandlet{margin-left:auto;font-size:13px;color:var(--muted)}
  button{font:inherit;cursor:pointer}
  .btn{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--charcoal);font-size:13px}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:600}
  .btn.sm{padding:3px 9px;font-size:12px}
  .btn:hover{filter:brightness(.97)}
  h1{margin:6px 0 2px;font-size:22px;font-weight:700;color:var(--charcoal);display:flex;align-items:center;gap:8px}
  .chip{width:13px;height:13px;border-radius:4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .panel h3{margin:0 0 6px;font-size:15px}
  .team{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .member{display:flex;align-items:center;gap:6px;background:#f6f5f1;border:1px solid var(--line);border-radius:20px;padding:3px 5px 3px 11px;font-size:13px}
  .member b{font-weight:600} .member select{font:inherit;font-size:11px;border:1px solid var(--line);border-radius:12px;padding:2px 5px;background:#fff}
  .member .x{border:none;background:none;color:#bbb;cursor:pointer;font-size:15px} .member .x:hover{color:var(--red)}
  .addmem{display:flex;gap:6px;align-items:center}
  select,input{font:inherit}
  .hint{font-size:12px;color:var(--muted);font-weight:400}
  .tlwrap{overflow-x:auto;border:1px solid var(--line);border-radius:0;background:#fff}
  .tl{position:relative}
  .thd{border-bottom:1px solid var(--line);background:#faf9f6}
  .mo{position:absolute;top:2px;font-size:11px;font-weight:600;color:var(--charcoal);border-left:1px solid var(--line);padding-left:4px;height:15px}
  .wn{position:absolute;top:18px;font-size:9px;color:#a9a79f;text-align:center;border-left:1px solid #eee}
  .ll{position:absolute;left:4px;font-size:9px;font-weight:800;color:#b4b1a8;z-index:2}
  .stg{position:absolute;border-radius:0;overflow:hidden;z-index:2}
  .stglab{position:absolute;font-size:11px;font-weight:700;color:#43414d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:15px;z-index:11;pointer-events:none}
  .rb{position:absolute;border:none;background:rgba(255,255,255,.85);color:#222;font-size:11px;font-weight:800;padding:0;cursor:pointer;border-radius:0;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .rb:hover{background:#fff}
  .subpill{position:absolute;border-radius:0;font-size:11px;color:#2b2b2b;font-weight:600;padding:0 14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;user-select:none;border:1px solid rgba(0,0,0,.25)}
  .subpill:active{cursor:grabbing}
  .subpill.sel{outline:2px solid var(--charcoal);outline-offset:-1px;font-weight:700}
  .pb{position:absolute;height:17px;width:12px;border:none;background:rgba(255,255,255,.85);color:#222;font-size:11px;font-weight:800;line-height:15px;text-align:center;padding:0;cursor:pointer;z-index:12;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .pb:hover{background:#fff}
  .addsub{position:absolute;height:17px;border:1px dashed #c9c6bd;background:#fff;color:#8a887f;font-size:9px;border-radius:0;padding:0 6px;cursor:pointer;z-index:6}
  .addsub:hover{border-color:var(--orange);color:var(--orange)}
  .colband{position:absolute;z-index:4;opacity:.34;cursor:grab}
  .colchip{position:absolute;height:14px;z-index:8;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border-radius:0;cursor:grab;user-select:none;box-shadow:0 0 0 1px #fff}
  .colchip .x{margin-left:3px;background:rgba(255,255,255,.9);color:#333;border-radius:50%;width:11px;height:11px;line-height:10px;text-align:center;font-size:9px;cursor:pointer}
  .today{position:absolute;z-index:7;width:2px;background:var(--orange)}
  .todaylab{position:absolute;z-index:9;background:var(--orange);color:#fff;font-size:8px;font-weight:800;padding:0 4px;border-radius:2px;top:1px}
  .subedit{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .subedit input{padding:4px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{text-align:left;padding:5px 7px;border-bottom:1px solid #eee}
  th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  td input,td select{font-size:12px;padding:3px 5px;border:1px solid var(--line);border-radius:6px;width:100%}
  td .del{border:none;background:none;color:#c9c6bd;font-size:14px;cursor:pointer}
  .empty{color:var(--muted);font-size:12px;font-style:italic;padding:4px 2px}
</style>
</head>
<body>
<div class="app"><div id="nav"></div><div id="content"></div></div>
<script src="store.js?v=21"></script>
<script>
document.getElementById('nav').innerHTML=navBar('');
const id=+new URLSearchParams(location.search).get('id');
let ev=null, selSub=null, dragMk=null, dragW0=null, dragSub=null;
const WD=11, WEEKW=WD*5, TOPH=30, STGH=21, SUBH=21, GAP=1, LANEPAD=3;
const LANE_LETTER={project:'PM',marketing:'MKT',sales:'SAL',logistics:'LOG'};
/* which stage covers a given week (used to colour/assign substages by position) */
function stageKeyAtWeek(lane,wk){
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const c=evIdx-wk, bars=layLane(ev,lane,evIdx);
  for(const b of bars){if(c>=b.x&&c<b.x+b.w)return b.s.key;}
  return bars.length?bars[bars.length-1].s.key:null;
}
/* substages = a shade darker than their stage: clearly a different row, same colour family */
function darken(hex,f){if(typeof hex!=='string'||hex[0]!=='#'||hex.length<7)return hex;const c=i=>Math.round(parseInt(hex.slice(i,i+2),16)*f),h=v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0');return '#'+h(c(1))+h(c(3))+h(c(5));}
function lum(hex){if(typeof hex!=='string'||hex[0]!=='#'||hex.length<7)return 1;return (0.299*parseInt(hex.slice(1,3),16)+0.587*parseInt(hex.slice(3,5),16)+0.114*parseInt(hex.slice(5,7),16))/255;}
function addSubstage(lane){
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const bars=layLane(ev,lane,evIdx);
  const subs=DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane&&s.week!=null);
  const span=1,occ=new Set();subs.forEach(s=>{const c0=evIdx-s.week,sp=Math.max(s.span||1,1);for(let k=0;k<sp;k++)occ.add(c0+k);});
  const startCol=bars[0]?bars[0].x:0;let col=startCol;
  for(let c=startCol;c<=evIdx;c++){let ok=true;for(let k=0;k<span;k++)if(occ.has(c+k)){ok=false;break;}if(ok){col=c;break;}}
  const wk=evIdx-col, stKey=stageKeyAtWeek(lane,wk)||(bars[0]&&bars[0].s.key), nid=DB.newId();
  DB.substages.push({id:nid,eventId:ev.id,lane,stage:stKey,name:lane==='marketing'?'Webinar':'New item',order:DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane).length,week:wk,span});
  selSub=nid;DB.save();renderTimeline();renderTasks();const f=document.getElementById('subname');if(f){f.focus();f.select();}
}
function renderAddBar(){const bar=document.getElementById('addbar');if(!bar)return;
  if(!DB.canManage()){bar.style.display='none';return;} // members: timeline is read-only (server enforces it too)
  bar.innerHTML='<span style="font-size:12px;color:var(--muted);font-weight:600">＋ Add substage to:</span>';
  LANES.forEach(lane=>{const b=document.createElement('button');b.className='btn sm';b.textContent=LANE_LABEL[lane]||lane;b.onclick=()=>addSubstage(lane);bar.appendChild(b);});
}

function scrollToToday(){const wrap=document.querySelector('.tlwrap');if(!wrap)return;
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const todayIdx=Math.round((+monday(new Date())-+start)/(7*86400000));
  wrap.scrollLeft=Math.max(0,todayIdx*WEEKW-6);}
boot(()=>{ev=DB.event(id);const C=document.getElementById('content');
  if(!ev){C.innerHTML='<p>Event not found. <a href="gantt.html">Back to overview</a></p>';return;}render();scrollToToday();});
window.addEventListener('dc-remote',()=>{if(!DB.event(id)){location.href='gantt.html';return;}ev=DB.event(id);render();});

function peopleOpts(sel){return '<option value="">— unassigned —</option>'+DB.people.map(p=>'<option value="'+p.id+'" '+(p.id==sel?'selected':'')+'>'+p.name+'</option>').join('');}

function render(){
  if(!ev.team)ev.team=[];
  document.getElementById('content').innerHTML=
    '<h1><span class="chip" style="background:'+(TOPICS[ev.topic]||'#999')+'"></span>'+ev.name+'</h1>'+
    '<p class="sub">'+(ev.city||'')+(ev.city&&ev.country?', ':'')+(ev.country||'')+' · '+dateRange(ev)+' &nbsp; <a href="gantt.html">← overview</a> &nbsp;·&nbsp; <a href="#" id="xls">⬇ Excel</a></p>'+
    (function(){const f=DB.financeFor(ev.id);if(!f)return'';const r=finResult(f);
      return '<p class="sub" style="margin-top:-8px">€ <a href="finance.html" style="color:inherit">Target '+finFmt(f.target)+' · Stretch '+finFmt(f.stretch)+' · Facturado '+finFmt(f.invoiced)+
      (r?' · <b style="color:'+r.color+'">'+r.label+'</b>':'')+' · Margin '+finFmt(finMargin(f))+'</a></p>';})()+
    '<div class="panel"><h3>Team</h3><div class="team" id="team"></div>'+
      '<div class="addmem"><select id="newp"></select><select id="newr">'+ROLES.map(r=>'<option>'+r+'</option>').join('')+'</select><button class="btn sm" id="addmem">+ Attach person</button></div></div>'+
    '<div class="panel"><h3>Detailed timeline <span class="hint">— stage line + substage line per lane · drag a substage to move · +/− to resize · click it to open tasks</span></h3>'+
      '<div id="addbar" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:2px 0 10px"></div>'+
      '<div class="tlwrap"><div class="tl" id="tl"></div></div></div>'+
    '<div class="panel" id="tkpanel"></div>';
  renderTeam(); renderAddBar(); renderTimeline(); renderTasks(); wire();
}

function renderTeam(){
  const t=document.getElementById('team');
  const mg=DB.canManage(); // members see the team read-only
  t.innerHTML=ev.team.map(m=>{const p=DB.person(m.personId);if(!p)return'';
    return mg?('<span class="member"><b>'+p.name+'</b><select data-role="'+m.personId+'">'+ROLES.map(r=>'<option '+(r===m.role?'selected':'')+'>'+r+'</option>').join('')+'</select><button class="x" data-rm="'+m.personId+'">×</button></span>')
             :('<span class="member"><b>'+p.name+'</b><span class="hint">'+m.role+'</span></span>');}).join('')||'<span class="empty">No one attached yet.</span>';
  const am=document.querySelector('.addmem');if(am&&!mg){am.style.display='none';}
  if(mg){const inTeam=ev.team.map(m=>m.personId);
    document.getElementById('newp').innerHTML=DB.people.filter(p=>!inTeam.includes(p.id)).map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('')||'<option value="">(all attached)</option>';}
  t.querySelectorAll('[data-role]').forEach(s=>s.onchange=()=>{ev.team.find(m=>m.personId==s.dataset.role).role=s.value;DB.save();});
  t.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ev.team=ev.team.filter(m=>m.personId!=b.dataset.rm);DB.save();renderTeam();});
}

function subColor(sub,stageColor){return (sub.type&&MKT_TYPES[sub.type])?MKT_TYPES[sub.type]:stageColor;}

function renderTimeline(){
  const tl=document.getElementById('tl');
  const start=addDays(monday(ymd(ev.date)),-(preExtent(ev)+2)*7);
  const evIdx=Math.round((+monday(ymd(ev.date))-+start)/(7*86400000));
  const NW=preExtent(ev)+2+6, BW=NW*WEEKW;
  const todayIdx=Math.round((+monday(new Date())-+start)/(7*86400000));

  // ---- per-lane layout: exactly TWO rows each — a stage line + one substage line (8 lines total) ----
  const laneLay=LANES.map(lane=>{
    const bars=layLane(ev,lane,evIdx);
    const subs=DB.substages.filter(s=>s.eventId==ev.id&&s.lane===lane);
    let dirty=false;
    // 1) default week (spread across its stage) for any substage missing one
    const byStage={};subs.forEach(s=>{(byStage[s.stage]=byStage[s.stage]||[]).push(s);});
    Object.keys(byStage).forEach(k=>{const bar=bars.find(b=>b.s.key===k);if(!bar)return;const list=byStage[k];
      list.forEach((s,i)=>{if(s.week==null){const col=Math.round(bar.x+(i+0.5)*bar.w/list.length-0.5);s.week=evIdx-col;dirty=true;}});});
    // 2) default span for any substage missing one: wide enough to read the name, capped by the gap to the next (so no overlap)
    const arr=subs.map(s=>({s,c:evIdx-s.week})).sort((a,b)=>a.c-b.c);
    arr.forEach((o,i)=>{if(o.s.span==null){const nextC=(i+1<arr.length)?arr[i+1].c:(evIdx+1);const gap=Math.max(1,nextC-o.c);const need=Math.max(1,Math.ceil(((o.s.name||'').length*6.6+34)/WEEKW));o.s.span=Math.min(need,gap);dirty=true;}});
    if(dirty&&(!USE_SUPABASE||DB.canManage()))DB.save(); // members never push layout defaults
    return {lane,bars,subs};
  });
  const LANEH2=STGH+GAP+SUBH+LANEPAD;
  let acc=TOPH;laneLay.forEach(L=>{L.y=acc;acc+=LANEH2;});
  const bodyH=acc+4;

  tl.style.cssText='width:'+BW+'px;height:'+bodyH+'px';
  let h='';
  for(let w=0;w<NW;w++){h+='<div style="position:absolute;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px;left:'+(w*WEEKW)+'px;border-left:1px solid #e3e0d8;z-index:0"></div>';
    for(let dc=1;dc<5;dc++)h+='<div style="position:absolute;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px;left:'+(w*WEEKW+dc*WD)+'px;border-left:1px solid #f2f0ea;z-index:0"></div>';}
  h+='<div class="thd" style="position:absolute;left:0;top:0;width:'+BW+'px;height:'+TOPH+'px"></div>';
  for(let w=0;w<NW;w++){const d=addDays(start,w*7);
    if(d.getDate()<=7)h+='<div class="mo" style="left:'+(w*WEEKW)+'px">'+MON[d.getMonth()]+(d.getMonth()===0?" '"+String(d.getFullYear()).slice(2):'')+'</div>';
    const diff=evIdx-w;h+='<div class="wn" style="left:'+(w*WEEKW)+'px;width:'+WEEKW+'px">'+(diff===0?'W0':diff>0?('W-'+diff):('+'+(-diff)))+'</div>';}
  if(todayIdx>=0&&todayIdx<NW)h+='<div class="todaylab" style="left:'+(todayIdx*WEEKW)+'px">TODAY</div>';
  tl.innerHTML=h;
  if(todayIdx>=0&&todayIdx<NW){const t2=document.createElement('div');t2.className='today';t2.style.cssText='left:'+(todayIdx*WEEKW)+'px;top:'+TOPH+'px;height:'+(bodyH-TOPH)+'px';tl.appendChild(t2);}

  const btnLayer=document.createElement('div');btnLayer.style.cssText='position:absolute;inset:0;z-index:9;pointer-events:none';tl.appendChild(btnLayer);
  function addBtn(x,y,lane,key,delta,label){const b=document.createElement('button');b.className='rb';b.textContent=label;b.style.cssText='left:'+x+'px;top:'+y+'px;width:13px;height:'+STGH+'px;pointer-events:auto';b.onclick=e=>{e.stopPropagation();const o=ev.dur[lane];o[key]=Math.max(1,(o[key]||1)+delta);if(lane==='project'&&key==='scaling')ev.milestones.launch=o.scaling;DB.save();renderTimeline();};btnLayer.appendChild(b);}
  function stageAtCol(bars,c){for(const b of bars){if(c>=b.x&&c<b.x+b.w)return b.s;}return bars[bars.length-1].s;}

  laneLay.forEach(L=>{
    const lane=L.lane, y=L.y, sy=y+STGH+GAP;
    const ll=document.createElement('div');ll.className='ll';ll.style.top=(y+2)+'px';ll.textContent=LANE_LETTER[lane];tl.appendChild(ll);
    // ---- row 1: stage bars ----
    L.bars.forEach(bar=>{
      const x=bar.x*WEEKW, w=Math.max(bar.w*WEEKW,10);
      const seg=document.createElement('div');seg.className='stg';seg.style.cssText='left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+STGH+'px;background:'+bar.s.color;seg.title=bar.s.name;tl.appendChild(seg);
      const sl=document.createElement('div');sl.className='stglab';sl.style.cssText='left:'+(x+15)+'px;top:'+(y+4)+'px;max-width:'+(w-30)+'px;color:'+(bar.s.color==='#111111'?'#fff':'#3a3844');sl.textContent=bar.s.name;tl.appendChild(sl);
      addBtn(x,y,lane,bar.s.key,-1,'−'); addBtn(x+w-13,y,lane,bar.s.key,1,'+');
    });
    // ---- row 2: substages — ALL on one line; positioned by week, sized by span, colour follows the stage beneath ----
    L.subs.forEach(sub=>{
      const span=Math.max(sub.span||1,1), wk=sub.week, c=evIdx-wk, st=stageAtCol(L.bars,c);
      const x=c*WEEKW+2, pw=span*WEEKW-4;
      const fill=darken(subColor(sub,st.color),0.78);
      const pill=document.createElement('div');pill.className='subpill'+(selSub===sub.id?' sel':'');
      pill.style.cssText='left:'+x+'px;top:'+sy+'px;width:'+pw+'px;height:'+SUBH+'px;line-height:'+SUBH+'px;background:'+fill+';color:'+(lum(fill)<0.5?'#fff':'#2b2b2b')+';z-index:10';
      pill.textContent=sub.name;pill.title=sub.name+' — drag to move · +/− to resize · click to open tasks';
      pill.addEventListener('mousedown',e=>{dragSub={sub,startX:e.clientX,dx:0,el:pill,baseWeek:wk,moved:false};e.preventDefault();});
      tl.appendChild(pill);
      // − / + to shorten / lengthen the substage (in weeks), staying on the same line
      const rb=(left,label,delta,tip)=>{const b=document.createElement('button');b.className='pb';b.textContent=label;b.style.cssText='left:'+left+'px;top:'+sy+'px;height:'+SUBH+'px;line-height:'+(SUBH-3)+'px';b.title=tip+' '+sub.name;
        b.addEventListener('mousedown',e=>e.stopPropagation());
        b.onclick=e=>{e.stopPropagation();let ns=Math.max(1,(sub.span||1)+delta);
          if(delta>0){let nextC=Infinity;L.subs.forEach(o=>{if(o.id===sub.id)return;const oc=evIdx-o.week;if(oc>c&&oc<nextC)nextC=oc;});const cap=(nextC===Infinity)?(evIdx-c+1):(nextC-c);ns=Math.min(ns,Math.max(1,cap));}
          sub.span=ns;DB.save();renderTimeline();if(selSub===sub.id)renderTasks();};tl.appendChild(b);};
      rb(x,'−',-1,'shorten'); rb(x+pw-12,'+',1,'lengthen');
    });
  });

  const colTop=TOPH, colH=bodyH-TOPH;
  function col(off,label,color,kind,field){
    const x=(evIdx-off)*WEEKW;
    const band=document.createElement('div');band.className='colband';band.style.cssText='left:'+x+'px;width:'+WEEKW+'px;top:'+colTop+'px;height:'+colH+'px;background:'+color;tl.appendChild(band);
    const chip=document.createElement('div');chip.className='colchip';chip.style.cssText='left:'+x+'px;width:'+WEEKW+'px;top:'+(TOPH-16)+'px;background:'+color;
    chip.innerHTML='<span style="pointer-events:none">'+label+'</span>'+(kind==='ld'?'<span class="x" title="remove">×</span>':'');
    chip.title=label+' (W-'+off+')'+(kind==='w0'?' — drag to reschedule':' — drag to move');
    const st=e=>{if(e.target.classList.contains('x'))return;if(kind==='w0')dragW0={ev,startX:e.clientX,dx:0,band,chip};else dragMk={ev,field,kind,startX:e.clientX,dx:0,band,chip};e.preventDefault();};
    chip.addEventListener('mousedown',st);band.addEventListener('mousedown',st);
    const xb=chip.querySelector('.x');if(xb)xb.onclick=ev2=>{ev2.stopPropagation();ev.alerts.LD.on=false;DB.save();renderTimeline();};
    tl.appendChild(chip);
  }
  col(ev.milestones.goNoGo,'G','var(--red)','mile','goNoGo');
  col(ev.milestones.launch,'L','var(--red)','mile','launch');
  if(ev.alerts.LD.on) col(ev.alerts.LD.off,'LD','var(--purple)','ld','LD');
  col(ev.alerts.SE.off,'SE','var(--purple)','alert','SE');
  col(ev.alerts.EB.off,'EB','var(--purple)','alert','EB');
  col(ev.alerts.LC.off,'LC','var(--purple)','alert','LC');
  col(0,'W0','#111','w0','');
}

function renderTasks(){
  const p=document.getElementById('tkpanel');
  if(!selSub){p.innerHTML='<span class="empty">Click a substage in the timeline to rename it, set its week/type, and edit its tasks &amp; owners.</span>';return;}
  const sub=DB.substages.find(s=>s.id===selSub);
  if(!sub){selSub=null;p.innerHTML='';return;}
  const tks=DB.tasksForSub(sub.id);
  const mg=DB.canManage(); // managers & admins edit everything; members tick the status of their OWN tasks
  let h='<div class="subedit"><b style="color:var(--muted);font-size:11px;text-transform:uppercase">'+stageName(sub.lane,sub.stage)+'</b>'+
    (mg?'<input id="subname" value="'+(sub.name||'').replace(/"/g,'&quot;')+'" style="width:230px">'
       :'<span style="font-weight:600">'+(sub.name||'')+'</span>');
  if(sub.lane==='marketing'){h+=mg?('<select id="subtype">'+['','Content','Product','Sales','Webinar'].map(t=>'<option '+(t===(sub.type||'')?'selected':'')+'>'+(t||'— type —')+'</option>').join('')+'</select>')
                                 :(sub.type?'<span class="hint">'+sub.type+'</span>':'');}
  h+='<span class="hint">week W-'+(sub.week!=null?sub.week:'?')+((sub.span||1)>1?(' · '+(sub.span||1)+' wks'):'')+'</span>';
  if(mg)h+='<button class="btn sm" id="delsub" style="color:#A32D2D;border-color:#f0c4c4">Delete substage</button>'+
    '<button class="btn sm" id="addtask" style="margin-left:auto">+ Add task</button>';
  h+='</div>';
  h+='<table><tr><th>Task</th><th style="width:160px">Responsible</th><th style="width:140px">Deadline</th><th style="width:120px">Status'+(mg?'':' <span style="text-transform:none;letter-spacing:0;color:#b4b1a8">· you can tick your own</span>')+'</th><th style="width:24px"></th></tr>';
  if(!tks.length)h+='<tr><td colspan="5" class="empty">No tasks yet'+(mg?' — add one.':'.')+'</td></tr>';
  tks.forEach(t=>{const canS=DB.canEditStatus(t);h+='<tr>'+
    '<td>'+(mg?'<input data-tf="title" data-id="'+t.id+'" value="'+(t.title||'').replace(/"/g,'&quot;')+'">':(t.title||''))+'</td>'+
    '<td>'+(mg?'<select data-tf="assignee" data-id="'+t.id+'">'+peopleOpts(t.assignee)+'</select>':DB.personName(t.assignee))+'</td>'+
    '<td>'+(mg?'<input type="date" data-tf="deadline" data-id="'+t.id+'" value="'+(t.deadline||'')+'">':(t.deadline||'—'))+'</td>'+
    '<td>'+(canS?('<select data-tf="status" data-id="'+t.id+'">'+STATUS.map(s=>'<option '+(s===t.status?'selected':'')+'>'+s+'</option>').join('')+'</select>'):('<span class="rostat" style="font-size:12px;color:#6f6e6a">'+(t.status||'')+'</span>'))+'</td>'+
    '<td>'+(mg?'<button class="del" data-deltask="'+t.id+'">×</button>':'')+'</td></tr>';});
  h+='</table>';
  p.innerHTML=h;
  const sn=document.getElementById('subname');if(sn)sn.onchange=e=>{sub.name=e.target.value;DB.save();renderTimeline();};
  const ts=document.getElementById('subtype');if(ts)ts.onchange=e=>{sub.type=e.target.value.startsWith('—')?'':e.target.value;DB.save();renderTimeline();};
  const ds=document.getElementById('delsub');if(ds)ds.onclick=()=>{DB.data.substages=DB.substages.filter(s=>s.id!==sub.id);DB.data.tasks=DB.tasks.filter(t=>t.substageId!==sub.id);selSub=null;DB.save();renderTimeline();renderTasks();};
  const at=document.getElementById('addtask');if(at)at.onclick=()=>{DB.tasks.push({id:DB.newId(),eventId:ev.id,lane:sub.lane,stage:sub.stage,substageId:sub.id,title:'New task',assignee:null,deadline:'',status:'To do'});DB.save();renderTasks();};
  p.querySelectorAll('[data-tf]').forEach(el=>el.onchange=()=>{const t=DB.tasks.find(x=>x.id==el.dataset.id);let v=el.value;if(el.dataset.tf==='assignee')v=v?+v:null;t[el.dataset.tf]=v;DB.save();});
  p.querySelectorAll('[data-deltask]').forEach(b=>b.onclick=()=>{DB.data.tasks=DB.tasks.filter(t=>t.id!=b.dataset.deltask);DB.save();renderTasks();});
}

/* drag: milestones/discounts (mirror), W0 (reschedule), substages (move week / click to open) */
document.addEventListener('mousemove',e=>{
  if(dragMk){dragMk.dx=e.clientX-dragMk.startX;const px=Math.round(dragMk.dx/WEEKW)*WEEKW;dragMk.band.style.transform='translateX('+px+'px)';dragMk.chip.style.transform='translateX('+px+'px)';}
  else if(dragW0){dragW0.dx=e.clientX-dragW0.startX;const px=Math.round(dragW0.dx/WEEKW)*WEEKW;dragW0.band.style.transform='translateX('+px+'px)';dragW0.chip.style.transform='translateX('+px+'px)';}
  else if(dragSub){dragSub.dx=e.clientX-dragSub.startX;if(Math.abs(dragSub.dx)>3)dragSub.moved=true;dragSub.el.style.transform='translateX('+(Math.round(dragSub.dx/WEEKW)*WEEKW)+'px)';}
});
document.addEventListener('mouseup',()=>{
  if(dragMk){const wks=Math.round((dragMk.dx||0)/WEEKW);if(wks){dragMk.ev.milestones&&dragMk.kind==='mile'?(dragMk.ev.milestones[dragMk.field]=Math.max(0,dragMk.ev.milestones[dragMk.field]-wks)):(dragMk.ev.alerts[dragMk.field].off=Math.max(0,dragMk.ev.alerts[dragMk.field].off-wks));if(dragMk.field==='launch'){const off=dragMk.ev.milestones.launch;dragMk.ev.dur.project.scaling=Math.max(1,off);dragMk.ev.dur.marketing.onmarket=Math.max(1,off);}DB.save();}dragMk=null;renderTimeline();}
  else if(dragW0){const wks=Math.round((dragW0.dx||0)/WEEKW);if(wks){dragW0.ev.date=toISO(addDays(ymd(dragW0.ev.date),wks*7));dragW0.ev.prov=false;DB.save();}dragW0=null;renderTimeline();}
  else if(dragSub){const s=dragSub;if(s.moved){const wks=Math.round((s.dx||0)/WEEKW);s.sub.week=s.baseWeek-wks;s.sub.stage=stageKeyAtWeek(s.sub.lane,s.sub.week)||s.sub.stage;DB.save();renderTimeline();if(selSub===s.sub.id)renderTasks();}else{selSub=(selSub===s.sub.id?null:s.sub.id);renderTimeline();renderTasks();}dragSub=null;}
});

function wire(){
  document.getElementById('xls').onclick=e=>{e.preventDefault();exportXLSX(ev.name.replace(/[^\w]+/g,'_')+'.xlsx',[
    {name:'Tasks',rows:DB.tasksFor(ev.id).map(t=>{const s=DB.substages.find(x=>x.id==t.substageId);return{Lane:t.lane,Stage:stageName(t.lane,t.stage),Substage:s?s.name:'',Task:t.title,Responsible:DB.personName(t.assignee),Deadline:t.deadline,Status:t.status};})},
    {name:'Team',rows:ev.team.map(m=>({Name:DB.personName(m.personId),Role:m.role}))}]);};
  document.getElementById('addmem').onclick=()=>{const v=document.getElementById('newp').value;if(!v)return;ev.team.push({personId:+v,role:document.getElementById('newr').value});DB.save();renderTeam();};
}
</script>
